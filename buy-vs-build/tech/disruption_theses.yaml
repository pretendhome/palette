  # ═══════════════════════════════════════════════════════════════
  # THESIS 1: DATA PLATFORMS EAT THE APPLICATION LAYER
  # ═══════════════════════════════════════════════════════════════

  - id: DISRUPT-DATA-EATS-APPS
    name: "Data Platforms Eat the Application Layer"
    thesis: >
      Databricks, Snowflake, and ClickHouse are moving UP the stack into
      application territory. Enterprises are building custom apps INSIDE
      data platforms instead of buying SaaS. A performance review tool was
      SaaS, then got rebuilt in Databricks, then got sold. This pattern
      will repeat across every vertical SaaS category sitting on top of
      warehouse data.
    direction: bearish_saas
    timeframe: 12-36 months
    confidence: high

    evidence:
      - session: S10
        speaker: "Data Infra Keynote Panel (Altimeter, ClickHouse, Snowflake, Databricks)"
        quote: "Data platforms moving up the stack — ClickStack, Cortex Code, Snowflake native apps. Platforms becoming app environments."
      - session: S10
        speaker: "Panel"
        quote: "People want to host inside data platforms — companies building custom apps inside Databricks/Snowflake instead of buying SaaS."
      - session: S10
        speaker: "Panel"
        quote: "Performance review tool was SaaS, then they built it in Databricks, then sold it."
      - session: S10
        speaker: "Panel"
        quote: "Transparent and simple pricing to understand what they are paying for."

    exposed_companies:
      - name: "Vertical SaaS on Snowflake/Databricks"
        ticker: various
        risk: "Displacement by native data platform apps"
        detail: "Any SaaS company whose primary value is querying/transforming data the customer already has in a warehouse. The warehouse will do it natively."
      - name: "Expedia Group"
        ticker: EXPE
        risk: "If Snowflake/Databricks enable enterprises to build travel-booking intelligence internally"
        detail: "Long-shot but directional — the pattern is 'if the data lives in the platform, the app moves there too.'"
      - name: "Salesforce"
        ticker: CRM
        risk: "Agentforce competes with Databricks Apps for the enterprise agent layer"
        detail: "Salesforce is building agents on its own data, but if enterprise data lives in Databricks, that's where agents will run."
      - name: "ServiceNow"
        ticker: NOW
        risk: "Enterprise workflow SaaS vulnerable if orchestration moves to data platforms"
        detail: "ServiceNow's value is workflow on enterprise data. If the data platform does workflow natively, the middleware layer compresses."

    beneficiaries:
      - name: "Databricks"
        ticker: private
        why: "Moving from analytics platform to full application platform. Every app built inside Databricks is revenue they took from a SaaS vendor."
      - name: "Snowflake"
        ticker: SNOW
        why: "Cortex + native apps + Snowpark = full application runtime on warehouse data. Marketplace creates distribution."
      - name: "ClickHouse"
        ticker: private
        why: "ClickStack = real-time analytics + app runtime. Fastest at the query layer."

    watchlist_triggers:
      - "Snowflake or Databricks launches a native CRM/HR/finance app"
      - "Enterprise customer case study replacing SaaS with native data platform app"
      - "Snowflake Marketplace grows >50% YoY in app listings"
      - "Databricks Apps GA with >1000 published apps"
      - "Vertical SaaS vendor cites 'data platform competition' in earnings call"

    morning_brief: >
      Databricks and Snowflake are becoming app platforms, not just data warehouses.
      Every vertical SaaS company sitting on top of warehouse data is at risk of
      displacement by native apps. Watch for Snowflake Cortex and Databricks Apps
      announcements — each one compresses the SaaS middleware layer.

  # ═══════════════════════════════════════════════════════════════
  # THESIS 2: CLOUD PEAK / ON-PREM RENAISSANCE
  # ═══════════════════════════════════════════════════════════════

  - id: DISRUPT-CLOUD-PEAK
    name: "Cloud Peak — On-Prem and Edge AI Renaissance"
    thesis: >
      Cloud infrastructure revenue growth is peaking. The future is edge,
      ambient, and on-prem inference. Models like Kimi K2.6 deliver 80%
      cheaper inference with equivalent quality. llamafile (24K GitHub stars)
      enables single-file LLM distribution. As inference moves to edge
      devices and on-prem hardware, hyperscaler revenue concentration
      weakens. Companies with on-prem infrastructure (IBM, Intel, HPE)
      have a comeback path.
    direction: bearish_hyperscalers_long_term
    timeframe: 18-48 months
    confidence: medium

    evidence:
      - session: S15
        speaker: "Modern Inference Keynote"
        quote: "This is the most cloud-centric that cloud will ever be."
      - session: S06
        speaker: "Meryem Arik, Doubleword"
        quote: "Kimi K2.6 — 80% cheaper, just as good. Cheaper model + more data beats expensive model."
      - session: S16
        speaker: "Keynote Panel"
        quote: "Open source is a viable alternative. We need good rounded corners."
        detail: "llamafile (24K stars), any-llm (2K stars), any-agent (1.2K stars)"
      - session: S09
        speaker: "Yaroslav Bulatov"
        quote: "Path dependency — 1. Make a good design decision. 2. Environment changes. 3. Decision is now bad."
        detail: "Cloud lock-in is path-dependent. Environment (cost, regulation, latency) is changing."
      - session: S15
        speaker: "Keynote"
        quote: "Edge/ambient inference = Apple, laptops, LM Studio, local models."

    exposed_companies:
      - name: "Amazon Web Services"
        ticker: AMZN
        risk: "AI inference revenue growth slows as local/edge models close quality gap"
        detail: "AWS Bedrock charges per-token. If Kimi K2.6 runs locally at 80% discount for 80% of workloads, Bedrock loses the long-tail."
      - name: "Microsoft Azure"
        ticker: MSFT
        risk: "Azure AI revenue depends on inference staying cloud-centric"
        detail: "Windows + local models could be the hedge — Microsoft is in both positions."
      - name: "Google Cloud"
        ticker: GOOGL
        risk: "Gemini inference revenue at risk from open-source Gemma running locally"
        detail: "Google hedges with on-device (Android AI), but cloud margin at risk."

    beneficiaries:
      - name: "NVIDIA"
        ticker: NVDA
        why: "Wins either way — cloud GPUs or on-prem GPUs. Edge AI needs NVIDIA silicon too."
      - name: "AMD"
        ticker: AMD
        why: "Efficient throughput for agentic workloads. Conference noted 'AMD for efficient throughput.' MI300X competitive for inference."
      - name: "Intel"
        ticker: INTC
        why: "Gaudi accelerators for on-prem inference. If cloud peaks, enterprise on-prem AI hardware demand rises. Intel's data center business has a comeback path."
      - name: "IBM"
        ticker: IBM
        why: "Red Hat + watsonx + on-prem enterprise AI. If regulated industries (banking, healthcare, defense) move inference on-prem for data sovereignty, IBM is positioned."
      - name: "Apple"
        ticker: AAPL
        why: "On-device inference (Apple Silicon). As models shrink to run on M-series chips, Apple captures the consumer edge AI market without cloud costs."
      - name: "HPE"
        ticker: HPE
        why: "Enterprise on-prem infrastructure. If the pendulum swings from cloud to hybrid/on-prem, HPE's server business benefits."
      - name: "Dell Technologies"
        ticker: DELL
        why: "Enterprise servers + PowerEdge AI servers. Same on-prem thesis as HPE."

    watchlist_triggers:
      - "Open-source model benchmarks within 5% of frontier on key tasks"
      - "Enterprise announces moving AI inference from cloud to on-prem"
      - "Kimi, Llama, or Mistral model runs on consumer hardware at GPT-4 quality"
      - "Hyperscaler AI revenue growth decelerates for 2 consecutive quarters"
      - "Apple announces on-device LLM features at WWDC"
      - "Intel Gaudi wins a major enterprise AI deployment"
      - "llamafile or Ollama downloads exceed 10M"

    morning_brief: >
      "This is the most cloud-centric cloud will ever be." Open-source models
      at 80% discount are closing the quality gap. Watch Intel Gaudi, IBM watsonx,
      and Apple on-device AI. If inference moves to edge, hyperscaler AI margins
      compress and on-prem hardware makers (IBM, Intel, HPE, Dell) come roaring back.

  # ═══════════════════════════════════════════════════════════════
  # THESIS 3: REDIS AND THE CONTEXT ENGINE RACE
  # ═══════════════════════════════════════════════════════════════

  - id: DISRUPT-CONTEXT-ENGINE
    name: "The Context Engine Race — Data + Inference in One System"
    thesis: >
      Redis is positioning as THE operating system for agent context —
      vector search + BM25 + semantic caching + agent memory + real-time
      ETL in a single system. If Redis solves memory + retrieval + inference
      context in one layer, it could enable edge AI systems where data and
      inference live in the same process. This would displace traditional
      databases, vector DBs, and cache layers. But the moat question is
      real — "anyone can copy Redis."
    direction: disruptive_new_layer
    timeframe: 12-24 months
    confidence: medium-high

    evidence:
      - session: S13
        speaker: "Redis Context Engineering"
        quote: "Context Engineering is becoming a new field."
      - session: S13
        speaker: "Redis"
        quote: "Context selection, not context accumulation. Memory is really STATE. Memory = ETL."
      - session: S13
        speaker: "Redis"
        quote: "An operating system for agent context."
      - session: S13
        speaker: "Redis"
        quote: "Semantic caching (LangCache) — cache by semantic similarity."
      - session: S13
        speaker: "Redis"
        quote: "RDI = real-time ETL for freshness."
      - session: S04
        speaker: "Glauber Costa, Turso CEO"
        quote: "Agents create an insane amount of data about their own state — this is already done with MD but it will ALWAYS BECOME a database."
      - session: S07
        speaker: "Apoorva Joshi, MongoDB"
        quote: "Agent memory = distributed engineering problem."

    exposed_companies:
      - name: "Pinecone"
        ticker: private
        risk: "Pure vector DB displaced if Redis does vector + BM25 + caching natively"
        detail: "If the agent context layer needs hybrid (not just vector), single-purpose vector DBs lose."
      - name: "Weaviate"
        ticker: private
        risk: "Same as Pinecone — vector-only DB vulnerable to hybrid context engines"
        detail: "Weaviate adds features but starts from vector-first. Redis starts from data-structure-first."
      - name: "MongoDB"
        ticker: MDB
        risk: "If agent memory consolidates into context engines rather than general-purpose databases"
        detail: "MongoDB Atlas Vector Search is a hedge, but if Redis becomes the default agent memory layer, MongoDB loses that workload."
      - name: "Elastic"
        ticker: ESTC
        risk: "BM25 search commoditized when Redis does it natively alongside vector"
        detail: "Elastic's moat was full-text search. Redis now does BM25 + vector + semantic caching."

    beneficiaries:
      - name: "Redis"
        ticker: private
        why: "If they own the context engine layer, every agent system needs Redis. Massive TAM expansion from cache → agent infrastructure."
      - name: "Turso"
        ticker: private
        why: "SQLite-in-Rust with async, WASM, concurrent writes, vector search. Purpose-built for per-agent state at scale. 'We're the governance on top, you're the storage underneath.'"
      - name: "turbopuffer"
        ticker: private
        why: "AI search connecting AI to data, S3-backed, semantically aware. The retrieval primitive for agent systems."

    watchlist_triggers:
      - "Redis launches 'Agent Memory Server' as GA product"
      - "Major LLM framework (LangChain, LlamaIndex) adopts Redis as default context backend"
      - "Turso announces agent-scale deployment with major customer"
      - "Edge AI demo where data + inference + context live in one process"
      - "Pinecone or Weaviate pivots to hybrid context engine positioning"
      - "MongoDB Atlas or Elastic launches dedicated 'agent context' product"

    morning_brief: >
      Redis is racing to become the operating system for agent context — vector +
      BM25 + caching + memory + real-time ETL in one system. If they win, pure
      vector DBs (Pinecone, Weaviate) and general databases (MongoDB) lose the
      agent memory workload. Turso (SQLite-in-Rust) is the dark horse for
      per-agent state. The edge AI question: can data + inference live in one
      system? Redis thinks yes.

  # ═══════════════════════════════════════════════════════════════
  # THESIS 4: AGENT SECURITY AS THE NEW INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════

  - id: DISRUPT-AGENT-SECURITY
    name: "Agent Security — The Unsolved Infrastructure Layer"
    thesis: >
      Agent identity and traceability are UNSOLVED PROBLEMS in production.
      Every company deploying agents without governance is exposed to
      identity spoofing, privilege inflation, cascading failures, and
      supply chain attacks. TTE (Time to Exploit) collapsed to 10 hours.
      MCP without auth is an open door. This creates a new infrastructure
      category worth billions — and exposes every company rushing to deploy
      agents without security.
    direction: new_infrastructure_category
    timeframe: 6-18 months
    confidence: very_high

    evidence:
      - session: S17
        speaker: "Diana Kelley, CISO Noma Security"
        quote: "5-boundary matrix: Instruction, Knowledge, Retrieval, Memory, Action + Identity"
      - session: S18
        speaker: "Feross Aboukhadijeh, Socket CEO"
        quote: "TTE collapsed to 10 hours. MCP without auth = open door."
      - session: S19
        speaker: "Enterprise Trust Panel"
        quote: "Agent Identity and Traceability are UNSOLVED PROBLEMS."
      - session: S19
        speaker: "Panel"
        quote: "Control, autonomy, permissions are DIALS not booleans."
      - session: S19
        speaker: "Panel"
        quote: "Only good strategy is build it yourself."
      - session: S21
        speaker: "Ian Livingstone, Keycard"
        quote: "Insurance company with 1000+ agents in production... Who asked the agent to do this? What were the constraints?"
      - session: S21
        speaker: "All speakers"
        quote: "Don't fuck up auth. Every C-level adoption is stalled on auth security."

    exposed_companies:
      - name: "Every enterprise deploying agents without governance"
        ticker: various
        risk: "Production agent incidents, data breaches, unauthorized actions"
        detail: "Insurance company example: 1000+ agents, citizen developers encoding them, no traceability. One bad agent action = regulatory incident."
      - name: "Salesforce (Agentforce)"
        ticker: CRM
        risk: "If Agentforce agents lack identity/traceability at enterprise scale"
        detail: "Salesforce is pushing agents hard. If a customer's Agentforce agent does something unauthorized, liability question is massive."
      - name: "Microsoft (Copilot)"
        ticker: MSFT
        risk: "Copilot agents acting on behalf of users without fine-grained governance"
        detail: "Copilot has broad access to enterprise data. Identity nesting problem: is this the user or Copilot acting on behalf of Copilot?"

    beneficiaries:
      - name: "Noma Security"
        ticker: private
        why: "Diana Kelley's boundary matrix is the framework. First-mover in agent-specific security."
      - name: "Socket"
        ticker: private
        why: "Supply chain security for agents. TrustFall vulnerability = one-click patching for agent ecosystems."
      - name: "Keycard"
        ticker: private
        why: "Cryptographic agent identity. Ian Livingstone: 'First party auth for agents.' Potential Okta-for-agents."
      - name: "CrowdStrike"
        ticker: CRWD
        why: "If agent security becomes an extension of endpoint security, CrowdStrike has the enterprise footprint."
      - name: "Palo Alto Networks"
        ticker: PANW
        why: "Network-level agent security. If agents make network calls, firewall/proxy layer needs agent-awareness."

    watchlist_triggers:
      - "Major enterprise agent security incident reported publicly"
      - "OWASP releases Top 10 for Agentic Systems (ASI list referenced in S17)"
      - "CrowdStrike or Palo Alto announces agent-specific security product"
      - "Noma Security or Keycard raises Series A/B"
      - "Cloud provider launches native agent governance (AWS, Azure, GCP)"
      - "Regulatory body (SEC, EU) issues guidance on agent accountability"

    morning_brief: >
      Agent security is the biggest unsolved problem in production AI. TTE
      collapsed to 10 hours. Identity and traceability are unsolved. Every
      enterprise deploying agents is exposed. Watch Noma Security, Socket,
      and Keycard — they're building the infrastructure. A major agent security
      incident will accelerate this category faster than anything.

