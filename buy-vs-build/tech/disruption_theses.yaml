  # ═══════════════════════════════════════════════════════════════
  # THESIS 7: AGENT INFRASTRUCTURE IS THE NEW CLOUD
  # ═══════════════════════════════════════════════════════════════

  - id: DISRUPT-AGENT-INFRA
    name: "Agent Infrastructure — The Microprocessor Moment"
    thesis: >
      We're at the microprocessor moment for AI agents. The coordination
      layer that makes billions of small units work together doesn't exist
      yet. Agents need trillions of small databases, millions of sandboxes,
      governed orchestration, and identity infrastructure. Current cloud
      architectures aren't built for this. The companies that build the
      agent-era infrastructure will be the AWS/Azure of the next decade.
    direction: new_platform_category
    timeframe: 12-36 months
    confidence: high

    evidence:
      - session: S04
        speaker: "Glauber Costa, Turso"
        quote: "Transistor → circuit board → microprocessor → cloud → kubernetes → agents. Where are we in the curve?"
      - session: S04
        speaker: "Turso"
        quote: "Each unit becomes a lot smaller, just like microprocessors. Agents will have thousands of small DBs."
      - session: S03
        speaker: "Neil Movva, Sail Research"
        quote: "Coordination is the next problem we need to solve."
      - session: S08
        speaker: "Felipe Huici, Unikraft"
        quote: "Agents should NEVER be run in containers — full VM isolation required."
      - session: S08
        speaker: "Unikraft"
        quote: "Scale-to-zero: suspend → snapshot → standby → instant resume. Near-zero idle cost."
      - session: S09
        speaker: "Yaroslav Bulatov"
        quote: "Arithmetic is essentially free now. Communication (moving data) is the bottleneck."
      - session: S01
        speaker: "Keynote"
        quote: "10 people = enough for $1B revenue. 80 people for $100B."

    exposed_companies:
      - name: "Docker"
        ticker: private
        risk: "Containers aren't secure enough for agent isolation"
        detail: "Unikraft CEO: 'Containers don't contain. Isolates don't isolate.' MicroVMs are the replacement for agent sandboxing."
      - name: "Kubernetes-dependent platforms"
        ticker: various
        risk: "K8s orchestration designed for long-running services, not millions of ephemeral agent processes"
        detail: "Agent workloads are bursty, ephemeral, and need sub-second boot. K8s wasn't built for this."

    beneficiaries:
      - name: "Unikraft"
        ticker: private
        why: "MicroVM sandboxing for agents. Millisecond boot, scale-to-zero, minimal attack surface. 'Where Firecracker meets agents.'"
      - name: "Turso"
        ticker: private
        why: "Per-agent database at scale. SQLite-in-Rust with concurrent writes, vector search, WASM runtime."
      - name: "Firecracker / AWS Lambda"
        ticker: AMZN
        why: "MicroVM infrastructure already deployed at scale. Agent sandboxing is a natural extension."
      - name: "Cloudflare"
        ticker: NET
        why: "Workers + edge compute. 47M requests, 295 teams using internal AI. 'Best agent cloud' positioning."
      - name: "Browserbase"
        ticker: private
        why: "Agent sandbox for web interaction. Credential brokering. Security-first."

    watchlist_triggers:
      - "Unikraft or Firecracker announces agent-specific product"
      - "Cloudflare launches agent orchestration as a service"
      - "Agent-infra startup raises >$100M (Turso, Browserbase, etc.)"
      - "Major cloud provider launches 'agent-native' compute tier"
      - "Kubernetes usage declines for AI workloads in developer surveys"

    morning_brief: >
      We're at the microprocessor moment for agents. Current cloud infra
      (containers, K8s) wasn't built for millions of ephemeral agent processes.
      MicroVMs (Unikraft, Firecracker), per-agent databases (Turso), and
      edge compute (Cloudflare) are the new infrastructure layer. The company
      that builds the AWS for agents captures the next platform shift.

