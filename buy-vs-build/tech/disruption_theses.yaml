  - id: DISRUPT-MULTI-MODEL
    name: "Multi-Model Required — Single-Provider Lock-in is Dead"
    thesis: >
      No single model wins everywhere. Opus for human-like synthesis,
      GPT-5.5 for RL-optimized implementation, Kimi for long-running
      cheap tasks, Sonar for research. The companies that lock into
      one provider face quality AND cost disadvantage. The BYOK (Bring
      Your Own Key) pattern will dominate enterprise AI.
    direction: structural_shift
    timeframe: 6-18 months
    confidence: very_high

    evidence:
      - session: S15
        speaker: "Keynote"
        quote: "Multi-model inference system, all orchestrated with a top-level orchestration system."
      - session: S11
        speaker: "Open Layer Panel"
        quote: "Model + Harness + Product = all come together. OTHERWISE SOMEONE WILL JUST STEAL YOUR PRODUCT."
      - session: S11
        speaker: "Kilo Code"
        quote: "Model agnostic harness — they optimize per model."
      - session: conference_conversations
        speaker: "Multiple"
        quote: "Opus = more human-like (docs, architecture, frontend). GPT-5.5 = more RL-optimized (implementation, correctness, debugging)."
      - session: S06
        speaker: "Doubleword"
        quote: "Kimi K2.6 — 80% cheaper, just as good."

    exposed_companies:
      - name: "Companies locked into single AI provider"
        ticker: various
        risk: "Quality ceiling + cost floor + vendor dependency"
        detail: "Using only GPT for everything = paying frontier prices for tasks a $0.01 model handles."
      - name: "Google Cloud (Gemini-only customers)"
        ticker: GOOGL
        risk: "If Gemini quality stagnates, locked-in customers can't switch without rebuilding"
        detail: "Google's moat is data, not the model. Model-agnostic platforms reduce switching costs."

    beneficiaries:
      - name: "OpenRouter"
        ticker: private
        why: "Routing layer across 100+ models. The infrastructure for multi-model."
      - name: "LiteLLM"
        ticker: private/open-source
        why: "Unified API for all LLM providers. The plumbing for BYOK."
      - name: "Kilo Code"
        ticker: private
        why: "Model-agnostic coding harness. Optimizes per model. Model companies give them early access."
      - name: "Perplexity"
        ticker: private
        why: "Multi-model hub for research. Already routes across Claude, GPT, Sonar."

    watchlist_triggers:
      - "Enterprise announces multi-model strategy publicly"
      - "LiteLLM or OpenRouter crosses 1M daily API calls"
      - "Major framework makes multi-model routing a default feature"
      - "Model provider loses major customer to multi-model competitor"

    morning_brief: >
      Single-model lock-in is dead. Opus for synthesis, GPT for implementation,
      Kimi for cheap long-running, Sonar for research. The BYOK pattern is
