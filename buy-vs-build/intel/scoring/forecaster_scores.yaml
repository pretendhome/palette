# Intel Forecaster Scoring System v1.0
# Tracks prediction accuracy using Brier scores and calibration.
# All scores start null — populated as predictions are logged and resolved.
#
# Created: 2026-05-01
# Algorithm: Tetlock-derived (softmax weighting, extremizing, decay)

metadata:
  version: "1.0"
  created: "2026-05-01"
  scoring_method: "brier_score"
  aggregation_method: "accuracy_weighted_extremized"
  status: "SCHEMA_READY — no predictions logged yet"

# ══════════════════════════════════════════════════════════════
# ALGORITHM PARAMETERS
# ══════════════════════════════════════════════════════════════

algorithm:
  # Signal weighting
  weighting:
    method: "softmax_inverse_brier"
    temperature: 0.3  # lower = more aggressive reward for accuracy
    default_weight: "1/N (equal weight for unscored voices)"

  # Extremizing (Tetlock transform)
  extremizing:
    base_factor: 1.5  # push consensus toward 0/1
    diversity_scaling: true  # d = 1.5 + 0.5 * log(N_sources)

  # Decay by domain
  decay:
    method: "exponential"
    half_lives:
      oil-energy: 4      # days
      ai-investment: 10   # days
      macro-stress: 21    # days
    shock_factor: 4.0     # multiplier during regime-changing events

  # Consensus/contrarian detection
  contrarian:
    consensus_threshold: 0.85    # above this = potential crowded trade
    dispersion_threshold: 0.05   # below this + high consensus = crowded trade flag
    contrarian_boost: 1.5        # weight multiplier for dissenting voices when crowded

  # Scoring
  scoring:
    brier_baseline: 0.25    # naive 50/50 baseline
    skill_threshold: 0.20   # Brier below this = demonstrated skill
    rolling_window_days: 90
    drift_alert_stdev: 1.0  # flag if rolling diverges from lifetime by >1 stdev

