  python: |
    # PitchBook API requires enterprise license
    # This is an illustrative example based on API documentation patterns
    # Actual endpoints and schema require enterprise access to verify

    import requests

    headers = {
        "Authorization": "Bearer $PITCHBOOK_API_TOKEN",
        "Content-Type": "application/json"
    }

    # Search for a company (illustrative — actual endpoint may differ)
    response = requests.get(
        "https://api.pitchbook.com/v1/companies",
        headers=headers,
        params={
            "name": "Lovable",
            "fields": "companyName,foundedDate,totalRaised,lastRoundSize,lastRoundDate,primaryIndustry,employeeCount"
        }
    )
    print(response.json())

  note: "Cannot verify API schema without enterprise access. Example is illustrative only."

