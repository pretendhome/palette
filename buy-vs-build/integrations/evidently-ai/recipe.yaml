capabilities:
  - "Data drift detection: statistical tests for feature and prediction drift (PSI, KS, Wasserstein)"
  - "LLM evaluation: text quality metrics (sentiment, toxicity, readability, semantic similarity)"
  - "LLM tracing: trace and evaluate LLM inputs/outputs in production"
  - "Test suites: define pass/fail conditions on data quality and model performance"
  - "Reports: interactive HTML reports with visualizations"
  - "Monitoring dashboard: Evidently Cloud provides real-time monitoring UI"
  - "Presets: pre-built metric collections (DataDriftPreset, TextEvals, etc.)"
  - "Custom metrics: define any Python-based metric for evaluation"
  - "Regression/classification monitoring: standard ML performance tracking"
  - "Integration with Pandas DataFrames — works with any data pipeline"
  - "Collector service: lightweight daemon for continuous monitoring"
  - "OpenAI/Anthropic LLM-as-judge integration for custom evaluation criteria"

limitations:
  - "Open-source library generates static reports — no real-time dashboards without Cloud"
  - "Cloud product is newer and less mature than competitors (Arize, Datadog ML Monitoring)"
  - "LLM evaluation features are newer — less battle-tested than Braintrust or LangSmith"
  - "Self-hosted monitoring requires infrastructure management"
  - "No APM or infrastructure monitoring — ML/LLM data quality only"
  - "Large evaluation runs on DataFrames can be memory-intensive"

example_request:
  description: "Evaluate LLM response quality with Evidently"
  python: |
    import pandas as pd
    from evidently.report import Report
    from evidently.metric_preset import TextEvals
    from evidently.descriptors import TextLength, Sentiment, OOVWordsPercentage

    # Prepare data as DataFrame
    data = pd.DataFrame({
        "question": [
            "What is Braintrust?",
            "Compare Honeycomb vs New Relic",
        ],
        "response": [
            "Braintrust is an LLM evaluation platform that raised $80M Series B in Feb 2026.",
            "Honeycomb excels at distributed tracing with BubbleUp. New Relic has a 100GB free tier.",
        ],
    })

    # Run text evaluation report
    report = Report(metrics=[
        TextEvals(column_name="response", descriptors=[
            TextLength(),
            Sentiment(),
            OOVWordsPercentage(),
        ]),
    ])
    report.run(reference_data=None, current_data=data)
    report.save_html("llm_quality_report.html")
    print("Report saved to llm_quality_report.html")

  description_drift: "Monitor data drift between reference and production data"
  python_drift: |
