example_request:
  description: "Topaz CLI batch processing (local only, not a cloud API)"
  cli: |
    # Topaz Photo AI CLI — local batch processing
    # Must have Topaz Photo AI installed locally

    # Upscale a single image
    tpai --input /path/to/image.jpg --output /path/to/output/ --upscale 4x

    # Batch process a directory
    tpai --input /path/to/images/ --output /path/to/enhanced/ --upscale 2x --denoise

    # Topaz Video AI CLI
    tvai --input video.mp4 --output enhanced.mp4 --model prob-4 --scale 2

  workaround: |
    # For programmatic image enhancement in Palette workflows, consider:
    # - Real-ESRGAN (open-source upscaler) — pip install realesrgan
    # - Stability AI API — cloud-based image upscaling
    # - Replicate.com — run upscaling models via API (Real-ESRGAN, SwinIR)

    # Example: Real-ESRGAN via Replicate API
    import replicate
    output = replicate.run(
        "nightmareai/real-esrgan:350d32041630ffbe63c8352783a26d94126de062",
        input={"image": open("low_res.jpg", "rb"), "scale": 4}
    )

