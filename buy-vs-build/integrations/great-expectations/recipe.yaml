example_request:
  description: "Validate Palette people library data quality"
  python: |
    import great_expectations as gx
    import pandas as pd

    # Initialize context
    context = gx.get_context()

    # Load people library data
    people_data = pd.DataFrame({
        "person_id": ["PERSON-001", "PERSON-002", "PERSON-003"],
        "name": ["Ruben Hassid", "Anisha Jain", "Axelle Vanquaillie"],
        "signal_strength": [5, 2, 4],
        "status": ["active", "low", "active"],
    })

    # Create data source and asset
    data_source = context.data_sources.add_pandas("palette_data")
    data_asset = data_source.add_dataframe_asset("people_library")
    batch_definition = data_asset.add_batch_definition_whole_dataframe("full_batch")
    batch = batch_definition.get_batch(batch_parameters={"dataframe": people_data})

    # Define expectations
    expectation_suite = context.suites.add(
        gx.ExpectationSuite(name="people_library_quality")
    )
    expectation_suite.add_expectation(
        gx.expectations.ExpectColumnValuesToNotBeNull(column="person_id")
    )
    expectation_suite.add_expectation(
        gx.expectations.ExpectColumnValuesToBeInSet(
            column="status", value_set=["active", "low", "archived"]
        )
    )
    expectation_suite.add_expectation(
        gx.expectations.ExpectColumnValuesToBeBetween(
            column="signal_strength", min_value=1, max_value=5
        )
    )

    # Validate
    validation_definition = context.validation_definitions.add(
        gx.ValidationDefinition(
            name="validate_people_library",
            data=batch_definition,
            suite=expectation_suite,
        )
    )
    result = validation_definition.run()
    print(f"Success: {result.success}")

