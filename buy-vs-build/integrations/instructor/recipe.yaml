example_request:
  description: "Extract structured company analysis from LLM using Pydantic model"
  python: |
    import instructor
    from pydantic import BaseModel, Field
    from openai import OpenAI
    from typing import Literal

    # Define structured output schema
    class CompanyAnalysis(BaseModel):
        company_name: str
        category: str = Field(description="Primary product category")
        maturity: Literal["early", "growth", "established"]
        confidence: float = Field(ge=0, le=1, description="Classification confidence")
        key_signals: list[str] = Field(description="Evidence supporting classification")
        recommended_rius: list[str] = Field(description="Relevant Palette RIU IDs")

    # Patch OpenAI client with Instructor
    client = instructor.from_openai(OpenAI())

    # Get structured output — automatic validation and retry
    analysis = client.chat.completions.create(
        model="gpt-4o",
        response_model=CompanyAnalysis,
        max_retries=3,
        messages=[{
            "role": "user",
            "content": "Analyze Lovable: AI-powered web app builder, raised Series A, "
                       "competes with v0.dev and Bolt.new"
        }]
    )

    print(f"Company: {analysis.company_name}")
    print(f"Category: {analysis.category}")
    print(f"Maturity: {analysis.maturity} (confidence: {analysis.confidence})")
    print(f"Signals: {analysis.key_signals}")
    print(f"RIUs: {analysis.recommended_rius}")

    # Works with Anthropic too:
    # import anthropic
    # client = instructor.from_anthropic(anthropic.Anthropic())

