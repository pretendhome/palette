example_request:
  description: "Run an evaluation using Braintrust Python SDK"
  python: |
    import braintrust

    # Create or get a project
    project = braintrust.init(project="palette-eval")

    # Run evaluation
    experiment = project.start_experiment("prompt-v2-test")

    for case in golden_set:
        output = call_llm(case["input"])
        experiment.log(
            input=case["input"],
            output=output,
            expected=case["expected"],
            scores={"accuracy": score_fn(output, case["expected"])}
        )

    experiment.summarize()

