  free: "400 AI credits (Gamma branding on output)"
  plus: "$8/month (annual) — unlimited AI, no branding, advanced image models"
  pro: "$15/month (annual) — premium AI models, API access, custom branding, analytics, 10 custom domains"
  ultra: "$100/month — most advanced AI models, 100 custom domains, early access"
  business: "$40/user/month"
  enterprise: "custom"
