  - "No real-time collaboration API — generation is async"
  - "Output quality depends on prompt quality"

example_request:
  description: "Generate a presentation via Gamma API"
  curl: |
    # Step 1: Create generation request
    curl -X POST https://api.gamma.app/v1/generate \
      -H "Authorization: Bearer $GAMMA_API_KEY" \
      -H "Content-Type: application/json" \
      -d '{
        "type": "presentation",
        "prompt": "Palette Intelligence System: AI-powered service routing for enterprise AI deployments",
        "options": {
          "slides": 8,
          "style": "professional"
        }
      }'

    # Step 2: Poll for completion
    curl https://api.gamma.app/v1/generate/{generation_id} \
      -H "Authorization: Bearer $GAMMA_API_KEY"

    # Step 3: Export
    curl https://api.gamma.app/v1/export/{generation_id}?format=pptx \
      -H "Authorization: Bearer $GAMMA_API_KEY"
  note: "API endpoints are illustrative — check developers.gamma.app for exact schema"

palette_agent: "Narrator (GTM/Narrative) — narrative → presentation pipeline"
palette_integration_plan:
