capabilities:
  - "AI-generated presentations, documents, and webpages from text prompts"
  - "Generate API (GA since January 2026) — programmatic content creation via REST"
  - "Export to PDF, PowerPoint (.pptx), Google Slides, PNG"
  - "Direct LinkedIn publishing"
  - "Custom branding, analytics, and custom domains on Pro+"
