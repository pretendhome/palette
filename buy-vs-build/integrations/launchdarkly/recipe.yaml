example_request:
  description: "Evaluate a feature flag using the LaunchDarkly Python SDK"
  python: |
    import ldclient
    from ldclient.config import Config

    ldclient.set_config(Config("$LAUNCHDARKLY_SDK_KEY"))
    client = ldclient.get()

    context = ldclient.Context.builder("user-123").kind("user").build()
    use_new_model = client.variation("palette-use-claude-4", context, False)

    if use_new_model:
        response = call_llm(model="claude-4")
    else:
        response = call_llm(model="claude-sonnet-4-6")

