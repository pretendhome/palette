example_request:
  description: "Generate guaranteed-valid structured output from a local model"
  python: |
    import outlines
    from pydantic import BaseModel, Field
    from typing import Literal

    # Define output schema
    class RIUClassification(BaseModel):
        riu_id: str = Field(pattern=r"RIU-\d{3}")
        riu_name: str
        classification: Literal["internal_only", "both", "service_applicable"]
        confidence: float = Field(ge=0, le=1)
        reasoning: str

    # Load local model
    model = outlines.models.transformers("mistralai/Mistral-7B-Instruct-v0.3")

    # Create structured generator — output is GUARANTEED to match schema
    generator = outlines.generate.json(model, RIUClassification)

    result = generator(
        "Classify this RIU: RIU-521 LLM Model Version Management. "
        "Is it internal_only (Palette handles entirely), both (Palette + external service), "
        "or service_applicable (external service only)?"
    )

    print(f"RIU: {result.riu_id}")
    print(f"Classification: {result.classification}")
    print(f"Confidence: {result.confidence}")

    # Regex-constrained generation
    phone_generator = outlines.generate.regex(
        model,
        r"\(\d{3}\) \d{3}-\d{4}"
    )

    # Multiple choice
    choice_generator = outlines.generate.choice(
        model,
        ["foundation", "retrieval", "orchestration", "specialization"]
    )

