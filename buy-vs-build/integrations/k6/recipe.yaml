example_request:
  description: "Run a load test against an API endpoint"
  python: |
    # k6 is a CLI tool — invoke from Python via subprocess
    # k6 scripts are written in JavaScript

    # script.js:
    # import http from 'k6/http';
    # import { check } from 'k6';
    # export const options = { vus: 50, duration: '30s' };
    # export default function () {
    #   const res = http.get('https://api.example.com/health');
    #   check(res, { 'status is 200': (r) => r.status === 200 });
    # }

    import subprocess
    result = subprocess.run(["k6", "run", "script.js"], capture_output=True, text=True)
    print(result.stdout)

