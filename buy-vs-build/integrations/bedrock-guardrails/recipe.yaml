example_request:
  description: "Apply guardrails to text content using ApplyGuardrail API"
  python: |
    import boto3

    client = boto3.client("bedrock-runtime", region_name="us-east-1")

    response = client.apply_guardrail(
        guardrailIdentifier="my-guardrail-id",
        guardrailVersion="1",
        source="INPUT",
        content=[{
            "text": {"text": user_input}
        }]
    )

    if response["action"] == "GUARDRAIL_INTERVENED":
        # Content was blocked — use the guardrail's response
        safe_output = response["outputs"][0]["text"]
    else:
        # Content passed — proceed with LLM call
        llm_response = call_llm(user_input)

