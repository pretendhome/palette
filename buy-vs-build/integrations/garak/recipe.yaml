example_request:
  description: "Run a vulnerability scan against an LLM endpoint"
  python: |
    import subprocess

    # Scan for prompt injection vulnerabilities
    result = subprocess.run([
        "python", "-m", "garak",
        "--model_type", "openai",
        "--model_name", "gpt-4",
        "--probes", "promptinject",
        "--report_prefix", "palette_security_scan"
    ], capture_output=True, text=True)
    print(result.stdout)

    # Full scan with all probes
