capabilities:
  - "CBPE (Confidence-Based Performance Estimation): estimate model accuracy without ground truth labels"
  - "DLE (Direct Loss Estimation): estimate regression model loss without ground truth"
  - "Realized performance: calculate actual performance when ground truth becomes available"
  - "Univariate drift detection: KS test, chi-squared, Jensen-Shannon, Wasserstein, Hellinger"
  - "Multivariate drift detection: PCA-based data reconstruction error"
  - "Concept drift detection: detect changes in the relationship between features and target"
  - "Data quality: missing values, unseen categories tracking over time"
  - "Thresholds: constant and standard deviation-based alerting thresholds"
  - "Chunking: time-based or size-based data chunking for monitoring windows"
  - "Plotting: built-in matplotlib/plotly visualizations for all metrics"
  - "NannyML Cloud: hosted dashboard for team monitoring (TODO: verify current status)"

limitations:
  - "CBPE requires well-calibrated model probabilities — less effective for poorly calibrated models"
  - "Designed for classification and regression — limited LLM/NLP-specific features"
  - "Performance estimation is approximate — not a substitute for ground truth evaluation"
  - "Smaller community than Evidently AI — less ecosystem support"
  - "Cloud product maturity uncertain — OSS library is the primary offering"
  - "Not suitable for raw text/LLM output monitoring — focused on tabular predictions"
  - "Requires reference dataset (training data) for baseline calibration"

example_request:
  description: "Estimate model performance without ground truth using CBPE"
  python: |
    import nannyml as nml
    import pandas as pd

    # Reference data (with ground truth — from training/validation)
    reference_df = pd.DataFrame({
        "predicted_class": ["relevant", "irrelevant", "relevant", "relevant"],
        "predicted_proba_relevant": [0.92, 0.15, 0.88, 0.75],
        "actual_class": ["relevant", "irrelevant", "relevant", "irrelevant"],
        "timestamp": pd.date_range("2026-01-01", periods=4, freq="D"),
    })

    # Analysis data (production — NO ground truth yet)
    analysis_df = pd.DataFrame({
        "predicted_class": ["relevant", "relevant", "irrelevant", "relevant"],
        "predicted_proba_relevant": [0.65, 0.55, 0.30, 0.50],
        "timestamp": pd.date_range("2026-02-01", periods=4, freq="D"),
    })

    # Estimate performance without ground truth
    estimator = nml.CBPE(
        y_pred_proba="predicted_proba_relevant",
        y_pred="predicted_class",
        y_true="actual_class",
        problem_type="classification_binary",
        metrics=["roc_auc", "f1"],
        timestamp_column_name="timestamp",
    )

    estimator.fit(reference_df)
    results = estimator.estimate(analysis_df)

    # Check for performance degradation
    print(results.to_df())
    figure = results.plot()
    figure.write_html("performance_estimation.html")

  description_drift: "Detect data drift in production"
  python_drift: |
    # Univariate drift detection
    drift_calculator = nml.UnivariateDriftCalculator(
        column_names=["predicted_proba_relevant"],
        timestamp_column_name="timestamp",
        continuous_methods=["kolmogorov_smirnov"],
    )
    drift_calculator.fit(reference_df)
    drift_results = drift_calculator.calculate(analysis_df)
    print(drift_results.to_df())

