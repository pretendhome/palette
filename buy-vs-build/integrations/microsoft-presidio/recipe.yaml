example_request:
  description: "Detect and anonymize PII in text before sending to LLM"
  python: |
    from presidio_analyzer import AnalyzerEngine
    from presidio_anonymizer import AnonymizerEngine

    # Initialize engines
    analyzer = AnalyzerEngine()
    anonymizer = AnonymizerEngine()

    text = "John Smith's email is john@example.com and his SSN is 123-45-6789."

    # Detect PII
    results = analyzer.analyze(
        text=text,
        entities=["PERSON", "EMAIL_ADDRESS", "US_SSN"],
        language="en"
    )

    # Anonymize detected PII
    anonymized = anonymizer.anonymize(text=text, analyzer_results=results)
    print(anonymized.text)
    # Output: "<PERSON>'s email is <EMAIL_ADDRESS> and his SSN is <US_SSN>."

