evaluation_verdict: "EVALUATE — strongest open-source vector database. Apache 2.0 license, self-hostable, competitive performance. Free Cloud tier sufficient for Palette's current 101-entry knowledge library. Key advantage over Pinecone: self-hosted option eliminates vendor lock-in and recurring costs. Key disadvantage: operational burden if self-hosting."
