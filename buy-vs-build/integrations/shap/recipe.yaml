capabilities:
  - "SHAP values: unified measure of feature importance based on game theory"
  - "Model-agnostic explainability (works with any model)"
  - "TreeExplainer: fast exact SHAP for tree-based models (XGBoost, LightGBM)"
  - "DeepExplainer: approximate SHAP for deep learning models"
  - "KernelExplainer: model-agnostic (slow but works with anything)"
  - "Rich visualizations: force plots, summary plots, dependence plots, waterfall"
  - "Text and image explainability support"

limitations:
  - "KernelExplainer is slow for large datasets (O(2^n) worst case)"
  - "LLM-specific explainability is limited — better for traditional ML"
  - "Shapley values can be unintuitive for non-technical stakeholders"
  - "Memory-intensive for high-dimensional data"

example_request:
  description: "Explain a model prediction with SHAP values"
  python: |
    import shap

    # For tree-based models (fast)
    explainer = shap.TreeExplainer(model)
    shap_values = explainer.shap_values(X_test)
    shap.summary_plot(shap_values, X_test)

    # For any model (slower, model-agnostic)
    explainer = shap.KernelExplainer(model.predict, X_train[:100])
    shap_values = explainer.shap_values(X_test[:10])
    shap.force_plot(explainer.expected_value, shap_values[0], X_test.iloc[0])

