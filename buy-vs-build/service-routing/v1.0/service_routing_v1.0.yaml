routing_decision_tree:
  when_to_build_internally:
  - No external service exists for this pattern (taxonomy gap)
  - Service exists but the pattern is replicable via existing RIUs
  - Build cost is low AND service dependency risk is high
  - External service requires lock-in (one-way door) without clear ROI
  when_to_use_external_service:
  - Task requires real-time data (use Grok or Perplexity)
  - Task requires specialized model quality (code → Cursor; video → Seedance/Runway)
  - Task requires non-text output (video → Higgsfield; presentation → Gamma)
  - Cost of building internally exceeds service cost over 12 months
  - 'Service has practitioner signal_strength: high AND is already funded/stable'
  when_to_use_palette_agents:
  - Task matches an existing RIU and internal agents can execute it
  - Data privacy requirements prevent external service use
  - Cost of external service exceeds internal build cost
  - Service has no API (consumer-only)
  - Signal strength is low or unvalidated
