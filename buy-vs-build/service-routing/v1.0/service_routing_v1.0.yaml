# Palette Service Routing Index v1.0
# Generated: 2026-02-24
# Status: SEED — cost data unvalidated; quality rankings based on practitioner signals only
# Purpose: For each RIU, which external service should Palette route to?
#
# This is the bridge between Palette's RIU taxonomy (WHAT problem) and
# external services (HOW to solve it without building from scratch).
#
# Schema per service entry:
#   quality_tier: tier_1 (best available) | tier_2 | tier_3
#   cost_model: free | freemium | usage_based | subscription | enterprise
#   cost_estimate: rough cost per unit (requires Perplexity validation)
#   integration_status: integrated | available | recipe_needed | evaluate | no_api
#   palette_integration_status: how Palette currently uses this
#   signal_source: people_library | benchmark | market_data | internal
#   build_vs_buy: adopt_pattern | integrate | defer
#     adopt_pattern = Palette agents can replicate this without the service
#     integrate = use the external service directly
#     defer = not worth integrating yet

metadata:
  version: "1.0"
  generated_date: "2026-02-24"
  phase_2_date: "2026-02-24"
  taxonomy_ref: "../../../../taxonomy/releases/v1.3/palette_taxonomy_v1.3.yaml"
  signal_source_ref: "../people-library/v1.1/people_library_company_signals_v1.1.yaml"
  total_rius_covered: 40
  both_rius_covered: "37/37 (all 'both' classified RIUs have entries)"
  additional_rius: 3
  additional_rius_note: "RIU-500, RIU-200, RIU-320 are routed but classified differently in riu_classification_v1.0.yaml"
  existing_full_entries: 8
