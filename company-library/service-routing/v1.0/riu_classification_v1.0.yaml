    candidate_services:
      - Pinecone (managed vector DB, production-ready)
      - Qdrant (OSS + managed, high performance)
      - Weaviate (OSS + managed, hybrid search native)
      - pgvector (Postgres extension, simplest for existing PG users)
    service_signal: low
    notes: Choice depends on existing infrastructure. pgvector for simplicity, Qdrant/Pinecone for scale.

