  - riu_id: RIU-607
    name: Context Compaction for Long Engagements
    classification: internal_only
    rationale: Context compaction is a Palette-native protocol (Yuty + Anky pattern).

  - riu_id: RIU-608
    name: Workflow Definition for Multi-Agent Engagements
    classification: internal_only
    rationale: Workflow definition is Palette's own structured format. No external framework replaces it.

