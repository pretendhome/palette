  # MULTIMODAL AI WORKFLOWS (RIU-500 to RIU-503)
  # Image and audio processing have strong external services.
  # ==========================================================================

  - riu_id: RIU-500
    name: Multimodal Data Pipeline Design
    classification: internal_only
    rationale: Pipeline architecture design is Rex's work. The pipeline design itself has no external substitute.

  - riu_id: RIU-501
    name: Image/Vision Processing Integration
    classification: both
    rationale: |
      Image generation and vision analysis services materially change output quality
      vs attempting to replicate these capabilities internally.
    candidate_services:
      - Claude Vision (already integrated, best for image understanding)
      - Seedance (AI video/image generation, very high signal)
      - Higgsfield AI (video generation, high signal)
      - Leonardo AI (image generation, medium signal)
      - AWS Rekognition (managed image analysis, enterprise)
    service_signal: high
    notes: Claude Vision for analysis. Seedance/Higgsfield for generation per people-library signals.

  - riu_id: RIU-502
    name: Audio Processing Integration
    classification: both
    rationale: |
      Speech-to-text and audio processing services materially change transcription
      accuracy and language support vs building custom audio processing.
    candidate_services:
      - Wispr Flow (voice input, highest signal, Palette Telegram bot integration)
      - OpenAI Whisper (open-source, already referenced in Palette)
      - Deepgram (production STT, good accuracy + low latency)
      - AssemblyAI (STT + audio intelligence)
    service_signal: high
    notes: Wispr Flow for voice UI. Whisper/Deepgram for backend transcription pipelines.

  - riu_id: RIU-503
    name: Cross-Modal Validation Pattern
    classification: internal_only
    rationale: Cross-modal consistency checking is custom quality logic using Claude's multimodal capabilities.

  # ==========================================================================
  # ADVANCED AGENTIC SYSTEMS (RIU-510 to RIU-514)
  # All internal_only: these are Palette's core agentic patterns.
  # ==========================================================================

  - riu_id: RIU-510
    name: Multi-Agent Workflow Design
    classification: internal_only
    rationale: Multi-agent workflow design is Palette's core architectural pattern. No external framework replaces it.

  - riu_id: RIU-511
    name: Agent State Management Pattern
    classification: internal_only
    rationale: State management design uses Palette's checkpoint protocol. No external service materially helps.

  - riu_id: RIU-512
    name: Agent Failure Recovery Pattern
    classification: internal_only
    rationale: Failure recovery pattern is Palette's design. Standard retry libraries for implementation.

  - riu_id: RIU-513
    name: Inter-Agent Communication Protocol
    classification: internal_only
    rationale: Palette's own communication protocol. No external framework replaces this.

  - riu_id: RIU-514
    name: Agent Capability Boundary Enforcement
    classification: internal_only
    rationale: Boundary enforcement design is Rex/Anky work. Policy enforcement is internal. See RIU-082 for LLM guardrails.

  # ==========================================================================
  # MODERN LLMOPS (RIU-520 to RIU-524)
  # All "both" — LLMOps tooling materially improves every dimension here.
  # ==========================================================================

  - riu_id: RIU-520
    name: Prompt Version Control & Lifecycle
    classification: both
    rationale: |
      Prompt management platforms materially improve versioning, rollback, and
      team collaboration on prompts vs manual git-based management.
    candidate_services:
      - Braintrust (prompt management + evals, strong signal)
      - Helicone (prompt versioning + observability)
      - LangSmith (if in LangChain ecosystem)
      - Anthropic Console (basic prompt management, already accessible)
    service_signal: medium
    notes: Braintrust for full lifecycle. Helicone for simpler setups. Anthropic Console for basic needs.

  - riu_id: RIU-521
    name: LLM Model Version Management
    classification: both
    rationale: |
      Model routing platforms materially simplify managing multiple model versions
      with automatic fallback, cost tracking, and compatibility testing.
    candidate_services:
      - OpenRouter (500+ models, $40M funded, 5% markup)
      - LiteLLM (OSS self-hosted, ~3-5ms overhead, 100+ models)
      - Vercel AI Gateway (if on Vercel, Guillermo Rauch signal)
    service_signal: medium
    notes: OpenRouter for managed simplicity. LiteLLM for self-hosted control. See service-routing for full analysis.

  - riu_id: RIU-522
    name: Token Budget Management
    classification: both
    rationale: |
      Cost tracking platforms materially improve attribution and budget enforcement
      across teams, users, and features vs manual logging.
    candidate_services:
      - Helicone (usage tracking + cost attribution)
      - OpenRouter (built-in cost tracking across models)
      - LiteLLM (cost tracking + budget limits)
    service_signal: medium
    notes: Use whatever is chosen for RIU-521 (model routing) — most include cost tracking.

  - riu_id: RIU-523
    name: LLM Response Caching Strategy
    classification: both
    rationale: |
      Semantic caching platforms materially reduce token costs for repeated/similar
      queries at production scale.
    candidate_services:
      - GPTCache (OSS semantic cache)
      - Upstash Vector (serverless semantic cache on Redis)
      - Momento Cache (serverless, semantic search add-on)
    service_signal: low
    notes: Evaluate based on RIU-035 caching stack choice. Semantic caching has ~10-40% hit rates typically.

  - riu_id: RIU-524
    name: LLM Output Quality Monitoring
    classification: both
    rationale: |
      LLM observability platforms materially improve quality detection with
      automated scoring, drift alerts, and production sampling.
    candidate_services:
      - Braintrust (production eval + quality monitoring)
      - Arize AI (ML + LLM observability, drift detection)
      - Whylogs / WhyLabs (OSS + managed data quality + LLM)
      - Helicone (observability + quality scoring)
    service_signal: medium
    notes: Braintrust if already used for RIU-520/RIU-021. Arize for production LLM monitoring specifically.

  # ==========================================================================
  # AI GOVERNANCE (RIU-530 to RIU-535)
  # Bias detection and explainability have material external tools.
  # ==========================================================================

  - riu_id: RIU-530
    name: AI System Risk Classification
    classification: internal_only
    rationale: Risk classification is an assessment and documentation task. No tool replaces regulatory judgment.

  - riu_id: RIU-531
    name: Algorithmic Bias Detection
    classification: both
    rationale: |
      Bias detection frameworks materially improve coverage across protected attributes
      with established fairness metrics that would take significant time to reimplement.
    candidate_services:
      - Fairlearn (Microsoft OSS, scikit-learn compatible)
      - IBM AI Fairness 360 (AIF360, comprehensive metrics)
      - Evidently AI (bias + data quality, OSS + managed)
    service_signal: low
    notes: Fairlearn for standard ML models. Evidently for combined DQ + bias monitoring.

  - riu_id: RIU-532
    name: AI Explainability Framework
    classification: both
    rationale: |
      Explainability libraries materially improve explanation quality and correctness
      for ML models (SHAP values, feature importance) vs manual descriptions.
    candidate_services:
      - SHAP (standard for feature-based explainability)
      - LIME (local interpretable explanations)
      - Captum (PyTorch, deep learning explainability)
    service_signal: low
    notes: Primarily relevant for traditional ML components. LLM-based decisions use RIU-034 reason codes instead.

  - riu_id: RIU-533
    name: Fundamental Rights Impact Assessment (FRIA)
    classification: internal_only
    rationale: FRIA is a structured assessment requiring legal/ethical judgment. No service replaces human review.

  - riu_id: RIU-534
    name: AI Audit Trail Requirements
    classification: internal_only
    rationale: Audit trail requirements definition is documentation. Implementation uses standard logging (see RIU-061).

  - riu_id: RIU-535
    name: AI System Documentation Package
    classification: internal_only
    rationale: Documentation compilation is Yuty/Theri work. No service materially improves package quality.

  # ==========================================================================
  # AGENT-SPECIFIC PATTERNS (RIU-540 to RIU-543)
  # Observability stack and drift detection have material external tools.
  # ==========================================================================

  - riu_id: RIU-540
    name: Validation Gate Design
    classification: internal_only
    rationale: Gate criteria design is Anky/Rex work. No service replaces contextual gate definition.

  - riu_id: RIU-541
    name: Compliance Audit Preparation
    classification: internal_only
    rationale: Evidence gathering and gap analysis is Anky/Argy work. No service replaces structured audit prep.

  - riu_id: RIU-542
    name: Observability Stack Design
    classification: both
    rationale: |
      Observability platform selection materially affects what is visible and at what cost.
      This design RIU directly maps to service selection.
    candidate_services:
      - Datadog (full-stack, widest coverage)
      - Honeycomb (tracing-first, excellent for distributed systems)
      - Grafana + Prometheus (OSS, maximum flexibility)
      - New Relic (APM + logs + infra, competitive pricing)
    service_signal: medium
    notes: Same selection as RIU-061 — they're the same decision. Honeycomb preferred for LLM-heavy systems.

  - riu_id: RIU-543
    name: Drift Detection Configuration
    classification: both
    rationale: |
      Drift detection platforms materially improve detection of data and model drift
      with statistical tests and alerting that would be complex to reimplement.
    candidate_services:
      - Arize AI (LLM + ML monitoring, drift detection)
      - WhyLabs (OSS + managed, data/model drift)
      - Evidently AI (OSS + cloud, data + model drift, comprehensive)
    service_signal: low
    notes: Evidently for combined DQ + drift. Arize for LLM-specific monitoring.

  # ==========================================================================
  # ENTERPRISE AI STRATEGY (RIU-600 to RIU-608)
  # Mostly internal_only. RIU-606 (brand safety) maps to guardrail services.
  # ==========================================================================

  - riu_id: RIU-600
    name: Multi-Brand AI Strategy Framework
    classification: internal_only
    rationale: Strategy design and brand landscape mapping is Rex/Human work. No external service required.

  - riu_id: RIU-601
    name: AI Operating Model Design
    classification: internal_only
    rationale: Operating model design is Rex/Human strategic work.

  - riu_id: RIU-602
    name: AI Use Case Prioritization Matrix
    classification: internal_only
    rationale: WSJF scoring and prioritization is structured judgment work. No service materially helps.

  - riu_id: RIU-603
    name: Employee AI Adoption Program
    classification: internal_only
    rationale: Adoption program design is Yuty/Human work focused on behavior change methodology.

  - riu_id: RIU-604
    name: AI ROI Quantification Framework
    classification: internal_only
    rationale: ROI modeling is structured financial analysis. No external service materially improves the framework.

  - riu_id: RIU-605
    name: Cross-Brand Knowledge Transfer
    classification: internal_only
    rationale: Knowledge transfer system design is Argy/Yuty work. Pattern library is Palette's internal artifact.

  - riu_id: RIU-606
    name: Brand Safety for AI-Generated Content
    classification: both
    rationale: |
      Palette designs the brand safety framework, but managed guardrail services
      materially improve enforcement reliability for customer-facing AI content.
    candidate_services:
      - AWS Bedrock Guardrails (managed, Claude-integrated, denied topics + word filters)
      - Lakera Guard (prompt injection + brand safety)
      - Guardrails AI (OSS, custom validators for brand voice)
    service_signal: medium
