# RIU Service Classification v1.0
# Generated: 2026-02-24
# Rule: service_applicable only if an external service MATERIALLY changes output quality or cost.
#       The library is a suggestion layer, not a replacement layer.
#       Palette's cognitive/process work stays internal.
#
# Classifications:
#   internal_only    — Palette agents handle this entirely; no external service materially improves outcome
#   service_applicable — External service is THE mechanism (e.g., image generation, vector DB)
#   both             — Palette does meaningful work AND an external service materially improves quality/cost
#
# Fields (for both/service_applicable entries):
#   candidate_services: short list of known options
#   service_signal:     people-library signal strength for these services (high/medium/low/none)
#
# Source: palette_taxonomy_v1.3.yaml (117 RIUs)
# Author: Argy (ARK:Argentavis) + classification review

---
version: "1.0"
generated_at: "2026-02-24"
taxonomy_version: "v1.3"
total_rius: 117
service_applicable_count: 0   # see summary at bottom
both_count: 0                  # see summary at bottom
internal_only_count: 0         # see summary at bottom

classification_rule: |
  External service is material if it would meaningfully change:
  - Output quality that Palette agents cannot match (e.g., speech-to-text accuracy)
  - Cost/scale (e.g., vector DB vs in-memory similarity)
  - Speed (e.g., caching layer vs no caching)
  "Could assist" is NOT sufficient. The service must be worth the integration cost.

---
rius:

