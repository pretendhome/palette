palette_agent: "Rex (Architect) — model routing infrastructure; all agents benefit from unified LLM access"
palette_integration_plan:
  phase_1: "Evaluate LiteLLM SDK for direct multi-provider routing in agent code"
  phase_2: "Deploy LiteLLM proxy with Redis for centralized cost tracking and budget enforcement"
  phase_3: "Compare total cost: LiteLLM (free + hosting) vs OpenRouter (5% markup, zero ops)"

status: evaluate
evaluation_verdict: "EVALUATE — strongest self-hosted LLM gateway. MIT licensed, 3-5ms overhead, zero markup on model costs. Key decision: OpenRouter (managed, 5% markup, zero ops) vs LiteLLM (self-hosted, free, more control). For Palette's current stage, OpenRouter is simpler. LiteLLM becomes the right choice when Palette's LLM spend exceeds ~$500/month (where 5% markup = $25/month > hosting cost)."
