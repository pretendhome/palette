  - "Brand consistency requires paid plans with Brand Kit"

example_request:
  description: "Canva Connect API — design export (NOT AI features)"
  python: |
    import requests

    headers = {
        "Authorization": "Bearer $CANVA_ACCESS_TOKEN",
        "Content-Type": "application/json"
    }

    # List user's designs (Connect API — NOT AI features)
    response = requests.get(
        "https://api.canva.com/rest/v1/designs",
        headers=headers,
        params={"query": "palette presentation"}
    )
    designs = response.json()

    # Export a design to PDF
    export_response = requests.post(
        "https://api.canva.com/rest/v1/exports",
        headers=headers,
        json={
            "design_id": designs["items"][0]["id"],
            "format": {"type": "pdf"}
        }
    )
    print(export_response.json())

  note: "This only covers design management. AI features (Magic Media, Magic Write) cannot be called via API."

