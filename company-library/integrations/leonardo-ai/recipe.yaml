example_request:
  description: "Generate an image via Leonardo AI REST API"
  python: |
    import requests
    import time

    headers = {
        "Authorization": "Bearer $LEONARDO_API_KEY",
        "Content-Type": "application/json"
    }

    # Step 1: Create generation
    response = requests.post(
        "https://cloud.leonardo.ai/api/rest/v1/generations",
        headers=headers,
        json={
            "prompt": "Professional dashboard UI for an AI intelligence platform, clean modern design",
            "modelId": "6b645e3a-d64f-4341-a6d8-7a3690fbf042",  # Phoenix
            "width": 1024,
            "height": 768,
            "num_images": 1
        }
    )
    generation_id = response.json()["sdGenerationJob"]["generationId"]

    # Step 2: Poll for completion
    time.sleep(15)
    result = requests.get(
        f"https://cloud.leonardo.ai/api/rest/v1/generations/{generation_id}",
        headers=headers
    )
    images = result.json()["generations_by_pk"]["generated_images"]
    print(images[0]["url"])

