capabilities:
  - "Company data: founding date, description, categories, location, status"
  - "Funding data: rounds, amounts, investors, valuations, lead investors"
  - "People data: founders, executives, board members, career history"
  - "Investor data: portfolio companies, fund sizes, investment patterns"
  - "Acquisition data: acquirer, target, price, date"
  - "IPO and market data for public companies"
  - "Advanced search with boolean filters across all entities"
  - "Autocomplete endpoint for search suggestions"
  - "Organization similarity and related companies"
  - "Daily-updated data — one of the most current startup databases"
  - "2M+ company profiles, 500K+ investor profiles"

limitations:
  - "API requires Pro subscription minimum ($49/month)"
  - "Basic API has limited fields — some data points require Enterprise"
  - "Rate limits can be restrictive for bulk enrichment"
  - "Data quality varies — some profiles are outdated or incomplete"
  - "Revenue data is largely estimated, not confirmed"
  - "No real-time funding alerts via API — must poll or use webhooks (Enterprise)"
  - "Pricing data (valuations, revenue) is often missing for private companies"
  - "API pagination required for search results — no bulk export on Pro"

example_request:
  description: "Look up company and funding data via Crunchbase API"
  python: |
    import requests

    headers = {
        "X-cb-user-key": "$CRUNCHBASE_API_KEY"
    }

    # Search for a company
    response = requests.get(
        "https://api.crunchbase.com/v4/autocompletes",
        headers=headers,
        params={"query": "Lovable", "collection_ids": "organizations"}
    )
    results = response.json()

    # Get organization details
    org_response = requests.get(
        "https://api.crunchbase.com/v4/entities/organizations/lovable",
        headers=headers,
        params={
            "field_ids": ["short_description", "founded_on", "num_employees_enum",
                          "funding_total", "last_funding_type", "categories",
                          "investor_count", "homepage_url"]
        }
    )
    org_data = org_response.json()
    print(org_data)

    # Get funding rounds
    funding_response = requests.get(
        "https://api.crunchbase.com/v4/entities/organizations/lovable/cards/raised_funding_rounds",
        headers=headers,
        params={
            "field_ids": ["announced_on", "money_raised", "investment_type",
                          "lead_investor_identifiers", "investor_identifiers"]
        }
    )
    print(funding_response.json())

