cost_model: enterprise
cost_per_unit:
  basic_api: "Included with Crunchbase Pro ($49/month annual, $99/month monthly)"
  pro_api: "Included with Crunchbase Pro — search, org, people, funding endpoints"
  enterprise_api: "Custom pricing — bulk data, advanced filters, higher limits"
  data_licensing: "Separate pricing for bulk data feeds and integrations"
  note: "API access requires at minimum a Pro subscription ($49/month). Enterprise for full data access."
free_tier:
  availability: "No free API access. Website has limited free browsing."
