  - "Requires careful threshold tuning — too aggressive caching returns wrong answers"
  - "Not suitable for queries requiring real-time data (research, current events)"
  - "Embedding computation adds latency on cache misses (though less than full LLM call)"
  - "Cache invalidation is hard — stale responses if underlying knowledge changes"
  - "Library maintenance has slowed — check GitHub activity for current status"
  - "Not suitable for creative/varied outputs — caching assumes deterministic-ish responses"
  - "Memory/storage requirements grow with cache size"

example_request:
  description: "Set up semantic caching for LLM calls with local FAISS backend"
  python: |
    from gptcache import cache
    from gptcache.adapter import openai
    from gptcache.embedding import ONNX
    from gptcache.manager import CacheBase, VectorBase, get_data_manager
    from gptcache.similarity_evaluation.distance import SearchDistanceEvaluation

    # Initialize embedding model (local ONNX — free, no API calls)
    onnx = ONNX()

    # Set up local storage
    cache_base = CacheBase("sqlite")
    vector_base = VectorBase("faiss", dimension=onnx.dimension)
    data_manager = get_data_manager(cache_base, vector_base)

    # Initialize cache
    cache.init(
        embedding_func=onnx.to_embeddings,
        data_manager=data_manager,
        similarity_evaluation=SearchDistanceEvaluation(),
    )
    cache.set_openai_key()

    # First call — cache miss, calls LLM
    response = openai.ChatCompletion.create(
        model="gpt-4o",
        messages=[{"role": "user", "content": "What are the key features of Honeycomb observability?"}],
    )
    print(response["choices"][0]["message"]["content"])

    # Similar query — cache HIT (semantic match), instant response
    response = openai.ChatCompletion.create(
        model="gpt-4o",
        messages=[{"role": "user", "content": "Tell me about Honeycomb's main capabilities"}],
    )
    print(response["choices"][0]["message"]["content"])
    # Returns cached response — no LLM API call, near-zero latency

  description_langchain: "Use GPTCache as LangChain cache"
  python_langchain: |
    from langchain.cache import GPTCache
    from langchain.globals import set_llm_cache

    def init_gptcache(cache_obj, llm_string):
        from gptcache.embedding import ONNX
        from gptcache.manager import get_data_manager, CacheBase, VectorBase
        from gptcache.similarity_evaluation.distance import SearchDistanceEvaluation

        onnx = ONNX()
        cache_obj.init(
            embedding_func=onnx.to_embeddings,
            data_manager=get_data_manager(CacheBase("sqlite"), VectorBase("faiss", dimension=onnx.dimension)),
            similarity_evaluation=SearchDistanceEvaluation(),
        )

    set_llm_cache(GPTCache(init_gptcache))

