example_request:
  description: "Transcribe audio file using self-hosted Whisper"
  python: |
    import whisper

    model = whisper.load_model("large-v3")
    result = model.transcribe("meeting_recording.mp3")
    print(result["text"])

    # With faster-whisper for 4x speed improvement
    from faster_whisper import WhisperModel

    model = WhisperModel("large-v3", device="cuda", compute_type="float16")
    segments, info = model.transcribe("meeting_recording.mp3")
    for segment in segments:
        print(f"[{segment.start:.2f}s -> {segment.end:.2f}s] {segment.text}")

  docker: |
    # Run Whisper as a local API server using whisper-asr-webservice
    docker run -d -p 9000:9000 \
      -e ASR_MODEL=large-v3 \
      -e ASR_ENGINE=faster_whisper \
      --gpus all \
      onerahmet/openai-whisper-asr-webservice:latest

    # Then call it like an API
    curl -X POST http://localhost:9000/asr \
      -F "audio_file=@meeting.mp3" \
      -F "task=transcribe" \
      -F "language=en"

