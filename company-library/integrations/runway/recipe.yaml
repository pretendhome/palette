example_request:
  description: "Generate video with Runway Gen-3 Alpha via API"
  python: |
    import requests
    import time

    headers = {
        "Authorization": "Bearer $RUNWAY_API_KEY",
        "Content-Type": "application/json",
        "X-Runway-Version": "2024-11-06"
    }

    # Text-to-video generation
    response = requests.post(
        "https://api.dev.runwayml.com/v1/image_to_video",
        headers=headers,
        json={
            "model": "gen3a_turbo",
            "promptImage": "https://example.com/dashboard.png",
            "promptText": "Subtle animation with data visualizations updating smoothly",
            "duration": 5,
            "ratio": "16:9"
        }
    )
    task_id = response.json()["id"]

    # Poll for completion
    while True:
        time.sleep(10)
        result = requests.get(
            f"https://api.dev.runwayml.com/v1/tasks/{task_id}",
            headers=headers
        )
        status = result.json()["status"]
        if status == "SUCCEEDED":
            print(result.json()["output"])
            break
        elif status == "FAILED":
            print("Generation failed:", result.json())
            break

