# Generated: 2026-03-01
# RIUs served: RIU-082 (Guardrails), RIU-524 (Quality Monitoring), RIU-521 (LLM Routing)
# Context: Open-source LLM evaluation CLI — test prompts against multiple models with assertions

service_name: "Promptfoo"
company: "Promptfoo (open source)"
company_url: "https://www.promptfoo.dev"
api_url: null
api_docs: "https://www.promptfoo.dev/docs/intro/"

auth_method:
  type: "none"
  note: "Open-source CLI tool. No auth required for core functionality. LLM provider API keys are configured per-provider in the config file. Optional Promptfoo Cloud requires account."

rate_limits:
  note: "No rate limits — runs locally. Rate limits are determined by the underlying LLM providers."

cost_model: open_source
cost_per_unit:
  cli: "$0.00 (fully open source, MIT license)"
  cloud: "TODO: verify Promptfoo Cloud pricing (team sharing, history)"
  note: "Costs are only the underlying LLM API calls for evaluation runs."
free_tier:
  availability: "Fully free and open source. No usage limits."
  limitation: "CLI-only by default. Cloud features (sharing, history, CI/CD integration) may require paid tier."

capabilities:
  - "YAML-driven evaluation: define test cases, prompts, and assertions in a config file"
  - "Multi-model comparison: test the same prompts against multiple LLM providers simultaneously"
  - "Assertion types: contains, equals, regex, is-json, is-valid-openai-function-call, llm-rubric, similar, cost, latency"
  - "LLM-as-judge: use a model to grade outputs against rubrics"
  - "Red teaming: automated adversarial testing for prompt injection, jailbreaks, PII leakage"
  - "Web UI: local browser-based results viewer with diff comparison"
  - "CI/CD integration: run evals in GitHub Actions, fail on assertion violations"
  - "Provider support: OpenAI, Anthropic, Google, Azure, Ollama, HuggingFace, custom HTTP endpoints"
  - "Variable substitution: parameterize prompts with test data"
  - "Caching: local response cache to avoid redundant API calls during iteration"
  - "Output file formats: JSON, CSV, HTML for reporting"
  - "Custom providers: wrap any API endpoint as an evaluation target"
  - "Model grading: compare model quality vs. cost for routing decisions"

limitations:
  - "CLI-first — no built-in production monitoring (eval-time tool, not runtime tool)"
  - "No hosted dashboard for team collaboration (without Promptfoo Cloud)"
  - "Evaluation runs consume LLM API credits (especially LLM-as-judge)"
  - "YAML config can become complex for large evaluation suites"
  - "No tracing or observability — purely evaluation-focused"
  - "Red teaming is effective but not as comprehensive as dedicated tools (Garak)"

example_request:
  description: "Define and run a prompt evaluation with Promptfoo"
  yaml_config: |
    # promptfooconfig.yaml
    prompts:
      - "You are Argy, a research agent. Answer this question: {{question}}"
      - "Research the following topic thoroughly: {{question}}"

    providers:
      - openai:gpt-4o
      - anthropic:messages:claude-sonnet-4-20250514

    tests:
      - vars:
          question: "What is Braintrust and who are their competitors?"
        assert:
          - type: contains
            value: "evaluation"
          - type: llm-rubric
            value: "Response should mention at least 2 competitors with specific details"
          - type: cost
            threshold: 0.05
          - type: latency
            threshold: 5000

      - vars:
          question: "Compare Honeycomb vs New Relic for LLM observability"
        assert:
          - type: contains-all
            value:
              - "Honeycomb"
              - "New Relic"
          - type: llm-rubric
            value: "Response should provide a balanced comparison with pros and cons for each"

  shell: |
    # Install
    npm install -g promptfoo

    # Run evaluation
    promptfoo eval

    # View results in browser
    promptfoo view

  description_redteam: "Run red team adversarial testing"
  shell_redteam: |
    # Generate red team test cases
    promptfoo redteam generate --purpose "research agent that answers questions about AI tools"

    # Run red team evaluation
    promptfoo redteam eval

palette_agent: "Anky (Validator) — prompt quality evaluation and red teaming"
