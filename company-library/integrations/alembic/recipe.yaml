capabilities:
  - "Database schema migration with version control (revision history)"
  - "Auto-generation of migration scripts from SQLAlchemy model changes"
  - "Upgrade and downgrade (rollback) support with revision chains"
  - "Branch and merge support for parallel migration development"
  - "Offline mode — generate SQL scripts without executing"
  - "Batch operations for SQLite (which lacks ALTER TABLE)"
  - "Stamp command to mark database at a specific revision without running migrations"
  - "Integrates natively with SQLAlchemy ORM models"
  - "Custom migration operations via Python scripting"

limitations:
  - "SQLAlchemy-only — does not work with other ORMs (Django ORM, Peewee, etc.)"
  - "Auto-generation misses some changes: table renames, column type changes, constraint names"
  - "No built-in dry-run/preview for complex migrations (use --sql offline mode)"
  - "No GUI — CLI and configuration files only"
  - "Migration conflicts require manual resolution when branches diverge"
  - "No built-in CI/CD integration — must be scripted into deployment pipeline"

example_request:
  description: "Initialize Alembic, auto-generate migration, and apply it"
  python: |
    # Step 1: Initialize Alembic in project
    # $ alembic init alembic

    # Step 2: Configure alembic.ini with database URL
    # sqlalchemy.url = postgresql://user:pass@localhost/palette

    # Step 3: Set target_metadata in alembic/env.py
    # from palette.models import Base
    # target_metadata = Base.metadata

    # Step 4: Auto-generate migration from model changes
    # $ alembic revision --autogenerate -m "add knowledge_entries table"

    # Step 5: Apply migration
    # $ alembic upgrade head

    # Step 6: Rollback if needed
    # $ alembic downgrade -1

    # Programmatic usage:
    from alembic.config import Config
    from alembic import command

    alembic_cfg = Config("alembic.ini")

    # Run upgrade programmatically
    command.upgrade(alembic_cfg, "head")

    # Check current revision
    command.current(alembic_cfg)

    # Generate SQL without executing (dry run)
    command.upgrade(alembic_cfg, "head", sql=True)

