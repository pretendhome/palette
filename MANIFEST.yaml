agents:
  path: agents/
  count: 10
  list:
    - { name: resolver,    role: "intent resolver — front door, maps input to RIU" }
    - { name: researcher,  role: "research — internal libraries first, then Perplexity MCP" }
    - { name: architect,   role: "system design and tradeoff evaluation" }
    - { name: builder,     role: "implementation within bounded spec" }
    - { name: narrator,    role: "GTM/narrative — evidence-based only" }
    - { name: validator,   role: "plan/spec assessment, GO/NO-GO verdicts" }
    - { name: monitor,     role: "signal monitoring and anomaly detection" }
    - { name: debugger,    role: "failure diagnosis and minimal repair" }
    - { name: orchestrator, role: "workflow routing" }
    - { name: business-plan-creation, role: "multi-agent business plan workflow" }

governance:
  tier_1: core/palette-core.md
  tier_2: core/assumptions.md
  tier_3: decisions.md
  decision_prompt: core/decisions-prompt.md

scripts:
  integrity: "python3 -m scripts.palette_intelligence_system.integrity --checks-only"
  audit: "python3 -m scripts.palette_intelligence_system.audit_system"
  regression: "python3 -m scripts.palette_intelligence_system.regression --check"
  drift: "python3 -m scripts.palette_intelligence_system.drift"
  para_decision: "python3 -m scripts.palette_intelligence_system.para_decision"
  tests: "uv run pytest -q scripts/palette_intelligence_system/test_*.py"

bridges:
  - { name: telegram, path: bridges/telegram/ }

skills:
  - { name: retail-ai, path: skills/retail-ai/ }

archive:
  path: archive/superseded-libraries/
  superseded:
    - knowledge-library-v1.2
    - people-library-v1.0
    - taxonomy-v1.2
