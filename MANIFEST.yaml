  wiki:
    path: wiki/
    compiler: scripts/compile_wiki.py
    validator: scripts/validate_wiki.py
    pages: 337
    validation: "8/8 PASS"
    status: current

agents:
  path: agents/
  count: 13
  list:
    - { name: resolver,    role: "intent resolver — front door, maps input to RIU" }
    - { name: researcher,  role: "research — internal libraries first, then Perplexity MCP, auto-enrichment opt-in" }
    - { name: architect,   role: "system design and tradeoff evaluation" }
    - { name: builder,     role: "implementation within bounded spec" }
    - { name: narrator,    role: "GTM/narrative — evidence-based only" }
    - { name: validator,   role: "plan/spec assessment, GO/NO-GO verdicts" }
    - { name: monitor,     role: "signal monitoring and anomaly detection" }
    - { name: debugger,    role: "failure diagnosis and minimal repair" }
    - { name: orchestrator, role: "workflow routing" }
    - { name: business-plan-creation, role: "multi-agent business plan workflow" }
    - { name: health, role: "system integrity checklist and continuous improvement reflection" }
    - { name: total-health, role: "comprehensive cross-layer audit, identity coherence, optimization" }
    - { name: remediation, role: "shared infrastructure for validator→debugger→builder loop" }

sdk:
  path: sdk/
  modules:
    - { name: agent_base, purpose: "machine enablement engine — base class for all agents" }
    - { name: integrity_gate, purpose: "pre-emit validation against PIS data" }
    - { name: graph_query, purpose: "queryable interface to relationship graph" }
  tests:
    path: sdk/tests/
    count: 86
    pis_tests: 60
    run: "uv run pytest -q sdk/tests/"

governance:
  tier_1: core/palette-core.md
  tier_2: core/assumptions.md
  tier_3: decisions.md
  decision_prompt: core/decisions-prompt.md
  model: docs/WIKI_GOVERNANCE_MODEL_v1.md
  voting_roster: wiki/proposed/VOTING_ROSTER.yaml
  pipeline:
    file_proposal: scripts/file_proposal.py
    record_vote: scripts/record_vote.py
    promote_proposal: scripts/promote_proposal.py
    bridge_feedback: scripts/bridge_feedback_to_proposals.py
    auto_enrich: agents/researcher/auto_enrich.py

scripts:
  integrity: "python3 -m scripts.palette_intelligence_system.integrity --checks-only"
  audit: "python3 -m scripts.palette_intelligence_system.audit_system"
  regression: "python3 -m scripts.palette_intelligence_system.regression --check"
  drift: "python3 -m scripts.palette_intelligence_system.drift"
  para_decision: "python3 -m scripts.palette_intelligence_system.para_decision"
  tests: "uv run pytest -q scripts/palette_intelligence_system/test_*.py"

bridges:
  - { name: telegram, path: bridges/telegram/ }

skills:
  - { name: retail-ai, path: skills/retail-ai/, status: WORKING, skills: 1 }
  - { name: talent, path: skills/talent/, status: WORKING, skills: 2 }
  - { name: education, path: skills/education/, status: WORKING, skills: 1 }
  - { name: travel, path: skills/travel/, status: WORKING, skills: 1 }
  - { name: enablement, path: skills/enablement/, status: UNVALIDATED, skills: 1 }
  - { name: lenses, path: skills/lenses/, status: UNVALIDATED, skills: 1 }

ai_tool_config:
  claude_code: CLAUDE.md
  codex: AGENTS.md
  steering: .steering/

peers_bus:
  broker: peers/broker/index.mjs
  port: 7899
  adapters:
    generic: peers/adapters/generic/server.mjs
    claude: peers/adapters/claude-code/server.mjs
    gemini: peers/adapters/gemini-cli/server.mjs
  endpoints:
    - /health
    - /register
    - /send
    - /fetch
    - /peek
    - /search
    - /memory
    - /skills
    - /list-peers
    - /thread
    - /approve
    - /reject
  persistent_state:
    agent_memory: "bounded, 2200 chars per agent, auditable"
    agent_skills: "per-agent procedural memory, versioned"
    message_search: "FTS5 index, rebuildable from source messages"
    broadcast_deliveries: "per-agent delivery tracking"

plugins:
  decision_board:
    path: plugins/decision-board/
    version: 0.1.0
    lines: 432
    status: shipped

portfolio:
  generator: ../enablement/portfolio/generate.py
  templates: ../enablement/portfolio/templates/
  topics: ../enablement/portfolio/topics/
  status: active

voice_hub:
  server: peers/hub/server.mjs
  watcher: peers/hub/watcher.mjs
  port: 7890
  depends: [peers_broker, wiki, rime_api]
  status: active

peers:
