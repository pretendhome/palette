    overrides: buy-vs-build/service-routing/v1.0/service_recipe_overrides.yaml
    generated: 2026-02-24
    entries: 40
    unit: routed RIU
    status: seed

  integrations:
    path: buy-vs-build/integrations/
    entries: 75
    unit: recipe directory
    status: active

  lenses:
    version: v0
    path: lenses/releases/v0/
    entries: 28
    unit: role lens
    status: pilot
