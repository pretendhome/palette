      trust_tier: WORKING
    - name: codex.implementation
      type: CLI
      trust_tier: WORKING
    - name: gemini.specialist
      type: CLI
      trust_tier: WORKING
    - name: hub.voice
      type: ADAPTER
      trust_tier: UNVALIDATED

archive:
