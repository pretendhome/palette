<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Mission Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: 'Space Grotesk', system-ui, sans-serif;
  background: #08080c;
  color: #e8e8e8;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2.5rem;
  max-width: 640px;
  width: 90%;
}

.question {
  font-size: 1.8rem;
  font-weight: 300;
  letter-spacing: -0.02em;
  color: #fff;
  text-align: center;
  opacity: 0;
  animation: fadeUp 1s ease forwards;
}

.mic-btn {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.04);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  opacity: 0;
  animation: fadeUp 1s ease 0.3s forwards;
  position: relative;
}
.mic-btn:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }
.mic-btn.listening {
  border-color: #ef4444;
  background: rgba(239,68,68,0.12);
  animation: pulse 1.5s ease infinite;
}
.mic-btn.thinking {
  border-color: rgba(99,102,241,0.6);
  background: rgba(99,102,241,0.1);
}
.mic-btn svg { width: 32px; height: 32px; fill: #e8e8e8; transition: fill 0.3s; }
.mic-btn.listening svg { fill: #ef4444; }

.transcript {
  font-size: 1.1rem;
  color: rgba(255,255,255,0.5);
  text-align: center;
  min-height: 1.5em;
  font-style: italic;
}

.response {
  font-size: 1rem;
  line-height: 1.7;
  color: rgba(255,255,255,0.85);
  text-align: left;
  width: 100%;
  max-height: 50vh;
  overflow-y: auto;
  opacity: 0;
  transition: opacity 0.5s ease;
  white-space: pre-wrap;
}
.response.visible { opacity: 1; }
.response strong { color: #fff; }
.response .coaching-hint {
  background: rgba(99,102,241,0.1);
  border-left: 3px solid rgba(99,102,241,0.4);
  padding: 0.5rem 0.75rem;
  margin: 0.5rem 0;
  border-radius: 0 6px 6px 0;
  font-size: 0.9rem;
}

.status {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.3);
  position: fixed;
  bottom: 1.5rem;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.3); }
  50% { box-shadow: 0 0 0 16px rgba(239,68,68,0); }
}

/* Scrollbar */
.response::-webkit-scrollbar { width: 4px; }
.response::-webkit-scrollbar-track { background: transparent; }
.response::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
</style>
</head>
<body>

<div class="container">
  <div class="question">Who are you?</div>

  <button class="mic-btn" id="mic" aria-label="Speak">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </button>

  <div class="transcript" id="transcript"></div>
  <div class="response" id="response"></div>
</div>

<div class="status" id="status">tap to speak</div>

<script>
const API = window.location.origin;
const mic = document.getElementById('mic');
const transcriptEl = document.getElementById('transcript');
const responseEl = document.getElementById('response');
const statusEl = document.getElementById('status');

let recognition = null;
let listening = false;

// Detect workspace from URL path
const pathParts = window.location.pathname.split('/').filter(Boolean);
const workspaceId = pathParts[0] || 'oil-investor';

// Web Speech API setup
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    transcriptEl.textContent = transcript;
    if (e.results[0].isFinal) {
      stopListening();
      route(transcript);
    }
  };

  recognition.onerror = (e) => {
    stopListening();
    if (e.error === 'no-speech') {
      statusEl.textContent = 'no speech detected — tap to try again';
    } else {
      statusEl.textContent = `error: ${e.error}`;
    }
  };

  recognition.onend = () => { if (listening) stopListening(); };
} else {
  statusEl.textContent = 'speech not supported — type below';
  // Fallback: click mic to type
  mic.addEventListener('click', () => {
    const text = prompt('What would you like to say?');
    if (text) { transcriptEl.textContent = text; route(text); }
  });
}

function startListening() {
  if (!recognition) return;
  listening = true;
  mic.classList.add('listening');
  mic.classList.remove('thinking');
  statusEl.textContent = 'listening...';
  transcriptEl.textContent = '';
  responseEl.classList.remove('visible');
  recognition.start();
}

function stopListening() {
  listening = false;
  mic.classList.remove('listening');
  if (recognition) try { recognition.stop(); } catch {}
}

if (recognition) {
  mic.addEventListener('click', () => {
    if (listening) { stopListening(); }
    else { startListening(); }
  });
}

async function route(text) {
  mic.classList.add('thinking');
  statusEl.textContent = 'thinking...';

  const payload = {
    request_id: `voice-${Date.now()}`,
    timestamp: new Date().toISOString(),
    session_id: `voice-session-${workspaceId}`,
    workspace_id: workspaceId,
    user: { id: 'voice-user', role: 'owner' },
    input: {
      objective: text,
      context: '',
      desired_outcome: '',
      constraints: '',
      risk_posture: 'medium'
    },
    policy: {
      enforce_convergence: true,
      enforce_one_way_gate: true,
      max_selected_rius: 5,
      require_validation_checks: true
    },
    runtime: {
      mode: 'planning',
      allow_execution: false,
      tool_whitelist: ['research', 'planning'],
      log_target: 'implementation'
    }
  };

  try {
    const res = await fetch(`${API}/v1/missioncanvas/route`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    // Render the response
    let brief = data.action_brief_markdown || '';

    // Format coaching hints nicely
    brief = brief.replace(/💡 \*\*([^*]+)\*\*: ([^\n]+)/g,
      '<div class="coaching-hint">💡 <strong>$1</strong>: $2</div>');
    // Bold
    brief = brief.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

    responseEl.innerHTML = brief || '(no response)';
    responseEl.classList.add('visible');

    // Show coaching packet count if present
    const packets = data.convergence_chain?.coaching_packets || [];
    const source = data.source || data.coaching?.source || 'route';
    statusEl.textContent = `${source}${packets.length ? ` · ${packets.length} coaching signals` : ''} · tap to speak again`;

  } catch (err) {
    responseEl.textContent = `Error: ${err.message}`;
    responseEl.classList.add('visible');
    statusEl.textContent = 'error — tap to try again';
  }

  mic.classList.remove('thinking');
}
</script>
</body>
</html>
