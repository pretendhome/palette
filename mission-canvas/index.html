<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mission Canvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #06060a;
      --surface: #0d0d14;
      --surface-2: #141420;
      --text: #d4cec4;
      --text-dim: #5a554e;
      --text-bright: #efe9df;
      --accent: #c4916b;
      --accent-soft: rgba(196, 145, 107, 0.12);
      --accent-glow: rgba(196, 145, 107, 0.3);
      --recording: #d94040;
      --recording-glow: rgba(217, 64, 64, 0.25);
      --indigo: rgba(99, 102, 241, 0.6);
      --indigo-bg: rgba(99, 102, 241, 0.08);
      --indigo-border: rgba(99, 102, 241, 0.35);
      --health-green: #5ba85b;
      --user-bg: #16141e;
      --mc-bg: #0f131c;
      --mc-border: rgba(196, 145, 107, 0.35);
      --font: 'Space Grotesk', -apple-system, system-ui, sans-serif;
    }

    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: var(--font); overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Ambient ── */
    .ambient {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .ambient::before {
      content: ''; position: absolute;
      top: -50%; left: -30%; width: 160%; height: 160%;
      background:
        radial-gradient(ellipse at 25% 15%, rgba(196,145,107,0.035) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 80%, rgba(80,100,170,0.025) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(140,100,160,0.015) 0%, transparent 40%);
      animation: drift 40s ease-in-out infinite alternate;
    }
    @keyframes drift {
      0% { transform: translate(0, 0) rotate(0deg) scale(1); }
      100% { transform: translate(-2%, 1.5%) rotate(0.5deg) scale(1.03); }
    }
    .ambient::after {
      content: ''; position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
    }

    /* ── Shell ── */
    .shell {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      height: 100dvh; max-width: 640px;
      margin: 0 auto; padding: 0 24px;
    }

    /* ── Header ── */
    .header {
      padding: 24px 0 0; text-align: center; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .header-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); opacity: 0.6;
      animation: headerPulse 3s ease-in-out infinite;
    }
    .header-dot.connected { background: var(--health-green); opacity: 0.8; }
    @keyframes headerPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    .header h1 {
      font-size: 12px; font-weight: 400;
      letter-spacing: 4px; text-transform: uppercase;
      color: var(--text-dim);
      transition: all 0.6s ease;
    }

    /* ── Center stage (pre-conversation) ── */
    .stage {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
      gap: 0;
    }
    .stage.active {
      flex: 0 0 auto;
      justify-content: flex-start;
      padding-top: 12px;
    }

    .question {
      font-size: 44px; font-weight: 300;
      letter-spacing: -0.8px; color: var(--text-bright);
      text-align: center; margin-bottom: 8px;
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .stage.active .question {
      font-size: 15px; color: var(--text-dim);
      letter-spacing: 0.5px; margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px; color: var(--text-dim);
      letter-spacing: 0.3px; margin-bottom: 48px;
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .stage.active .subtitle { display: none; }

    /* ── Mic orb ── */
    .mic-orb {
      position: relative;
      width: 120px; height: 120px;
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .stage.active .mic-orb { display: none; }

    .mic-orb canvas {
      position: absolute; inset: -20px;
      width: calc(100% + 40px); height: calc(100% + 40px);
      pointer-events: none;
    }

    .mic-orb button {
      position: relative; z-index: 2;
      width: 100%; height: 100%;
      border-radius: 50%; border: none;
      background: linear-gradient(135deg, var(--accent), #a8734d);
      color: var(--bg); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 40px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .mic-orb button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 60px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .mic-orb button.recording {
      background: linear-gradient(135deg, var(--recording), #b33030);
      box-shadow: 0 0 50px var(--recording-glow);
      animation: orbPulse 1.8s ease-in-out infinite;
    }
    .mic-orb button svg { width: 36px; height: 36px; fill: currentColor; }
    @keyframes orbPulse {
      0%,100% { box-shadow: 0 0 30px var(--recording-glow); transform: scale(1); }
      50% { box-shadow: 0 0 70px rgba(217,64,64,0.35); transform: scale(1.03); }
    }

    .mic-label {
      margin-top: 20px; font-size: 12px;
      color: var(--text-dim); letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .stage.active .mic-label { display: none; }

    /* ── Conversation ── */
    .conversation {
      flex: 1; overflow-y: auto;
      padding: 20px 0 12px;
      display: none; flex-direction: column; gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: rgba(100,100,100,0.15) transparent;
    }
    .conversation.visible { display: flex; }
    .conversation::-webkit-scrollbar { width: 3px; }
    .conversation::-webkit-scrollbar-thumb { background: rgba(100,100,100,0.15); border-radius: 2px; }

    .msg {
      max-width: 85%; padding: 14px 18px;
      border-radius: 14px; font-size: 14.5px; line-height: 1.7;
      animation: fadeUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      white-space: pre-wrap; word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end; background: var(--user-bg);
      border-bottom-right-radius: 4px;
    }
    .msg.mc {
      align-self: flex-start; background: var(--mc-bg);
      border-bottom-left-radius: 4px;
      border-left: 2px solid var(--mc-border);
    }
    .msg .mc-label {
      display: block; font-size: 10px; font-weight: 500;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--accent); margin-bottom: 6px; opacity: 0.8;
    }
    .msg .mc-body { display: block; }

    /* Health status line in first response */
    .msg .mc-health {
      display: block; font-size: 11px;
      color: var(--text-dim); margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(100,100,100,0.1);
    }
    .msg .mc-health .health-score { color: var(--health-green); font-weight: 500; }

    /* Coaching hint panel (indigo) — from Kiro */
    .coaching-hint {
      background: var(--indigo-bg);
      border-left: 3px solid var(--indigo-border);
      padding: 8px 12px; margin-top: 10px;
      border-radius: 0 8px 8px 0;
      font-size: 13px; line-height: 1.6;
      color: rgba(165, 168, 255, 0.9);
    }
    .coaching-hint strong { color: rgba(200, 202, 255, 1); }

    .msg.thinking {
      align-self: flex-start; background: var(--mc-bg);
      border-bottom-left-radius: 4px;
      border-left: 2px solid var(--mc-border);
      color: var(--text-dim);
      padding: 14px 18px;
    }
    .msg.thinking .dots { display: flex; gap: 4px; }
    .msg.thinking .dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); opacity: 0.3;
      animation: dotPulse 1.4s ease-in-out infinite;
    }
    .msg.thinking .dots span:nth-child(2) { animation-delay: 0.15s; }
    .msg.thinking .dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes dotPulse { 0%,100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 0.8; transform: scale(1.1); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .speak-btn {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 10px; background: none;
      border: 1px solid rgba(196,145,107,0.15);
      border-radius: 6px; color: var(--accent);
      font-family: var(--font); font-size: 10px;
      letter-spacing: 1.2px; text-transform: uppercase;
      padding: 3px 8px; cursor: pointer;
      transition: all 0.2s; opacity: 0.7;
    }
    .speak-btn:hover { opacity: 1; background: var(--accent-soft); }
    .speak-btn svg { width: 10px; height: 10px; fill: currentColor; }

    /* ── Debug: broker metadata (hidden by default) ── */
    .debug-meta {
      display: none; font-size: 10px;
      color: var(--text-dim); margin-top: 8px;
      padding: 6px 8px; background: rgba(100,100,100,0.06);
      border-radius: 4px; font-family: 'IBM Plex Mono', monospace;
    }
    .debug-mode .debug-meta { display: block; }

    /* ── Bottom bar ── */
    .bottom-bar {
      flex-shrink: 0; display: none;
      align-items: flex-end; gap: 12px;
      padding: 12px 0 max(20px, env(safe-area-inset-bottom));
    }
    .bottom-bar.visible { display: flex; }

    .input-wrap { flex: 1; position: relative; }
    .live-tx {
      position: absolute; bottom: calc(100% + 4px); left: 0; right: 0;
      padding: 10px 16px; background: rgba(13,13,20,0.92);
      backdrop-filter: blur(12px); border-radius: 10px;
      font-size: 13px; color: var(--text-dim); font-style: italic;
      display: none; max-height: 72px; overflow-y: auto;
      border: 1px solid rgba(100,100,100,0.08);
    }
    .live-tx.active { display: block; }

    .text-in {
      width: 100%; background: var(--surface);
      border: 1px solid rgba(100,100,100,0.1);
      border-radius: 22px; padding: 12px 18px;
      font-family: var(--font); font-size: 14px;
      color: var(--text); outline: none; resize: none;
      max-height: 110px; line-height: 1.4;
      transition: border-color 0.2s;
    }
    .text-in:focus { border-color: rgba(196,145,107,0.3); }
    .text-in::placeholder { color: var(--text-dim); }

    .bottom-mic {
      width: 48px; height: 48px; border-radius: 50%; border: none;
      background: var(--accent); color: var(--bg);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .bottom-mic:hover { transform: scale(1.06); box-shadow: 0 0 20px var(--accent-glow); }
    .bottom-mic.recording {
      background: var(--recording);
      box-shadow: 0 0 24px var(--recording-glow);
      animation: miniPulse 1.5s ease-in-out infinite;
    }
    .bottom-mic svg { width: 18px; height: 18px; fill: currentColor; }
    @keyframes miniPulse {
      0%,100% { box-shadow: 0 0 8px var(--recording-glow); }
      50% { box-shadow: 0 0 28px rgba(217,64,64,0.2); }
    }

    .send-btn {
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: var(--accent); color: var(--bg);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s;
      opacity: 0; pointer-events: none; transform: scale(0.8);
    }
    .send-btn.active {
      opacity: 1; pointer-events: auto; transform: scale(1);
    }
    .send-btn:hover { transform: scale(1.06); }
    .send-btn svg { width: 16px; height: 16px; fill: currentColor; }

    /* ── Toast ── */
    .toast {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      background: #1e1218; border: 1px solid rgba(217,64,64,0.2);
      color: #d99; padding: 10px 20px; border-radius: 8px;
      font-size: 12px; z-index: 100;
      animation: fadeUp 0.3s ease-out;
    }

    @media (max-width: 500px) {
      .shell { padding: 0 16px; }
      .question { font-size: 34px; }
      .mic-orb { width: 96px; height: 96px; }
      .msg { max-width: 92%; font-size: 13.5px; }
    }
  </style>
</head>
<body>

<div class="ambient"></div>

<div class="shell" id="shell">
  <header class="header" id="header">
    <div class="header-dot" id="statusDot"></div>
    <h1 id="headerTitle">Mission Canvas</h1>
  </header>

  <div class="stage" id="stage">
    <div class="question" id="questionText">Who are you?</div>
    <div class="subtitle">Tap the mic and ask</div>

    <div class="mic-orb" id="micOrb">
      <canvas id="vizCanvas"></canvas>
      <button id="orbBtn" type="button" aria-label="Start speaking">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
    </div>
    <div class="mic-label">Tap to speak</div>
  </div>

  <div class="conversation" id="convo"></div>

  <div class="bottom-bar" id="bottomBar">
    <div class="input-wrap">
      <div class="live-tx" id="liveTx"></div>
      <textarea class="text-in" id="textIn" rows="1" placeholder="Type or tap the mic..."></textarea>
    </div>
    <button class="bottom-mic" id="bottomMic" type="button" aria-label="Speak">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <button class="send-btn" id="sendBtn" type="button" aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// ── Config ──
const pathParts = window.location.pathname.split('/').filter(Boolean);
const WS = pathParts[0] || 'oil-investor';
const API = window.location.origin;
const DEBUG = new URLSearchParams(window.location.search).has('debug');

let started = false;
let recording = false;
let recognition = null;
let audioCtx = null;
let analyser = null;
let micStream = null;
let workspaceName = '';
let headerTapCount = 0;
let headerTapTimer = null;

// Offline fallback answer (from Codex)
const FALLBACK_ANSWER = 'I am Mission Canvas. I translate messy human intent into structured decisions. I surface what is known, what is missing, what is blocked, and what should happen next. Palette is the intelligence layer behind me, and I can hand work back toward Claude or Codex on the backend when needed.';

// ── DOM refs ──
const shell      = document.getElementById('shell');
const stage      = document.getElementById('stage');
const convo      = document.getElementById('convo');
const bottomBar  = document.getElementById('bottomBar');
const orbBtn     = document.getElementById('orbBtn');
const bottomMic  = document.getElementById('bottomMic');
const textIn     = document.getElementById('textIn');
const sendBtn    = document.getElementById('sendBtn');
const liveTx     = document.getElementById('liveTx');
const vizCanvas  = document.getElementById('vizCanvas');
const statusDot  = document.getElementById('statusDot');
const headerTitle = document.getElementById('headerTitle');
const vizCtx     = vizCanvas.getContext('2d');

// Enable debug mode
if (DEBUG) shell.classList.add('debug-mode');

// Double-tap header to toggle debug (from Codex crew feedback)
document.getElementById('header').addEventListener('click', () => {
  headerTapCount++;
  clearTimeout(headerTapTimer);
  if (headerTapCount >= 2) {
    headerTapCount = 0;
    shell.classList.toggle('debug-mode');
    toast(shell.classList.contains('debug-mode') ? 'Debug mode on' : 'Debug mode off');
  }
  headerTapTimer = setTimeout(() => { headerTapCount = 0; }, 400);
});

// ── Connection check ──
(async () => {
  try {
    const r = await fetch(`${API}/v1/missioncanvas/health`);
    if (r.ok) statusDot.classList.add('connected');
  } catch {}
})();

// ── Audio visualizer ──
function initAudioViz(stream) {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  const source = audioCtx.createMediaStreamSource(stream);
  source.connect(analyser);
  drawViz();
}

function drawViz() {
  if (!analyser || !recording) {
    vizCtx.clearRect(0, 0, vizCanvas.width, vizCanvas.height);
    return;
  }
  requestAnimationFrame(drawViz);

  const bufLen = analyser.frequencyBinCount;
  const data = new Uint8Array(bufLen);
  analyser.getByteFrequencyData(data);

  const w = vizCanvas.width = vizCanvas.offsetWidth * 2;
  const h = vizCanvas.height = vizCanvas.offsetHeight * 2;
  const cx = w / 2, cy = h / 2;
  const baseR = Math.min(w, h) * 0.32;

  vizCtx.clearRect(0, 0, w, h);

  const bars = 48;
  for (let i = 0; i < bars; i++) {
    const idx = Math.floor((i / bars) * bufLen * 0.6);
    const val = data[idx] / 255;
    const angle = (i / bars) * Math.PI * 2 - Math.PI / 2;
    const len = val * baseR * 0.5 + 2;

    const x1 = cx + Math.cos(angle) * (baseR + 4);
    const y1 = cy + Math.sin(angle) * (baseR + 4);
    const x2 = cx + Math.cos(angle) * (baseR + 4 + len);
    const y2 = cy + Math.sin(angle) * (baseR + 4 + len);

    vizCtx.beginPath();
    vizCtx.moveTo(x1, y1);
    vizCtx.lineTo(x2, y2);
    vizCtx.strokeStyle = `rgba(217, 64, 64, ${0.3 + val * 0.5})`;
    vizCtx.lineWidth = 3;
    vizCtx.lineCap = 'round';
    vizCtx.stroke();
  }
}

// ── Speech recognition ──
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let finalTx = '', interimTx = '';

function makeSR() {
  if (!SR) return null;
  const r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.lang = 'en-US';

  r.onresult = (e) => {
    finalTx = ''; interimTx = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalTx += e.results[i][0].transcript;
      else interimTx += e.results[i][0].transcript;
    }
    liveTx.textContent = finalTx + interimTx;
    liveTx.classList.add('active');
  };

  r.onend = () => {
    if (recording) {
      const t = (finalTx + interimTx).trim();
      stopRec();
      if (t) send(t);
    }
  };

  r.onerror = (e) => {
    if (e.error !== 'no-speech' && e.error !== 'aborted') toast('Mic error: ' + e.error);
    stopRec();
  };

  return r;
}

async function startRec(btn) {
  if (!SR) { toast('Speech not supported — use Chrome or Edge'); return; }

  finalTx = ''; interimTx = '';
  recognition = makeSR();
  if (!recognition) return;

  recording = true;
  btn.classList.add('recording');
  liveTx.textContent = '';
  liveTx.classList.add('active');

  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    initAudioViz(micStream);
    recognition.start();
  } catch (e) {
    toast('Could not access microphone');
    stopRec();
  }
}

function stopRec() {
  recording = false;
  orbBtn.classList.remove('recording');
  bottomMic.classList.remove('recording');
  liveTx.classList.remove('active');

  if (recognition) { try { recognition.stop(); } catch {} recognition = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (audioCtx) { audioCtx.close().catch(() => {}); audioCtx = null; analyser = null; }

  return liveTx.textContent.trim();
}

function toggleMic(btn) {
  if (recording) { const t = stopRec(); if (t) send(t); }
  else startRec(btn);
}

orbBtn.onclick = () => toggleMic(orbBtn);
bottomMic.onclick = () => toggleMic(bottomMic);

// ── Text input ──
textIn.addEventListener('input', () => {
  textIn.style.height = 'auto';
  textIn.style.height = Math.min(textIn.scrollHeight, 110) + 'px';
  sendBtn.classList.toggle('active', textIn.value.trim().length > 0);
});

textIn.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const t = textIn.value.trim();
    if (t) { send(t); textIn.value = ''; textIn.style.height = 'auto'; sendBtn.classList.remove('active'); }
  }
});

sendBtn.onclick = () => {
  const t = textIn.value.trim();
  if (t) { send(t); textIn.value = ''; textIn.style.height = 'auto'; sendBtn.classList.remove('active'); }
};

// ── Transition ──
function enterChat() {
  if (started) return;
  started = true;
  stage.classList.add('active');
  convo.classList.add('visible');
  bottomBar.classList.add('visible');
  setTimeout(() => textIn.focus(), 400);
}

// ── Wire contract payload (from Kiro) ──
function buildRoutePayload(text) {
  return {
    request_id: `voice-${Date.now()}`,
    timestamp: new Date().toISOString(),
    session_id: `voice-session-${WS}`,
    workspace_id: WS,
    user: { id: 'voice-user', role: 'owner' },
    input: {
      objective: text,
      context: '',
      desired_outcome: '',
      constraints: '',
      risk_posture: 'medium'
    },
    policy: {
      enforce_convergence: true,
      enforce_one_way_gate: true,
      max_selected_rius: 5,
      require_validation_checks: true
    },
    runtime: {
      mode: 'planning',
      allow_execution: false,
      tool_whitelist: ['research', 'planning'],
      log_target: 'implementation'
    }
  };
}

// ── Messages ──
function addUser(text) {
  const d = document.createElement('div');
  d.className = 'msg user';
  d.textContent = text;
  convo.appendChild(d);
  scroll();
}

function addThinking() {
  const d = document.createElement('div');
  d.className = 'msg thinking';
  d.id = 'thinking';
  d.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  convo.appendChild(d);
  scroll();
}

function rmThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

function addMC(text, opts = {}) {
  const { autoSpeak, healthLine, coachingHints, brokerMeta } = opts;

  const d = document.createElement('div');
  d.className = 'msg mc';

  const lbl = document.createElement('span');
  lbl.className = 'mc-label';
  lbl.textContent = 'Mission Canvas';
  d.appendChild(lbl);

  const body = document.createElement('span');
  body.className = 'mc-body';
  d.appendChild(body);

  // Coaching hints (from Kiro — indigo panel for depth=full packets)
  if (coachingHints && coachingHints.length > 0) {
    coachingHints.forEach(hint => {
      const ch = document.createElement('div');
      ch.className = 'coaching-hint';
      ch.innerHTML = '<strong>' + escHtml(hint.term || hint.concept_id || 'Insight') + '</strong>: ' + escHtml(hint.explanation || hint.text || '');
      d.appendChild(ch);
    });
  }

  // Health status line (from Kiro crew feedback — first response)
  if (healthLine) {
    const hl = document.createElement('span');
    hl.className = 'mc-health';
    hl.innerHTML = healthLine;
    d.appendChild(hl);
  }

  // Broker metadata (from Codex — debug only)
  if (brokerMeta) {
    const dm = document.createElement('div');
    dm.className = 'debug-meta';
    dm.textContent = brokerMeta;
    d.appendChild(dm);
  }

  // Speak button
  const btn = document.createElement('button');
  btn.className = 'speak-btn';
  btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg> Speak';
  btn.onclick = () => speak(text);
  d.appendChild(btn);

  convo.appendChild(d);
  scroll();
  typeOut(body, text);

  if (autoSpeak) setTimeout(() => speak(text), 300);
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function typeOut(el, text) {
  let i = 0;
  const chunk = Math.max(1, Math.floor(text.length / 180));
  (function tick() {
    if (i < text.length) {
      el.textContent += text.slice(i, i + chunk);
      i += chunk;
      scroll();
      requestAnimationFrame(tick);
    }
  })();
}

function scroll() {
  requestAnimationFrame(() => { convo.scrollTop = convo.scrollHeight; });
}

// ── TTS ──
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.slice(0, 2000));
  u.rate = 1.0; u.pitch = 1.0;
  const voices = speechSynthesis.getVoices();
  const pref = voices.find(v =>
    /samantha|google uk english female|karen|daniel/i.test(v.name)
  );
  if (pref) u.voice = pref;
  speechSynthesis.speak(u);
}
if (speechSynthesis) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

// ── Clean markdown ──
function clean(s) {
  return s.replace(/^#+\s*/gm, '').replace(/\*\*/g, '').replace(/\*/g, '').replace(/`/g, '').replace(/^-{3,}$/gm, '').trim();
}

// ── Extract coaching hints from response (from Kiro) ──
function extractCoaching(data) {
  const hints = [];

  // Primary: coaching_packets array with depth === "full"
  const packets = data.convergence_chain?.coaching_packets || [];
  packets.forEach(p => {
    if (p.payload && p.payload.depth === 'full') {
      hints.push({
        term: p.payload.term || p.payload.concept_id || '',
        explanation: p.payload.explanation || ''
      });
    }
  });

  // Fallback: regex match on markdown coaching hints
  if (hints.length === 0) {
    const brief = data.action_brief_markdown || '';
    const re = /💡 \*\*([^*]+)\*\*: ([^\n]+)/g;
    let m;
    while ((m = re.exec(brief)) !== null) {
      hints.push({ term: m[1], explanation: m[2] });
    }
  }

  return hints;
}

// ── Build health status line ──
function buildHealthLine(welcomeData) {
  if (!welcomeData) return '';
  const score = welcomeData.health_score;
  const label = welcomeData.health_label;
  const nudges = welcomeData.nudges || [];
  const needsAttention = nudges.length;
  if (score == null) return '';
  const parts = [`Health: <span class="health-score">${score}/100</span>`];
  if (label) parts[0] += ` (${label})`;
  if (needsAttention > 0) parts.push(`${needsAttention} item${needsAttention > 1 ? 's' : ''} need attention`);
  return parts.join(' · ');
}

// ── Build broker metadata string (from Codex) ──
function buildBrokerMeta(channel) {
  if (!channel) return '';
  const parts = [
    channel.status ? `relay: ${channel.status}` : 'relay unavailable',
    channel.to_agent ? `to ${channel.to_agent}` : '',
    channel.message_id ? `msg ${channel.message_id}` : ''
  ].filter(Boolean);
  return parts.join(' · ') || 'No backend relay';
}

// ── Update header to workspace name after first interaction ──
function setHeaderWorkspace(name) {
  if (name && name !== WS) workspaceName = name;
  else workspaceName = WS.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  headerTitle.textContent = workspaceName;
}

// ── API: send message ──
let isFirstMessage = true;

async function send(text) {
  enterChat();
  addUser(text);
  addThinking();

  if (isFirstMessage) {
    isFirstMessage = false;
    // First message: who-are-you + route + workspace-welcome in parallel
    try {
      const [whoResp, routeResp, welcomeResp] = await Promise.all([
        fetch(`${API}/v1/missioncanvas/who-are-you`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: text, source: 'voice-ui', backend_agent: 'claude.analysis' })
        }),
        fetch(`${API}/v1/missioncanvas/route`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(buildRoutePayload(text))
        }),
        fetch(`${API}/v1/missioncanvas/workspace-welcome`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ workspace_id: WS })
        }).catch(() => null)
      ]);

      rmThinking();

      const whoData = await whoResp.json().catch(() => ({}));
      const routeData = await routeResp.json().catch(() => ({}));
      const welcomeData = welcomeResp ? await welcomeResp.json().catch(() => null) : null;

      // Identity answer
      const identity = whoData.answer || '';
      // Route narration
      const chain = routeData.convergence_chain || {};
      const narration = chain.narration || routeData.action_brief_markdown || '';
      // Combine
      const parts = [identity];
      if (narration) parts.push('\n\n' + clean(narration));
      const answer = clean(parts.join('')) || FALLBACK_ANSWER;

      // Coaching hints from route response
      const coachingHints = extractCoaching(routeData);

      // Health status line from workspace-welcome
      const healthLine = buildHealthLine(welcomeData);

      // Broker metadata from who-are-you (debug only)
      const brokerMeta = buildBrokerMeta(whoData.backend_channel);

      // Update header to workspace name
      if (welcomeData && welcomeData.workspace_name) {
        setHeaderWorkspace(welcomeData.workspace_name);
      } else {
        setHeaderWorkspace(WS);
      }

      // Update question text to reflect workspace
      const qEl = document.getElementById('questionText');
      if (qEl && workspaceName) qEl.textContent = workspaceName;

      addMC(answer, { autoSpeak: true, healthLine, coachingHints, brokerMeta });

    } catch (err) {
      rmThinking();
      // Offline fallback (from Codex)
      addMC(FALLBACK_ANSWER, { autoSpeak: true, brokerMeta: 'Backend unreachable. Local fallback.' });
    }
    return;
  }

  // Subsequent messages: route with full wire contract
  try {
    const resp = await fetch(`${API}/v1/missioncanvas/route`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(buildRoutePayload(text))
    });

    rmThinking();
    if (!resp.ok) { addMC('Something went wrong. Try again.', {}); return; }

    const data = await resp.json();
    const chain = data.convergence_chain || {};
    const answer = clean(chain.narration || data.action_brief_markdown || 'I heard you. Let me think about that.');

    // Coaching hints
    const coachingHints = extractCoaching(data);

    // Source + coaching count in status
    const packets = chain.coaching_packets || [];
    const source = data.source || data.coaching?.source || 'route';

    addMC(answer, { coachingHints });

  } catch (err) {
    rmThinking();
    addMC('Connection issue. Is the server running?', {});
  }
}

// ── Toast ──
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}
</script>
