- id: OIL-016
  question: What are the key financial metrics for midstream MLPs and what is a healthy distribution coverage ratio?
  answer: 'Midstream MLPs (Master Limited Partnerships) use different metrics than upstream E&Ps. Distribution Coverage Ratio (DCR) = Distributable Cash Flow / Distributions Paid — below 1.0x means paying out more than earned (unsustainable). Current average: 1.7-1.8x, forecast 1.8-1.9x over next 5 years. Distributable Cash Flow (DCF) = EBITDA - Maintenance Capex - Interest - Taxes (MLP equivalent of FCF). Debt/EBITDA: most midstream names target 3.0-4.0x (current investment-grade average 3.7x). Fee-based revenue percentage: >80% preferred for commodity price insulation. Key midstream companies: Enterprise Products Partners (EPD, largest US midstream MLP), MPLX (Marathon midstream, DCR 1.5x, Debt/EBITDA 3.3x), Williams Companies (WMB, Transco pipeline), Kinder Morgan (KMI, largest US gas pipeline network). Index-level distributions have grown 69.2% since cycle low.'
