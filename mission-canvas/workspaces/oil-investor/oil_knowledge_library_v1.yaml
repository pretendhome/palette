# ═══ GEOPOLITICAL ═══

- id: OIL-022
  question: What is the Strait of Hormuz and what happens to oil prices when it is disrupted?
  answer: 'The Strait of Hormuz is a 21-mile-wide waterway connecting the Persian Gulf to the Gulf of Oman. Approximately 20 million b/d flowed through it in 2024, representing ~20% of global petroleum consumption and ~27% of seaborne oil trade. Key exporters: Saudi Arabia (38% of Hormuz crude, 5.5 million b/d), UAE, Iraq, Kuwait, Iran. 84% of Hormuz crude flows to Asia — China, India, Japan, South Korea. Historical price impact: 1987-88 Tanker War (+30%), 2019 Iranian attacks (+$5-8/bbl), 2024 Houthi Red Sea attacks (freight cost increase), 2026 Hormuz conflict (+~50% from year-start to March 9). Risk premium bands: minor escalation $2-5/bbl, moderate disruption $5-15/bbl, major disruption $20-40+/bbl. There is no adequate bypass for Persian Gulf producers — Saudi East-West pipeline has limited capacity. Closure would be catastrophically disruptive.'
