- id: OIL-006
  question: What is the EIA Weekly Petroleum Status Report and why does it move oil prices?
  answer: 'Published every Wednesday at 10:30 AM ET, the EIA Weekly Petroleum Status Report is the most market-moving weekly data release in oil. It reports US crude oil inventories (including Cushing, Oklahoma — the WTI delivery point), total petroleum inventories, refinery utilization rates, import/export volumes, and gasoline/distillate stocks. Cushing is critical because it is the physical delivery point for NYMEX WTI futures. When Cushing fills, WTI faces downward pressure (the April 2020 negative price event was Cushing overflow). When Cushing draws down rapidly, it signals strong demand and is bullish. Traders and algorithms react within seconds of the 10:30 release — a larger-than-expected inventory draw can move WTI $1-2/bbl instantly. The EIA API provides this data for free with no rate limits on daily queries.'
