- id: OIL-025
  question: What are the essential data sources an oil investor needs and how often are they updated?
  answer: 'Daily: EIA spot prices via API (WTI, Brent, Henry Hub — free, unlimited), OilPriceAPI for real-time intraday ($9/mo). Weekly: EIA Weekly Petroleum Status Report (Wednesday 10:30 AM ET — inventories, Cushing, refinery utilization), Baker Hughes Rig Count (Friday 1:00 PM ET — active rigs by basin). Monthly: EIA Short-Term Energy Outlook (price/supply/demand forecasts), IEA Oil Market Report (global supply/demand balance), S&P Global Platts OPEC+ Survey (actual production vs quotas). Quarterly: Dallas Fed Energy Survey (executive sentiment, break-evens — March/June/September/December). Annual: EIA Annual Energy Outlook (long-term to 2050), IEA World Energy Outlook (scenarios). SEC EDGAR for 10-K reserve disclosures (annual), 10-Q quarterly financials, 8-K material events. FERC eLibrary for pipeline/LNG filings (ongoing). Bloomberg Terminal for real-time streaming and analytics ($2,000+/mo).'
