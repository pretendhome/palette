- id: OIL-026
  question: How do I integrate the EIA API for live commodity price data in a workspace?
  answer: 'The EIA Open Data API v2 is a free RESTful JSON API. Register for a key at eia.gov/opendata. All endpoints follow: https://api.eia.gov/v2/{route}/data/?api_key={KEY}&{parameters}. Key petroleum endpoints: /v2/petroleum/pri/spt/data/ (crude spot prices, daily), /v2/petroleum/sum/sndw/data/ (weekly petroleum status), /v2/petroleum/stoc/wstk/data/ (Cushing inventories, weekly), /v2/natural-gas/pri/fut/data/ (Henry Hub spot, daily). Use facets to filter: facets[product][]=EPCWTI for WTI. Max 5,000 rows per request. No hard rate limit but throttling at heavy use. Recommended caching strategy: prices TTL 4 hours (update once/day for spot), inventory TTL 24 hours (weekly release), static reference TTL 6 months. For real-time intraday: OilPriceAPI at $9/mo covers 100+ commodities. Bloomberg API for institutional-grade real-time ($2,000+/mo terminal subscription).'
