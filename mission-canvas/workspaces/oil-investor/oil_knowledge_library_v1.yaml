- id: OIL-014
  question: What are the key leverage metrics for oil and gas companies and when do they signal distress?
  answer: 'Key metrics: Net Debt/EBITDA (general leverage — concern above 2.5-3.0x, lenders require <3.0-3.5x), Net Debt/EBITDAX (E&P-specific — caution above 2.5x), Debt/Proved Reserves (asset-based, used in Reserve-Based Lending), Interest Coverage EBITDA/Interest (stress below 3.0x). Reserve-Based Lending (RBL) facilities are the critical covenant mechanism — semi-annual borrowing base redeterminations tied to proved reserves value. When oil prices drop, proved reserve values decline (SEC uses 12-month average pricing), which can trigger borrowing base reductions, forced repayments, or covenant breaches. This is the primary leverage risk event for smaller E&Ps. Investment-grade midstream leverage (Debt/EBITDA) averaged 3.7x at year-end 2024, down from 5.6x in June 2021 — a 22.3% sector-wide deleveraging.'
