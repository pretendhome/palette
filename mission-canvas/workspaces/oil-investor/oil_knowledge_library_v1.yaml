# ═══ INDUSTRY STRUCTURE ═══

- id: OIL-007
  question: Who are the top integrated oil majors (supermajors) and how do they differ from independents?
  answer: 'The 5 supermajors — ExxonMobil (~$640B market cap), Chevron (~$394B), Shell (~$200B+), BP (~$100B+), TotalEnergies (~$150B+) — operate across upstream, midstream, and downstream, providing natural hedges. Their strategy emphasizes balance sheet strength, dividends, and energy transition positioning. Top US independents by 2025 production: Expand Energy (1.75 MMboe/d), ConocoPhillips (1.42 MMboe/d), Devon Energy/Coterra merger (~1.6 MMboe/d, now largest Lower 48 independent), EOG Resources, Diamondback Energy. Key strategy divergence: independents now return >68% of FCF to shareholders (up from 35% in 2019) via buybacks and dividends. Supermajors maintain both capital returns and energy transition spending. The Devon-Coterra $58B merger (2026) exemplifies the consolidation trend — scale and stable cash flows over growth.'
