- id: OIL-015
  question: What is the frac spread and why does it matter for midstream companies?
  answer: 'The frac spread is the difference between NGL (natural gas liquids) prices and the natural gas price — the economic incentive for gas processors to extract NGLs rather than reject them (leave them in the gas stream). A wider frac spread means more profitable midstream processing. When frac spreads are negative or near zero, processors reject ethane and lighter NGLs back into the gas stream, reducing NGL supply and midstream processing revenue. NGLs are priced at Mont Belvieu, Texas — the US pricing hub. The 5 NGL components: ethane (~35-40% of mix, priced between gas floor and propane ceiling), propane (~30%, record US exports of 1.8 million b/d in 2025), normal butane (~10%), isobutane (~5%), and natural gasoline (~15-20%). MPLX reported adjusted EBITDA from NGL rose 19% YoY in Q1 2025 due to higher weighted average frac spreads.'
