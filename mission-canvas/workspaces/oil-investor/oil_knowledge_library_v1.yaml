- id: OIL-010
  question: What is reserve replacement ratio and reserve life index, and why do they matter?
  answer: 'Reserve Replacement Ratio (RRR) = new reserves added / reserves produced. Above 100% means the company is growing its reserve base; below 100% means depletion outpaces discovery. Reserve Life Index (RLI) = proved reserves / annual production, measuring how many years of current production remain without new investment. Healthy RLI: >10-15 years acceptable, >15 years signals a strong position. Global oil and gas average is ~12 years. Nuance: RLI can be misleading — a low RLI may mean a company prioritizes high-return, fast-payback inventory rather than booking marginal reserves. Reserve data is published in company 10-K filings per SEC Subpart 1200, using 12-month average pricing (not current spot). The post-2020 capital discipline trend pressures reserve replacement across the sector as less exploratory drilling occurs.'
