# ═══ FINANCIAL INTERPRETATION ═══

- id: OIL-011
  question: What is EBITDAX and when should it be used instead of EBITDA for oil and gas companies?
  answer: 'EBITDAX = Earnings Before Interest, Taxes, Depreciation/Depletion, Amortization, and Exploration Expense. The X matters because E&P companies use different accounting methods: successful efforts (dry hole costs expensed immediately) vs full cost (all exploration costs pooled and amortized). This creates non-comparability. EBITDAX removes exploration expense, normalizing both methods for apples-to-apples comparison. Use EBITDAX for companies with significant exploration spending; use standard EBITDA for mature producers with steady production and minimal exploration. Key leverage metric in energy: Net Debt/EBITDAX — above 2.5x triggers caution. Lenders typically require <3.0-3.5x. Reserve-Based Lending (RBL) facilities have semi-annual borrowing base redeterminations tied to proved reserves value — the key covenant risk event for smaller E&Ps.'
