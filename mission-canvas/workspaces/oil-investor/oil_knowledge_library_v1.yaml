- id: OIL-005
  question: What is the Henry Hub natural gas benchmark and how does it relate to oil and LNG pricing?
  answer: 'Henry Hub is the US natural gas benchmark, priced at the Erath, Louisiana pipeline hub and traded on NYMEX. It reached a historic low averaging $2.21/MMBtu in 2024. LNG export pricing is not based on Henry Hub directly — US LNG exports are priced at Henry Hub plus liquefaction fee (~$3.00-3.50/MMBtu) plus shipping. European and Asian LNG trades at JKM (Japan-Korea Marker) or TTF (Dutch) prices, substantially higher. This disconnect (US gas ~$2/MMBtu vs European $10-15/MMBtu) is the economic engine for US LNG export expansion. The historic gas-to-oil ratio is 6:1 by energy content (1 barrel oil = 6 MMBtu gas). At $60/bbl oil and $3/MMBtu gas, oil carries a 3:1 energy-equivalent premium, driving decisions about associated gas management and resource prioritization. Capital Economics forecasts Henry Hub to rise to $4.00 by end-2026 and $4.50/MMBtu by end-2027 as LNG export capacity expands.'
