- id: OIL-002
  question: What is the 3-2-1 crack spread and why do refiners watch it?
  answer: 'The 3-2-1 crack spread is the industry standard benchmark for US refining margins. It models a refinery converting 3 barrels of crude into 2 barrels of gasoline and 1 barrel of distillate (diesel/heating oil). Formula: (2 x Gasoline + 1 x Distillate) / 3 - Crude. Expressed in $/barrel, it represents the gross refining margin before operating costs. A widening crack spread signals better refining economics; narrowing signals compression. Real refiners track "margin capture" — the percentage of the 3-2-1 they actually realize as EBITDA. A well-run refinery with 80% margin capture on a $25/bbl 3-2-1 earns $20/bbl EBITDA. Variations include 2-1-1 (European diesel-heavy) and 5-3-2 (distillate-heavy). As of March 2026, the 3-2-1 hit $55.78/bbl — a crisis-driven spike from typical $12-18/bbl levels.'
