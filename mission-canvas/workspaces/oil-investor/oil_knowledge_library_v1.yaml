# ═══ AI PRODUCT CONTEXT ═══

- id: OIL-028
  question: What AI tools exist for oil and gas investment intelligence and what is the market gap?
  answer: 'Enverus AI (December 2025) is the most oil-specific: trained on petabytes of lease terms, production data, and invoices across 8,000+ companies. Offers acquisition target identification, drilling benchmarking, and earnings call summarization. Rystad Energy provides proprietary supply/demand models and project-level forecasts for IOCs, hedge funds, and governments. Kensho (S&P Global) does NLP and event-driven analysis — geopolitical impact on prices, sentiment, M&A signals. Orbital Insight uses satellite imagery to track oil storage fill levels from space (institutional hedge fund product). Bloomberg ASKB (February 2026) is the first agentic AI on a professional financial terminal — multi-agent, hundreds of millions of documents, generates BQL code. The market gap: no voice-first, portfolio-aware, decision-convergence workspace exists for oil investors. The infrastructure components are production-ready (Deepgram Nova-3 STT, ElevenLabs/OpenAI TTS, LiveKit, EIA API) but no one has assembled them with persistent project state, dependency chain reasoning, and proactive nudging.'
