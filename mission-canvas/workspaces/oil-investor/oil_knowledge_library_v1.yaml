- id: OIL-018
  question: How do OPEC+ quotas work and what is the current compliance picture?
  answer: 'OPEC (12 members, ~40% global production) + OPEC+ (22 countries adding Russia, Kazakhstan, etc., ~53 million b/d of ~106 million b/d global demand). Ministers meet periodically — monthly JMMC plus full ministerial ~twice yearly. Each member gets a quota; JMMC monitors compliance. Quotas are regularly exceeded by chronic overproducers (Iraq, Kazakhstan, UAE). In March 2025, OPEC+ producers pumped 319,000 b/d above target. Overproducers agree to compensation cuts but rarely fully deliver. Saudi Arabia is the key swing producer — can adjust rapidly by hundreds of thousands of b/d. In February 2026, Saudi increased production by 340,000-782,000 b/d despite formal freeze agreements in response to the Hormuz crisis. New Maximum Sustainable Capacity (MSC) mechanism approved November 2025 will set 2027 production baselines — expected to reward UAE and Saudi Arabia while disadvantaging African members with declining capacity.'
