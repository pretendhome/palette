- id: OIL-013
  question: How do E&P companies hedge production and what instruments do they use?
  answer: 'E&P companies hedge to protect cash flow and satisfy lender requirements. Three primary instruments: fixed-price swaps (lock a set price, no upside, no cost), costless collars (buy a put floor + sell a call ceiling, partial upside capped at ceiling, no upfront cost), and put options (right to sell at strike price, full upside above strike, premium cost $3-9/bbl). Post-2020 trend: producers shifted toward outright puts wanting full upside exposure while protecting downside. Typical hedge ratios: PE-backed/leveraged E&Ps hedge 70-90% of PDP production for 12-24 months (lender requirement); large-cap investment-grade (XOM, CVX) minimal or zero hedging; mid-cap public E&Ps 30-60%. As of early 2025, only 19% of Q4 production from 38 tracked companies was hedged — over 80% unhedged at elevated prices. Hedge books are disclosed in 10-Q filings.'
