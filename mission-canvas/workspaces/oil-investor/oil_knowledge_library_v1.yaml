- id: OIL-020
  question: What does the Texas Railroad Commission regulate and why do investors track its permit data?
  answer: 'The Texas Railroad Commission (RRC) is the primary regulator for the world most productive onshore oil region. Despite the name, it has not regulated railroads since that function moved to TxDOT. Functions: issues drilling permits for all Texas oil and gas wells, collects production and well completion reports (P5 forms), regulates well plugging and remediation, pipeline safety, natural gas utilities, and sets spacing and density rules. Investors track RRC permit filings as a leading indicator of future drilling activity — a surge in Permian Basin permit applications signals upcoming production growth (with a 3-6 month lag). RRC production data is public records. Other key state regulators: NDIC (North Dakota) for Bakken production, and New Mexico OCD (Oil Conservation Division) for the Delaware Basin portion of the Permian — increasingly important as Delaware Basin production rivals the Midland.'
