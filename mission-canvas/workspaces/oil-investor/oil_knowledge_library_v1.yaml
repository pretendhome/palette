- id: OIL-012
  question: What are lifting costs (LOE) and how do they vary by basin?
  answer: 'Lifting costs (Lease Operating Expenses / LOE) are the cash operating costs to produce a barrel of oil equivalent from an existing well. They include artificial lift, well maintenance, water disposal, field processing, and labor. Typical LOE ranges (2025-2026): Permian Delaware ~$5.45/Boe (lowest — per Permian Resources 2026 guidance), Bakken ~$9-12/Boe (higher artificial lift and water disposal costs), Eagle Ford ~$8-11/Boe (significant water disposal), conventional vertical wells vary widely but have low volumes. Conventional wells often have lower per-barrel LOE due to natural reservoir pressure but lower production rates mean fixed costs dominate. LOE is reported quarterly in company earnings and annually in 10-K filings. It is the key metric for determining which existing wells remain economic at any given oil price — if LOE exceeds the realized price, the well should be shut in.'
