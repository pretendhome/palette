- id: OIL-003
  question: How does oil price sensitivity differ between upstream, midstream, and downstream companies?
  answer: 'Upstream E&P companies are highly leveraged to oil prices — revenue is production volume x realized price, so a $10/bbl move directly impacts EBITDA (amplified because operating costs are largely fixed short-term). Downstream refiners have a more complex relationship: when crude rises, input costs rise faster if product price response lags, so net effect depends on the crack spread. Refiners can see improved margins during price collapses if product prices fall more slowly. Midstream operators (pipelines, storage) are the most insulated — revenues are primarily fee-based via take-or-pay contracts tied to throughput volumes, not commodity prices. They function more like infrastructure utilities. Price sensitivity is indirect: prolonged low prices that kill upstream production eventually reduce throughput volumes.'
