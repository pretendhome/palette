# ═══ MARKET CONTEXT (March 2026) ═══

- id: OIL-027
  question: What is the current oil market situation as of March 2026?
  answer: 'Brent: $100-105/bbl (hit $105.85 on March 26), up ~40% in one month and ~50% from January 1. WTI: ~$94-100/bbl. Spread: $6-10/bbl WTI discount. Primary driver: active military conflict near the Strait of Hormuz with Iranian production shut-ins. IEA released 400 million barrels from emergency reserves on March 11. US eased Venezuela sanctions as a supply offset. Saudi Arabia overrode OPEC+ freeze, increasing production by 340,000-782,000 b/d as swing producer. US issued 30-day waivers on Russian oil at sea to prevent simultaneous supply shocks. EIA forecasts Brent averaging $79/bbl for 2026 (revised up 37%) and $64/bbl for 2027, highly dependent on Hormuz conflict duration. Pre-conflict forecast was $58/bbl for 2026. US shale production forecast: 13.6 million b/d in 2026. Crack spread hit $55.78/bbl on March 20 — a crisis-driven spike from typical $12-18/bbl. 592 US rigs as of late March, down 29 YoY.'
