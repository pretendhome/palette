- id: OIL-024
  question: What is peak oil demand and when is it projected?
  answer: 'Per the IEA World Energy Outlook 2025, under the Stated Policies Scenario (STEPS), oil demand is expected to plateau around 2030 at ~102 million b/d before a slow decline. Under the Current Policies Scenario (CPS — actual policies without new commitments), demand rises to 105 million b/d by 2035 and 113 million by 2050. Key shift in WEO 2025 vs prior years: IEA extended its gas demand peak from 2030 to 2035 and softened the fossil fuel peak narrative, driven by weak climate action and energy security fears. Rystad Energy projects clean energy investment surpassing oil and gas by 2025 — data center capex reached $770B in 2025, exceeding upstream oil and gas for the first time. For investors: peak demand ~2030 per STEPS means 4 years of growth before plateau — short enough to make 20-year oilfield investments questionable without high return hurdles. The "when" of peak demand is central to long-cycle capex decisions.'
