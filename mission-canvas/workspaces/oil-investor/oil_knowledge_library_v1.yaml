# ═══ COMMODITY FRAMEWORKS ═══

- id: OIL-001
  question: What is the difference between WTI and Brent crude oil, and why does the spread matter?
  answer: 'WTI (West Texas Intermediate) is the US crude benchmark, priced at Cushing, Oklahoma and traded on NYMEX. Brent is the international benchmark reflecting North Sea seaborne oil, used to price approximately two-thirds of globally traded crude. The WTI-Brent spread typically reflects logistical and quality differences — when US export infrastructure is constrained, WTI trades at a discount to Brent. The spread matters for investment decisions because it affects US refiner input costs, E&P netback realizations, and international trade routing. As of March 2026, WTI trades ~$6-10/bbl below Brent due to Hormuz disruption affecting seaborne grades more than landlocked WTI. Historical 5-year range: $1.50-$6/bbl WTI discount under normal conditions.'
