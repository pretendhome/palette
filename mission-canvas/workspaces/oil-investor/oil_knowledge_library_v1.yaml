- id: OIL-009
  question: What do oilfield service companies do and how does their revenue correlate with upstream capex?
  answer: 'The Big Three OFS companies — SLB (Schlumberger), Baker Hughes (BKR), and Halliburton (HAL) — provide drilling, completion, production, and digital services to E&P operators. SLB is the largest (digital + subsurface leadership, >$1B digital ARR), Baker Hughes is diversifying into industrial energy tech (record $32.4B backlog, power systems and data centers), and Halliburton is most North America and completions-focused (most cyclical). OFS revenue is a lagging function of upstream capex with a 6-12 month lag. When E&P companies increase drilling budgets, OFS revenues follow. The current cycle: Halliburton operating income fell 39.8% as North America activity softened, while Baker Hughes grew revenue as its non-cyclical segments offset upstream exposure. The Baker Hughes rig count (published every Friday at 1:00 PM ET) is the key weekly activity indicator — 592 US rigs as of late March 2026.'
