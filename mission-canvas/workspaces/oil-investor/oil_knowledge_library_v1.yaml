- id: OIL-008
  question: What is capital discipline in US shale and how did it change the industry post-2020?
  answer: 'Post-2020, US shale shifted fundamentally from growth-at-all-costs to free cash flow maximization. Cumulative FCF was approximately -$300B from 2010-2020 as operators subsidized production growth. In 2022 alone, FCF reached +$210B — a structural reversal. Rystad Energy calls this "Shale 4.0" — capital discipline and inventory quality gate decisions, not price optimism. Top 20 independents now return 68% of FCF to shareholders vs 35% in 2019. Capex guidance across the industry for 2026 is flat to modestly higher with low-single-digit production growth expected. The rig count declined ~7% in 2025 and ~5% in 2024. US crude production is forecast at 13.6 million b/d in 2026, rising to 13.8 million in 2027. This discipline means higher oil prices no longer trigger a supply surge — a structural change in market dynamics.'
