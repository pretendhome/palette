- id: OIL-023
  question: How do sanctions on Iran, Venezuela, and Russia affect global oil supply?
  answer: 'Iran: under US sanctions since 1979 (with gaps). Production ~3.23 million b/d, exempt from OPEC+ quotas. In March 2026, IEA member countries released 400 million barrels from emergency reserves in response to Iran conflict. Venezuela: US eased PDVSA sanctions in March 2026 via comprehensive authorization allowing direct sales to US businesses — a supply offset during Hormuz disruption. Russia: sanctioned post-2022 Ukraine invasion with a $60/bbl price cap on seaborne crude. In March 2026, US issued 30-day waivers allowing purchase of Russian oil already at sea, avoiding simultaneous Russian + Iranian supply shock. Sanctions are a policy tool used for geopolitical leverage but create complex supply dynamics — removing barrels from official markets pushes them to shadow fleets and discounted trade routes. Actual production impact is often less than headline sanctions suggest.'
