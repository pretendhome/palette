- id: OIL-019
  question: How does the SEC require oil and gas companies to report reserves?
  answer: 'The SEC Modernization of Oil and Gas Reporting rules (effective January 2010) govern public company reserve disclosures in 10-K filings under Subpart 1200 (Items 1201-1208). Key rules: companies must use the 12-month average of first-day-of-month prices (not current spot) to calculate proved reserves, improving comparability. Proved reserves definition was expanded to include unconventional resources (shale, oil sands). Companies may (but are not required to) disclose 2P (proved + probable) and 3P (plus possible) reserves. Third-party qualified engineers are required for reserve reports. Reserve categories: 1P (proved — 90%+ probability), 2P (proved + probable — 50%+ probability), 3P (plus possible — 10%+ probability). To find reserve data: search SEC EDGAR (sec.gov) for 10-K filings; reserves are disclosed in the Standardized Measure of Discounted Future Net Cash Flows section.'
