# ═══ REGULATORY ═══

- id: OIL-017
  question: What does FERC regulate and where can investors find its filings?
  answer: 'FERC (Federal Energy Regulatory Commission) regulates interstate natural gas pipelines (rates, terms, construction), LNG export/import facility siting under Section 3 of the Natural Gas Act, and electricity markets. Actions that matter to investors: approving/denying LNG terminal permits (multi-year process gating US LNG export capacity), setting pipeline tariff rates (affects midstream revenue), and environmental review (NEPA impact statements). Currently regulates 27 operational LNG facilities with active proceedings for new terminals. Key recent policy: the OBBBA (2025) mandated 36 offshore lease sales through 2040, accelerating BOEM schedules. All FERC orders, tariff filings, and environmental documents are publicly accessible at the FERC eLibrary (elibrary.ferc.gov) — searchable by docket number, company name, or document type. FERC also provides a submission API for automated monitoring.'
