- id: OIL-021
  question: What are the key US environmental regulators affecting oil and gas operations?
  answer: 'EPA (Environmental Protection Agency) regulates methane emissions (NSPS OOOOa/OOOOb rules), air quality, water disposal from drilling (produced water), and Clean Air Act permitting. Methane regulation directly increases E&P operating costs. Evolving rules on produced water affect Permian economics. BSEE (Bureau of Safety and Environmental Enforcement) handles offshore safety — drilling permits, production safety systems, equipment inspections on the Outer Continental Shelf. Can halt offshore drilling via permit moratoria or enforce safety shutdowns. BOEM (Bureau of Ocean Energy Management) manages offshore leasing — the 5-year OCS Leasing Program determines who can drill where and when. The OBBBA (2025) mandated 36 lease sales through 2040. DOE (Department of Energy) manages the Strategic Petroleum Reserve (SPR releases inject supply into market), LNG export authorization (separate from FERC construction permits), and energy policy.'
