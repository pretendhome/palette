- id: OIL-004
  question: What are the break-even prices for US shale producers by basin?
  answer: 'Break-evens come in two forms: half-cycle (incremental — covers well-level costs on already-acquired acreage) and full-cycle (covers all costs including land, G&A, infrastructure). Per the Dallas Fed Energy Survey Q1 2026, the average break-even to profitably drill across all basins is $66/bbl, with Permian Basin at $67/bbl (up from $65 YoY). Basin break-evens for new wells: Permian Delaware ~$61/bbl, Eagle Ford ~$55-65/bbl, Bakken ~$58/bbl. Full-cycle Permian: most productive wells ~$36.40/bbl, average $50-65/bbl depending on acreage vintage. For comparison, Saudi Arabia lifting costs are ~$2-4/bbl but fiscal break-even (government budget balance) is ~$70-80/bbl. The Dallas Fed survey is a quarterly leading indicator — 135 respondents, data collected March 11-19, 2026. Now available on FRED.'
