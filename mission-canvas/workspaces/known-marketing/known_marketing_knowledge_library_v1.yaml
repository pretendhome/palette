  - id: KNOWN-MKT-KL-015
    question: How should Known talk about safety and build trust with new users?
    answer: "Known should NOT talk about safety the way every other app does (generic 'we take safety seriously' language). Instead, lead with structural design choices that create safety as a byproduct: 1) Voice-first onboarding means users reveal more about themselves before matching — harder for bots and bad actors, 2) One-person-at-a-time introductions mean users invest attention — less room for spam or mass-messaging, 3) 24-hour action windows create accountability — no ghosting after weeks of texting, 4) Per-date pricing means Known's incentive is successful dates, not keeping users trapped. For privacy: Known should implement zero-trust voice storage with self-destruct voice messages after match (R-004 in risk register). Trust messaging: 'We built Known so you'd feel safe enough to be honest.' Not: 'We have advanced safety features.'"
