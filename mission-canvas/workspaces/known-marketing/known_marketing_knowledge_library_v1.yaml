  - id: KNOWN-MKT-KL-002
    question: What should a competitive matrix for Known optimize for?
    answer: "The matrix should optimize for decision usefulness, not category completeness. The most important columns are: target user frustration, match mechanism, time-to-date, trust/intimacy signal, monetization logic, launch-mode requirements, and proof strength. For Known, the strategic question is not 'who has the most features?' It is 'which alternative owns the same job-to-be-done for dating-fatigued users who want fewer, better introductions?' That means Hinge, Bumble, Thursday, and Overtone matter more than generic social apps."
