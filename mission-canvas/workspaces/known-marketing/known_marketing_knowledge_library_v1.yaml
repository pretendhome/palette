  - id: KNOWN-MKT-KL-014
    question: What should Known's marketing budget be and what seasonal trends matter?
    answer: "For a seed-stage dating app with $9.7M raised, a reasonable monthly marketing budget is $15K-30K, with 60-70% on organic/community and 30-40% on paid tests. The $15 CAC guardrail means a $15K paid budget could acquire ~1,000 users/month. Seasonal trends in dating app downloads: January is the biggest month ('cuffing season' resolution + New Year fresh starts), with a secondary peak in September (back-to-school, fall dating). Summer (June-August) typically sees lower engagement. Valentine's Day week is high-awareness but high-competition — better for PR than paid. For Known specifically, launch timing should target January or September peaks. Budget allocation: P0 organic voice loops (TikTok/Reels), P1 referral program, P2 'swipe fatigue' paid social, P3 community guerrilla events."
