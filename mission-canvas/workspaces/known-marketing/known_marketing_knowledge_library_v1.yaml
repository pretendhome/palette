  - id: KNOWN-MKT-KL-006
    question: What are Known's unit economics, CAC, and LTV targets?
    answer: "Known's unit economics are anchored to the $30 per-successful-date revenue model. CAC guardrail is $15 per user — this gives a 2:1 first-date LTV-to-CAC ratio. If a user goes on 2 dates/month, monthly LTV is $60 — higher than the average Hinge/Tinder subscriber. Channel CAC benchmarks for dating apps: organic/viral $1-5, referral $5-15, influencer $10-30, paid social $15-40, Google Ads $20-60. Known should prioritize channels under $15 CAC. Current status: actual channel-level CAC data is still pending (ME-002 partially resolved with guardrail, awaiting real data from owner). LTV-to-CAC ratio target at scale: 3:1 or better."
