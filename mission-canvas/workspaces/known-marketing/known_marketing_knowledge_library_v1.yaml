  - id: KNOWN-MKT-KL-005
    question: What is Known's north star metric and what KPIs should we track weekly?
    answer: "Known's north star metric is 'Date Density' — dates per 1,000 active users in a city. This measures the core product promise. Weekly KPIs to track: 1) Waitlist growth rate and waitlist-to-accepted conversion, 2) Voice onboarding completion rate, 3) Intro-to-date conversion rate (target: maintain 80%), 4) CAC by channel (guardrail: under $15), 5) Viral coefficient (goal: >0.4 from referrals), 6) Gender ratio of active users (target: 45/55 or better), 7) Repeat date rate (users returning for second intro). The one metric to watch every morning is intro-to-date conversion — if it drops below 70%, the product promise is eroding."
