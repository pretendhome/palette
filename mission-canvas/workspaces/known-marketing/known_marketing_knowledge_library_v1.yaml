  - id: KNOWN-MKT-KL-013
    question: How does Known handle gender balance and marketplace dynamics?
    answer: "Gender imbalance is the #1 structural risk for Known (R-001 in risk register). Most dating apps skew 60-70% male, which degrades the experience for everyone. Known's mitigation: strict gender-balanced waitlist releases — only unlock a city when the gender split is within 45/55 ratio. For messaging, target women with safety, depth, and control narratives (voice reveals personality before photos, one person at a time creates focus). Target men with high match potential, voice features that create real connection, and the 80% date rate. The one-at-a-time model helps because it prevents the 'abundance illusion' that makes users less serious. Current status: ME-003 (actual gender split and marketplace balance) is CRITICAL and unresolved — we do not know the current ratio. Until this is resolved, expansion is blocked."
