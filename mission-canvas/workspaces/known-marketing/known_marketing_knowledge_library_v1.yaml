  - id: KNOWN-MKT-KL-008
    question: What is Known's waitlist strategy and what conversion rate should we target?
    answer: "Known currently operates in waitlist/apply mode in SF only. The waitlist serves two purposes: 1) quality control — maintaining marketplace balance and user quality, 2) demand signal — demonstrating product-market fit to investors and press. Industry benchmarks for waitlist conversion: 30-50% is strong for consumer apps. Known should target 40%+ waitlist-to-accepted conversion to maintain healthy growth while filtering for quality. Gender-balanced waitlist releases are critical — only unlock a city when the gender split is within 45/55 ratio. Current status: ME-001 (waitlist size, growth rate, acceptance rate, time-to-accept by cohort) is unresolved and CRITICAL — Agnes needs to get this data from the product team. Without it, we cannot forecast launch scale or choose growth channels. The waitlist itself is a marketing asset: scarcity creates desire."
