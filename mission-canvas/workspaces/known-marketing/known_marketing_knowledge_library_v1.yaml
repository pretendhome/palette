  - id: KNOWN-MKT-KL-012
    question: How should Known approach city expansion and what does a new city launch look like?
    answer: "Expansion criteria focus on 'Date Density' and gender-balanced waitlist unlocks. Tier 1 candidates: LA, NYC, Austin. The launch playbook has three phases: 1) Waitlist Collection — run 'Voice of the City' ads to gauge demand and build the waitlist, 2) Gender-Balanced Unlocking — only open the city when the gender split is within 45/55 ratio, 3) Local 'Founding Members' — hand-pick the first 500 users via manual voice audition to set the brand tone. The next city should favor markets where social proof spreads locally, dating fatigue is legible, and event/community amplification can complement the product story. This likely favors dense, narrative-rich urban markets. Localization needs: local venue partnerships for date spots, city-specific content, and community ambassador program. Current blockers: ME-003 (gender balance data) and ME-004 (expansion shortlist — partially resolved)."
