  - id: KNOWN-MKT-KL-001
    question: How should Known position itself against Hinge, Bumble, Thursday, and Overtone?
    answer: "Known should not position as 'another dating app with AI.' It should position against swipe fatigue and low-intent matching. The clearest wedge is: voice-first onboarding, one-person-at-a-time introductions, and a business model tied to successful dates rather than endless engagement. Against Hinge and Bumble, the contrast is depth and outcome quality. Against Thursday, the contrast is guided intimacy rather than event scarcity. Against Overtone, the contrast is that Known already has early behavioral proof points in market, including an 80% intro-to-date rate in the SF beta and a 26-minute onboarding flow that suggests unusually high user intent."
