  - id: KNOWN-MKT-KL-011
    question: How should Known approach PR and press coverage?
    answer: "Known already has strong press foundation — TechCrunch covered the $9.7M seed and the voice-first model. PR strategy should lead positioning, then social amplifies. Recommended approach: 1) Pitch founder stories to relationship/lifestyle press (not just tech), 2) Lead with the 80% stat and the 26-minute onboarding contrast versus swiping, 3) Position Celeste Amadon as the anti-dating-app founder (Stanford dropout building what dating should have been), 4) Target press around city launches for local coverage, 5) Pitch think-pieces on 'voice-first connection design' to build category. Do NOT pitch: 'AI dating app' (crowded narrative, Overtone will own it), feature tours, or pricing details until pricing model is validated. PR should come before paid — earned media builds credibility that makes paid social convert better."
