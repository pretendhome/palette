  - id: KNOWN-MKT-KL-003
    question: What is the strongest messaging contrast for Known versus swipe-based apps?
    answer: "The strongest contrast is not 'better matching algorithm.' It is 'higher-intent connection design.' Swipe apps optimize volume, optionality, and lightweight engagement. Known can credibly argue for fewer introductions, more signal before the introduction, and accountability around the outcome. Messaging should lead with the emotional and behavioral difference: you speak, you reveal more, and the system is built to get you to a real date faster. The 80% intro-to-date beta claim is the sharpest proof point available right now, but it should be paired with caution because retention, gender balance, and CAC are still unresolved evidence gaps."
