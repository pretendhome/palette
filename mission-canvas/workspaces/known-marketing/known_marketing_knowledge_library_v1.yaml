  - id: KNOWN-MKT-KL-004
    question: How should Known think about pricing compared with subscription-based incumbents?
    answer: "Known's per-successful-date pricing is strategically interesting because it aligns revenue with the user outcome instead of time spent in the app. That creates a narrative advantage over subscription incumbents, but it is also a one-way door because public pricing shapes trust and future unit economics. Before scaling this positioning, Known needs evidence on retention after first date, repeat usage behavior, and the current waitlist-to-date funnel. The right message today is 'aligned incentives,' not 'final pricing model proven.'"
