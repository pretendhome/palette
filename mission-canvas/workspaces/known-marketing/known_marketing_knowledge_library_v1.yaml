  - id: KNOWN-MKT-KL-010
    question: Should Known run a referral program and what should the incentive be?
    answer: "Yes — referral is a P1 channel. Known's 80% date rate is the best referral trigger in dating. Recommended incentive: 'Invite a friend, get your next date free' ($30 value). This is double-sided: referrer gets a free Date Token, referee gets priority waitlist access. The referral should trigger at the moment of delight — right after a successful date, prompt the user to invite a friend. Target viral coefficient: >0.4 (every 10 users bring in 4+ new users). Cost per referral lead at $30 value is within the $15 CAC guardrail if even half of referred users convert to a paid date. Make sharing seamless via voice notes or pre-filled messages. Current status: referral program is not yet live — it depends on resolving OD-001 (primary growth channel decision)."
