  - id: KNOWN-MKT-KL-009
    question: What is Known's brand personality and brand voice?
    answer: "Known sounds like your most honest friend who happens to be great at dating. Not a tech company. Not a dating coach. Not a therapist. Tone: warm but direct, confident without bragging, playful but never cheesy, anti-hype — understate and let numbers do the work. Brand personality in three words: honest, warm, intentional. The one-liner: 'You talk. We listen. You meet one real person.' Words to use freely: voice, conversation, real, actual, meet, date, person, connect, honest, genuine. Words to never say: swipe, algorithm, AI-powered, disrupting, find your person. Key brand rule: every piece of content must be speakable — if it doesn't sound natural read aloud, rewrite it. Numbers over adjectives: '80% go on dates' beats 'the best dating app.'"
    problem_type: Brand_Identity
