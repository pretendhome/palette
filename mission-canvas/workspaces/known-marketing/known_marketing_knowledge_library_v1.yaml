  - id: KNOWN-MKT-KL-017
    question: How should Known use the 80% intro-to-date conversion rate in marketing?
    answer: "The 80% stat is Known's sharpest proof point. How to use it: 1) Lead with it in every channel — '80% of our intros turn into actual dates' is the single most compelling claim Known has, 2) Context it against the industry: dating app average match-to-date rate is 5-15%, so Known is 5-16x better, 3) Use it in the TikTok 'The Math' script: '90 minutes of swiping, one date a month. 26 minutes of talking, 80% go on an actual date,' 4) Pair it with the per-date pricing: 'We only charge when it works — and it works 80% of the time.' Cautions: 1) This is beta SF data — it may not hold at scale, in new cities, or with different demographics. Flag it as 'SF beta' until proven elsewhere, 2) Do not say '80% success rate' — say '80% of intros lead to in-person dates.' The date is the outcome, not the relationship, 3) Monitor this number weekly — if it drops below 70%, pause marketing that references it. Current status: the stat is the strongest positioning asset but retention (ME-006) and gender balance (ME-003) could erode it."
    problem_type: Proof_Point_Strategy
