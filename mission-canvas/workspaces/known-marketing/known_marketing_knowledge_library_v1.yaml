  - id: KNOWN-MKT-KL-007
    question: What should Known's content strategy and content calendar look like?
    answer: "Known's content calendar follows a weekly rhythm: Monday — data point (80% stat, 26-min insight) on Twitter/X for credibility. Tuesday — anonymized user story on TikTok/Reels for emotional connection. Wednesday — swipe culture commentary on TikTok/Reels for problem awareness. Thursday — behind-the-scenes voice AI content on Instagram Stories for transparency. Friday — weekend date prompt across all platforms for engagement. Saturday — intentional silence (Known is about quality, not volume). Sunday — founder voice note on Instagram/TikTok for authenticity. Content rules: never post more than once per day, every post must sound natural read aloud, no stock photos ever, numbers over adjectives, respond to every comment for the first 1000 followers. Current status: ME-005 (content operating strategy) is unresolved — Agnes needs to confirm what content is already in market before finalizing."
