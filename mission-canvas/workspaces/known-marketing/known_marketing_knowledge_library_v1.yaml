  - id: KNOWN-MKT-KL-016
    question: How should Known message the 26-minute voice onboarding without scaring people?
    answer: "The 26-minute onboarding is Known's biggest differentiator AND biggest conversion risk. Messaging strategy: 1) Never call it '26 minutes of questions' — call it '26 minutes of real conversation,' 2) Frame it as investment vs. cost: 'You spend 90 minutes a day swiping. We ask for 26 minutes once — and 80% of the time, you go on an actual date,' 3) Use social proof: highlight that users average 26 minutes voluntarily — some go over an hour because they're having a real conversation, 4) Contrast with the alternative: '26 minutes or 26 days of texting someone who ghosts you,' 5) In ads, show the experience — someone laughing, being genuine, surprised by their own honesty. The onboarding IS the product experience. It is not a barrier to entry — it is the first moment of connection."
    problem_type: Conversion_Messaging
