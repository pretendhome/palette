<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nora's Bot Builder</title>
<style>
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --accent: #e94560;
    --accent-soft: rgba(233, 69, 96, 0.15);
    --text: #eee;
    --text-dim: #8899aa;
    --success: #4ecca3;
    --warm: #f5a623;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #header {
    width: 100%;
    text-align: center;
    padding: 20px;
    background: var(--card);
    border-bottom: 2px solid var(--accent);
  }
  #header h1 { font-size: 1.6em; margin-bottom: 4px; }
  #header .sub { color: var(--text-dim); font-size: 0.9em; }
  #progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.1);
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--warm));
    transition: width 0.5s ease;
    width: 0%;
  }

  #main {
    flex: 1;
    width: 100%;
    max-width: 600px;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #block-label {
    font-size: 0.85em;
    color: var(--warm);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  #question-card {
    background: var(--card);
    border-radius: 16px;
    padding: 28px 24px;
    width: 100%;
    margin-bottom: 24px;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 1.25em;
    line-height: 1.5;
    border: 1px solid rgba(255,255,255,0.05);
  }

  #answer-display {
    width: 100%;
    min-height: 60px;
    margin-bottom: 24px;
    text-align: center;
    color: var(--text-dim);
    font-style: italic;
    font-size: 1em;
    line-height: 1.4;
  }
  #answer-display.has-answer { color: var(--success); font-style: normal; }

  #mic-btn {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    background: var(--accent-soft);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    margin-bottom: 16px;
  }
  #mic-btn:hover { background: rgba(233, 69, 96, 0.3); }
  #mic-btn.recording {
    border-color: var(--success);
    background: rgba(78, 204, 163, 0.2);
    animation: pulse 1.5s infinite;
  }
  #mic-btn svg { width: 40px; height: 40px; fill: var(--text); }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(78, 204, 163, 0.4); }
    50% { box-shadow: 0 0 0 20px rgba(78, 204, 163, 0); }
  }

  #mic-label {
    font-size: 0.9em;
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  .nav-row {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 400px;
  }
  .nav-btn {
    flex: 1;
    padding: 14px;
    border: 1px solid rgba(255,255,255,0.15);
    background: var(--card);
    color: var(--text);
    border-radius: 10px;
    font-size: 1em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.08); }
  .nav-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    font-weight: 600;
  }
  .nav-btn.primary:hover { opacity: 0.9; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  #speaker-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: var(--card);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  #speaker-btn svg { width: 20px; height: 20px; fill: var(--text); }

  #done-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }
  #done-screen h2 { font-size: 1.8em; margin-bottom: 12px; color: var(--success); }
  #done-screen p { color: var(--text-dim); margin-bottom: 24px; line-height: 1.5; }

  #counter {
    font-size: 0.85em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  /* Break screen */
  #break-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }
  #break-screen h2 { font-size: 1.5em; margin-bottom: 12px; color: var(--warm); }
  #break-screen p { color: var(--text-dim); margin-bottom: 24px; }
</style>
</head>
<body>

<div id="header">
  <h1>Nora's Bot Builder</h1>
  <div class="sub">Let's build something just for you</div>
</div>
<div id="progress-bar"><div id="progress-fill"></div></div>

<button id="speaker-btn" title="Read question aloud">
  <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
</button>

<div id="main">
  <div id="block-label"></div>
  <div id="counter"></div>
  <div id="question-card"></div>
  <div id="answer-display">Tap the mic and talk</div>

  <button id="mic-btn">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </button>
  <div id="mic-label">Tap to talk</div>

  <div class="nav-row">
    <button class="nav-btn" id="skipBtn">Skip</button>
    <button class="nav-btn primary" id="nextBtn" disabled>Next</button>
  </div>
</div>

<div id="break-screen">
  <h2>Nice work!</h2>
  <p>Take a break if you want. Stretch, get some water, pet the cat. Come back when you're ready.</p>
  <button class="nav-btn primary" id="continueBtn" style="max-width:200px;margin:0 auto;">I'm ready!</button>
</div>

<div id="done-screen">
  <h2>You did it!</h2>
  <p>Thank you, Nora. Your answers are going to help us build something really cool for you.</p>
  <p id="answer-count"></p>
  <button class="nav-btn primary" id="exportBtn" style="max-width:200px;margin:0 auto;">Save my answers</button>
</div>

<script>
const QUESTIONS = [
  // Block 1: Who Are You?
  { block: "Who Are You?", q: "If you had to describe yourself to someone who'd never met you, what would you say?" },
  { block: "Who Are You?", q: "What are you really, really good at? It can be anything." },
  { block: "Who Are You?", q: "What's the coolest thing you've ever made or done?" },
  { block: "Who Are You?", q: "If you could spend a whole day learning about anything — no school rules — what would you pick?" },
  { block: "Who Are You?", q: "You speak Italian and English. Which one feels more like you?" },
  { block: "Who Are You?", q: "What do you want to be when you grow up? It's OK if there are five answers or zero." },
  { block: "Who Are You?", q: "Who are the most important people in your life? Why them?" },
  { block: "Who Are You?", q: "What's the bravest thing you've ever done?" },
  { block: "Who Are You?", q: "If you could have any superpower, what would it be? Why that one?" },
  { block: "Who Are You?", q: "What's something you know a lot about that most kids your age don't?" },

  // Block 2: Learning & School
  { block: "Learning & School", q: "When you learn something new and it really clicks — what does that feel like? Can you remember a time?" },
  { block: "Learning & School", q: "When something at school is really hard and you're stuck — what does that feel like? What do you usually do?" },
  { block: "Learning & School", q: "Do you learn better by listening, by watching, by doing something with your hands, or by talking about it?" },
  { block: "Learning & School", q: "You've used voice-to-text at school — the thing where you talk and the computer writes. What do you think about that?" },
  { block: "Learning & School", q: "Is there something you understand really well in your head but have trouble getting onto paper?" },
  { block: "Learning & School", q: "How do you feel about reading? You can say anything — it's totally OK to be honest." },
  { block: "Learning & School", q: "Is reading easier in Italian or English? Why do you think that is?" },
  { block: "Learning & School", q: "When someone reads a book to you, do you enjoy it? What kind of books or stories do you like?" },
  { block: "Learning & School", q: "If reading magically became easy tomorrow, what's the first thing you'd want to read on your own?" },
  { block: "Learning & School", q: "What's the best part of school right now?" },
  { block: "Learning & School", q: "What's the hardest part of school right now?" },
  { block: "Learning & School", q: "Is there a time at school when you feel really smart?" },
  { block: "Learning & School", q: "Is there a time at school when you feel frustrated or sad?" },
  { block: "Learning & School", q: "Do your friends know that reading is hard for you? How do you feel about that?" },

  // Block 3: Your Bot
  { block: "Your Bot", q: "We're building a helper just for you — you can talk to it anytime. What should we call it?" },
  { block: "Your Bot", q: "Should it sound like a kid, a grown-up, a teacher, a friend, a robot, or something else?" },
  { block: "Your Bot", q: "If your bot could help you with ONE thing, what would that be?" },
  { block: "Your Bot", q: "What about a second thing?" },
  { block: "Your Bot", q: "When you get something wrong, how should the bot react? Should it give you a hint? Say something nice? What would feel right?" },
  { block: "Your Bot", q: "When you get something right, how should it celebrate? Big celebration or chill?" },
  { block: "Your Bot", q: "Is there anything you'd want to ask the bot that you might feel embarrassed to ask a teacher or parent?" },
  { block: "Your Bot", q: "Would you want the bot to know about your dyslexia? Would you want to ask it questions about how your brain works?" },
  { block: "Your Bot", q: "Think about the best teacher or adult you've ever had — the one who really got you. What made them so good?" },
  { block: "Your Bot", q: "Think about a time someone tried to help you but it actually made you feel worse. What happened?" },
  { block: "Your Bot", q: "When you're practicing something hard, how long before you need a break? Five minutes? Ten? Fifteen?" },
  { block: "Your Bot", q: "If the bot notices you're getting frustrated, what should it do? Keep going? Switch to something fun? Tell a joke?" },
  { block: "Your Bot", q: "Would you rather practice hard stuff in the morning or afternoon?" },
  { block: "Your Bot", q: "Is there anything else you want this bot to do?" },
  { block: "Your Bot", q: "Is there anything you want this bot to NEVER do?" },
  { block: "Your Bot", q: "If this bot could be anything in the whole world — forget what's possible — what would you want it to be?" },
];

const BLOCK_BREAKS = { "Learning & School": 10, "Your Bot": 24 };
const breaksDismissed = new Set();
const ENCOURAGEMENTS = [
  "Great answer!", "Love that!", "That's awesome.", "Thank you!",
  "Good one!", "I like that.", "Nice.", "Cool!", "Got it!",
  "That's really interesting.", "Perfect.", "Thank you for sharing that."
];

let currentQ = 0;
let answers = {};
let recording = false;
let recognition = null;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

const questionCard = document.getElementById('question-card');
const answerDisplay = document.getElementById('answer-display');
const micBtn = document.getElementById('mic-btn');
const micLabel = document.getElementById('mic-label');
const nextBtn = document.getElementById('nextBtn');
const skipBtn = document.getElementById('skipBtn');
const blockLabel = document.getElementById('block-label');
const counter = document.getElementById('counter');
const progressFill = document.getElementById('progress-fill');
const speakerBtn = document.getElementById('speaker-btn');
const mainEl = document.getElementById('main');
const breakScreen = document.getElementById('break-screen');
const doneScreen = document.getElementById('done-screen');
const continueBtn = document.getElementById('continueBtn');
const exportBtn = document.getElementById('exportBtn');

// Load saved progress
try {
  const saved = localStorage.getItem('nora-intake-answers');
  if (saved) {
    answers = JSON.parse(saved);
    // Find first unanswered
    for (let i = 0; i < QUESTIONS.length; i++) {
      if (!answers[i]) { currentQ = i; break; }
      if (i === QUESTIONS.length - 1) currentQ = QUESTIONS.length;
    }
  }
} catch {}

function saveProgress() {
  localStorage.setItem('nora-intake-answers', JSON.stringify(answers));
  // Also try to save to server
  fetch('/v1/missioncanvas/nora-intake-save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ answers, timestamp: new Date().toISOString() })
  }).catch(() => {});
}

function showQuestion() {
  if (currentQ >= QUESTIONS.length) {
    showDone();
    return;
  }

  // Check for block break
  for (const [block, idx] of Object.entries(BLOCK_BREAKS)) {
    if (currentQ === idx && !breaksDismissed.has(idx)) {
      breaksDismissed.add(idx);
      showBreak();
      return;
    }
  }

  const q = QUESTIONS[currentQ];
  blockLabel.textContent = q.block;
  counter.textContent = `${currentQ + 1} of ${QUESTIONS.length}`;
  questionCard.textContent = q.q;
  progressFill.style.width = `${((currentQ) / QUESTIONS.length) * 100}%`;

  if (answers[currentQ]) {
    answerDisplay.textContent = answers[currentQ];
    answerDisplay.classList.add('has-answer');
    nextBtn.disabled = false;
  } else {
    answerDisplay.textContent = 'Tap the mic and talk';
    answerDisplay.classList.remove('has-answer');
    nextBtn.disabled = true;
  }

  mainEl.style.display = 'flex';
  breakScreen.style.display = 'none';
  doneScreen.style.display = 'none';
}

function showBreak() {
  mainEl.style.display = 'none';
  breakScreen.style.display = 'block';
  doneScreen.style.display = 'none';
}

function showDone() {
  mainEl.style.display = 'none';
  breakScreen.style.display = 'none';
  doneScreen.style.display = 'block';
  const answered = Object.keys(answers).length;
  document.getElementById('answer-count').textContent = `You answered ${answered} out of ${QUESTIONS.length} questions.`;
  progressFill.style.width = '100%';
}

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.95;
  u.pitch = 1.0;
  const voices = speechSynthesis.getVoices();
  const pref = voices.find(v => /samantha|google uk english female|karen|daniel/i.test(v.name));
  if (pref) u.voice = pref;
  speechSynthesis.speak(u);
}

function encouragement() {
  return ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)];
}

// Mic handling
function startRec() {
  if (recording) { stopRec(); return; }
  recording = true;
  micBtn.classList.add('recording');
  micLabel.textContent = 'Listening... tap when done';
  answerDisplay.textContent = '';
  answerDisplay.classList.remove('has-answer');

  if (SR) {
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    let finalText = '';
    recognition.onresult = (e) => {
      let interim = '';
      for (let i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          finalText += e.results[i][0].transcript + ' ';
        } else {
          interim += e.results[i][0].transcript;
        }
      }
      answerDisplay.textContent = (finalText + interim).trim();
      answerDisplay.classList.add('has-answer');
    };
    recognition.onerror = () => stopRec();
    recognition.onend = () => { if (recording) stopRec(); };
    recognition.start();
  } else {
    micLabel.textContent = 'Speech recognition not available in this browser';
    stopRec();
  }
}

function stopRec() {
  recording = false;
  micBtn.classList.remove('recording');
  micLabel.textContent = 'Tap to talk';

  if (recognition) {
    try { recognition.stop(); } catch {}
    recognition = null;
  }

  const text = answerDisplay.textContent.trim();
  if (text && text !== 'Tap the mic and talk') {
    answers[currentQ] = text;
    nextBtn.disabled = false;
    saveProgress();
  }
}

micBtn.addEventListener('click', () => {
  if (recording) stopRec();
  else startRec();
});

nextBtn.addEventListener('click', () => {
  if (nextBtn.disabled) return;
  const enc = encouragement();
  speak(enc);
  currentQ++;
  setTimeout(() => {
    showQuestion();
    // Read next question aloud after encouragement
    if (currentQ < QUESTIONS.length) {
      setTimeout(() => speak(QUESTIONS[currentQ].q), 1200);
    }
  }, 800);
});

skipBtn.addEventListener('click', () => {
  currentQ++;
  showQuestion();
  if (currentQ < QUESTIONS.length) {
    setTimeout(() => speak(QUESTIONS[currentQ].q), 400);
  }
});

continueBtn.addEventListener('click', () => {
  showQuestion();
  setTimeout(() => {
    if (currentQ < QUESTIONS.length) speak(QUESTIONS[currentQ].q);
  }, 400);
});

speakerBtn.addEventListener('click', () => {
  if (currentQ < QUESTIONS.length) speak(QUESTIONS[currentQ].q);
});

exportBtn.addEventListener('click', () => {
  const lines = [];
  lines.push('# Nora Intake Answers');
  lines.push(`Date: ${new Date().toISOString().slice(0, 10)}`);
  lines.push('');
  let lastBlock = '';
  for (let i = 0; i < QUESTIONS.length; i++) {
    const q = QUESTIONS[i];
    if (q.block !== lastBlock) {
      lines.push(`\n## ${q.block}\n`);
      lastBlock = q.block;
    }
    lines.push(`**Q${i + 1}**: ${q.q}`);
    lines.push(`**A**: ${answers[i] || '(skipped)'}`);
    lines.push('');
  }
  const blob = new Blob([lines.join('\n')], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'nora-intake-answers.md';
  a.click();
});

// Init
if (speechSynthesis) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

showQuestion();
// Auto-read first question after a moment
setTimeout(() => {
  if (currentQ < QUESTIONS.length) speak(QUESTIONS[currentQ].q);
}, 1000);
</script>
</body>
</html>
