origin:
  education_arc: |
    Claudia's education is genuinely rare — not just the credentials, but what they produced.
    A BA in French and English from Cagliari (Sardinia), then an MA in Francophone Literature at
    Paris-Sorbonne, then an MA in Second Language Didactics at Paris 8, then a PhD in Comparative
    Literature (Paris-Sorbonne, 2011) on Mediterranean detective fiction and cross-cultural studies.

    This is not a teaching degree. It's a research degree with a teaching dimension — the same
    distinction that matters in Mical's linguistics-to-engineering arc. The PhD trained her to see
    structural patterns across cultural systems. The Didactics MA trained her to design learning
    environments. The combination is what makes her approach to curriculum architecture fundamentally
    different from teachers who learn pedagogy on the job.

    The education also made her trilingual at a native level in Italian and French, with full
    academic fluency in English — a combination that is nearly impossible to find in the Bay Area
    international school market.

  formative_experiences:
    - what: "University of Cagliari — Research Associate and Lecturer (2012-2018)"
      when: "2012-2018"
      why_it_matters: |
        Taught 10+ graduate and undergraduate courses. Co-organized 10+ international academic
        conferences. Mentored students from inquiry through publication. This is where she learned
        to design educational programs, not just deliver lessons. The conference organizing built
        operational and cross-cultural coordination skills. The mentoring revealed her instinct
        for developing people — the same instinct that shows up at La Scuola.

    - what: "ENAS NGO — Project/Localization Manager (~5 years)"
      when: "~2008-2013"
      why_it_matters: |
        International project management in a non-profit context. Built operational discipline
        in resource-constrained environments. Localization work — adapting content across cultures —
        is structurally the same skill as curriculum adaptation across educational frameworks.

    - what: "Yves Saint Laurent — International Sales"
      when: "prior to academia"
      why_it_matters: |
        Luxury international sales before academia. Shows she can operate in commercial environments,
        not just educational ones. Client-facing, high-touch, relationship-driven — the same skills
        that make her the most trusted family-facing person at La Scuola.

    - what: "Google — Localization Program Manager (2019-2020)"
      when: "2019-2020"
      why_it_matters: |
        Managed Google Ads product launch across 40+ countries. Built tracking dashboards.
        Operated in radical accountability culture with clear KPIs. This is the experience that
        gave her operational rigor — process design, trackers, issue triage — that she now applies
        to education. Most educators don't have a Google-trained operational muscle. She does.

    - what: "La Scuola — from teacher to program architect (2020-present)"
      when: "2020-present"
      why_it_matters: |
        Entered as a teacher. Within 4 years: created Lingua Viva (proprietary K-5 Italian
        curriculum from zero), achieved 93% student improvement on Prove MT, mentored the most
        successful new teacher development in school history, designed a 7-layer Structural
        Coherence Framework for the entire institution, drafted the High School admissions plan,
        and proposed an AI integration strategy. She outgrew the role almost immediately but the
        school's dependency on her teaching keeps her in it.

    - what: "Nora's dyslexia diagnosis and intervention design"
      when: "2025-present"
      why_it_matters: |
        Her daughter's phonological dyslexia diagnosis (Feb 2025) forced her to become an expert
        in learning differences at a deep cognitive level. She is simultaneously the parent,
        the school's Italian Program Coordinator, and the person designing AI-assisted intervention
        protocols. This dual insider position — educator AND parent of a child with specific needs
        at the same school — is both a strength (deep understanding) and a source of tension
        (emotional investment in institutional decisions).

  career_throughline: |
    The throughline is institutional design — not teaching, not administration, not operations,
    but the structural architecture that makes schools work.

    At Cagliari she designed academic programs and conferences. At ENAS she managed international
    projects. At Google she managed cross-country product launches. At La Scuola she built a
    curriculum from zero, designed a school-wide structural coherence framework, and proposed an
    AI integration strategy.

    She is not a teacher who has ideas. She is a systems architect who happens to be an
    extraordinary teacher. The teaching is evidence of her design instinct — she creates
    environments where students succeed (93% improvement, median 5.0→8.0) by designing the
    right structure, not by working harder within a broken one.

    This is the same pattern as Mical's career. Both of them see structural problems that
    others can't see, fix the structure, and the people in the system get what they need.
    The difference: Mical has been able to name it and position for it. Claudia hasn't — yet.

