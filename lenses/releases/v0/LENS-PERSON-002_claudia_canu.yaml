working_style:
  process: |
    Claudia is a builder-first thinker who designs systems by doing the work, then extracting
    the pattern. She didn't set out to create a curriculum framework — she taught, saw what was
    missing, and built it. She didn't set out to design a structural reform — she experienced the
    institutional friction, diagnosed the root cause (three identities competing for limited
    resources), and designed a 7-layer solution.

    Her process is bottom-up: start from the classroom, observe what works and what breaks,
    design the structure that would fix it, then propose it to leadership. This is incredibly
    effective but creates a positioning problem — leadership sees the teaching (bottom) and
    doesn't see the architecture (what she actually designed).

  pace: |
    Fast within her domain. She designed Lingua Viva, the Structural Coherence Framework,
    the AI Classroom Proposal, the ARON intervention program, and the HS admissions plan —
    all while teaching full-time with 22 blocks per 6-day cycle. The volume of output is
    extraordinary given the constraints. But she is frustrated by the pace of institutional
    change — her ideas move faster than the school's willingness to implement them.

  communication: |
    Exceptional with families and students — high-touch, warm, calm in sensitive situations.
    Strong with peers — recognized school-wide as the best mentor. But the Gate A review
    suggests a friction point with leadership: presenting too many ideas at once reads as
    "not focused on teaching" rather than "has a vision for the institution." She needs to
    learn to sequence her ideas for leadership — one proposal at a time, with evidence,
    not a portfolio of innovations.

  decision_making: "Evidence-based with research backing. Her Structural Coherence Framework cites 25+ sources (IB, CEFR, Responsive Classroom, PLC). She builds proposals with decision gates, risk mitigation, and success metrics. This is Google-trained rigor applied to education."

  collaboration_mode: "Naturally collaborative — designs for co-creation (50% standardized, 50% flexible). Mentors generously. But has a tendency to do the design work herself rather than building coalition first, which creates the 'she has too many ideas' perception."

  when_they_are_at_their_best: |
    When given a structural problem that requires designing a system from scratch.
    Lingua Viva (curriculum from zero), the Structural Coherence Framework (school reform
    from diagnosis), the ARON program (intervention from cognitive profile), the AI Classroom
    Proposal (integration strategy from research). She is at her best when there is nothing
    and she builds the thing that was needed.

  when_they_struggle: |
    When the environment values her execution (teaching) but resists her design (architecture).
    When she has to slow her innovation pace to match institutional readiness. When her ideas
    are met with anxiety rather than curiosity — the same pattern Mical describes, but in
    an educational context. The review feedback ("too many ideas, not focused on teaching")
    is the clearest signal: her innovations succeed but create organizational discomfort.

