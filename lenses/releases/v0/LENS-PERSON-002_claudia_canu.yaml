contradictions:
  - tension: "Produces director-level work but holds a coordinator title"
    resolution: "The school needs her teaching too much to promote her. Her value as a teacher creates a ceiling on her growth as a leader."
    implication: "She will only advance by leaving — or by making the school understand that promoting her KEEPS her teaching influence (through others) rather than losing it."

  - tension: "Designs for institutional change but works bottom-up without coalition"
    resolution: "Her research training taught her to build the argument before presenting it. But institutional change requires building the coalition before presenting the solution. The approach that works in academia doesn't work in school leadership."
    implication: "She needs to learn to bring leadership into the design process earlier — or find an environment where the founder/head actively seeks her design input."

  - tension: "Deeply invested in La Scuola but increasingly frustrated by it"
    resolution: "Nora is at La Scuola. The tuition remission saves ~$40K/year. The school genuinely benefits from her presence. But the school's inability to let her grow is creating a slow-burning professional crisis that will eventually force a decision."
    implication: "The financial dependency (tuition remission) makes leaving harder. Any external role needs to account for the ~$40K/year lost benefit."

  - tension: "PhD-trained researcher who works as a K-8 teacher"
    resolution: "She chose this path intentionally — she wanted to be in classrooms, not universities. The PhD gives her the structural thinking; the classroom gives her the reality check. But the market sees 'PhD' and expects academia, or sees 'teacher' and doesn't see the architecture."
    implication: "Her resume needs to lead with the architecture, not the teaching. The PhD is the credibility signal, not the job description."

