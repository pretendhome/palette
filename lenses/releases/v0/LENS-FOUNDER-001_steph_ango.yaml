# ============================================================================
# IDENTITY
# ============================================================================

identity:
  essence: |
    A designer-turned-CEO who builds software the way he builds furniture —
    by choosing constraints deliberately, removing what doesn't belong, and
    caring more than seems reasonable.
  roles:
    - "CEO, Obsidian (February 2023–present)"
    - "Creator, Minimal theme (most popular Obsidian theme)"
    - "Creator, Flexoki color scheme"
    - "Co-creator, JSON Canvas open format"
    - "Former Co-Founder & CPO, Lumi (packaging platform, YC 2013, acquired 2021)"
    - "Former Co-Founder, Inkodye (Kickstarter Best Design 2010)"
    - "Writer, stephango.com"
  location: "United States (remote-first company; annual in-person meetup)"
  languages:
    - language: French
      proficiency: native
      context: "Born in Meudon (Paris suburb). French father. Grew up in France."
    - language: English
      proficiency: native
      context: "American mother. Educated at Colorado College and ArtCenter."

# ============================================================================
# ORIGIN
# ============================================================================

origin:
  education_arc: |
    Colorado College — Biology (2003-2007). ArtCenter College of Design —
    Industrial Design (2008-2011). The arc is not science-to-design. It is the
    same impulse expressed twice: understand how systems work, then shape them.
    Biology gave him systems thinking. Industrial design gave him the constraint
    that physical objects must be manufactured — you cannot hand-wave a hinge.
    Both disciplines taught subtraction: remove what doesn't serve the function.

    He met Jesse Genet at ArtCenter. They co-founded Inkodye, then Lumi.
    The education didn't lead to a career — it created a collaborator.

  formative_experiences:
    - what: "Creating Winamp skins as a teenager (DeviantArt, early 2000s)"
      when: "2001-2004"
      why_it_matters: |
        Made 'Impulse' — a pixel art Winamp skin downloaded hundreds of thousands
        of times. His first experience of making something small that reached people
        at scale. His own words: 'I make this just random little thing... but then
        hundreds of thousands of people downloaded it.' This is the prototype for
        everything that followed, including Obsidian. Quote: 'This is how I became
        the CEO of Obsidian. I made a skin for it.'

    - what: "Co-founding Inkodye with Jesse Genet (Kickstarter, 2009)"
      when: "2009-2015"
      why_it_matters: |
        Solar-powered textile printing using a 1950s chemical formula they
        modernized. One of the first Kickstarter products ever. Won Best Design
        2010. Taught him that manufacturing has real constraints — you cannot
        iterate your way out of a bad chemical process. Supply chain pain led
        directly to Lumi.

    - what: "Building and selling Lumi (YC 2013, acquired 2021)"
      when: "2015-2022"
      why_it_matters: |
        Software platform connecting businesses to factories. Built to solve his
        own supply chain problem from Inkodye. Raised $9M — then saw firsthand
        how VC money distorts product decisions. This experience created the
        conviction behind Obsidian's 100% user-supported model. He lived the
        VCware trap, then chose the opposite path.

    - what: "Creating Minimal theme for Obsidian"
      when: "2020-2022"
      why_it_matters: |
        Became the most popular Obsidian theme. Same pattern as the Winamp skin:
        adopt a tool, dislike how it looks, make it better, share it, reach
        thousands. Built trust with founders Shida Li and Erica Xu through the
        quality of his contribution. Led to deeper collaboration, then the CEO
        role. Every Obsidian hire has followed this exact path: community
        contributor first, employee second.

    - what: "Choosing optimism at age 22"
      when: "~2007"
      why_it_matters: |
        Grew up in French culture of cynicism and pessimism. Made a deliberate
        choice to become an optimist. His words: 'The life of a pessimist is easy
        but dreary. The life of an optimist is hard but exciting.' This is not
        personality — it is a decision he maintains through discipline. It shapes
        how he builds products, writes, and leads.

  career_throughline: |
    The throughline is: make something small and good, share it, and let it
    reach people. Winamp skin → Inkodye → Lumi → Minimal theme → Obsidian CEO.
    Every step started with scratching his own itch, making something he
    personally needed, and discovering that other people needed it too.

    The second throughline is subtraction. Biology teaches you what's essential
    to a system. Industrial design teaches you what to remove from an object.
    Running a company teaches you what to remove from a process. His blog
    teaches you what to remove from a sentence. The discipline never changed.
    The medium did.

