    - "Demonstrating you use Obsidian daily and have opinions about it"
    - "Making contributions to the community (plugins, themes, docs)"
    - "Choosing to remove a feature you built because it's not good enough"
    - "Writing clearly and concisely"
    - "Caring about details that don't show up in metrics"

  trust_breakers:
