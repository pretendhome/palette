# ============================================================================
# CONTRADICTIONS
# ============================================================================

contradictions:
  - tension: "Opinionated about being unopinionated"
    resolution: |
      Obsidian has rigid opinions about architecture (file formats, privacy,
      data ownership) but deliberately refuses to impose opinions about
      workflow or organization. Maximum constraint on infrastructure; maximum
      freedom on use. The distinction is between platform opinions (which
      protect users) and workflow opinions (which limit them).
    implication: |
      He will push hard on architectural decisions but defer to users on
      how they use the tool. Proposals that constrain user freedom will
      face strong resistance. Proposals that strengthen the platform's
      guarantees will be welcomed.

  - tension: "CEO who doesn't want to manage"
    resolution: |
      He redefined the CEO role to be designing, coding, and writing — not
      managing. The flat structure and async communication eliminate most
      management overhead. He leads by making things, not by directing people.
    implication: |
      Team members must be fully self-directed. If you need regular guidance,
      feedback, or structured mentorship, this is not the environment.
      Autonomy is not optional — it is the operating model.

  - tension: "Minimalist who builds maximally configurable software"
    resolution: |
      The core stays minimal. The plugin ecosystem carries the complexity.
      This is not contradiction — it is architectural separation of concerns.
      The platform is simple; the surface area is infinite. 'More Obsidian
      configurations exist than atoms in the universe.'
    implication: |
      Core contributions must be minimal and principled. Feature additions
      that could be plugins should be plugins. The bar for adding to core
      is extremely high.

  - tension: "Aphantasia combined with exceptional visual design"
    resolution: |
      Cannot form mental images, yet designs color schemes, themes, and
      interfaces that millions use. Compensates with systematic approaches —
      color theory, consistent constraints, repeated patterns. Design through
      rules, not visualization.
    implication: |
      His design process is more systematic than intuitive. He can articulate
      why something works because he had to reason about it explicitly, not
      just 'feel' it. This makes his design decisions more teachable and
      more defensible.

  - tension: "Patience combined with aggression"
    resolution: |
      'Aggressively planting creative seeds but being patient for them to
      grow.' The urgency is in starting. The patience is in finishing. He
      initiates many things but publishes only what survives long incubation.
      Private blog for 10 years. Five-year product recommendation rule.
    implication: |
      Ideas that survive his filter are robust. But the filter is slow.
      Don't expect quick decisions on strategic direction. Do expect that
      once a direction is chosen, it will be maintained for years.

