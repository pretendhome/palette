# ============================================================================
# WORKING STYLE
# ============================================================================

working_style:
  process: |
    Starts by using the tool himself. If he's not personally annoyed by a
    problem, it doesn't get prioritized. Designs from constraint: what can we
    remove? What can we choose to be bad at? Prototypes in code, not mocks.
    Writes as a thinking tool — essays are how he develops and tests ideas.

    Feedback loop: 'Use Twitter for messiest stuff, get friction from
    disagreement, catalog arguments, refine language in drafts. Then later,
    when right moment comes, publish polished version.'

    Maintained a private blog for 10 years before publishing. Patience is not
    passive waiting — it is 'aggressively planting creative seeds but being
    patient for them to grow.'

  pace: |
    Slow and deliberate by design. Five-year rule: only recommends products
    after 5 years of use. One meeting per year. Obsidian releases are steady
    but unhurried. Quote: 'If you're someone who really likes the idea of
    being able to move from one thing to the next, then maybe software is not
    the right category for you.'

  communication: |
    Writes short, declarative prose. Essays under 500 words. Removes words
    that 'don't have calories.' Tone is conversational authority — thinks
    alongside you, never lectures. Avoids exclamation points, hype, and
    superlatives. His 'about' page opens with 'I'm Steph.'

    Internal: ramblings channels (personal async streams where only one person
    posts, others reply in threads). No scheduled meetings. No expectation
    that anyone reads your ramblings. 'Some of their best ideas emerge from
    ramblings.'

  decision_making: |
    Manifesto-driven. The Obsidian manifesto (Yours, Durable, Private,
    Malleable, Independent) acts as a filter. If a feature contradicts the
    manifesto, it doesn't ship. If it aligns, it can proceed without
    consensus.

    'Like tacking a boat against wind — go 45 degrees left, then right.
    Bounce between maximalist/minimalist, short-term/long-term.'

    Uses deliberate oscillation between opposites to find the right path.
    Not indecisive — navigating through contradiction.

  collaboration_mode: |
    Flat. No hierarchy. Team members champion priorities internally. Hires
    only from the community — trust is pre-established through contribution
    quality. Quote: 'I don't really enjoy being a manager. I want designing,
    coding, writing, and direct user interaction.'

    Annual week-long in-person meetup. Rest of year is fully async. This is
    not a compromise — it is the preferred mode. 'No scheduled meetings'
    is a feature, not a limitation.

  when_they_are_at_their_best: |
    When building something he personally uses. When constraints are tight and
    clear. When he can design, code, write, and interact with users directly —
    without management overhead. When he has years, not quarters, to develop
    an idea. When the team is small enough that every person's work is visible.

  when_they_struggle: |
    When forced to manage rather than make. When growth pressure demands
    hiring beyond his comfort threshold. When the market demands speed over
    craft. When something cannot be simplified further and must remain
    complex. When he has to practice maximalism.

# ============================================================================
# VALUES
# ============================================================================

values:
  motivated_by:
    - "Making something small that reaches millions — the Winamp skin pattern"
    - "Ownership — users own their data, he owns his company"
    - "Subtraction — removing is more satisfying than adding"
    - "Craftsmanship — caring more than seems economically rational"
    - "Independence — no investors, no compromises"
    - "Long-term thinking — building for decades, not quarters"

  not_motivated_by:
    - "Growth metrics or market capture"
    - "Management status or team size"
    - "Industry recognition or awards"
    - "Speed of execution (values patience over velocity)"
    - "Comprehensive feature coverage (values doing less, better)"
    - "VC-style returns or exit events"

  non_negotiables:
    - "User data stays on user's device"
    - "No telemetry"
    - "Open file formats (plain text, JSON)"
    - "100% user-supported — no investors, ever"
    - "Team stays small (caps at 10-12)"
    - "Every hire comes from the community"

  peak_moment:
    what: "Becoming CEO of Obsidian through community contribution"
    why: |
      Made a theme (Minimal) because he didn't like how Obsidian looked.
      The same impulse as the Winamp skin at 16. This time it led to
      running the company. 'This is how I became the CEO of Obsidian.
      I made a skin for it.'
    what_it_reveals: |
      He doesn't pursue leadership — he pursues craft, and leadership
      follows. His authority is earned through contribution quality, not
      credentials or ambition. This is also exactly how he hires: look
      at what someone built, not what they claim.

# ============================================================================
# PATTERNS
# ============================================================================

patterns:
  strengths:
    - pattern: "Scratch-your-own-itch builder"
      evidence:
        - "Built Inkodye because he wanted to print on fabric"
        - "Built Lumi because Inkodye's supply chain was broken"
        - "Built Minimal because Obsidian's default theme wasn't good enough"
        - "Wrote 'File over app' because he needed a philosophy for his own tool"
      why_it_works: |
        Every product starts with a real problem he personally has. This ensures
        genuine understanding of the user (he IS the user) and sustained motivation
        (he needs the solution to exist). Eliminates market research theater.

    - pattern: "Subtraction as design method"
      evidence:
        - "'What can we remove?' as explicit practice"
        - "Essays under 500 words — removes 'words without calories'"
        - "Team capped at 10-12 despite $25M ARR"
        - "Monochromatic clothing, no logos — personal life pruned too"
      why_it_works: |
        Prevents bloat at every level — product, team, communication, personal
        life. Creates focus by eliminating options. The consistency across
        domains means it is not a technique but an identity.

    - pattern: "Patience as strategy"
      evidence:
        - "Maintained private blog for 10 years before publishing"
        - "Five-year rule for product recommendations"
        - "Obsidian growth: steady, never forced, never VC-accelerated"
        - "'Aggressively planting seeds, patiently waiting for growth'"
      why_it_works: |
        Compound returns. Ideas that survive 10 years of private development
        are more robust. Products recommended after 5 years of use are more
        trustworthy. Companies that grow without acceleration build genuine
        loyalty. Patience is his competitive moat.

    - pattern: "Community-first hiring"
      evidence:
        - "Every Obsidian employee was first a community contributor"
        - "He himself went from theme creator to CEO"
        - "Trust established through contribution quality, not interviews"
      why_it_works: |
        Eliminates hiring risk almost entirely. You've already seen their work,
        their communication style, their values, and how they handle feedback.
        No resume or interview can match years of observable contribution.

  blind_spots:
    - pattern: "Scaling resistance"
      evidence:
        - "Caps team at 10-12 despite serving 1.5M+ users"
        - "'I don't really enjoy being a manager'"
        - "One meeting per year — may miss coordination opportunities"
      cost: |
        Features that require larger teams (native mobile apps, enterprise
        features, accessibility) may be permanently under-resourced. The
        product's growth may eventually outpace the team's capacity to
        maintain quality.
      awareness: aware

    - pattern: "Minimalism as ideology"
      evidence:
        - "'I have a hard time practicing maximalism'"
        - "Obsidian core is deliberately simple while plugins carry complexity"
        - "May under-invest in features that require comprehensive coverage"
      cost: |
        Some problems genuinely require comprehensive solutions. Mobile apps,
        enterprise sync, accessibility compliance — these cannot be minimized.
        The plugin ecosystem compensates but introduces quality variance.
      awareness: aware

    - pattern: "Anti-VC identity may limit strategic options"
      evidence:
        - "Coined 'VCware' as pejorative"
        - "100% user-supported is a non-negotiable, not just a preference"
        - "Revenue per employee is extraordinary but team is very small"
      cost: |
        If the market shifts (e.g., AI-native editors, Apple/Google bundling
        note-taking), the company may lack resources to respond quickly. The
        anti-VC stance is principled but also constraining.
      awareness: aware

