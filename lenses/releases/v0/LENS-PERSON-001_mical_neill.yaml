      April 22, 2026: Two interviews in one day, both advanced. In a single morning session
      before the first interview, co-designed with Claude Code a complete knowledge-velocity
      enablement architecture — 6-layer system, 5 mechanisms, 4 KPIs, artifact spectrum
      (micro/meso/macro/agentic), role-based delivery, hybrid retrieval (structured + graph +
