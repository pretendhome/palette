# ============================================================================
# WORKING STYLE
# ============================================================================

working_style:
  process: |
    Fast iterative discovery. He starts acting immediately — not because he's rushing,
    but because iteration is how he understands. He does not plan-then-execute; he
    iterates to discover the right solution.

    From the outside, this looks chaotic. It is not. It is disciplined exploration
    with a convergence trajectory. Each iteration produces observable learning that
    feeds the next. But it requires trust from the environment — when organizations
    cut the iteration short because it "looks like moving too fast without a plan,"
    the process fails.

    Palette is the purest expression of this process: no spec, no product roadmap,
    no business plan. He iterated across real problems (interviews, travel, education,
    retail) and the system emerged. 117 taxonomy nodes, 167 knowledge entries, 12
    agents — all from iterative discovery, not top-down architecture.

  pace: |
    Fast to start, patient to finish. Begins immediately, iterates rapidly, but does
    not declare the answer until the iterations converge. Others perceive "fast" at
    the start and "slow" near the end. In reality, the pace is consistent — the early
    iterations just look more productive because they produce visible artifacts, while
    the later ones produce understanding.

  communication: |
    Oral > written for exploration. Written > oral for delivery. He thinks out loud —
    voice transcription of his self-discovery work is more honest and detailed than
    anything he'd type. But his final artifacts (resumes, interview prep, system docs)
    are structured, precise, and evidence-based.

    Can explain complex systems to non-technical audiences (Sciences Po students,
    business executives, Carabinieri). This is not simplification — it is structural
    translation. He finds the equivalent construct in the listener's domain and maps
    through it.

  decision_making: |
    Iterative convergence. Does not commit early. Explores options through small
    experiments, gathers evidence, narrows. The decision emerges from the data, not
    from analysis paralysis or premature commitment. This is effective but confusing
    to stakeholders who expect a decision framework up front.

  collaboration_mode: |
    Best as the person who designs the structure that others execute within. Not a
    solo contributor (needs users to validate), not a traditional manager (innovator
    pattern creates friction with reports), not a pure consultant (needs to build, not
    just advise). The sweet spot is: architect of the environment, with a small team
    that trusts the iterative process.

  when_they_are_at_their_best: |
    When he can see the structural problem nobody else sees, fix it, and watch people
    succeed because of it. The publishing simulation. The POI mapping fix. The taxonomy
    reclassification. The Kaizen program. Every peak moment follows this pattern:
    structural insight → structural fix → human success.

    Also: when nobody is interrupting the iteration cycle. Palette was built during
    the freest period of his career — and it shows.

  when_they_struggle: |
    When the environment punishes innovation or requires consensus before action.
    When politics becomes self-justifying. When he has to give away credit to get
    ideas implemented. When the iteration cycle is cut short by stakeholders who
    need a finished plan before they'll trust the process.

    Also: when the role is primarily about maintaining existing systems rather than
    building new ones. He is a builder, not a maintainer.

