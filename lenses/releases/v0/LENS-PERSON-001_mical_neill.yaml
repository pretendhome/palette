# ============================================================================
# CONTRADICTIONS
# ============================================================================

contradictions:
  - tension: "Moves fast but doesn't want to know the answer too early"
    resolution: |
      He moves fast through iterations, not toward a predetermined conclusion.
      Speed and patience coexist because the speed is in exploration and the
      patience is in convergence. Outsiders see the speed and assume he's rushing.
      He's not — he's sampling the solution space rapidly so the right answer
      can emerge.
    implication: |
      Don't ask him for a plan on day 1. Ask him for a plan after 2 weeks of
      iteration. The plan will be better and he'll actually believe in it.

  - tension: "Genuinely innovative but systematically gives away credit"
    resolution: |
      He learned that innovation dies in political environments unless someone
      with authority champions it. Giving away credit is not low self-esteem —
      it's a survival strategy developed over 30 years of being told he's
      "moving too fast" or "doing it wrong." The ideas matter more to him
      than the attribution.
    implication: |
      In the right environment (small team, founder-led), he doesn't need to
      give away credit. He can own his work. But he'll default to the old
      pattern unless the environment explicitly signals that innovation is safe.

  - tension: "Would take $2,000/month to teach but asks for $130K in tech"
    resolution: |
      Money is not the motivator. Family stability is the constraint. If his
      family were financially secure, he'd design learning environments for
      a fraction of a tech salary. The $130K is what it costs to live in SF
      with 3 kids. The $2,000 is what the work is worth to him emotionally.
    implication: |
      EU relocation changes the math entirely. A EUR 60K role in Paris or
      Milan that lets him design learning systems would make him happier
      than a $200K enablement role at a big tech company.

  - tension: "12 years at Amazon but doesn't fit enterprise culture"
    resolution: |
      He survived Amazon by finding pockets where structural innovation was
      needed (Alexa knowledge graph, AGI evaluation, Pathfinder taxonomy
      redesign) and by giving credit to senior engineers to get ideas through.
      He was successful at Amazon despite the culture, not because of it.
      The 12 years prove resilience and adaptability, not alignment.
    implication: |
      Don't assume he's an "enterprise person" because of tenure. He's a
      builder who happened to find enough building opportunities inside an
      enterprise to stay. Given a choice, he'd choose a 10-person team
      building something new over a 10,000-person org maintaining what exists.

