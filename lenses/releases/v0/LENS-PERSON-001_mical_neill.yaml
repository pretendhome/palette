# ============================================================================
# ORIGIN
# ============================================================================

origin:
  education_arc: |
    BA Comparative Literature & Spanish (SF State, 2005) → MA Romance Languages &
    Linguistics (Paris-Sorbonne, 2009) → Data Analytics Certificate (UC Berkeley, 2019).

    The education arc is not a pivot from humanities to tech. It is a single line:
    how meaning maps across systems. Comparative linguistics trained him to see that
    ontology design is a cultural problem — Italian commercial categories don't map 1:1
    to American ones, French business naming conventions differ from German ones. This
    became knowledge engineering at Amazon, which became AI architecture. The discipline
    never changed. The medium did.

  formative_experiences:
    - what: "Working full-time from age 13 in restaurants while attending school"
      when: "1993-2001"
      why_it_matters: |
        Built a milkshake system at 16 that was faster and better. Got in trouble for
        doing it differently. Made manager multiple times, never lasted — the organization
        didn't feel comfortable with him representing them. This is the first appearance
        of the innovation-resistance pattern that would repeat for 30 years.

    - what: "Teaching publishing students at Ecole des Metiers du Livre (Paris)"
      when: "2007-2009"
      why_it_matters: |
        Peak professional moment. Designed a simulated publishing process where students
        learned English, UK publishing standards, query letter writing, editorial process,
        and interview skills — without knowing they were studying any of those things.
        Students reached out for years afterward. He would have taken the Agregation
        (one of France's hardest exams) to stay permanently. Paid $2,000/month. Didn't
        care. Left only because his wife got pregnant. This is the benchmark for "right fit."

    - what: "Teaching Carabinieri (Italian federal police) English in Sardinia"
      when: "2012-2013"
      why_it_matters: |
        Officers needed English for international assignments. Their textbook treated
        them like first graders. He threw it out, started with The Economist articles
        they chose, fought through comprehension, then discussed freely. Grammar taught
        inside context, never isolated. All passed certification without opening textbooks.
        Proof that contextual immersion works across populations.

    - what: "Amazon Italy Kaizen lead — Think Big competition win"
      when: "2013-2015"
      why_it_matters: |
        Asked every employee in a Southern Italy customer service center for improvement
        ideas. First time these employees had been asked. One L2 employee's idea won the
        company-wide Think Big competition — first time ever for that level. Proof that
        creating the environment for innovation matters more than being the innovator.

    - what: "Alexa Automotive POI data mapping across 47 providers"
      when: "2019-2023"
      why_it_matters: |
        Engineers were building sophisticated vector databases to fix what was fundamentally
        a cultural mapping problem. He fixed the mapping itself — the structural understanding
        of how different countries categorize automotive services — and produced one of the
        biggest improvements the system had ever seen. Proof that structural insight
        outperforms engineering sophistication when the problem is categorical, not computational.

    - what: "Building Palette independently (2025-2026)"
      when: "2025-present"
      why_it_matters: |
        Built a 117-node taxonomy, 167-entry knowledge library, 1,876-quad relationship
        graph, and 12-agent orchestration system with no organizational scaffolding.
        Proof of full end-to-end execution. Also the purest expression of his iterative
        discovery process — no one interrupted the iterations.

  career_throughline: |
    The thread is: I see structural problems that others can't see because they require
    understanding how meaning works across systems. I fix the structure. The people using
    the system get what they actually need.

    This has been true since he was 16 making milkshakes, through teaching English in
    Paris and Sardinia, through mapping automotive knowledge across 47 data providers,
    through reclassifying a taxonomy from industry-based to function-based, through
    building Palette. The domain changes. The discipline doesn't.

