lens_id: LENS-PM-001
version: 0.2
status: pilot
name: Product Decision Lens
optional: true
origin:
  type: hybrid
  palette_basis: "Palette lenses v0"
  external_inspiration:
    - "OpenAI Academy Prompt Packs (role-based 'ChatGPT for ...' framing)"
  notes: "Refined to better mirror role-pack behavior: decision framing, prioritization clarity, and stakeholder-ready outputs."

critical_question:
  as_palette: "How will this lens best help me, and what would it actually help me do?"
  answer: "It helps Palette convert route outputs into explicit product decisions with evidence, reversibility labels, owners, and success metrics. It reduces 'analysis without decision' and improves go/no-go quality."

when_to_use:
  signals:
    - roadmap
    - prioritization
    - launch readiness
    - go/no-go
    - scope negotiation
  not_for:
    - deep debugging root-cause analysis
    - low-level implementation tasks
  user_intents:
    - "What should we do next?"
    - "Which option should we pick?"
    - "Is this worth building now?"
    - "What do I need to decide before launch?"

palette_fit:
  primary_rius:
    - RIU-001
    - RIU-014
    - RIU-062
    - RIU-073
  supporting_rius:
    - RIU-039
  primary_agents:
    - narrator
    - rex
    - validator
  supporting_agents:
    - researcher
    - builder
  library_links:
    - "Use LIB entries tied to decision frameworks, risk framing, and launch operations."
  company_matrix_use:
    - "Use company examples only to validate market reality, not to copy strategy blindly."

output_contract:
  required_sections:
    - Decision
    - Why now
    - Evidence
    - One-way vs two-way door classification
    - Risks and mitigations
    - Owner and due date
    - Success metric
    - Open questions / assumptions
  forbidden_patterns:
    - unsupported certainty
    - ownerless recommendations
    - no metric/no deadline action lists

quality_checks:
  - "Decision is explicit (not implied)."
  - "At least one measurable success metric is present."
  - "Reversibility is labeled."
  - "Top risk has mitigation and owner."
  - "Assumptions are labeled when evidence is incomplete."
  - "Options are compared before recommending if more than one credible path exists."

interaction_style:
  default_answer_shape:
    - decision_first
    - evidence_and_tradeoffs
    - owner_deadline_metric
    - assumptions_and_open_questions
  presentation_rules:
    - "Lead with the recommendation in the first 1-2 lines."
    - "Use bullets for option comparison when multiple paths exist."
    - "Avoid background-heavy summaries when a decision is requested."

prompt_pack_alignment:
  closest_role_pack: "ChatGPT for product"
  role_pack_translation:
    - "Turn broad prompts into decision-ready outputs with explicit tradeoffs."
    - "Bias toward prioritization and launch readiness artifacts, not general summaries."
    - "Make decisions auditable (owner, date, metric, reversibility)."

evaluation_plan:
  compare_against_no_lens:
    - convergence_turn_count
    - artifact_rework_rate
    - gate_decision_time
    - owd_false_positive_rate
  minimum_sample_size: 20
  kill_if:
    - "No improvement on at least 2 of 4 metrics."
    - "Process overhead increases >20% with no quality gain."
