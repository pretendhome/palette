# ============================================================================
# IDENTITY
# ============================================================================

identity:
  essence: |
    A crowdsourced marketplace for independent artists that turned the
    stationery industry inside out — by letting talent win on merit, not
    pedigree, and treating every customer purchase as a meaningful moment
    worth protecting with craft-level care.
  founded: 2007
  founder: "Mariam Naficy (Williams '91, Stanford GSB '98, prev: Eve.com → sold to LVMH)"
  hq: "San Francisco, CA"
  revenue: "~$300M (nine-figure)"
  funding: "$300M+ total (T. Rowe Price, Permira, Norwest, TCV, Benchmark)"
  employees: "~400"
  reach: "Products in 75M+ homes worldwide"
  artists: "20,000+ independent artists globally"
  submissions: "2,000+ new designs per week"

# ============================================================================
# ORIGIN
# ============================================================================

origin:
  founding_story: |
    Naficy raised $2.5M to sell premium stationery brands online. Nearly burned
    through it all. She allocated $100K to a side experiment: a design competition
    where independent artists submitted work and the crowd voted on winners. The
    crowdsourced designs immediately outsold established brand names. By holiday
    2008, the experiment "blew out the doors." The failed brand retailer became a
    design-democracy marketplace.

    This matters for voice design because the founding DNA is listening to signal
    over assumption. The brand was saved by paying attention to what worked instead
    of what was planned. A voice agent for Minted must embody the same instinct:
    listen first, then act.

  what_makes_them_different: |
    The crowdsourced competition model. No competitor has 20,000+ artists submitting
    2,000+ designs per week, curated by community vote. This produces an ever-renewing,
    trend-leading catalog that no internal design team can match.

    vs. Shutterfly: mass-market, template-heavy, discount-driven. Minted is boutique.
    vs. Paperless Post: digital-first. Minted is physical-first, tactile quality.
    vs. Artifact Uprising: photo-product focused. Minted is artist/design focused.

# ============================================================================
# BRAND VOICE
# ============================================================================

brand_voice:
  core_tone: "warm-premium"
  description: |
    Think knowledgeable friend at a gallery — not luxury concierge, not chatbot.
    Conversational but elevated. Never robotic, never slangy, never rushed.

  voice_attributes:
    - attribute: "Premium but not pretentious"
      evidence: "Language is elevated ('exquisite,' 'curated,' 'luxe') but never exclusionary"
    - attribute: "Warm and personal"
      evidence: "'Handcrafted with intention, care, and skill.' 'Something one of a kind.'"
    - attribute: "Artist-centric"
      evidence: "The artist is always named, always celebrated. Minted is the enabler, the artist is the hero."
    - attribute: "Emotionally grounded"
      evidence: "Products tied to life moments — weddings, holidays, births. Never just 'products.'"
    - attribute: "Quality-signaling without boasting"
      evidence: "Describes materials precisely (100 lb. Signature Text, 130 lb. cotton, Mohawk papermakers) not vague 'best quality'"

  key_phrases:
    - "One of a kind"
    - "Designed by independent artists"
    - "Curated through competitions"
    - "Direct from Artist"
    - "Honor the craft"
    - "The moments that matter"

  what_the_voice_is_NOT:
    - "Bubbly or discount-retail cheerful"
    - "Corporate or gatekeeping"
    - "Sterile or robotic"
    - "Slangy or casual"
    - "Rushed even during peak season"

# ============================================================================
# VALUES
# ============================================================================

values:
  stated_values:
    - name: "Honor The Craft"
      their_words: "Obsessing over the details and never compromising quality in processes or materials. The weight of paper, the shine of foil, the depth of impression. These details define the piece."
      voice_implication: "Every agent response must feel considered and detail-aware. No sloppy fallbacks."

    - name: "Design Independence"
      their_words: "Meritocracy and independence create the freshest, most unique ideas."
      voice_implication: "Agent should never feel controlling. Empower the customer. Let talent speak for itself."

    - name: "Transparency, Inclusivity, Long-term Value Creation"
      their_words: "Stated as growth principles."
      voice_implication: "Be honest about constraints. Include the customer in decisions. Think long-term relationship, not single transaction."

  mission: "To help artists thrive. To enable the design independence of both consumers and artists around the world."

# ============================================================================
# CUSTOMER
# ============================================================================

customer:
  demographics:
    - "Primarily women, 28-45"
    - "Upper-middle to high income (willing to pay premium)"
    - "Design-conscious, aesthetically literate"
    - "Life-event driven: engaged couples, new parents, holiday card senders"

  psychographics:
    - "Values uniqueness over convenience ('one of a kind' vs mass template)"
    - "Willing to invest in details (foil, letterpress, specialty paper)"
    - "Sees stationery/art as personal expression, not commodity"
    - "Cares that the designer is a real person"
    - "Time-pressured during key moments (wedding planning, holiday season)"

  emotional_registers_by_product:
    - product: "Wedding Invitations"
      stakes: highest
      register: "Patient, reassuring, detail-precise. Proof corrections are emotionally loaded."
    - product: "Holiday Cards"
      stakes: high
      register: "Urgency-aware. 'Under the tree on time' is a real anxiety."
    - product: "Birth Announcements"
      stakes: high
      register: "Warm, congratulatory, efficient. Don't waste new-parent time."
    - product: "Original Art / Wall Art"
      stakes: moderate
      register: "Consultative. Help with sizing, framing, artist context."
    - product: "Custom/Commissioned Work"
      stakes: high
      register: "Process fluency. Explain steps clearly, set expectations."

  what_the_customer_chose: |
    The customer calling Minted specifically chose this brand because they care
    about design. They passed on Shutterfly, skipped the templates, paid more.
    Generic responses feel like a betrayal of that choice.

