# ============================================================================
# WORKING STYLE
# ============================================================================

working_style:
  process: |
    Process-driven and systematic. The auditing background shows: he works through
    checklists, samples systematically, documents findings, and delivers formal reports.
    The annotation quality work follows the same pattern — structured intake, defined
    quality bars (IAA rates), audit cycles, feedback loops. He doesn't improvise; he
    designs the process, then executes it rigorously.

  pace: |
    Steady and methodical rather than fast-and-break-things. The career progression
    shows patience — 5 years in Austrian government, started as a contractor at Amazon
    and worked up. The team satisfaction turnaround (3 months) shows he can move quickly
    when the problem is clear and the lever is people, not technology.

  communication: |
    Evidence from recommendations: "very responsive & reliable" (Cathy To), "impeccable
    accuracy and speed" (Jeffrey Helman). Communication style appears to be reliable,
    precise, and team-oriented rather than charismatic or visionary. Presents Failure
    Space Analysis to senior leadership — can communicate up, but likely in a data-driven,
    structured format rather than narrative storytelling.

  decision_making: |
    Data-driven and process-oriented. The audit background suggests he seeks evidence
    before deciding. The IAA rate focus (90–95%) shows he defines quantitative quality
    bars and manages to them. Likely conservative — would rather have a proven process
    than an innovative experiment.

  collaboration_mode: |
    Cross-functional bridge builder. Evidence: coordinates with Engineering and Science
    teams for feedback loops, works across UK/US for sprint planning, managed data for
    both domestic and international partners at Rimini Street. The pattern is working
    BETWEEN teams rather than within a single team.

  when_they_are_at_their_best: |
    When he has a clear operational domain with defined quality metrics, a team to lead,
    and Science/Engineering partners who value data quality feedback. The current role
    (pilot annotation programs, tight feedback loops with Science teams) appears to be
    this sweet spot.

  when_they_struggle: |
    Insufficient evidence to assess with confidence. Likely candidates based on profile:
    ambiguous environments without clear metrics, purely strategic roles without
    operational execution, or highly political environments where process discipline
    is overridden by speed pressure.

