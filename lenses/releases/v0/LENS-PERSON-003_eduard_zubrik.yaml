# ============================================================================
# ORIGIN
# ============================================================================

origin:
  education_arc: |
    Reifeprüfung + VET-Diploma (Austrian BA equivalent) from International Business
    College Vienna (2002–2008), concentrating in International Marketing and Trade.
    Main subjects: German, Business Administration, Accounting, English, Spanish, Math.

    This is not a CS degree. It is a European business administration credential with
    strong accounting and language foundations. The technical skills — SQL, Python, data
    analytics — came later through edX certifications and on-the-job learning at Amazon.
    The education explains why he thinks in process terms (accounting workflows, audit
    procedures) rather than engineering terms — and why that's actually an advantage in
    data operations, where process discipline matters more than algorithmic novelty.

  formative_experiences:
    - what: "Federal Staff Accountant → Federal Auditor at Austria's Buchhaltungsagentur des Bundes"
      when: "2009–2015"
      why_it_matters: |
        5+ years in Austrian federal government accounting and auditing — processing
        payment runs up to several hundred million, performing 30+ institutional audits
        per year, drafting reports for the Ministry of Finance and Federal Court of Auditors.
        First employee to transition from operations to auditing department — others followed.
        This built the quality mindset: systematic sampling, checklists, risk evaluation,
        audit reports. The annotation quality work at Amazon is a direct continuation
        of this discipline applied to a different domain.

    - what: "Technical Translator → Knowledge Engineer for German Alexa at Amazon Lab126"
      when: "2017–2019"
      why_it_matters: |
        Entered Amazon through a contract translation role and earned conversion to full-time
        Knowledge Engineer within 5 months. The Alexa Automotive domain work — Failure Mode
        Analysis, error pattern identification, actionable recommendations — directly led to
        Echo Auto launch. This is the transition point: from language precision to ML system
        quality. The German grammar expertise wasn't just translation — it was debugging an
        AI system's linguistic failures.

    - what: "Building and leading an international Data Analytics team across 16 locales and 9 languages"
      when: "2023–2024"
      why_it_matters: |
        Owned the Local Information Failure Triage (LIFT) system expansion for international
        markets. Presented Failure Space Analysis to senior leadership. This is where the
        multilingual foundation became a leadership capability — coordinating sprint planning
        across UK and US teams while understanding the linguistic nuances of 9 different
        language markets.

    - what: "Team satisfaction turnaround: 40% → 86% in three months"
      when: "2024"
      why_it_matters: |
        In the current ML Data Ops Lead role, inherited a team with 40% job satisfaction
        and raised it to 86% within three months through targeted leadership initiatives.
        Also coached three direct reports from L3 to L4 promotions. This is people
        leadership evidence — not just project management.

  career_throughline: |
    The thread is quality assurance applied with increasing technical sophistication.
    Federal auditing (verify financial transactions) → data management (verify CRM data
    integrity) → knowledge engineering (verify AI language quality) → data analytics
    (verify search quality across locales) → ML data operations (verify annotation
    quality for AI training). Each step applied the same audit mindset — systematic
    sampling, inter-rater agreement, feedback loops — to a more technical domain.

    The second thread is multilingual bridge-building. German/English/Spanish language
    skills → German Alexa quality → international analytics across 9 languages →
    multilingual annotation pipeline management. He doesn't just speak multiple
    languages — he understands how meaning breaks across linguistic boundaries,
    which is exactly what ML training data quality requires.

