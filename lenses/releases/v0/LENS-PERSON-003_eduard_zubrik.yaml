# ============================================================================
# CONTRADICTIONS
# ============================================================================

contradictions:
  - tension: "Austrian government auditor → Silicon Valley AI leader"
    resolution: |
      The leap looks dramatic on the surface but the underlying skill is identical:
      systematic quality verification. The domain changed (financial transactions →
      ML training data), the tools changed (SAP → annotation platforms), but the
      cognitive work — sampling, measuring agreement, documenting deviations, feeding
      back corrections — is structurally the same work.
    implication: |
      Don't underestimate the audit background. It's not irrelevant history — it's the
      foundation of his quality discipline. Competitors for ML data ops roles who come
      from pure tech backgrounds may lack this rigor.

  - tension: "Quietly reliable operator who is openly job-seeking"
    resolution: |
      He states directly he is "currently open to new opportunities" — unusual
      transparency for someone at a senior Amazon role. This likely reflects either
      organizational changes (Search AI restructuring, Rufus pilot maturity) or a
      desire for more scope/impact than the current role allows.
    implication: |
      He's not desperate — he's deliberate. The transparency about job-seeking suggests
      confidence in his value. His profile reads as someone who knows what he's worth
      and is looking for the right fit, not any fit.

  - tension: "Business administration education → ML data operations leadership"
    resolution: |
      The path was: business admin → accounting → data management → knowledge engineering
      → ML data ops. Each step was adjacent, not a leap. The technical skills (SQL, Python)
      were added through certifications and on-the-job learning, not formal CS education.
      This means his technical depth has limits, but his operational and quality discipline
      exceeds what most CS graduates bring to data ops.
    implication: |
      Frame him as a data operations leader who understands the technical context, not a
      technical leader who manages operations. The distinction matters for role targeting.

