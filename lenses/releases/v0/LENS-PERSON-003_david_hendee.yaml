voice_sommelier:
  concept: "Helping craft an agent's voice is like picking a good wine — everyone has opinions, preferences vary widely, most lack precise vocabulary for what they want. Success requires listening, translating needs, and offering guided advice."
  origin: "A few weeks into Alpine, he joked the role should be Voice Sommelier. The name stuck."
  process:
    - "Listen to the brand — values, tone guidelines, who their customers are"
    - "Celebrity touchstone exercise — which actor embodies this brand?"
    - "Select or create voice — existing voices (Jade, Tatyana, Steven), new voice actors, or actual CS reps"
    - "Tune performance cues — breath, rhythm, stress, pitch, selective human interjections"
    - "Add vocal texture — subtle gravel, vocal fry, breathiness for lived-in quality"
    - "Emotional modulation — efficient for refunds, upbeat for recommendations, warm for positive outcomes, empathetic for problems"
    - "Test and iterate — no voice is right on the first pass"
  success_metrics:
    acceptance: "Do customers continue the conversation or request a human?"
    resolution: "Does the agent solve the issue through clear communication?"
    satisfaction: "Do customers feel genuinely helped? Brand-aligned voices improve ratings even with identical outcomes."
  key_quote: "Tone earns you trust more than speed or accuracy."

