conversation_strategy:
  frame: "Peer conversation, not job interview. David created this discipline. Mical has been building in the same space from the engineering side. The overlap is genuine."
  lead_with:
    - "The languages — 4 native languages means Mical can evaluate voice quality in French, Italian, Spanish, and English without translators. That's rare and directly useful for multilingual launches."
    - "The evaluation frameworks — don't just say 'I built assessments.' Say 'I built a 3-layer evaluation pipeline: automated checks, AI rubric scoring, human calibration. The same pattern you'd use for voice QA gates.'"
    - "The agent personality work — 'I've designed 12 agents with distinct roles, typed handoffs, and convergence protocols. The agents have personalities that are governed, not improvised.'"
  do_not:
    - "Don't oversell the engineering side — David is a designer first. Frame technical work as 'enabling the design to ship' not 'the architecture is the point.'"
    - "Don't compare to David's experience — complement it. 'You design the voice. I can evaluate whether it works across 4 languages and build the frameworks to scale that evaluation.'"
