taxonomy_gaps:

  - gap_id: "GAP-001"
    title: "No-Code AI App Generation / Vibe-Coding"
    affected_tools: ["Lovable", "v0.dev (Vercel)", "Replit"]
    closest_existing_riu: "RIU-413 (Customer Value Demo Creation)"
    why_imperfect: |
      RIU-413 is about creating demos for stakeholder alignment.
      Lovable/v0.dev/Replit are about generating full production applications
      for non-technical builders — different problem pattern, different audience,
      different success criteria.
    proposed_riu: "RIU-550"
    proposed_name: "No-Code AI App Generation (Vibe-Coding)"
    proposed_description: |
