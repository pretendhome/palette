- id: LIB-134
  question: How do I create a schema mapping table that eliminates field mapping churn between source and target systems?
  answer: 'RIU-018 prescribes a mapping table with seven columns: Source Field, Source Type, Target Field, Target Type, Transform
    Rule, Default Value, and Provenance (who agreed to this mapping and when). Step 1 — Freeze source schema using RIU-011
    (Data Contract) before mapping begins. If the source schema is still shifting, mapping is premature and will cause rework.
    Step 2 — Document every transform explicitly: type coercion (string to int), unit conversion (USD cents to dollars), enum
    mapping (source status codes to target status codes), null handling (default vs reject vs propagate). Never leave an implicit
    transform undocumented — this is the number one cause of mapping bugs. Step 3 — Validate with sample payloads. Run 10-20
    representative records through the mapping and verify outputs with the target system owner. Step 4 — Write mapping tests.
    Each transform rule should have at least one positive test and one edge case test (null input, max-length input, unicode).
    Store these as regression tests (RIU-086). Optional fields are the most dangerous — they often appear in only 5% of records
    and their absence is not caught until production.'
  problem_type: Data_Semantics_and_Quality
