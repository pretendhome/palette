- id: LIB-143
  question: How do I define and enforce a cost/latency budget envelope for AI systems to prevent runaway spend and latency
    spikes?
  answer: 'RIU-085 defines a budget envelope with four components. Component 1 — Budget Definition: set explicit ceilings
    for cost per request, cost per day, cost per month, and latency p50/p95/p99. These must be agreed with stakeholders before
    development begins — they are non-negotiable constraints, not aspirational targets. Example: cost ceiling $0.05/request,
    latency p95 < 3 seconds, monthly spend cap $500. Component 2 — Guards: implement programmatic guards that enforce the
    budget. For cost: token counting before LLM calls, model routing to cheaper models for simple requests, request batching
    where possible. For latency: timeout enforcement, streaming responses, caching (RIU-324). Guards must be fail-closed —
    if the budget system itself fails, default to the most conservative behavior. Component 3 — Alerts: configure alerts at
    70%, 85%, and 95% of budget thresholds. Include both rate-based alerts (cost per hour trending above daily budget / 24)
    and cumulative alerts (monthly spend approaching cap). Route alerts to both engineering and business stakeholders. Component
    4 — Fallbacks: define what happens when budget is exceeded. Options: degrade to cheaper model, serve cached responses,
    queue requests for batch processing, return graceful error. Never silently exceed budget. The budget envelope is the financial
    equivalent of a circuit breaker — it protects the business from AI cost surprises that have bankrupted startups.'
