- id: LIB-065
  question: How do I version control operational procedures for AI systems?
  answer: "Treat operational procedures like code: version control, review, test, and deploy. Unversioned procedures lead\
    \ to drift, confusion, and incidents.\n      \n      **What to version control:**\n      \n      | Artifact Type | Example\
    \ | Version Control Method |\n      |---------------|---------|------------------------|\n      | Runbooks | Incident\
    \ response procedures | Git (markdown) |\n      | SOPs | Daily operations guide | Git (markdown) |\n      | Prompts |\
    \ System prompts, templates | Git + Prompt Registry |\n      | Configurations | Model settings, thresholds | Git (YAML/JSON)\
    \ |\n      | Infrastructure | IaC templates | Git (Terraform/CDK) |\n      | Dashboards | CloudWatch configs | Git (JSON)\
    \ |\n      | Alerts | Alarm definitions | Git (YAML) |\n      \n      **Repository structure:**\n      \n      ```\n \
    \     ai-operations/\n      ├── README.md                    # Overview and quick links\n      ├── CHANGELOG.md      \
    \           # Change history\n      │\n      ├── runbooks/\n      │   ├── incident-response/\n      │   │   ├── quality-degradation.md\n\
    \      │   │   ├── model-failure.md\n      │   │   └── rag-retrieval-issues.md\n      │   ├── deployment/\n      │   │\
    \   ├── standard-deployment.md\n      │   │   ├── rollback-procedure.md\n      │   │   └── emergency-hotfix.md\n     \
    \ │   └── maintenance/\n      │       ├── knowledge-base-update.md\n      │       └── model-version-upgrade.md\n     \
    \ │\n      ├── sops/\n      │   ├── daily-operations.md\n      │   ├── on-call-handbook.md\n      │   └── change-management.md\n\
    \      │\n      ├── prompts/\n      │   ├── system-prompts/\n      │   │   ├── v1.0.0/\n      │   │   ├── v1.1.0/\n  \
    \    │   │   └── current -> v1.1.0\n      │   └── templates/\n      │\n      ├── configurations/\n      │   ├── guardrails/\n\
    \      │   ├── thresholds/\n      │   └── model-configs/\n      │\n      └── infrastructure/\n          ├── terraform/\n\
    \          └── cdk/\n      ```\n      \n      **Version control workflow:**\n      \n      ```\n      ┌─────────────────────────────────────────────────────────────┐\n\
    \      │              OPERATIONAL PROCEDURE LIFECYCLE                 │\n      ├─────────────────────────────────────────────────────────────┤\n\
    \      │                                                             │\n      │  ┌─────────┐   ┌─────────┐   ┌─────────┐\
    \   ┌─────────┐    │\n      │  │ CREATE  │──▶│ REVIEW  │──▶│  TEST   │──▶│ PUBLISH │    │\n      │  └─────────┘   └─────────┘\
    \   └─────────┘   └─────────┘    │\n      │       │             │             │             │          │\n      │   Branch\
    \      Pull Request   Validation    Merge to       │\n      │   from main   + Approval     (if appl.)   main + tag   \
    \   │\n      │                                                            │\n      └─────────────────────────────────────────────────────────────┘\n\
    \      ```\n      \n      **Change management process:**\n      \n      ```yaml\n      change_management:\n        minor_changes:\n\
    \          examples: [\"Typo fixes\", \"Clarifications\", \"Contact updates\"]\n          process:\n            - \"Create\
    \ branch\"\n            - \"Make changes\"\n            - \"Submit PR\"\n            - \"1 reviewer approval\"\n     \
    \       - \"Merge\"\n          turnaround: \"Same day\"\n          \n        major_changes:\n          examples: [\"New\
    \ procedures\", \"Process changes\", \"Threshold updates\"]\n          process:\n            - \"Create branch\"\n   \
    \         - \"Make changes\"\n            - \"Submit PR with description of impact\"\n            - \"2 reviewer approvals\
    \ (including subject matter expert)\"\n            - \"Test in staging (if applicable)\"\n            - \"Merge + announce\
    \ to team\"\n          turnaround: \"1-3 days\"\n          \n        critical_changes:\n          examples: [\"Security\
    \ procedures\", \"Compliance updates\", \"Escalation paths\"]\n          process:\n            - \"Create branch\"\n \
    \           - \"Make changes\"\n            - \"Submit PR with impact assessment\"\n            - \"Review by: Tech lead,\
    \ Security, Compliance (as applicable)\"\n            - \"Approval from AI Governance Lead\"\n            - \"Staged rollout\
    \ with communication plan\"\n          turnaround: \"3-7 days\"\n      ```\n      \n      **Pull request template:**\n\
    \      \n      ```markdown\n      ## Change Type\n      - [ ] Minor (typo, clarification)\n      - [ ] Major (new procedure,\
    \ process change)\n      - [ ] Critical (security, compliance, escalation)\n      \n      ## Description\n      [What\
    \ is being changed and why]\n      \n      ## Impact\n      [Who is affected, what changes for them]\n      \n      ##\
    \ Testing\n      - [ ] Reviewed by someone who will use this procedure\n      - [ ] Tested steps (if applicable)\n   \
    \   - [ ] Links updated and working\n      \n      ## Rollout\n      - [ ] Team notified (Slack/email)\n      - [ ] Training\
    \ needed? [Yes/No]\n      - [ ] CHANGELOG updated\n      \n      ## Reviewers\n      - Technical: @[name]\n      - SME:\
    \ @[name] (if applicable)\n      - Governance: @[name] (if critical)\n      ```\n      \n      **CHANGELOG format:**\n\
    \      \n      ```markdown\n      # Changelog\n      \n      ## [2024-06-15] - v1.2.0\n      ### Added\n      - New runbook:\
    \ RAG retrieval troubleshooting (runbooks/incident-response/rag-retrieval-issues.md)\n      - Emergency hotfix procedure\
    \ (runbooks/deployment/emergency-hotfix.md)\n      \n      ### Changed\n      - Updated escalation contacts in on-call-handbook.md\n\
    \      - Revised quality degradation thresholds (lowered warning from 85% to 80%)\n      \n      ### Deprecated\n    \
    \  - Old deployment procedure (use standard-deployment.md instead)\n      \n      ## [2024-06-01] - v1.1.0\n      ...\n\
    \      ```\n      \n      **Linking procedures to deployments:**\n      \n      ```yaml\n      deployment_metadata:\n\
    \        deployment_id: \"deploy-2024-06-15-001\"\n        git_commit: \"abc123def456\"\n        \n        procedures_version:\n\
    \          runbooks: \"v1.2.0\"\n          prompts: \"v1.1.0\"\n          configurations: \"v2.3.1\"\n          \n   \
    \     links:\n          deployment_runbook: \"runbooks/deployment/standard-deployment.md@v1.2.0\"\n          rollback_procedure:\
    \ \"runbooks/deployment/rollback-procedure.md@v1.2.0\"\n          incident_response: \"runbooks/incident-response/@v1.2.0\"\
    \n      ```\n      \n      **Automated validation (CI/CD):**\n      \n      ```yaml\n      procedure_validation:\n   \
    \     on_pull_request:\n          - check: \"Markdown linting\"\n            tool: \"markdownlint\"\n            \n  \
    \        - check: \"Link validation\"\n            tool: \"markdown-link-check\"\n            \n          - check: \"\
    Required sections present\"\n            tool: \"Custom script\"\n            sections: [\"Purpose\", \"Prerequisites\"\
    , \"Steps\", \"Rollback\", \"Contacts\"]\n            \n          - check: \"CHANGELOG updated\"\n            tool: \"\
    Custom script\"\n            \n        on_merge:\n          - action: \"Tag release\"\n          - action: \"Update 'current'\
    \ symlink\"\n          - action: \"Notify team via Slack\"\n          - action: \"Update documentation portal\"\n    \
    \  ```\n      \n      **AWS Systems Manager integration:**\n      \n      ```yaml\n      ssm_automation:\n        # Convert\
    \ markdown runbooks to executable automation\n        pattern:\n          - \"Store runbooks in Git (source of truth)\"\
    \n          - \"Sync to SSM Documents for automation\"\n          - \"Manual steps remain in markdown\"\n          - \"\
    Automated steps execute via SSM Runbooks\"\n          \n        benefits:\n          - \"Executable procedures reduce\
    \ human error\"\n          - \"Audit trail of procedure execution\"\n          - \"Approval gates in SSM\"\n      ```\n\
    \      \n      **PALETTE integration:**\n      - Store procedures in RIU-069 (Runbook)\n      - Version prompts in RIU-520\
    \ (Prompt Version Control)\n      - Track configurations in RIU-532 (Model Registry)\n      - Link from RIU-060 (Deployment\
    \ Readiness)\n      \n      Key insight: The question isn't whether to version control procedures — it's whether you can\
    \ answer \"what version of this runbook was in effect when this incident happened?\" If not, you have a traceability gap."
