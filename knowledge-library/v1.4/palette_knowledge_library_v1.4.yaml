- id: LIB-135
  question: How do I capture a baseline behavior snapshot before making changes to an AI system?
  answer: 'RIU-020 defines baseline capture as a three-artifact process. Artifact 1 — Golden Inputs: select 50-200 representative
    inputs that cover the key operating scenarios (happy path, edge cases, adversarial inputs, empty/null inputs). These become
    your regression anchors. Artifact 2 — Baseline Outputs: run golden inputs through the current system and store the exact
    outputs with timestamps, model version, and configuration. For non-deterministic systems (LLMs), run each input 3-5 times
    and record the distribution of outputs. Artifact 3 — Baseline Metrics: compute aggregate metrics (accuracy, latency p50/p95/p99,
    cost per request, error rate, token usage). Store as baseline_metrics.json. The baseline serves three purposes: (1) regression
    detection — any change that degrades baseline metrics is a red flag; (2) improvement measurement — you can only claim
    improvement if you have a before; (3) rollback decision support — if the new version is worse, you have a concrete comparison.
    Common failure: using a non-representative baseline (e.g., only happy-path inputs). Mitigate by including inputs from
    production logs stratified by frequency and error history. Cross-reference with RIU-604 (AI ROI Quantification) — the
    baseline is also the "before" measurement for ROI calculations.'
  problem_type: Reliability_and_Failure_Handling
