- id: LIB-130
  question: How do I detect data drift and model drift in production AI systems?
  answer: Use a dedicated drift detection platform — Arize AI (managed, production-grade, supports embeddings and tabular
    data) or Evidently AI (open-source, Python-native, good for experimentation). Monitor three drift types — data drift (input
    feature distributions shift), prediction drift (model output distribution shifts), and concept drift (the real-world relationship
    between inputs and outcomes changes). Set statistical thresholds — PSI above 0.2 or KS test p-value below 0.05 triggers
    investigation, not automatic retraining. Key insight — most drift is seasonal or cyclical, not catastrophic. Build dashboards
    that show drift trends over time, not just point-in-time alerts. Retrain only when drift correlates with measured quality
    degradation.
