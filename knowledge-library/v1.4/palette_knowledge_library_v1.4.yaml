- id: LIB-021
  question: How do I handle business rules that conflict across departments?
  answer: "Rule conflicts are natural in enterprises — don't try to eliminate tension, establish governance to resolve it\
    \ systematically.\n      \n      **Conflict detection:**\n      - Document all rules with owning department and business\
    \ justification\n      - During rule ingestion, check for overlapping conditions with different outcomes\n      - Flag\
    \ conflicts explicitly: \"Rule A (Sales) says X; Rule B (Compliance) says Y\"\n      - Store in centralized rule catalog\
    \ (RIU-044) with cross-references\n      \n      **Resolution governance (Hybrid CoE model):**\n      - **Executive Sponsor**:\
    \ Final arbiter for unresolved conflicts affecting strategy\n      - **AI Governance Lead**: Day-to-day conflict triage\
    \ and resolution tracking\n      - **Cross-Functional Oversight Team**: Representatives from each department evaluate\
    \ conflicts\n      - Use AIR workshop methodology when prioritization disputes arise\n      \n      **Priority framework:**\n\
    \      1. **Regulatory/Compliance rules** → Always highest priority (non-negotiable)\n      2. **Security/Safety rules**\
    \ → Second priority\n      3. **Customer-facing rules** → Third priority\n      4. **Operational efficiency rules** →\
    \ Lowest priority, most negotiable\n      \n      Document priority hierarchy in Constraint Profile (RIU-007) and get\
    \ executive sign-off.\n      \n      **Resolution patterns:**\n      - **Scope separation**: Rules apply to different\
    \ contexts (e.g., \"Sales rule for prospects, Compliance rule for regulated customers\")\n      - **Time-based precedence**:\
    \ Newer rule supersedes unless explicitly versioned\n      - **Escalation**: Use \"Disagree and Commit\" — debate respectfully,\
    \ then fully commit to decision\n      - **Merge**: Create unified rule that satisfies both intents\n      \n      **Technical\
    \ implementation:**\n      - Implement rule priority field (integer) in rule schema\n      - When conflicts detected at\
    \ runtime, highest priority wins\n      - Log all conflict resolutions for audit trail\n      - Alert when new rules create\
    \ conflicts with existing rules\n      \n      **PALETTE integration:**\n      - Document conflict resolutions in Decision\
    \ Log (RIU-003) as they're often ONE-WAY DOORs\n      - Track unresolved conflicts in Open Questions until governance\
    \ resolves\n      - Store harmonized rules in Assumptions Register (RIU-008) with validation plan\n      \n      Key insight:\
    \ The goal isn't eliminating conflicts — it's making conflict resolution fast, transparent, and auditable. Establish the\
    \ governance *before* you need it."
