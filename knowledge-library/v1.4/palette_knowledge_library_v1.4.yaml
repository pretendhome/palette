- id: LIB-005
  question: How do I handle requirements that change weekly in an enterprise AI deployment?
  answer: 'Distinguish between TWO-WAY DOOR changes (reversible — absorb quickly) and ONE-WAY DOOR changes (irreversible —
    require formal re-convergence via RIU-001). Implement a federated operating model: central oversight for data access,
    model risk, and compliance, while lines of business iterate autonomously within defined boundaries. Use the Assumptions
    Register (RIU-008) to track volatile requirements as testable assumptions with expiry dates rather than fixed specs. Apply
    AI-DLC methodology with structured prompts and mob elaboration to move from requirements to working prototypes in hours,
    enabling rapid validation before commitment. Map organizational debt and streamline approval processes that hinder adaptation.
    Redefine the Convergence Brief (RIU-001) as a living document — freeze ONE-WAY DOORs (architecture, data schema, compliance)
    while allowing TWO-WAY DOORs (prompts, UI, thresholds) to evolve weekly. Key insight: AI systems are nondeterministic,
    requiring new trust models where "requirements" become hypotheses validated through continuous experimentation rather
    than upfront specifications.'
  problem_type: Intake_and_Convergence
