- id: LIB-015
  question: How do I turn 'we'll know it when we see it' into measurable acceptance criteria?
  answer: "\"We'll know it when we see it\" signals subjective quality expectations. Use these techniques to make them measurable:\n\
    \      \n      **Step 1: Extract concrete examples**\n      - Ask: \"Show me 3 examples of good output and 3 examples\
    \ of bad output\"\n      - Ask: \"What specifically makes this one good? What's missing from the bad one?\"\n      - Document\
    \ these as your initial Golden Set (RIU-021)\n      \n      **Step 2: Apply the 4 evaluation frameworks**\n      1. **LLM-as-a-Judge**:\
    \ Use Amazon Bedrock Evaluations with custom metrics — define your own criteria alongside built-in metrics\n      2. **Rubric-Based\
    \ Evaluation**: Create scoring rubric (1-5 scale) with explicit criteria for each level\n      3. **Traditional Metrics**:\
    \ Where applicable, add objective measures (latency, cost, format compliance)\n      4. **Domain-Specific**: Map to business\
    \ outcomes (response time → resolution rate → customer satisfaction)\n      \n      **Step 3: Build measurable proxies**\n\
    \      For each subjective criterion, identify 2-3 quantifiable proxies:\n      - \"Sounds professional\" → No grammar\
    \ errors + formal tone score (LLM-judge) + no slang detected\n      - \"Helpful response\" → Contains action items + answers\
    \ the question asked + user follow-up rate\n      - \"Accurate\" → Factual claims verified against source + no hallucinated\
    \ entities + citation coverage\n      \n      **Step 4: Validate with stakeholders**\n      - Run evaluation on 50+ examples,\
    \ show results\n      - Ask: \"Does a score of 4.2 on this rubric match what you'd call 'good enough'?\"\n      - Adjust\
    \ thresholds until metrics align with human judgment (target ρ > 0.8 correlation)\n      \n      **PALETTE integration:**\n\
    \      - Document criteria in Success Metrics Charter (RIU-006)\n      - Store Golden Set in RIU-021 for regression testing\n\
    \      - Define exit criteria: \"Acceptance requires score ≥ X on rubric across Y% of test cases\"\n      \n      Key\
    \ insight: Evaluation is the single most important component for GenAI success — without it, you risk deploying models\
    \ that fail silently."
  problem_type: Human_to_System_Translation
