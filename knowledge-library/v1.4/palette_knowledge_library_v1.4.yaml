- id: LIB-118
  question: When should I add a caching layer to my LLM pipeline and what strategy should I use?
  answer: Add caching when you see repeated identical or semantically similar queries consuming LLM tokens. Three patterns
    — exact-match cache (Redis/Upstash, simple key-value, highest hit rate for deterministic queries), semantic cache (GPTCache
    or custom embedding similarity, catches paraphrases but adds latency), and response fragment cache (cache intermediate
    steps like retrieval results, not final LLM output). Start with exact-match on the highest-volume query patterns. Measure
    cache hit rate before adding semantic caching complexity. Invalidation strategy must match your data freshness requirements
    — TTL-based for most AI use cases, event-based invalidation for real-time data. Upstash Redis is serverless with per-request
    pricing (no idle cost), ElastiCache for high-throughput on AWS.
