- id: LIB-132
  question: How do I create an access and permissions readiness checklist that prevents delivery delays from missing credentials
    or network access?
  answer: 'Build the checklist in three layers using RIU-010. Layer 1 — Enumerate: list every system the engagement touches
    (APIs, databases, cloud consoles, VPNs, SSO portals). For each, record the credential type (API key, OAuth token, IAM
    role, service account), the required permission level (read-only vs read-write), and the provisioning owner. Layer 2 —
    Least Privilege: apply the principle of least privilege (NIST SP 800-53 AC-6). Request only the minimum permissions needed
    for the current phase. Document justification for any elevated access. Set expiration dates on temporary credentials.
    Layer 3 — Smoke Tests: write a runnable smoke test per system that validates connectivity and permission scope before
    development begins. Test read access, write access (to a sandbox), and network path (VPN, VPC peering, firewall rules).
    A blocked network path discovered on Day 1 is a schedule save; discovered on Day 10 is a schedule slip. Common failure
    mode: over-privileged tokens that pass smoke tests but violate compliance during security review. Always cross-reference
    with RIU-012 (PII/Compliance Triage) if regulated data is involved.'
  problem_type: Systems_Integration
