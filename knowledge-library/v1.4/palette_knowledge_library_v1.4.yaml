- id: LIB-137
  question: How do I define freshness and staleness rules to prevent stale data from being surfaced in AI recommendations?
  answer: 'RIU-025 implements deterministic freshness rules in three tiers. Tier 1 — Freshness Classes: classify every data
    source into freshness categories. Real-time (< 1 minute): user actions, prices, inventory. Near-real-time (< 1 hour):
    aggregated metrics, event streams. Daily: reports, batch analytics. Weekly+: reference data, taxonomies. Tier 2 — Staleness
    Rules: for each freshness class, define what happens when data exceeds its expected freshness window. Options: downrank
    (reduce confidence score), omit (exclude from results), flag (include with staleness warning), fallback (serve cached
    version with disclaimer). Tier 3 — Orphan Detection: implement last-seen snapshots to detect records that have disappeared
    from the source but still exist in downstream systems. An orphan is a record whose source_id no longer exists in the authoritative
    system — it must be flagged or removed, never silently served. Implementation: add last_refreshed_at and freshness_class
    fields to every data record. Build a staleness monitor (cron or event-driven) that compares current time against last_refreshed_at
    and applies the appropriate staleness rule. Common failure: missing timestamps on source data make staleness undetectable.
    Require timestamps as a data contract prerequisite (RIU-011).'
