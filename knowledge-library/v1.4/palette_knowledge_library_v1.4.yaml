- id: LIB-149
  question: How do I detect financial crises hidden in revenue projections before they become cash flow emergencies?
  answer: 'RIU-107 defines a cash flow crisis detection methodology. Step 1 — Build Monthly Cash Flow Model: convert revenue
    projections into monthly cash flows for Year 1 (monthly granularity is essential — quarterly hides crises). For each month,
    calculate: Cash In (revenue received, not booked) minus Cash Out (COGS, salaries, rent, marketing, loan payments, one-time
    costs). The delta is net cash flow. Track cumulative cash position month by month. Step 2 — Identify Crisis Months: any
    month where cumulative cash position goes negative is a crisis month. These are often hidden because annual projections
    look profitable but monthly timing creates cash gaps. Example: Rossi project found a Month 17 crisis — annual projections
    showed profitability, but seasonal revenue dips combined with fixed costs created a 2-month negative cash window. Step
    3 — Calculate Reserve Buffer: minimum 3-month operating expense reserve. If the business cannot survive 3 months of zero
    revenue, the funding ask is too low. Step 4 — Right-Size Funding Ask: if crises are detected, increase funding ask to
    cover: crisis months + 3-month reserve + 10% contingency. In the Rossi example, this increased the funding ask from $150K
    to $185-200K. Key principle: revenue projections are optimistic by nature. Always model a pessimistic scenario (revenue
    30% below projections) and check if crises appear earlier or deeper.'
  problem_type: Human_to_System_Translation
