- id: LIB-173
  question: How do I systematically map every error path in a new feature before shipping?
  answer: 'Use an error/rescue registry — a table that maps every method or codepath that can fail to its specific exception
    classes, whether each is rescued, what the rescue action is, and what the user sees. Format: METHOD | WHAT CAN GO WRONG
    | EXCEPTION CLASS | RESCUED? | RESCUE ACTION | USER SEES. Rules: (1) Never use catch-all exception handling — name specific
    exceptions. (2) Every rescued error must either retry with backoff, degrade gracefully with a user-visible message, or
    re-raise with added context. (3) For every data flow, trace four paths: happy path, nil input, empty input, and upstream
    error. (4) Any row where RESCUED=N and TESTED=N and USER SEES=silent is a critical gap. This methodology comes from production
    code review practice where the class of bugs that survive CI but break in production are almost always unhandled error
    paths, not logic errors.'
