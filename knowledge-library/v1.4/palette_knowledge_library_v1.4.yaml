- id: LIB-001
  question: How do I force convergence when stakeholders have conflicting definitions of success?
  answer: Create a Convergence Brief (RIU-001) requiring written commitment to Goal, Roles, Constraints, Capabilities, and
    Non-goals. Use Stakeholder Map + RACI-lite (RIU-002) to identify decision authority by influence and interest, then develop
    tailored engagement strategies. Secure executive sponsorship (CIO/CFO level) early — involvement should correlate with
    investment size and cross-team dependencies. Facilitate a cross-functional workshop where stakeholders must agree on measurable
    success criteria before proceeding. Err toward higher risk ratings initially, refine through discussion. Establish "people
    champions" to drive alignment, and pilot solutions to build consensus through demonstrated success before scaling. Document
    agreed definitions as ONE-WAY DOOR commitments in decisions.md to prevent re-litigation.
  problem_type: Intake_and_Convergence
