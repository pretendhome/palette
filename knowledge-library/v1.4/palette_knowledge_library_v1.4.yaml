- id: LIB-155
  question: How do I design a resilient third-party API integration with circuit breakers and fallback handling?
  answer: 'RIU-320 defines API integration resilience in four layers. Layer 1 — Circuit Breaker: implement a circuit breaker
    (Closed/Open/Half-Open states) per external API. When failure rate exceeds threshold (typically 50% over 10 requests),
    open the circuit and stop calling the API. After a cooldown period (30-60 seconds), enter half-open state and send a probe
    request. If it succeeds, close the circuit. This prevents cascading failures when an upstream API is down. Layer 2 — Rate
    Limiting: respect the API provider''s rate limits proactively. Implement client-side rate limiting with token bucket or
    sliding window. Buffer requests when approaching limits. Log rate limit headers from responses (X-RateLimit-Remaining,
    X-RateLimit-Reset) and adapt behavior dynamically. Layer 3 — Fallback Handling: define what happens when the API is unavailable.
    Options ranked by user experience: (a) serve cached response with staleness indicator; (b) degrade gracefully — return
    partial results with explanation; (c) queue request for retry when API recovers; (d) return user-friendly error with estimated
    recovery time. Never show a raw 500 error to end users. Layer 4 — Monitoring: track per-API metrics: availability (% of
    successful calls), latency (p50/p95/p99), error rate by type (4xx vs 5xx), and cost per call. Alert on availability drops
    and latency spikes. Implement distributed tracing to correlate API failures with user-visible impacts. Design principle:
    treat every external API as unreliable by default. The integration should function (degraded) even when the API is completely
    down.'
  problem_type: Systems_Integration
