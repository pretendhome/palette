- id: LIB-003
  question: How do I scope an AI pilot when the customer says 'we need AI everywhere'?
  answer: 'Resist technology-first thinking. Use RIU-004 (Problem → Workstream Decomposition) to generate broad candidate
    use cases without committing, then narrow using AWS''s Five V''s Framework: Value (high-impact opportunities), Visualize
    (clear success metrics), Validate (test against real requirements), Verify (scalable production path), Venture (secure
    long-term resources). Apply weighted shortest job first (WSJF) combined with responsible AI assessment — this may reprioritize
    projects by revealing hidden complexity. Create a Scope Freeze (RIU-005) with Phase 0/1/2 deliverables: start with prompt
    engineering for general knowledge tasks, add RAG when factual grounding needed. Define explicit Non-goals in your Convergence
    Brief (RIU-001) to prevent "AI everywhere" creep. Select pilots with quality data, engaged business sponsors, measurable
    ROI, and TWO-WAY DOOR characteristics enabling quick iteration. Target 3-6 month delivery cycles to build organizational
    confidence before scaling.'
  problem_type: Intake_and_Convergence
