- id: LIB-007
  question: How do I identify when a customer request is actually 3 separate problems disguised as one?
  answer: "**Warning signs of bundled problems:**\n      - Vague objectives like \"improve productivity\" or \"add AI\" (no\
    \ specific metric)\n      - Different stakeholders define success differently for the same request\n      - No clear line\
    \ of sight from proposed feature to measurable business outcome\n      - Request spans multiple data domains, teams, or\
    \ systems\n      - Cannot answer \"how will we measure success?\" with one metric\n      \n      **Decomposition technique:**\
    \ Use RIU-004 (Problem → Workstream Decomposition) to generate broad candidate workstreams without committing. Apply the\
    \ AIR Workshop methodology: score each potential use case (1-10) on business impact, cost, implementation complexity,\
    \ business priority, and timeline. Plot on Eisenhower matrix to separate high-impact use cases from quick wins. Each decomposed\
    \ problem must have its own line of sight to specific, quantifiable metrics (e.g., \"reduce churn 5%\" not \"improve customer\
    \ experience\").\n      \n      **Validation test:** If a problem requires its own Convergence Brief (RIU-001) with distinct\
    \ Goal, Constraints, and Stakeholders — it's a separate problem. Document in decisions.md and negotiate phased delivery\
    \ (RIU-005) rather than one mega-project."
  problem_type: Intake_and_Convergence
