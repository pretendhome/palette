- id: LIB-104
  question: What frameworks should I use for business model design?
  answer: "Use these proven frameworks for business model design:\n\n**1. Business Model Canvas** (Osterwalder)\n- 9 building\
    \ blocks: Value proposition, customer segments, channels,\n  customer relationships, revenue streams, key resources, key\
    \ activities,\n  key partnerships, cost structure\n- Best for: Startups and new ventures\n- Time: 1-2 hours to complete\n\
    - Output: One-page visual business model\n\n**2. Value Proposition Canvas** (Osterwalder)\n- Customer profile: Jobs to\
    \ be done, pains, gains\n- Value map: Products/services, pain relievers, gain creators\n- Best for: Product-market fit\
    \ validation\n- Time: 30-60 min to complete\n- Output: Customer-value alignment map\n\n**3. Lean Canvas** (Maurya)\n-\
    \ Focuses on: Problem, solution, key metrics, unfair advantage, channels\n- Best for: Lean startups and MVPs\n- Time:\
    \ 20-30 min to complete\n- Output: One-page lean business model\n\n**4. Strategic Framework** (Porter's 5 Forces + SWOT)\n\
    - Porter's 5 Forces: Supplier power, buyer power, competitive rivalry,\n  threat of substitutes, threat of new entrants\n\
    - SWOT: Strengths, weaknesses, opportunities, threats\n- Best for: Established businesses and competitive strategy\n-\
    \ Time: 2-3 hours to complete\n- Output: Competitive positioning analysis\n\n**When to use which**:\n- New startup → Lean\
    \ Canvas or Business Model Canvas\n- Product validation → Value Proposition Canvas\n- Strategic planning → Porter's 5\
    \ Forces + SWOT\n- Comprehensive plan → Combine multiple frameworks\n\n**Rossi Mission example**:\n- Used Business Model\
    \ Canvas for revenue streams (7 streams)\n- Used Value Proposition Canvas for artist value (50/50 split)\n- Used SWOT\
    \ for competitive positioning (scarcity economics)\n"
