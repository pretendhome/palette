- id: LIB-119
  question: How do I implement feature flags and kill switches for AI model rollouts?
  answer: Feature flags gate model versions, prompt variants, and pipeline configurations behind runtime toggles. Use a dedicated
    feature flag platform (LaunchDarkly or Statsig) rather than config files — you need instant kill switches without redeployment.
    Key patterns — percentage rollouts (10% to 50% to 100%), targeting rules (route enterprise customers to stable model,
    beta users to experimental), and kill switches (disable a model variant in seconds if quality degrades). Statsig adds
    built-in A/B testing and statistical significance tracking. LaunchDarkly is more mature for enterprise governance. Decision
    — if you need experiment analytics, use Statsig. If you need enterprise audit trails and approval workflows, use LaunchDarkly.
    Both support server-side SDKs for backend AI services.
