- id: LIB-039
  question: What's the best way to handle inconsistent data definitions across departments?
  answer: "Inconsistent definitions are a governance problem, not a technical problem. You can't automate your way out — you\
    \ need shared vocabulary with enforcement.\n      \n      **The problem:**\n      - Sales says \"customer\" = anyone with\
    \ an account\n      - Finance says \"customer\" = anyone who has paid\n      - Support says \"customer\" = anyone who\
    \ has contacted us\n      - AI model trained on \"customer\" data — which definition?\n      \n      **Solution: Canonical\
    \ business glossary + enforcement**\n      \n      **Step 1: Establish governance structure**\n      - **Data governance\
    \ champion**: Single accountable owner\n      - **Cross-functional governance committee**: Representatives from each department\n\
    \      - **Domain owners**: Department-level authority for their data\n      - Use Amazon DataZone domain units to organize\
    \ by business unit\n      \n      **Step 2: Create canonical business glossary**\n      ```yaml\n      glossary_term:\n\
    \        term: \"customer\"\n        canonical_definition: \"Entity with at least one completed paid transaction\"\n \
    \       owner: \"Finance\"\n        approved_date: \"2024-03-15\"\n        \n        department_mappings:\n          sales:\
    \ \n            local_term: \"account\"\n            relationship: \"superset\"  # All customers are accounts, not all\
    \ accounts are customers\n          support:\n            local_term: \"contact\"\n            relationship: \"overlapping\"\
    \  # Some contacts are customers, some aren't\n            \n        usage_guidance: \"For AI training on 'customer' data,\
    \ use this definition unless explicitly scoped otherwise\"\n        \n        related_terms: [\"prospect\", \"lead\",\
    \ \"account\", \"user\"]\n      ```\n      \n      **Step 3: Map conflicting definitions**\n      | Department | Their\
    \ Term | Canonical Term | Relationship | Transformation |\n      |------------|-----------|----------------|--------------|----------------|\n\
    \      | Sales | account | customer | superset | Filter: has_paid = true |\n      | Support | contact | customer | overlapping\
    \ | Join with transactions |\n      | Marketing | lead | prospect | equivalent | Direct mapping |\n      \n      **Step\
    \ 4: Enforce through tooling**\n      - **Amazon SageMaker Catalog**: Metadata enforcement rules require glossary terms\
    \ before publishing\n      - **Amazon DataZone**: Unified portal with business context and access governance\n      -\
    \ **AWS Glue Schema Registry**: Schema validation with canonical field names\n      - **Collibra integration**: Bidirectional\
    \ sync for enterprise-wide consistency\n      \n      **Step 5: Technical implementation**\n      ```\n      Source Data\
    \ (dept definitions)\n              ↓\n      Transformation Layer (mapping rules)\n              ↓\n      Canonical Data\
    \ Layer (glossary-aligned)\n              ↓\n      AI/Analytics Consumption\n      ```\n      \n      **Resolution process\
    \ for conflicts:**\n      1. **Identify conflict**: Same term, different meanings\n      2. **Document both definitions**:\
    \ What does each department actually mean?\n      3. **Determine canonical**: Which definition serves enterprise-wide\
    \ use?\n      4. **Create mappings**: How to transform from local to canonical\n      5. **Get sign-off**: Cross-functional\
    \ committee approval\n      6. **Enforce**: Metadata rules require canonical terms for shared assets\n      \n      **Common\
    \ pitfalls:**\n      - Creating glossary but not enforcing it (becomes shelfware)\n      - Forcing one department's definition\
    \ on others (creates resistance)\n      - Not documenting mappings (breaks downstream when source changes)\n      - Treating\
    \ this as IT problem (it's a business alignment problem)\n      \n      **For AI specifically:**\n      - Document which\
    \ definition was used for training data\n      - Include glossary version in model metadata\n      - Alert if source data\
    \ definition changes (potential drift)\n      - Validate that inference data uses same definition as training\n      \n\
    \      **PALETTE integration:**\n      - Document canonical definitions in RIU-042 (Taxonomy Alignment)\n      - Track\
    \ definition changes as potential ONE-WAY DOORs (RIU-003)\n      - Validate alignment with RIU-082 (Label/Category Alignment\
    \ Check)\n      - Include in data dictionary (RIU-011)\n      \n      Key insight: The goal isn't to force everyone to\
    \ use the same definition — it's to know which definition applies in each context and transform accordingly. Map, don't\
    \ mandate."
  problem_type: Data_Semantics_and_Quality
