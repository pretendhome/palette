- id: LIB-022
  question: What testing strategy validates that AI behavior matches human expert judgment?
  answer: "Use a multi-layered validation strategy: create expert-labeled datasets, measure agreement, automate with LLM-as-a-Judge,\
    \ and maintain human oversight.\n      \n      **Step 1: Create Golden Set with experts (RIU-021)**\n      - Generate\
    \ candidate Q&A pairs using LLM, then have experts review/correct\n      - Use FMEval triplet format: (question, context,\
    \ expected_answer)\n      - Include edge cases and failure modes discovered during testing\n      - Amazon SageMaker Ground\
    \ Truth Plus provides expert workforce for labeling\n      - Minimum: 50-100 examples for initial validation; 500+ for\
    \ robust evaluation\n      \n      **Step 2: Measure agreement metrics**\n      - **Recall**: Does AI find what experts\
    \ find?\n      - **Precision**: Does AI avoid false positives experts would reject?\n      - **F1 Score**: Balanced measure\
    \ of both\n      - **Win rate**: In head-to-head comparison, how often does AI match/beat expert?\n      - **Confidence\
    \ intervals**: Statistical significance of agreement\n      - Target: >80% agreement with expert judgment (ρ > 0.8 correlation)\n\
    \      \n      **Step 3: Automate with LLM-as-a-Judge**\n      - Use Amazon Nova LLM-as-a-Judge for unbiased cross-model\
    \ evaluation\n      - Use judge from *different model family* to avoid self-preference bias\n      - Version control evaluation\
    \ prompts in prompt registry\n      - Validate judge outputs against human-labeled subset periodically\n      - Integrate\
    \ into CI/CD with threshold scores (stage-gate testing)\n      \n      **Step 4: Scale with RLAIF**\n      - When expert\
    \ time is limited, use RLAIF (AI-generated feedback)\n      - Reduces SME workload by ~80% while maintaining quality\n\
    \      - Still require periodic human audit of AI judge accuracy\n      \n      **Step 5: Production validation**\n  \
    \    - Blue-green deployment: route % of traffic to new model, compare outputs\n      - Major releases: require full or\
    \ partial human evaluation before rollout\n      - Escalation-based HITL: route low-confidence outputs to human experts\n\
    \      - Monitor agreement metrics continuously in production\n      \n      **PALETTE integration:**\n      - Store Golden\
    \ Set in RIU-021 (Golden Set + Offline Evaluation Harness)\n      - Document evaluation thresholds in Success Metrics\
    \ Charter (RIU-006)\n      - Track expert disagreements as edge cases (RIU-014)\n      - Log validation results in decisions.md\
    \ when they affect deployment decisions\n      \n      Key insight: Human experts are ground truth, but they don't scale.\
    \ Use experts to calibrate automated evaluation, then automate — but always maintain human audit loop."
