- id: LIB-140
  question: How do I implement soft-label classification that avoids overconfident wrong predictions?
  answer: 'RIU-033 implements classification with three key design choices. Choice 1 — Soft Labels: instead of returning a
    single hard label, return a probability distribution across all candidate labels. This preserves uncertainty information
    that hard labels destroy. For example, instead of "category: fraud" return "fraud: 0.72, legitimate: 0.18, unclear: 0.10".
    Choice 2 — Abstention: define an explicit "abstain" option. When the highest-confidence label is below a threshold (typically
    0.6-0.7), the classifier should abstain rather than guess. Abstentions are signals, not failures — they identify cases
    that need human review, new labels, or more training data. Track abstention rate as a key metric; rising abstention often
    indicates concept drift or a new category emerging. Choice 3 — Uncertainty Logging: log the full probability distribution
    for every classification, not just the winner. This enables: (a) offline analysis of decision boundaries, (b) detection
    of bimodal distributions (the model is genuinely uncertain, not randomly noisy), (c) calibration checks (are predicted
    80% confidence cases actually correct 80% of the time?). Implementation: use LLM-based classification with logprobs enabled,
    or traditional ML classifiers with predict_proba(). For LLM-based, request structured output with a confidence field and
    validate calibration on your eval set. The most dangerous failure mode is overconfident wrong labels — mitigate by calibrating
    confidence scores against ground truth and adjusting thresholds accordingly.'
  problem_type: Human_to_System_Translation
  related_rius:
