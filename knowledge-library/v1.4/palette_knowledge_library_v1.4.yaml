- id: LIB-163
  question: How do I audit a knowledge base for coverage, duplication, staleness, and structural issues?
  answer: 'RIU-400 defines a KB audit in four dimensions. Dimension 1 — Coverage Analysis: map the KB content against the
    known query universe. Identify coverage gaps by: (a) analyzing support tickets and search queries that returned no results;
    (b) mapping KB articles against product features and finding undocumented features; (c) checking for user journey gaps
    — can a user complete their entire workflow using only KB content? Score coverage as percentage of known topics covered.
    Target: 85%+ for mature KBs. Dimension 2 — Duplication Analysis: identify articles that cover the same topic. Use embedding
    similarity to find near-duplicates (cosine similarity > 0.85). For each duplicate set: determine the authoritative article,
    merge unique information from duplicates into it, and redirect or remove duplicates. Duplication inflates search results
    and confuses users — a KB with 500 articles where 100 are duplicates performs worse than a KB with 400 unique articles.
    Dimension 3 — Staleness Analysis: for each article, check: last modified date (stale if > 6 months without review), referenced
    product versions (stale if referencing deprecated versions), broken links (indicate unmaintained content), and factual
    accuracy (spot-check 10% of articles against current product behavior). Dimension 4 — Structural Analysis: evaluate information
    architecture. Check: consistent formatting, appropriate categorization, search findability (test 20 common queries), and
    navigation paths (can users browse to relevant content?). Prioritize fixes by impact: fix high-traffic gaps before low-traffic
    staleness.'
  problem_type: Data_Semantics_and_Quality
