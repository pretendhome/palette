- id: LIB-066
  question: How do I design audit trails for AI systems that satisfy compliance requirements?
  answer: "AI audit trails must answer: \"What decision was made, by what model, with what inputs, under what configuration,\
    \ and who approved it?\" Design for both real-time monitoring and historical reconstruction.\n      \n      **What auditors\
    \ ask (design to answer these):**\n      \n      | Auditor Question | Required Data | Source |\n      |------------------|---------------|--------|\n\
    \      | \"What model made this decision?\" | Model ID, version, endpoint | Request metadata |\n      | \"What was the\
    \ input?\" | Full request payload | Request logs |\n      | \"What was the output?\" | Full response | Response logs |\n\
    \      | \"What guardrails were applied?\" | Guardrail ID, actions taken | Guardrail logs |\n      | \"Who had access?\"\
    \ | IAM principals, roles | CloudTrail |\n      | \"What configuration was active?\" | Prompts, thresholds, settings |\
    \ Config audit |\n      | \"Was human oversight applied?\" | Approval records | Workflow logs |\n      | \"Can this decision\
    \ be reproduced?\" | All inputs + config | Lineage tracking |\n      \n      **Audit log schema:**\n      \n      ```yaml\n\
    \      ai_audit_log:\n        # Request identification\n        request_id: \"uuid-v4\"\n        trace_id: \"correlation-id-for-full-trace\"\
    \n        timestamp: \"2024-06-15T10:30:00Z\"\n        \n        # Who\n        principal:\n          type: \"IAMUser\
    \ | IAMRole | ServiceAccount\"\n          arn: \"arn:aws:iam::123456789012:user/jane\"\n          source_ip: \"10.0.1.50\"\
    \n          user_agent: \"MyApp/1.0\"\n          \n        # What model\n        model:\n          model_id: \"anthropic.claude-3-sonnet\"\
    \n          endpoint: \"arn:aws:bedrock:us-east-1::foundation-model/...\"\n          inference_profile: \"customer-a-profile\"\
    \n          \n        # Configuration at time of request\n        configuration:\n          prompt_version: \"v1.2.3\"\
    \n          guardrail_id: \"guardrail-abc123\"\n          guardrail_version: \"1\"\n          system_prompt_hash: \"sha256:abc123...\"\
    \n          \n        # Input (with PII handling)\n        input:\n          type: \"text | structured\"\n          content_hash:\
    \ \"sha256:...\"  # Hash if PII\n          content: \"...\"  # Full content if permitted\n          token_count: 150\n\
    \          \n        # Output\n        output:\n          content_hash: \"sha256:...\"\n          content: \"...\"\n \
    \         token_count: 500\n          finish_reason: \"end_turn\"\n          \n        # Safety and guardrails\n     \
    \   guardrail_result:\n          action: \"NONE | BLOCKED | MODIFIED\"\n          triggered_policies:\n            - policy:\
    \ \"content-filter\"\n              severity: \"MEDIUM\"\n              action: \"allowed\"\n            - policy: \"\
    pii-filter\"\n              severity: \"HIGH\"\n              action: \"redacted\"\n              \n        # Performance\n\
    \        metrics:\n          latency_ms: 1250\n          time_to_first_token_ms: 350\n          \n        # Business context\n\
    \        context:\n          tenant_id: \"acme-corp\"\n          application: \"customer-support-bot\"\n          use_case:\
    \ \"product-inquiry\"\n          environment: \"production\"\n          \n        # Human oversight (if applicable)\n\
    \        human_oversight:\n          required: true\n          approval_status: \"approved | pending | rejected\"\n  \
    \        approver: \"arn:aws:iam::...\"\n          approval_timestamp: \"2024-06-15T10:31:00Z\"\n      ```\n      \n \
    \     **Regulatory requirements by framework:**\n      \n      | Regulation | Key Audit Requirements | Retention |\n \
    \     |------------|------------------------|-----------|\n      | **EU AI Act** | Decision traceability, risk assessments,\
    \ human oversight records | 10 years (high-risk) |\n      | **GDPR** | Data processing records, consent, right to explanation\
    \ | Duration of processing + years |\n      | **HIPAA** | Access logs, PHI handling, breach records | 6 years |\n    \
    \  | **SOX** | Financial decision audit, controls evidence | 7 years |\n      | **SOC 2** | Access controls, change management,\
    \ incident response | Per audit period |\n      | **CCPA** | Data access, deletion requests | 24 months |\n      \n  \
    \    **AWS implementation architecture:**\n      \n      ```\n      ┌─────────────────────────────────────────────────────────────┐\n\
    \      │                    AI AUDIT ARCHITECTURE                     │\n      ├─────────────────────────────────────────────────────────────┤\n\
    \      │                                                             │\n      │  ┌─────────┐        ┌─────────────────────────────────┐\
    \    │\n      │  │ Bedrock │───────▶│ CloudWatch Logs (Request/Response)│   │\n      │  │  API    │        └─────────────────────────────────┘\
    \    │\n      │  └────┬────┘                      │                        │\n      │       │                        \
    \   ▼                        │\n      │       │              ┌─────────────────────────────────┐   │\n      │       │\
    \              │   S3 (Long-term retention)       │   │\n      │       │              │   - Immutable (Object Lock)  \
    \    │   │\n      │       │              │   - Lifecycle policies           │   │\n      │       │              └─────────────────────────────────┘\
    \   │\n      │       │                                                     │\n      │       ▼                        \
    \                             │\n      │  ┌─────────────────────────────────────────────────────┐   │\n      │  │    \
    \      CloudTrail (API Activity)                   │   │\n      │  │  - All Bedrock API calls                        \
    \    │   │\n      │  │  - IAM actions                                       │   │\n      │  │  - Config changes      \
    \                              │   │\n      │  └─────────────────────────────────────────────────────┘   │\n      │  \
    \                                                           │\n      │  ┌─────────────────────────────────────────────────────┐\
    \   │\n      │  │          AWS Audit Manager                           │   │\n      │  │  - GenAI best practices framework\
    \                    │   │\n      │  │  - Evidence collection                               │   │\n      │  │  - Compliance\
    \ reports                                │   │\n      │  └─────────────────────────────────────────────────────┘   │\n\
    \      │                                                             │\n      └─────────────────────────────────────────────────────────────┘\n\
    \      ```\n      \n      **Immutability and tamper-proofing:**\n      \n      ```yaml\n      immutability_controls:\n\
    \        s3_object_lock:\n          mode: \"GOVERNANCE\"  # or COMPLIANCE for stricter\n          retention_period: \"\
    7 years\"\n          purpose: \"Prevent deletion/modification\"\n          \n        cloudtrail:\n          log_file_validation:\
    \ true  # Digest files for integrity\n          kms_encryption: true\n          multi_region: true\n          \n     \
    \   access_controls:\n          write: \"Automated systems only (no human write access)\"\n          read: \"Auditors\
    \ + compliance team\"\n          delete: \"Requires compliance approval + waiting period\"\n          \n        integrity_verification:\n\
    \          - \"CloudTrail digest validation\"\n          - \"S3 object lock prevents modification\"\n          - \"Checksums\
    \ on all log entries\"\n      ```\n      \n      **Audit Manager GenAI framework (8 principles):**\n      \n      ```yaml\n\
    \      audit_manager_framework:\n        framework_id: \"generative-ai-best-practices\"\n        \n        control_sets:\n\
    \          accuracy:\n            - \"Model evaluation results documented\"\n            - \"Golden set test scores tracked\"\
    \n            \n          fairness:\n            - \"Bias testing conducted\"\n            - \"Demographic parity monitored\"\
    \n            \n          privacy:\n            - \"PII handling documented\"\n            - \"Data retention policies\
    \ enforced\"\n            \n          resilience:\n            - \"Failover tested\"\n            - \"Recovery procedures\
    \ documented\"\n            \n          explainability:\n            - \"Decision rationale logged\"\n            - \"\
    Model cards available\"\n            \n          safety:\n            - \"Guardrails configured\"\n            - \"Content\
    \ filtering active\"\n            \n          security:\n            - \"Access controls implemented\"\n            -\
    \ \"Encryption enabled\"\n            \n          sustainability:\n            - \"Resource usage tracked\"\n        \
    \    - \"Efficiency optimizations documented\"\n      ```\n      \n      **Query and retrieval patterns:**\n      \n \
    \     ```yaml\n      audit_queries:\n        # Common audit queries\n        by_user:\n          query: \"SELECT * FROM\
    \ audit_logs WHERE principal.arn = ?\"\n          use_case: \"Investigate user activity\"\n          \n        by_time_range:\n\
    \          query: \"SELECT * FROM audit_logs WHERE timestamp BETWEEN ? AND ?\"\n          use_case: \"Incident investigation\"\
    \n          \n        by_decision_outcome:\n          query: \"SELECT * FROM audit_logs WHERE output.content LIKE '%denied%'\"\
    \n          use_case: \"Review negative decisions\"\n          \n        guardrail_triggers:\n          query: \"SELECT\
    \ * FROM audit_logs WHERE guardrail_result.action != 'NONE'\"\n          use_case: \"Safety review\"\n          \n   \
    \     tools:\n          - \"Amazon Athena (S3 queries)\"\n          - \"CloudWatch Logs Insights\"\n          - \"OpenSearch\
    \ (full-text search)\"\n      ```\n      \n      **High-risk AI (EU AI Act) additional requirements:**\n      \n     \
    \ ```yaml\n      high_risk_ai_audit:\n        required_documentation:\n          - \"Risk management system documentation\"\
    \n          - \"Data governance records\"\n          - \"Technical documentation\"\n          - \"Conformity assessment\"\
    \n          - \"Human oversight procedures\"\n          \n        logging_requirements:\n          - \"All decisions affecting\
    \ individuals\"\n          - \"Modifications to the system\"\n          - \"Performance monitoring data\"\n          \n\
    \        retention: \"10 years minimum\"\n        \n        access_for_authorities:\n          - \"Must be provided on\
    \ request\"\n          - \"Readable format\"\n          - \"Complete traceability\"\n      ```\n      \n      **PALETTE\
    \ integration:**\n      - Define audit requirements in RIU-530 (AI Governance Config)\n      - Configure logging in RIU-531\
    \ (Guardrail Selection)\n      - Document in RIU-140 (Training Materials) for compliance team\n      - Track in RIU-534\
    \ (Audit Trail Config)\n      \n      Key insight: Design audit trails for reconstruction, not just recording. An auditor\
    \ should be able to take any AI decision and reconstruct exactly why it happened — model version, configuration, inputs,\
    \ and any human oversight. If you can't reproduce it, you can't defend it."
