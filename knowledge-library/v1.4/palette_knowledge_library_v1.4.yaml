- id: LIB-092
  question: How does agent maturity progression work in Palette?
  answer: "Palette uses a three-tier maturity model based on empirical reliability:\n\n**Tier 1: UNVALIDATED**\n- **Status**:\
    \ New agent, unproven\n- **Behavior**: Human-in-the-loop required for EACH execution\n- **Promotion**: 10 consecutive\
    \ successes\n- **Use when**: Agent just created, major version bump (V1→V2)\n\n**Tier 2: WORKING**\n- **Status**: Proven\
    \ reliable, but monitored\n- **Behavior**: Autonomous execution with review\n- **Promotion**: 50 impressions with <5%\
    \ failure rate\n- **Demotion**: Failure occurs while fail_gap ≤ 9 → demote to Tier 1\n- **Use when**: Agent works but\
    \ needs validation at scale\n\n**Tier 3: PRODUCTION**\n- **Status**: Fully trusted, autonomous\n- **Behavior**: Fully\
    \ autonomous until failure\n- **Demotion**: Two failures within any 10 impressions (fail_gap ≤ 9) → demote to Tier 2\n\
    - **Use when**: Agent has proven reliability over time\n\n**Tracking Format** (in decisions.md):\n```\nagent: researcher\n\
    ark_type: Researcher\nversion: 1.0\nstatus: UNVALIDATED\nimpressions:\n  success: 0\n  fail: 0\n  fail_gap: 0\nnotes:\
    \ First agent implementation\n```\n\n**On Success**:\n- Increment `success` count\n- Increment `fail_gap` (runs since\
    \ last failure)\n- Check promotion criteria\n\n**On Failure**:\n- If `fail_gap ≤ 9`: Demote per tier rules\n- Set `fail_gap\
    \ = 0`\n- Increment `fail` count\n- Log post-mortem in decisions.md\n\n**Versioning Impact**:\n- **Major bump** (V1.0\
    \ → V2.0): Resets impressions + fail_gap, back to UNVALIDATED\n- **Minor bump** (V1.0 → V1.1): Preserves impressions +\
    \ fail_gap\n\n**Key Insight**: Maturity is about measured trust, not function. A simple agent at PRODUCTION is more valuable\
    \ than a complex agent at UNVALIDATED.\n\n**Current Palette status** (as of implementation):\n- Researcher: 1 success,\
    \ 0 failures, UNVALIDATED (needs 9 more successes)\n- Architect: 0 executions, UNVALIDATED (awaiting first use)\n"
