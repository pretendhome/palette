- id: LIB-142
  question: How do I manage configuration and environment parity to prevent the "works in staging, fails in production" problem?
  answer: 'RIU-065 addresses configuration management through three practices. Practice 1 — Single Source of Configuration:
    store all configuration in version-controlled files (not environment variables alone). Use a layered config approach:
    base config (shared across all environments) + environment overlay (env-specific overrides). Tools: AWS Systems Manager
    Parameter Store, HashiCorp Vault for secrets, or simple YAML files with environment prefixes. Never hardcode configuration
    in application code. Practice 2 — Environment Parity Checks: write automated checks that compare configuration across
    environments (dev, staging, production). For each config key, categorize as: must-match (e.g., schema versions, feature
    flags), intentionally-different (e.g., database URLs, API endpoints), or environment-specific (e.g., log levels, debug
    flags). Alert on any must-match key that differs between staging and production. Practice 3 — Explicit Difference Documentation:
    maintain a living document that lists every intentional difference between environments. If a difference is not documented,
    it is a bug. Common failure modes: (a) undocumented environment variables that exist in production but not staging — catch
    with config key enumeration; (b) secrets rotation that updates production but not staging; (c) model version pinning that
    differs across environments — use the same version pinning mechanism everywhere. For AI systems specifically: model version,
    prompt template version, and guardrail configuration must be environment-parity checked.'
  problem_type: Operationalization_and_Scaling
  related_rius:
