- id: LIB-030
  question: How do I handle schema mismatches between AI output and legacy system input?
  answer: "Schema mismatches are inevitable when connecting AI (flexible, evolving) to legacy (rigid, stable). Use a transformation\
    \ layer with validation at boundaries.\n      \n      **Architecture pattern: Transformation Layer**\n      ```\n    \
    \  AI Service → [Transformation Layer] → Legacy System\n                         ↓\n                   - Schema mapping\n\
    \                   - Field conversion\n                   - Validation\n                   - Default values\n       \
    \            - Error handling\n      ```\n      \n      **Mismatch types and solutions:**\n      \n      | Mismatch Type\
    \ | Example | Solution |\n      |---------------|---------|----------|\n      | Field naming | `aiRiskScore` vs `RISK_SCORE`\
    \ | Field mapping in transformation |\n      | Data types | String \"123\" vs Integer 123 | Type coercion with validation\
    \ |\n      | Missing fields | AI omits optional field | Default values or null handling |\n      | Extra fields | AI adds\
    \ fields legacy ignores | Filter to expected schema |\n      | Format differences | JSON vs XML | API Gateway + Lambda\
    \ transformation |\n      | Nested vs flat | `{address: {city}}` vs `address_city` | Flatten/unflatten logic |\n     \
    \ | Enum mismatches | \"HIGH\" vs \"3\" | Lookup table conversion |\n      \n      **Control AI output schema (prevent\
    \ mismatches at source):**\n      - **Amazon Nova constrained decoding**: Define output schema in tool configuration,\
    \ use Converse API\n      - **Prompt templates as contracts**: Enforce output format in system prompt\n      - **JSON\
    \ mode**: Request structured JSON output matching legacy schema\n      ```python\n      # Nova constrained output example\n\
    \      tool_config = {\n          \"output_schema\": {\n              \"type\": \"object\",\n              \"properties\"\
    : {\n                  \"RISK_SCORE\": {\"type\": \"integer\", \"minimum\": 0, \"maximum\": 100},\n                  \"\
    CATEGORY_CODE\": {\"type\": \"string\", \"enum\": [\"A\", \"B\", \"C\"]}\n              },\n              \"required\"\
    : [\"RISK_SCORE\", \"CATEGORY_CODE\"]\n          }\n      }\n      ```\n      \n      **Transformation implementation\
    \ (AWS):**\n      - **Simple transformations**: API Gateway mapping templates (no code)\n      - **Complex transformations**:\
    \ Lambda function between AI and legacy\n      - **Streaming data**: Glue Schema Registry for validation + SerDe for conversion\n\
    \      - **Batch data**: Glue ETL jobs with schema mapping\n      \n      **Validation at boundaries (AWS Glue Data Quality):**\n\
    \      - Schema matching: Output conforms to expected structure\n      - Referential integrity: Foreign keys exist in\
    \ legacy system\n      - Data type validation: Values within expected ranges\n      - Completeness: Required fields present\n\
    \      ```\n      Rules: [\n        SchemaMatch \"ai_output\" \"legacy_input_schema\",\n        ColumnValues \"RISK_SCORE\"\
    \ between 0 and 100,\n        IsComplete \"ORDER_ID\",\n        ReferentialIntegrity \"CUSTOMER_ID\" \"legacy.customers.id\"\
    \n      ]\n      ```\n      \n      **Error handling for mismatches:**\n      1. **Validation failure**: Log error with\
    \ details, route to DLQ\n      2. **Transformation failure**: Return clear error message, don't fail silently\n      3.\
    \ **Partial success**: Decide policy — reject entire record or accept partial?\n      4. **Unknown fields**: Log warning,\
    \ strip and continue (don't break on extras)\n      \n      **Testing schema compatibility (RIU-080):**\n      - Contract\
    \ tests validate transformation outputs\n      - Test with edge cases: nulls, empty strings, boundary values\n      -\
    \ Test with malformed AI outputs (defensive)\n      - Regression tests when either schema changes\n      \n      **PALETTE\
    \ integration:**\n      - Document schema mappings in RIU-011 (Data Contract Freeze)\n      - Validate with RIU-084 (Data\
    \ Quality Checks)\n      - Test transformations with RIU-080 (Contract Tests)\n      - Track schema changes as potential\
    \ ONE-WAY DOORs\n      \n      Key insight: Don't trust AI output blindly — validate at the boundary before sending to\
    \ legacy. Constrained decoding prevents most mismatches; transformation layer handles the rest."
