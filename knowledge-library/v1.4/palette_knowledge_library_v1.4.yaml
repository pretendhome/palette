- id: LIB-012
  question: What's the checklist for 'good enough' convergence before moving to architecture?
  answer: "Use this checklist before proceeding from Convergence to Architecture phase. All items should be documented or\
    \ explicitly marked \"N/A with rationale.\"\n      \n      **Semantic Blueprint Complete (RIU-001):**\n      - [ ] Goal:\
    \ Measurable business outcome stated (not technical metric)\n      - [ ] Roles: Decision authority clear (RACI-lite, RIU-002)\n\
    \      - [ ] Capabilities: Required tools/agents identified\n      - [ ] Constraints: Hard boundaries documented (budget,\
    \ compliance, timeline)\n      - [ ] Non-goals: Explicit exclusions prevent scope creep\n      \n      **Stakeholder Alignment:**\n\
    \      - [ ] No conflicting definitions of success remain\n      - [ ] Executive sponsor identified and committed\n  \
    \    - [ ] Non-technical stakeholders can explain the goal back to you\n      - [ ] Sign-off obtained on Convergence Brief\n\
    \      \n      **Risk & Constraints Surfaced (RIU-007, RIU-008):**\n      - [ ] ONE-WAY DOOR decisions identified and\
    \ flagged (RIU-003)\n      - [ ] Compliance requirements assessed (HIPAA, GDPR, EU AI Act)\n      - [ ] Data governance\
    \ framework confirmed (critical ONE-WAY DOOR)\n      - [ ] Hidden constraints discovered (see LIB-008 questions)\n   \
    \   - [ ] Assumptions documented with validation plan\n      \n      **Technical Readiness:**\n      - [ ] Proof of value\
    \ demonstrated (PoC exit criteria met)\n      - [ ] Data availability and quality confirmed\n      - [ ] Proven architectural\
    \ patterns identified (e.g., RAG vs. fine-tuning)\n      - [ ] Unit economics estimated (cost per request, token usage)\n\
    \      \n      **AWS Phase Gate Alignment:**\n      Per Gen AI Adoption framework: Use Case Discovery ✓ → Business Case\
    \ with Success Criteria ✓ → Data/Model Foundation → Security/Compliance → Responsible AI → Development → Deployment\n\
    \      \n      **Gate criteria:** If any checkbox is incomplete and not \"N/A with rationale,\" you haven't converged\
    \ — return to discovery."
