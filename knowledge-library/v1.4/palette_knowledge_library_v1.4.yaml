- id: LIB-018
  question: What's the difference between deterministic rules and probabilistic AI for business logic?
  answer: "**Deterministic rules (Automated Reasoning):**\n      - Uses formal logic and mathematical proofs\n      - 100%\
    \ accuracy when assumptions are correct\n      - Outputs: valid / invalid / satisfiable with explanation\n      - Best\
    \ for: yes/no questions, always/never policies, compliance validation\n      - Examples: HR policies, regulations, operational\
    \ workflows, access control\n      - AWS tool: Automated Reasoning checks in Amazon Bedrock Guardrails (translates up\
    \ to 100-page policy docs into logical models)\n      - Tradeoff: Requires well-defined rules; struggles with novel situations;\
    \ maintenance burden as rules multiply\n      \n      **Probabilistic AI (Machine Learning):**\n      - Uses statistical\
    \ patterns from data\n      - Generalized predictions, not 100% accurate\n      - Outputs: predictions with confidence\
    \ scores\n      - Best for: pattern recognition, unstructured data, complex decisions with many variables\n      - Examples:\
    \ fraud detection, demand forecasting, sentiment analysis, recommendations\n      - Tradeoff: Less explainable; requires\
    \ training data; may produce unexpected outputs\n      \n      **When to use which:**\n      | Scenario | Use Deterministic\
    \ | Use Probabilistic |\n      |----------|-------------------|-------------------|\n      | \"Is this allowed by policy?\"\
    \ | ✅ | |\n      | \"What's the risk score?\" | | ✅ |\n      | \"Does this meet compliance?\" | ✅ | |\n      | \"What\
    \ will customer likely do?\" | | ✅ |\n      | \"Is this data valid?\" | ✅ | |\n      | \"What's the best response?\" |\
    \ | ✅ |\n      \n      **Hybrid architecture (recommended):**\n      Use RIU-023 (Deterministic-First Pipeline Split):\n\
    \      1. **Deterministic layer first**: Validate inputs, check policy compliance, apply business rules\n      2. **Probabilistic\
    \ layer second**: AI handles ambiguous cases, generates content, makes predictions\n      3. **Deterministic guardrails\
    \ around AI**: Validate AI outputs against rules before returning\n      \n      Key insight: Deterministic rules tell\
    \ you what's *allowed*; probabilistic AI tells you what's *likely*. Use both — rules as guardrails, AI for judgment."
  problem_type: Human_to_System_Translation
