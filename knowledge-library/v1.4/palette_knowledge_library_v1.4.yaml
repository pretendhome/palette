  evaluation_signal: 'Three quantitative thresholds signal pilot-to-scale readiness: unit economics stable, error rate below
    5%, and HITL intervention rate declining over 3+ consecutive weeks. Any still volatile means scale risk is high.'
- id: LIB-061
  question: How do I design AI systems that work across regions with different regulations?
  answer: "Multi-region AI compliance requires architecture that respects data boundaries while enabling global operations.\
    \ Design for the strictest regulation, then relax where permitted.\n      \n      **Key regulatory landscape:**\n    \
    \  \n      | Region | Key Regulation | Key Requirements |\n      |--------|----------------|------------------|\n    \
    \  | **EU** | EU AI Act (Aug 2024), GDPR | Risk classification, data residency, transparency |\n      | **US** | State\
    \ laws (CA, CO), sector rules | Varies by state and sector |\n      | **UK** | UK GDPR, AI framework | Similar to EU but\
    \ diverging |\n      | **APAC** | Country-specific (PDPA, etc.) | Data localization requirements vary |\n      | **Global**\
    \ | ISO IEC 42001 | AI management system standard |\n      \n      **Architecture decision framework:**\n      \n    \
    \  ```\n      For each region, determine:\n      \n      1. CAN data leave this region?\n         ├── YES → Can use cross-region\
    \ inference\n         └── NO → Need local processing\n         \n      2. WHAT data is restricted?\n         ├── All data\
    \ → Fully local architecture\n         ├── PII only → Anonymize before cross-region\n         └── Specific categories\
    \ → Selective routing\n         \n      3. WHAT AI risk level applies?\n         ├── High-risk (EU AI Act) → Additional\
    \ requirements\n         └── Limited/minimal risk → Standard controls\n      ```\n      \n      **Architecture patterns\
    \ by compliance requirement:**\n      \n      **Pattern 1: Cross-Region Inference (CRIS)**\n      ```\n      Best for:\
    \ Performance optimization with compliance\n      \n      ┌─────────────────────────────────────────────────────────┐\n\
    \      │                    GLOBAL USERS                         │\n      └─────────────────────────────────────────────────────────┘\n\
    \                              │\n                    ┌─────────┴─────────┐\n                    │   CRIS Profile    │\n\
    \                    │  (Geographic/EU)  │\n                    └─────────┬─────────┘\n                              │\n\
    \          ┌───────────────────┼───────────────────┐\n          ▼                   ▼                   ▼\n      ┌─────────┐\
    \       ┌─────────┐       ┌─────────┐\n      │ EU-West │       │EU-Central│       │  EU-N   │\n      │ Region  │     \
    \  │  Region  │       │ Region  │\n      └─────────┘       └─────────┘       └─────────┘\n      \n      Data stays within\
    \ EU, inference distributed for availability\n      ```\n      \n      ```yaml\n      cris_configuration:\n        profile_type:\
    \ \"geographic\"  # or \"global\"\n        \n        geographic_eu:\n          regions: [\"eu-west-1\", \"eu-central-1\"\
    , \"eu-north-1\"]\n          use_case: \"EU data residency required\"\n          data_flow: \"Data stays in EU regions\
    \ only\"\n          \n        global:\n          regions: [\"all available\"]\n          use_case: \"No data residency\
    \ restrictions\"\n          data_flow: \"Routed to optimal region\"\n          \n        security:\n          - \"Data\
    \ encrypted in transit\"\n          - \"Temporary processing only\"\n          - \"No persistent storage in destination\"\
    \n      ```\n      \n      **Pattern 2: Fully Local RAG (Outposts)**\n      ```\n      Best for: Strictest data residency\
    \ requirements\n      \n      ┌─────────────────────────────────────────────────────────┐\n      │                  CUSTOMER\
    \ DATACENTER                     │\n      │  ┌─────────────────────────────────────────────────┐    │\n      │  │    \
    \          AWS OUTPOSTS                        │    │\n      │  │  ┌──────────┐  ┌──────────┐  ┌──────────┐      │   \
    \ │\n      │  │  │ Bedrock  │  │ Knowledge│  │  Vector  │      │    │\n      │  │  │  Agent   │  │   Base   │  │   DB\
    \     │      │    │\n      │  │  └──────────┘  └──────────┘  └──────────┘      │    │\n      │  │                    \
    \                              │    │\n      │  │  All AI processing on-premises                   │    │\n      │  └─────────────────────────────────────────────────┘\
    \    │\n      └─────────────────────────────────────────────────────────┘\n      \n      Data never leaves customer premises\n\
    \      ```\n      \n      **Pattern 3: Hybrid RAG (Regional + Edge)**\n      ```\n      Best for: Balance of capability\
    \ and compliance\n      \n      ┌─────────────────────────────────────────────────────────┐\n      │                 \
    \   AWS CLOUD (EU)                        │\n      │  ┌──────────┐  ┌──────────┐                            │\n      │\
    \  │ Bedrock  │  │ Non-PII  │  ← General knowledge       │\n      │  │ Agents   │  │   KB     │                      \
    \      │\n      │  └────┬─────┘  └──────────┘                            │\n      └───────┼─────────────────────────────────────────────────┘\n\
    \              │\n              │ Orchestration (no PII)\n              │\n      ┌───────┼─────────────────────────────────────────────────┐\n\
    \      │       ▼           CUSTOMER EDGE                         │\n      │  ┌──────────┐  ┌──────────┐              \
    \              │\n      │  │ Local    │  │  PII     │  ← Sensitive data local    │\n      │  │ LLM      │  │   KB    \
    \ │                            │\n      │  └──────────┘  └──────────┘                            │\n      └─────────────────────────────────────────────────────────┘\n\
    \      \n      PII stays local, non-sensitive leverages cloud\n      ```\n      \n      **Per-region configuration:**\n\
    \      \n      ```yaml\n      regional_configuration:\n        eu:\n          data_residency: \"strict\"\n          inference_profile:\
    \ \"geographic-eu\"\n          knowledge_base_location: \"eu-west-1\"\n          logging_region: \"eu-west-1\"\n     \
    \     pii_handling: \"process locally, anonymize before cross-region\"\n          ai_act_risk_level: \"determine per use\
    \ case\"\n          required_controls:\n            - \"Human oversight for high-risk\"\n            - \"Transparency\
    \ documentation\"\n            - \"Bias monitoring\"\n            \n        us:\n          data_residency: \"sector-dependent\"\
    \n          inference_profile: \"geographic-us\" # or global\n          knowledge_base_location: \"us-east-1\"\n     \
    \     logging_region: \"us-east-1\"\n          pii_handling: \"varies by state (CCPA, etc.)\"\n          \n        apac_singapore:\n\
    \          data_residency: \"strict (PDPA)\"\n          inference_profile: \"geographic-apac\"\n          knowledge_base_location:\
    \ \"ap-southeast-1\"\n          required_controls:\n            - \"Data transfer agreements\"\n            - \"Local\
    \ representative\"\n      ```\n      \n      **Data flow controls:**\n      \n      ```yaml\n      data_flow_controls:\n\
    \        # IAM policies\n        iam_policies:\n          - name: \"RestrictCRISToEU\"\n            effect: \"Deny\"\n\
    \            action: \"bedrock:InvokeModel\"\n            condition:\n              StringNotEquals:\n               \
    \ \"bedrock:InferenceProfileArn\": \"arn:aws:bedrock:*:*:inference-profile/eu.*\"\n                \n        # Service\
    \ Control Policies (SCPs)\n        scps:\n          - name: \"EnforceEUDataResidency\"\n            target: \"EU Organization\
    \ Units\"\n            policy:\n              - deny_regions_outside: [\"eu-west-1\", \"eu-central-1\", \"eu-north-1\"\
    ]\n              - deny_global_inference: true\n              \n        # Network controls\n        network:\n       \
    \   - vpc_endpoints: \"Use PrivateLink, no internet\"\n          - nacls: \"Restrict outbound to approved regions\"\n\
    \      ```\n      \n      **EU AI Act compliance checklist:**\n      \n      ```yaml\n      eu_ai_act_compliance:\n  \
    \      risk_classification:\n          - task: \"Classify AI system risk level\"\n            categories: [\"Unacceptable\"\
    , \"High-risk\", \"Limited\", \"Minimal\"]\n            action: \"Document classification rationale\"\n            \n\
    \        high_risk_requirements:\n          - \"Risk management system\"\n          - \"Data governance\"\n          -\
    \ \"Technical documentation\"\n          - \"Record-keeping\"\n          - \"Transparency\"\n          - \"Human oversight\"\
    \n          - \"Accuracy, robustness, cybersecurity\"\n          \n        transparency_requirements:\n          - \"\
    Inform users they're interacting with AI\"\n          - \"Label AI-generated content\"\n          - \"Provide AI Service\
    \ Cards\"\n          \n        aws_support:\n          - \"ISO IEC 42001 certification\"\n          - \"AI Service Cards\"\
    \n          - \"Frontier model safety framework\"\n          - \"EU AI Pact signatory\"\n      ```\n      \n      **Compliance\
    \ monitoring:**\n      \n      ```yaml\n      compliance_monitoring:\n        automated_checks:\n          - \"Data flow\
    \ logging (CloudTrail)\"\n          - \"Region compliance (AWS Config rules)\"\n          - \"Model usage tracking (inference\
    \ profiles)\"\n          - \"Guardrail effectiveness\"\n          \n        regular_audits:\n          - \"Quarterly compliance\
    \ review\"\n          - \"Annual third-party audit\"\n          - \"Regulatory update tracking\"\n          \n       \
    \ alerts:\n          - \"Data flow outside approved regions\"\n          - \"Unapproved model access\"\n          - \"\
    Guardrail bypass attempts\"\n      ```\n      \n      **PALETTE integration:**\n      - Document regional requirements\
    \ in RIU-530 (AI Governance Config)\n      - Configure guardrails per region in RIU-531 (Guardrail Selection)\n      -\
    \ Track compliance in RIU-120 (Integration Mode Selection)\n      - Include in Deployment Readiness (RIU-060) for each\
    \ region\n      \n      Key insight: Design for the strictest regulation first (usually EU), then relax controls where\
    \ other regions permit. It's easier to loosen restrictions than to retrofit compliance into a permissive architecture."
