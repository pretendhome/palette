- id: LIB-171
  question: How do I implement context compaction for long engagements to maintain continuity across sessions?
  answer: 'RIU-607 defines the COMPACT protocol for preserving engagement state when approaching context window limits. Trigger:
    initiate compaction when context usage exceeds 70% of the window, or at any natural session break in a multi-phase engagement.
    Phase 1 — Memory Flush: extract all canonical facts from the current session and write them to MEMORY.md. Canonical facts
    include: key decisions made (with rationale), current phase and status, numeric values that must not drift (metrics, counts,
    IDs), relationships between entities, and any corrections or clarifications from earlier in the session. Apply the "would
    a new person need this?" test — if yes, it goes in MEMORY.md. Phase 2 — Daily Log: write a daily log entry with: date,
    what was accomplished, what is in progress, blockers, and a continuation note. The continuation note answers: "If this
    session ends right now, what should the next session do first?" It must be specific: "Resume at Phase 3, Step 2 — the
    extraction schema is defined but the eval set has not been built yet. The schema is at artifacts/extraction_schema.json."
    Phase 3 — Decision Update: update decisions.md with any new decisions, including one-way door flags (RIU-003). Phase 4
    — Next Session Start: the next session must read MEMORY.md + latest daily log + decisions.md before touching any phase
    artifacts. This three-file read is the minimum context needed to resume without regression. The two most common continuity
    failures: (1) number drift — metrics mentioned in conversation diverge from documented values over multiple sessions;
    (2) lost operational context — the "why" behind a decision is forgotten, leading to re-litigation. Both are prevented
    by consistent compaction discipline.'
  problem_type: Operationalization_and_Scaling
