- id: LIB-028
  question: How do I version APIs when both AI and legacy systems depend on them?
  answer: "API versioning with mixed consumers (AI + legacy) requires balancing innovation speed with stability. Use a combination\
    \ of versioning strategy, compatibility layers, and clear deprecation policies.\n      \n      **Versioning strategies:**\n\
    \      | Strategy | Example | Pros | Cons | Best For |\n      |----------|---------|------|------|----------|\n      |\
    \ URL Path | `/v1/orders`, `/v2/orders` | Clear, cacheable | URL proliferation | Public APIs |\n      | Header | `X-API-Version:\
    \ 2` | Clean URLs | Hidden versioning | Internal APIs |\n      | Query Param | `/orders?version=2` | Easy to test | Cache\
    \ complications | Debug/testing |\n      \n      **Recommended: Header-based with CloudFront + Lambda@Edge**\n      -\
    \ Route requests to different backends based on `X-API-Version` header\n      - Store version configuration in DynamoDB,\
    \ cache in Lambda@Edge\n      - Preserve clean URLs while supporting multiple versions\n      \n      **Compatibility\
    \ layer (API Gateway mapping templates):**\n      - Transform requests/responses to maintain compatibility\n      - Backend\
    \ can evolve while old consumers see consistent interface\n      - Clone API to create v2, use mapping templates to bridge\
    \ differences\n      - Both versions coexist, consumers migrate on their schedule\n      \n      **Version lifecycle (adapt\
    \ Kubernetes model):**\n      1. **Alpha**: Experimental, may change without notice, AI services only\n      2. **Beta**:\
    \ Stable interface, may have bugs, early adopters\n      3. **Stable**: Production-ready, backward-compatible changes\
    \ only\n      4. **Deprecated**: Still works, sunset date announced, warnings emitted\n      5. **Removed**: No longer\
    \ available\n      \n      **Deprecation policy:**\n      - Announce deprecation minimum 6 months before removal (longer\
    \ for legacy)\n      - Emit deprecation warnings in response headers\n      - Provide migration guide and tooling to identify\
    \ deprecated usage\n      - Monitor deprecated endpoint usage — don't remove until traffic drops\n      - Document in\
    \ API changelog and notify consumers directly\n      \n      **AI-specific considerations:**\n      - AI outputs may be\
    \ non-deterministic — version the *contract*, not the exact output\n      - Include model version in response metadata\
    \ for debugging\n      - AI services can consume newer versions faster — use them as early adopters\n      - Legacy systems\
    \ need longer deprecation windows — plan accordingly\n      \n      **Implementation with AWS:**\n      - **API Gateway**:\
    \ Create separate stages or cloned APIs per version\n      - **CloudFront + Lambda@Edge**: Route based on headers\n  \
    \    - **Mapping templates**: Transform between versions without backend changes\n      - **Strangler pattern**: Facade\
    \ provides uniform access during migration\n      \n      **PALETTE integration:**\n      - Document API versions in RIU-016\
    \ (API Contract Review + Versioning Plan)\n      - Track breaking changes as ONE-WAY DOORs in Decision Log (RIU-003)\n\
    \      - Define deprecation timeline in Constraint Profile (RIU-007)\n      - Test all supported versions with RIU-080\
    \ (Contract Tests)\n      \n      Key insight: Legacy systems can't upgrade quickly — maintain N-1 (or N-2) version support.\
    \ AI systems can move faster — use them to validate new versions before legacy consumers migrate."
