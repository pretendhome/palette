- id: LIB-122
  question: How do I build a PII redaction pipeline for AI training data and inference inputs?
  answer: Use a dedicated PII detection library — Microsoft Presidio (open-source, supports custom recognizers, runs on-premise)
    or AWS Comprehend PII (managed, pay-per-request). For AI pipelines, redact PII before it enters the LLM context window
    — this is a guardrail, not a post-processing step. Build a three-layer pipeline — detection (find PII entities), classification
    (determine sensitivity level), and action (redact, mask, or tokenize based on policy). Use entity-level redaction (replace
    names with consistent pseudonyms) rather than full removal to preserve semantic meaning for the model. Test with adversarial
    inputs — PII detectors miss embedded PII in code snippets, URLs, and structured data. AWS Comprehend PII detection is
    free when used with Bedrock Guardrails.
