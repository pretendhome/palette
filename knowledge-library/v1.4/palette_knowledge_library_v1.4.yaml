- id: LIB-138
  question: How do I design a tool-calling safety envelope for AI agents that limits blast radius while preserving utility?
  answer: 'RIU-029 defines four safety layers for agent tool calling. Layer 1 — Tool Allowlist: enumerate every tool the agent
    can call. Each tool entry includes: name, description, parameter schema, rate limit (calls per minute), cost ceiling (per
    call and per session), and data classification (what sensitivity level of data the tool can access). Any tool not on the
    allowlist is denied by default. Layer 2 — Parameter Validation: before executing a tool call, validate parameters against
    the schema. Reject calls with unexpected parameters, out-of-range values, or injection patterns (e.g., SQL injection in
    a database query tool). Layer 3 — Redaction: apply output redaction rules to tool responses before returning them to the
    agent. PII, credentials, and internal system details must be redacted from tool outputs. Cross-reference with RIU-012
    (PII/Compliance Triage). Layer 4 — Audit Trail: log every tool call with timestamp, agent_id, tool_name, parameters (redacted),
    response_code, and latency. This audit trail is required for compliance and debugging. Anthropic''s guidance on building
    effective agents emphasizes that tool calls are the highest-risk surface area in agentic systems. The safety envelope
    must be a ONE-WAY DOOR decision: once defined, it should only be relaxed through a formal review process (RIU-087). Rate
    limits prevent runaway costs; cost ceilings prevent individual expensive operations; the allowlist prevents capability
    creep.'
