- id: LIB-016
  question: What prompt engineering patterns work for translating policy documents into LLM behavior?
  answer: "Use a layered approach combining prompt structure, guardrails, and validation:\n      \n      **Prompt structure\
    \ for policies:**\n      - **System prompt**: Set role and global constraints (\"You are a compliance assistant. Never\
    \ provide advice that violates [Policy X].\")\n      - **Context section**: Include relevant policy excerpts (use RAG\
    \ for large policy corpora)\n      - **Instruction**: Specific task with policy reference (\"Answer the user's question\
    \ following Section 3.2 guidelines\")\n      - **Constraints**: Explicit prohibitions (\"Do NOT discuss [prohibited topics].\
    \ If asked, respond with [approved deflection].\")\n      - **Examples**: Few-shot samples showing compliant vs. non-compliant\
    \ responses\n      \n      **Parameter settings for compliance:**\n      - Temperature: 0.0-0.3 (prioritize consistency\
    \ over creativity)\n      - Top_p: 0.5-0.7 (restrict output variance)\n      - Use deterministic settings for policy-critical\
    \ responses\n      \n      **Guardrails layer (Amazon Bedrock Guardrails):**\n      - Content filters for harmful/inappropriate\
    \ content\n      - Denied topics aligned with policy prohibitions\n      - Word filters for restricted terminology\n \
    \     - Sensitive information filters (PII/PHI detection and masking)\n      - IAM policy-based enforcement for mandatory\
    \ guardrails on every inference call\n      \n      **Validation approach:**\n      - **Positive testing**: Legitimate\
    \ policy-compliant queries pass correctly\n      - **Negative testing**: Prohibited content/topics are blocked\n     \
    \ - Test edge cases where policies conflict or are ambiguous\n      - Version control prompts (RIU-520) for audit trail\
    \ and controlled updates\n      \n      **PALETTE integration:**\n      - Document policy-to-prompt mapping in RIU-022\
    \ (Prompt Interface Contract)\n      - Store prompt versions in RIU-520 (Prompt Version Control)\n      - Define guardrail\
    \ requirements in Constraint Profile (RIU-007)\n      - Flag policy interpretations that are ONE-WAY DOORs (require legal/compliance\
    \ sign-off)\n      \n      Key insight: Prompts alone aren't sufficient — use Bedrock Guardrails as a defense-in-depth\
    \ layer that enforces policies even if prompts are bypassed or jailbroken."
  problem_type: Human_to_System_Translation
