- id: LIB-158
  question: How do I design a message queue integration pattern for reliable async processing?
  answer: 'RIU-323 defines message queue integration across four design areas. Area 1 — Consumer Pattern Selection: choose
    based on processing requirements. Competing Consumers: multiple consumers process from the same queue for throughput.
    Best for: stateless, idempotent processing (image resizing, email sending). Fan-Out: one message triggers multiple independent
    consumers. Best for: event notification (order placed triggers inventory update, email, analytics). Sequential Processing:
    messages processed in strict order. Best for: state machines, financial transactions. Use SQS FIFO or Kafka partitions
    with key-based ordering. Area 2 — Error Handling: implement a three-tier error strategy. Transient errors (network timeout,
    throttling): retry with exponential backoff (1s, 2s, 4s, 8s, cap at 60s). Poison messages (malformed, schema violation):
    send to dead letter queue (DLQ) after 3 retries. Business errors (validation failure): route to error topic for human
    review. Never silently drop a message — every message must reach either successful processing, DLQ, or error topic. Area
    3 — Idempotency: design consumers to be idempotent — processing the same message twice produces the same result. Use message
    deduplication IDs (SQS) or consumer group offsets (Kafka). Store processed message IDs to detect duplicates. Area 4 —
    Monitoring: track queue depth (growing = consumers falling behind), processing latency (time from enqueue to process),
    DLQ depth (growing = systematic errors), and consumer lag (Kafka). Alert on DLQ depth > 0 and queue depth exceeding 10x
    normal.'
  problem_type: Systems_Integration
