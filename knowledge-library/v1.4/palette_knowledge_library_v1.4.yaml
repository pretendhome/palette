- id: LIB-010
  question: When should I escalate to reset/reframe vs continue converging?
  answer: "**RESET signals (stop and start over with fresh framing):**\n      - No tangible results after agreed timeline\
    \ (many AI projects abandoned for this)\n      - Stakeholders still have conflicting definitions of success after 2-3\
    \ alignment attempts\n      - No clear line of sight from AI feature to measurable business metric\n      - Technical\
    \ team owns strategy without cross-functional business involvement\n      - Exit criteria thresholds (quality, latency,\
    \ cost) consistently missed\n      \n      **REFRAME signals (change the problem statement, keep context):**\n      -\
    \ Original problem was actually 3 problems disguised as one (see LIB-007)\n      - Production reached but scaling challenges\
    \ emerge (load balancing, observability, optimization)\n      - Value chain mapping reveals disconnect between feature\
    \ and business impact\n      - Constraints discovered that make original approach infeasible (see LIB-008)\n      \n \
    \     **CONTINUE CONVERGING when:**\n      - Decisions are TWO-WAY DOORs (reversible, low-cost to change)\n      - Governance\
    \ frameworks in place (user profiles, data access, infrastructure templates)\n      - Stakeholders aligned on success\
    \ criteria, just iterating on solution\n      - Progress measurable against agreed milestones\n      \n      **PALETTE\
    \ guidance:** If convergence not reached within expected exchange window, propose Reset, Fork (try different approach),\
    \ or Reframe. Silent looping is not allowed. Escalate to executive sponsor when reset involves ONE-WAY DOOR sunk costs.\
    \ Document decision in decisions.md with rationale."
  problem_type: Intake_and_Convergence
