- id: LIB-025
  question: What's the best strategy for handling API rate limits in real-time AI systems?
  answer: "Use a layered approach: prevent hitting limits, handle limits gracefully when hit, and degrade gracefully when\
    \ overwhelmed.\n      \n      **Layer 1: Prevention (stay under limits)**\n      - **Token budget management**: Implement\
    \ cost sentry with rate limiter workflow to enforce limits before they're hit\n      - **Prompt caching**: Use Amazon\
    \ Bedrock's built-in prompt caching + client-side caching for repeated queries\n      - **Request batching**: Combine\
    \ multiple small requests where possible\n      - **Model routing**: Route to smaller/faster models for simple queries,\
    \ reserve large models for complex ones\n      - **Application inference profiles**: Track usage per tenant/use-case with\
    \ Bedrock inference profiles\n      \n      **Layer 2: Rate control mechanisms**\n      - **Token bucket algorithm**:\
    \ Track tokens/requests per tenant, enforce fair sharing\n      - **API Gateway throttling**: Set account-level and per-client\
    \ limits\n      - **SQS/Kinesis buffering**: Queue requests during spikes, process at controlled rate\n      - **Concurrency\
    \ limits**: Configure Lambda reserved concurrency to cap parallel executions\n      \n      **Layer 3: Graceful handling\
    \ when limits hit**\n      - **Exponential backoff with jitter**: Retry with increasing delays + randomization to prevent\
    \ thundering herd\n      ```python\n      delay = min(base_delay * (2 ** attempt) + random_jitter, max_delay)\n      ```\n\
    \      - **Streaming responses**: Break long generations into chunks, evaluate incrementally\n      - **Circuit breaker**:\
    \ After N failures, stop retrying for cooldown period\n      \n      **Layer 4: Graceful degradation**\n      - **Fallback\
    \ models**: If primary model rate-limited, route to backup (e.g., Nova Micro when Claude unavailable)\n      - **Cached\
    \ responses**: Serve cached results for common queries during rate limit events\n      - **Reduced functionality**: Disable\
    \ non-critical AI features, maintain core functionality\n      - **Queue and notify**: Accept request, queue for later\
    \ processing, notify user of delay\n      \n      **Monitoring and alerting (RIU-061)**\n      - CloudWatch dashboards\
    \ tracking: tokens used, requests/second, error rates, latency\n      - Alerts at 70%, 85%, 95% of rate limits\n     \
    \ - Cost alerts using AWS Budgets + Cost Explorer\n      - Track by inference profile ARN for per-tenant visibility\n\
    \      \n      **Cost optimization:**\n      - Batch mode for non-real-time workloads (significant cost savings)\n   \
    \   - Small, focused agents vs. monolithic prompts\n      - Provisioned throughput for predictable high-volume workloads\n\
    \      \n      **PALETTE integration:**\n      - Document rate limits in Constraint Profile (RIU-007)\n      - Define\
    \ fallback behavior in Incident Runbook (RIU-062)\n      - Track token budgets in RIU-522 (Token Budget Management)\n\
    \      - Monitor with RIU-061 (Observability Baseline)\n      \n      Key insight: Real-time AI systems need proactive\
    \ rate management, not just reactive handling. Budget enforcement *before* limits are hit is cheaper than graceful degradation\
    \ *after*."
