- id: LIB-156
  question: How do I plan and execute a database migration without downtime or data loss?
  answer: 'RIU-321 defines database migration in five phases. Phase 1 — Pre-Migration Assessment: document the source schema,
    data volume, access patterns, and dependencies. Identify: tables with foreign key relationships (migration order matters),
    stored procedures and triggers (must be migrated or replaced), application queries that will need changes, and data that
    requires transformation. Phase 2 — Migration Strategy Selection: choose based on constraints. Blue-Green: run old and
    new databases in parallel, switch traffic atomically. Best for: small-medium databases where you can afford double infrastructure
    cost temporarily. Strangler Fig: migrate table by table, routing queries to the new database as each table is migrated.
    Best for: large databases where full parallel operation is too expensive. Online Migration: use change data capture (CDC)
    to replicate changes in real-time while migrating historical data. Best for: zero-downtime requirements with large data
    volumes. Phase 3 — Rollback Plan: define how to revert if the migration fails. For blue-green: switch traffic back. For
    strangler: re-route queries. For online: stop CDC and revert application config. Test the rollback before attempting the
    migration. Phase 4 — Validation: after migration, run data integrity checks: row counts, checksum comparisons, query result
    comparisons for critical queries. Validate application behavior with the regression suite (RIU-086). Phase 5 — Monitoring:
    monitor the new database for 48-72 hours post-migration. Watch for: query performance regressions, connection pool exhaustion,
    replication lag, and storage growth anomalies.'
