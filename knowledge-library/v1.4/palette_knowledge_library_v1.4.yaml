- id: LIB-040
  question: How do I set data quality thresholds that balance accuracy and velocity?
  answer: "Quality thresholds aren't one-size-fits-all. Set them based on business impact: tighter for high-stakes data, looser\
    \ for speed-critical flows.\n      \n      **The tradeoff framework:**\n      ```\n      Accuracy ←――――――――――――――――――→\
    \ Velocity\n      \n      Higher thresholds:           Lower thresholds:\n      - More data rejected         - More data\
    \ passes\n      - Higher quality output      - More noise in output\n      - Slower throughput          - Faster throughput\n\
    \      - Higher investigation cost  - Higher error cost downstream\n      ```\n      \n      **Step 1: Classify data by\
    \ business impact**\n      \n      | Tier | Description | Example | Threshold Approach |\n      |------|-------------|---------|-------------------|\n\
    \      | Critical | Errors cause financial/legal harm | Financial transactions, PII | Strict, block on failure |\n   \
    \   | Important | Errors degrade user experience | Customer-facing AI outputs | Moderate, alert + continue |\n      |\
    \ Standard | Errors are inconvenient | Internal analytics | Relaxed, log only |\n      | Experimental | Errors are expected\
    \ | Dev/test data | Minimal checks |\n      \n      **Step 2: Establish baselines**\n      Before setting thresholds,\
    \ measure current state:\n      ```yaml\n      baseline_metrics:\n        completeness: 98.5%  # % non-null for required\
    \ fields\n        uniqueness: 99.9%    # % unique for key fields\n        validity: 97.2%      # % matching format/range\
    \ rules\n        freshness: \"< 1 hour\"\n        volume: \"45,000-55,000 records/day\"\n      ```\n      \n      **Step\
    \ 3: Set thresholds by tier**\n      \n      ```yaml\n      # AWS Glue DQDL example\n      Rules = [\n        # Critical\
    \ tier - strict\n        Completeness \"customer_id\" >= 99.9,\n        IsUnique \"transaction_id\",\n        ColumnValues\
    \ \"amount\" between 0 and 1000000,\n        \n        # Important tier - moderate  \n        Completeness \"email\" >=\
    \ 95.0,\n        ColumnValues \"status\" in [\"active\", \"pending\", \"closed\"],\n        \n        # Standard tier\
    \ - relaxed\n        Completeness \"notes\" >= 80.0\n      ]\n      ```\n      \n      **Step 4: Define threshold types**\n\
    \      \n      | Type | Use Case | Example |\n      |------|----------|---------|\n      | Absolute | Known business rules\
    \ | `amount >= 0` |\n      | Statistical | Detect anomalies | `mean(amount) within 2 std of baseline` |\n      | Relative\
    \ | Detect drift | `today's completeness >= 95% of 7-day avg` |\n      | Dynamic | Adapt to patterns | `compare to same\
    \ day last week` |\n      \n      **Step 5: Configure actions by severity**\n      \n      ```yaml\n      threshold_actions:\n\
    \        critical_failure:\n          action: \"block\"\n          notify: [\"on-call\", \"data-owner\"]\n          quarantine:\
    \ true\n          \n        warning:\n          action: \"continue\"\n          notify: [\"data-team\"]\n          log:\
    \ true\n          \n        info:\n          action: \"continue\"\n          log: true\n      ```\n      \n      **Implementation\
    \ with AWS Glue Data Quality:**\n      - Use DQDL labels to tag rules by priority/owner\n      - Route failed records\
    \ to separate S3 bucket (quarantine)\n      - Emit metrics to CloudWatch for dashboards/alerts\n      - Set up dynamic\
    \ rules comparing to historical values\n      \n      **Threshold tuning methodology:**\n      1. Start with baselines\
    \ from historical data\n      2. Set initial thresholds at baseline - 2 standard deviations\n      3. Run in \"alert only\"\
    \ mode for 2 weeks\n      4. Analyze alerts: false positives? missed issues?\n      5. Adjust thresholds based on business\
    \ feedback\n      6. Gradually tighten for critical data\n      \n      **Balancing accuracy vs. velocity:**\n      \n\
    \      | Scenario | Favor Accuracy | Favor Velocity |\n      |----------|----------------|----------------|\n      | Real-time\
    \ AI inference | | ✅ |\n      | Financial reporting | ✅ | |\n      | Customer-facing features | Balance | Balance |\n\
    \      | Training data pipelines | ✅ | |\n      | Exploratory analytics | | ✅ |\n      | Compliance/audit data | ✅ | |\n\
    \      \n      **PALETTE integration:**\n      - Define thresholds in RIU-084 (Data Quality Checks)\n      - Document\
    \ baseline in RIU-081 (Smoke Tests)\n      - Track quality metrics in RIU-063 (Performance Baselines)\n      - Alert on\
    \ breaches via RIU-061 (Observability Baseline)\n      \n      Key insight: The right threshold makes the cost of false\
    \ positives (good data rejected) roughly equal to the cost of false negatives (bad data accepted). If you're constantly\
    \ overriding alerts, thresholds are too tight. If errors reach users, they're too loose."
  problem_type: Data_Semantics_and_Quality
