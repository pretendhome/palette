- id: LIB-014
  question: What's the best way to model exception-heavy workflows in AI systems?
  answer: "Exception-heavy workflows require a layered architecture that separates the \"happy path\" from exception handling:\n\
    \      \n      **Architecture pattern:**\n      1. **Deterministic layer first**: Handle known, rule-based exceptions\
    \ with explicit IF/THEN logic — these are predictable and testable\n      2. **AI layer for ambiguity**: Use LLM/agents\
    \ only for cases that require judgment or context understanding\n      3. **Human-in-the-loop escape hatch**: Route unconfident\
    \ or high-stakes exceptions to human review\n      \n      **Design principles:**\n      - Use adaptive workflows (AI-DLC\
    \ pattern) that modulate depth based on complexity — simple cases get fast path, exceptions get deeper analysis\n    \
    \  - Implement fault isolation: exceptions in one branch shouldn't cascade to others\n      - Apply MCP architecture for\
    \ standardized tool integration across exception handlers\n      - Build layered protection based on user personas, data\
    \ characteristics, and failure modes\n      \n      **Exception categorization:**\n      - **Known exceptions**: Catalog\
    \ in Edge-Case Catalog (RIU-014), handle deterministically\n      - **Unknown-but-bounded**: AI handles within guardrails,\
    \ logs for review\n      - **Unbounded/novel**: Route to human immediately\n      \n      **Testing strategy:**\n    \
    \  - Test guardrail effectiveness explicitly — inject edge cases and verify behavior\n      - Use reinforcement learning\
    \ in simulated environments (Amazon Nova Act achieves 90%+ reliability this way)\n      - Validate that exception paths\
    \ actually execute — dead code is common in exception handling\n      \n      **PALETTE integration:**\n      - Document\
    \ exception categories in RIU-014 (Edge-Case Catalog)\n      - Flag exception-handling logic that involves ONE-WAY DOOR\
    \ decisions\n      - Store exception patterns in Assumptions Register (RIU-008) for validation\n      \n      Key insight:\
    \ Don't try to handle all exceptions with AI — use AI for judgment, deterministic code for known patterns, humans for\
    \ novel/high-stakes cases."
