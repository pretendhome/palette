- id: LIB-120
  question: How do I manage secrets and API keys securely for AI agent workflows?
  answer: Never store secrets in code, environment variables, or config files. Use a secrets manager — AWS Secrets Manager
    for AWS-native workflows (automatic rotation, IAM integration), HashiCorp Vault for multi-cloud or on-premise. For AI
    agents specifically, each agent should have its own IAM role or service account with least-privilege access. Rotate API
    keys on a schedule (90 days minimum). Use short-lived credentials (STS AssumeRole) instead of long-lived keys wherever
    possible. Agent credential access should be auditable — log which agent accessed which secret and when. Decision — if
    you are AWS-only, use Secrets Manager. If multi-cloud or complex rotation policies, use Vault.
