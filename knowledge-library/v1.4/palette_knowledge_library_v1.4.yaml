- id: LIB-146
  question: How do I design and deliver effective training sessions for AI system adoption?
  answer: 'RIU-103 defines training design in four layers. Layer 1 — Audience Segmentation: segment trainees by role and skill
    level. A store associate needs different training than a data analyst. Design separate tracks for: end users (task-focused,
    30-60 minutes), power users (configuration and customization, 2-4 hours), and administrators (ops, monitoring, troubleshooting,
    half day). Never deliver one-size-fits-all training. Layer 2 — Exercise-First Design: structure each session as 20% explanation,
    80% hands-on exercises using real or realistic data. Every exercise should mirror an actual workflow the trainee will
    perform daily. Include a "break it" exercise where trainees intentionally trigger an error and learn the recovery process
    — this builds confidence with failure modes. Layer 3 — Common Mistakes Prevention: compile the top 10 mistakes from pilot
    users and address each explicitly in training. Example: "Many users try to ask the system X. Here is why that does not
    work and what to do instead." This is more effective than feature tours. Layer 4 — Follow-Up Support: training is not
    a one-time event. Schedule a 30-minute follow-up session 1-2 weeks after initial training to address real-world questions.
    Create a FAQ document from training Q&A. Establish a support channel (Slack, Teams) for ongoing questions. Measure training
    effectiveness by task completion rate, not satisfaction score.'
