  question: How do I enforce structured output schemas from LLMs without manual parsing?
  answer: Use a schema-constrained generation library that validates LLM output against Pydantic models or JSON Schema at
    inference time. Instructor (Python) wraps the LLM call and retries on validation failure — supports OpenAI, Anthropic,
    and open-source models. Outlines uses constrained decoding (grammar-based sampling) for guaranteed schema compliance without
    retries but only works with open-source models. Decision — use Instructor for cloud LLM APIs (retry-based, model-agnostic),
    use Outlines for self-hosted models where you control decoding. Always define output schemas as Pydantic models, not raw
    JSON — you get type safety, validation, and documentation for free.
