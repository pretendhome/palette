- id: LIB-157
  question: How do I integrate authentication and authorization (SSO/OAuth/SAML) into an AI application securely?
  answer: 'RIU-322 defines auth integration across four areas. Area 1 — Protocol Selection: choose based on your ecosystem.
    OAuth 2.0 + OIDC: best for modern web/mobile apps with API access. SAML 2.0: best for enterprise SSO with existing IdP
    (Okta, Azure AD, Ping). API Keys: acceptable only for server-to-server communication, never for user-facing auth. For
    AI systems specifically: the AI agent inherits the permissions of the authenticated user — it should never have broader
    access than the user it serves. Area 2 — Token Management: store tokens securely (encrypted at rest, never in localStorage
    for web apps). Implement token rotation: access tokens short-lived (15-60 minutes), refresh tokens longer (hours-days)
    with rotation on use. Handle token expiration gracefully — refresh before the request, not after a 401. For AI agents
    calling APIs on behalf of users, use delegated tokens (OAuth token exchange) rather than service account tokens. Area
    3 — Session Management: define session lifetime, idle timeout, and concurrent session policy. For AI systems with long-running
    tasks: separate the user session (interactive, short timeout) from the task session (background, longer lifetime, narrower
    permissions). Area 4 — Security Checklist: CSRF protection on all state-changing endpoints, PKCE for public clients, token
    binding where supported, secure cookie flags (HttpOnly, Secure, SameSite), and CORS configuration. Common failure: weak
    token handling where tokens are logged, cached in plaintext, or shared across tenants.'
