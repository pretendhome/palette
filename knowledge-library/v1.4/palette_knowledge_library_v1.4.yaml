- id: LIB-133
  question: How do I build a source-of-truth inventory when multiple systems claim to own the same data?
  answer: 'Use RIU-013 to create a structured inventory with five columns per data field: Field Name, Authoritative System,
    System Owner (person), Update Cadence (real-time / hourly / daily / manual), and Trust Level (gold / silver / bronze).
    Start with the critical-path fields for your engagement — do not attempt to inventory everything. For each contested field,
    apply the "last writer wins" test: which system is the one that humans actually update when the data changes? That system
    is gold-tier authoritative. Systems that read from it are silver. Systems that have stale copies are bronze and should
    be flagged for eventual deprecation or sync. Common failure patterns: (1) shadow spreadsheets that override the "official"
    system — interview operators, not just architects; (2) post-merger environments where two CRMs both claim to own customer
    records — resolve by picking one as authoritative for specific field groups (e.g., billing fields from System A, engagement
    fields from System B); (3) timestamp-free systems where staleness is undetectable — add last_modified tracking as a prerequisite.
    Cross-reference with RIU-019 (Data Lineage Sketch) to visualize the flow between systems.'
  problem_type: Data_Semantics_and_Quality
