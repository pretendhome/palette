- id: LIB-041
  question: What testing strategy catches semantic data bugs before production?
  answer: "Semantic bugs are data that passes schema validation but is meaningfully wrong (swapped columns, wrong units, misinterpreted\
    \ categories). Catch them with \"unit tests for data\" that verify business meaning, not just structure.\n      \n   \
    \   **Types of semantic data bugs:**\n      | Bug Type | Example | Schema Catches? | Semantic Test Catches? |\n      |----------|---------|-----------------|------------------------|\n\
    \      | Swapped columns | customer_id in order_id field | ❌ (both strings) | ✅ (format check) |\n      | Wrong units\
    \ | Pounds stored as kilograms | ❌ (both numbers) | ✅ (range check) |\n      | Misinterpreted enum | \"HIGH\"=3 vs \"\
    HIGH\"=1 | ❌ (valid enum) | ✅ (business rule) |\n      | Stale reference | customer_id doesn't exist | ❌ (valid format)\
    \ | ✅ (referential check) |\n      | Aggregation error | Sum doesn't equal parts | ❌ (valid number) | ✅ (consistency check)\
    \ |\n      | Timezone confusion | UTC stored as local time | ❌ (valid timestamp) | ✅ (range/distribution) |\n      \n\
    \      **Testing pyramid for data quality:**\n      ```\n                    ┌─────────────────┐\n                   \
    \ │  Manual Review  │  ← Sample inspection\n                    ├─────────────────┤\n                    │ Cross-Dataset\
    \   │  ← Compare sources\n                    │  Validation     │\n                    ├─────────────────┤\n         \
    \           │ Business Rule   │  ← Domain constraints\n                    │    Tests        │\n                    ├─────────────────┤\n\
    \                    │ Statistical     │  ← Distribution checks\n                    │    Tests        │\n           \
    \         └─────────────────┘\n                    │ Schema Tests    │  ← Type/format (base)\n                    └─────────────────┘\n\
    \      ```\n      \n      **Layer 1: Unit tests for data (Deequ / AWS Glue Data Quality)**\n      ```python\n      # Deequ\
    \ example - semantic assertions\n      from pydeequ.checks import Check\n      \n      check = Check(spark, CheckLevel.Error,\
    \ \"Semantic Validation\") \\\n          # Format checks (catch swapped columns)\n          .hasPattern(\"order_id\",\
    \ r\"^ORD-\\d{10}$\") \\\n          .hasPattern(\"customer_id\", r\"^CUST-\\d{8}$\") \\\n          \n          # Range\
    \ checks (catch unit errors)\n          .isNonNegative(\"amount\") \\\n          .isLessThanOrEqualTo(\"amount\", 1000000)\
    \ \\\n          .isContainedIn(\"currency\", [\"USD\", \"EUR\", \"GBP\"]) \\\n          \n          # Business rule checks\n\
    \          .isContainedIn(\"priority\", [\"high\", \"low\"]) \\\n          .satisfies(\"discount <= amount\", \"discount\
    \ can't exceed amount\") \\\n          \n          # Referential checks\n          .isContainedIn(\"customer_id\", valid_customer_ids)\
    \ \\\n          \n          # Consistency checks\n          .satisfies(\"line_total == quantity * unit_price\", \"line\
    \ math\")\n      ```\n      \n      **Layer 2: Statistical tests (catch distribution shifts)**\n      ```yaml\n      statistical_checks:\n\
    \        - metric: \"mean(amount)\"\n          expected_range: [100, 500]  # Based on historical baseline\n          \n\
    \        - metric: \"null_rate(email)\"\n          max_threshold: 0.05  # No more than 5% nulls\n          \n        -\
    \ metric: \"distinct_count(category)\"\n          expected: 12  # Should always have exactly 12 categories\n         \
    \ \n        - metric: \"value_distribution(status)\"\n          expected:\n            active: 0.70-0.80\n           \
    \ pending: 0.15-0.25\n            closed: 0.05-0.10\n      ```\n      \n      **Layer 3: Cross-dataset validation (catch\
    \ integration bugs)**\n      - Compare source and target after transformation\n      - Verify row counts match (or explain\
    \ difference)\n      - Check that joins don't duplicate/lose records\n      - Use Apache Griffin for large-scale dataset\
    \ comparison\n      ```python\n      # Griffin-style comparison\n      assert count(source) == count(target), \"Row count\
    \ mismatch\"\n      assert sum(source.amount) == sum(target.amount), \"Amount sum mismatch\"\n      assert distinct(source.customer_id)\
    \ == distinct(target.customer_id)\n      ```\n      \n      **Layer 4: Example-based tests (golden set)**\n      - Curate\
    \ specific examples with known correct outputs\n      - Include edge cases and boundary conditions\n      - Run as regression\
    \ tests on every pipeline change\n      ```yaml\n      golden_examples:\n        - input: {order_id: \"ORD-0000000001\"\
    , amount: 0}\n          expected: {risk_score: \"low\"}  # Zero-value order = low risk\n          \n        - input: {order_id:\
    \ \"ORD-9999999999\", amount: 999999}\n          expected: {risk_score: \"high\"}  # Max-value order = high risk\n   \
    \       \n        - input: {customer_id: null}\n          expected: {should_fail_validation: true}\n      ```\n      \n\
    \      **CI/CD integration:**\n      - Run data unit tests on every pipeline change\n      - Block deployment if semantic\
    \ tests fail\n      - Sample production data into test environment weekly\n      - Compare test results against known-good\
    \ baseline\n      \n      **AWS implementation:**\n      - **Deequ**: Unit tests for Spark-based pipelines\n      - **AWS\
    \ Glue Data Quality**: DQDL rules in Glue jobs\n      - **Apache Griffin on EMR**: Large-scale dataset comparison\n  \
    \    - **CloudWatch**: Alert on test failures\n      \n      **PALETTE integration:**\n      - Define semantic tests in\
    \ RIU-082 (Label/Category Alignment Check)\n      - Store golden examples in RIU-021 (Golden Set)\n      - Run as part\
    \ of RIU-081 (E2E Smoke Tests)\n      - Document business rules in RIU-044 (Business Rules Documentation)\n      \n  \
    \    Key insight: Schema tests are necessary but not sufficient. The most dangerous bugs are semantically wrong data that\
    \ looks structurally correct. Test what the data *means*, not just what it *looks like*."
