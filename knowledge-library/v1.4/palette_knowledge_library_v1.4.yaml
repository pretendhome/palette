- id: LIB-151
  question: How do I design a document chunking strategy for RAG that preserves semantic coherence?
  answer: 'RIU-231 defines chunking strategy across three dimensions. Dimension 1 — Chunk Size: the optimal size depends on
    your embedding model and retrieval needs. General guidance: 256-512 tokens for precise retrieval (specific facts, definitions),
    512-1024 tokens for contextual retrieval (paragraphs with surrounding context), 1024-2048 tokens for broad retrieval (full
    sections). Measure retrieval quality at each size and choose based on your eval set, not defaults. Dimension 2 — Overlap:
    use 10-20% overlap between adjacent chunks to prevent context loss at chunk boundaries. Example: for 512-token chunks,
    use 50-100 token overlap. Without overlap, a sentence split across two chunks becomes unretrievable by either chunk. Dimension
    3 — Semantic Boundaries: chunk at natural document boundaries (headings, paragraphs, sections) rather than fixed token
    counts. For structured documents (contracts, manuals, legislation): chunk at section/clause boundaries. For unstructured
    documents (emails, transcripts): chunk at paragraph boundaries with topic detection. For code: chunk at function/class
    boundaries. For tables: keep each table as a single chunk with its header row. Advanced techniques: (a) Hierarchical chunking
    — store both fine-grained chunks and parent sections, retrieve at fine level but pass parent context to the LLM; (b) Document
    metadata enrichment — add title, section header, and document type to each chunk as metadata for hybrid search. Validate
    chunking quality by testing retrieval on 50+ queries and checking if the answer-containing chunk is retrieved in the top
    5.'
  problem_type: Data_Semantics_and_Quality
