- id: LIB-175
  question: How do I build a release checklist that prevents deployment failures?
  answer: 'A release checklist covers six areas in order: (1) Migration safety — is every DB migration backward-compatible
    and zero-downtime? Are there table locks? (2) Feature flags — should any part be behind a flag for gradual rollout? (3)
    Rollout order — correct sequence (migrate first, deploy second)? Old code and new code running simultaneously — what breaks?
    (4) Rollback plan — explicit step-by-step, including time estimate. (5) Post-deploy verification — what automated checks
    run in the first 5 minutes? First hour? (6) Smoke tests — what proves the deployment succeeded? For each area, the checklist
    should produce a concrete artifact: migration SQL reviewed, feature flag config committed, rollback runbook written, smoke
    test commands documented. The most common deployment failures come from partial states (old and new code running together)
    and missing rollback plans, not from the code itself.'
  problem_type: Operationalization_and_Scaling
