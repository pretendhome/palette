- id: LIB-166
  question: How do I design an AI operating model that balances centralized platform efficiency with decentralized execution
    speed?
  answer: 'RIU-601 defines the AI operating model through four structural decisions. Decision 1 — Team Topology: choose between
    three models. Centralized CoE: one AI team serves all business units. Best for: small organizations (< 500 employees)
    or early AI maturity. Risk: bottleneck, disconnected from business needs. Federated: each business unit has its own AI
    team. Best for: diverse business units with different needs. Risk: duplication, inconsistent standards. Hub-and-Spoke
    (recommended for most): central platform team (hub) provides infrastructure, MLOps, guardrails, and standards. Business
    unit AI teams (spokes) build use cases on the shared platform. The hub does not build use cases; the spokes do not build
    infrastructure. Decision 2 — Decision Rights Matrix: explicitly document who decides what. Platform decisions (cloud provider,
    MLOps tooling, security standards): central team. Use case prioritization: business unit. Model selection for a specific
    use case: business unit AI team within platform guardrails. Budget allocation: central team sets platform budget; business
    units set use case budgets. Decision 3 — Escalation Paths: define what happens when central and federated teams disagree.
    Common conflicts: business unit wants a tool not on the approved list, business unit wants to deploy a model that fails
    guardrails, two business units want conflicting platform changes. Resolve via the AI council (monthly) or VP-level escalation
    (urgent). Decision 4 — Shadow AI Prevention: business units will build AI outside the platform if the platform is too
    slow or restrictive. Prevent by: making the platform easy to use, providing self-service capabilities, and measuring time-to-first-model
    as a platform KPI.'
