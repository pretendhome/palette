- id: LIB-168
  question: How do I design an employee AI adoption program that drives behavior change rather than just training completion?
  answer: 'RIU-603 implements behavior-change adoption methodology in five steps. Step 1 — Persona Mapping: identify 3-5 employee
    personas based on role, not seniority. For each persona, document: daily workflows, pain points, incentive structure (what
    gets them promoted/recognized), technology comfort level, and resistance factors (fear of replacement, skepticism, overwhelm).
    Step 2 — Recipe Design: for each persona, create 3-5 "recipes" — specific, 5-minute workflow demonstrations using real
    tasks from their day. A recipe is not "here is how to use the AI tool" but "here is how to do [your specific task] 10x
    faster using the AI tool." Recipes should be copy-paste-able — the employee should be able to replicate the recipe immediately
    after seeing it. Step 3 — Champions Program: identify 1-2 champions per team — employees who are naturally curious about
    AI and respected by peers. Train champions first, then have them demonstrate recipes to their team. Peer adoption is 3-5x
    more effective than top-down mandates (per Rogers diffusion of innovations). Provide champions with: early access, direct
    support channel, and recognition (not monetary rewards — public acknowledgment is more motivating). Step 4 — Targeted
    Activation: move from mass communication (company email about AI tool) to targeted activation (specific Slack messages
    to specific teams about specific workflows). "The sales team can now auto-generate proposals in 2 minutes" is better than
    "New AI tool available for everyone." Step 5 — Measurement: measure behavior, not logins. Key metrics: tasks completed
    with AI assistance (not sessions), time-to-decision improvement, employee confidence score (survey), and voluntary repeat
    usage (30-day retention).'
  problem_type: Trust_Governance_and_Adoption
