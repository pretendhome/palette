- id: LIB-144
  question: How do I build a regression suite that catches regressions beyond a small golden test set using metamorphic testing?
  answer: 'RIU-086 extends traditional golden-set testing with metamorphic testing and invariant checks. Golden Tests (necessary
    but insufficient): 50-200 curated input-output pairs where the expected output is known. These catch exact regressions
    but miss novel failures. Metamorphic Tests (the key addition): define properties that must hold under input transformations
    even when the exact output is unknown. Examples: (a) Paraphrase invariance — rephrasing a query should produce semantically
    equivalent results; (b) Monotonicity — adding a positive signal should not decrease the score; (c) Symmetry — swapping
    entity order in a comparison should swap the result; (d) Negation — negating the input should change the output; (e) Subset
    — a more specific query should return a subset of a broader query. Metamorphic tests are powerful because they do not
    require ground-truth labels — they test relationships between inputs and outputs. Invariant Checks: define system-level
    invariants that must always hold. Examples: output schema always valid, confidence scores between 0 and 1, latency below
    budget, no PII in outputs. Run invariants on every test case. Suite Composition: aim for 60% golden, 25% metamorphic,
    15% invariant. Run the full suite on every model update, prompt change, or dependency update. Track pass rate over time
    — a declining metamorphic pass rate is an early warning of model drift even when golden tests still pass.'
  problem_type: Reliability_and_Failure_Handling
