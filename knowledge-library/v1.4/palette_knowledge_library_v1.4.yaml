- id: LIB-139
  question: How do I implement reliable structured extraction from unstructured text and documents?
  answer: 'RIU-032 defines a four-phase extraction pipeline. Phase 1 — Schema Definition: define the target schema as a JSON
    Schema with required fields, optional fields, types, and constraints (enums, ranges, patterns). Every extracted field
    must have a confidence score (0.0-1.0) and a provenance reference (which part of the source document the value was extracted
    from). Phase 2 — Extraction Implementation: use LLM-based extraction with structured output (e.g., Anthropic tool_use,
    OpenAI function calling, or Bedrock Converse). Provide the schema in the prompt and require the model to return JSON conforming
    to the schema. For critical fields, implement dual extraction — extract twice with different prompts and compare results.
    Discrepancies flag for human review. Phase 3 — Fallback Strategy: define what happens when extraction fails or confidence
    is below threshold. Options: return partial extraction with missing fields flagged, escalate to human review, retry with
    a more capable model. Never silently drop a failed extraction — log it. Phase 4 — Evaluation Set: build an eval set of
    50-100 documents with ground-truth annotations. Measure precision, recall, and F1 per field. The most dangerous failure
    mode is hallucinated fields — the model invents data that sounds plausible but does not exist in the source document.
    Mitigate by requiring provenance references and validating them programmatically.'
  problem_type: Human_to_System_Translation
