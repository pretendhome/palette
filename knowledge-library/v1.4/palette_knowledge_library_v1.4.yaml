- id: LIB-017
  question: How do I capture human judgment that's based on years of experience, not explicit rules?
  answer: "Experiential judgment is pattern recognition that experts can't articulate as rules. Capture it through examples,\
    \ feedback loops, and calibration — not interviews alone.\n      \n      **Elicitation techniques:**\n      - **Case-based\
    \ extraction**: Present real scenarios and ask \"What would you do? Why?\" Record decisions, not just rules\n      - **Contrastive\
    \ pairs**: Show two similar cases with different outcomes — \"Why did you handle these differently?\"\n      - **Think-aloud\
    \ protocol**: Have expert narrate while working real cases (use voice capture with Transcribe + Bedrock)\n      - **Calibration\
    \ sessions**: Show AI outputs to expert, ask \"Would you have done this?\" — disagreements reveal tacit criteria\n   \
    \   \n      **Learning architectures:**\n      1. **Feedback Loop HITL**: Expert reviews AI outputs, corrections feed\
    \ back into system\n      2. **RLHF (Reinforcement Learning from Human Feedback)**: Fine-tune models using expert preferences\
    \ on output pairs\n      3. **RLAIF**: When expert time is limited, use AI-generated feedback (reduces SME workload ~80%)\n\
    \      4. **Self-learning system**: Use disagreements between models as learning signals (Amazon Catalog pattern — supervisor\
    \ model resolves conflicts, builds hierarchical knowledge base)\n      \n      **AWS tools:**\n      - Amazon SageMaker\
    \ Ground Truth Plus for preference datasets and demonstration data\n      - Amazon Bedrock for fine-tuning with human\
    \ feedback\n      - Amazon Transcribe for voice-based knowledge capture\n      \n      **What CAN'T be captured:**\n \
    \     - Judgment requiring real-time sensory input (smell, touch, visual nuance)\n      - Decisions requiring context\
    \ the system can't access\n      - Novel situations outside training distribution\n      - Flag these for permanent human-in-the-loop\
    \ (Escalation-Based HITL pattern)\n      \n      **PALETTE integration:**\n      - Store captured judgment patterns in\
    \ Assumptions Register (RIU-008) as hypotheses to validate\n      - Document expert disagreements — these reveal edge\
    \ cases (RIU-014)\n      - Flag judgment calls that are ONE-WAY DOORs (require human approval even after training)\n \
    \     \n      Key insight: Don't ask experts to explain rules — show them cases and capture their reactions. Judgment\
    \ lives in the delta between what they do and what a naive system would do."
  problem_type: Human_to_System_Translation
