- id: LIB-131
  question: How do I ensure AI-generated content is brand-safe before publishing?
  answer: Use AWS Bedrock Guardrails for automated brand safety enforcement — denied topic detection, custom word filters,
    and content filters across 6 harm categories. Configure guardrails as a mandatory post-processing step on all AI-generated
    content before it reaches end users. For advanced brand voice compliance, Guardrails AI (open-source) offers composable
    validators including tone, formality, and custom brand rules. Lakera Guard adds adversarial defense against prompt injection
    that could bypass brand guidelines. Key pattern — defense in depth. System prompt sets brand voice, guardrails enforce
    it, and human review gates the highest-visibility content. Automate the 90 percent of content that is clearly safe, human-review
    the 10 percent that triggers edge-case flags.
