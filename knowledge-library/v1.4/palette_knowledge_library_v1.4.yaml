- id: LIB-147
  question: How do I create a handoff bundle that enables restartability when an engagement transitions to a new team or person?
  answer: 'RIU-104 defines the handoff bundle as a package with five mandatory sections. Section 1 — State Summary: a 1-2
    page narrative covering what was accomplished, what is in progress, and what is not started. Written for someone with
    zero prior context. Include the current phase, completion percentage, and any deadlines. Section 2 — Decision Log: the
    complete decisions.md with all decisions made, their rationale, who approved them, and which are one-way doors (RIU-003).
    This is the most critical section — decisions are the hardest knowledge to reconstruct. Section 3 — Open Questions: a
    prioritized list of unresolved questions, blocked items, and pending decisions. For each, note who owns the resolution
    and any known constraints. Section 4 — Artifact Inventory: a manifest of all artifacts produced, their locations, versions,
    and status (draft, reviewed, approved). Include links/paths to every document, code repository, configuration file, and
    dataset. Section 5 — Next Steps: a concrete list of the next 5-10 actions the successor should take, in order, with estimated
    effort. Include any context needed for each action. Common failure mode: implicit knowledge not captured — the outgoing
    person knows things that are not written down. Mitigate by having the successor attempt a "cold start" using only the
    bundle and report gaps before the outgoing person leaves. This gap analysis is the most valuable quality check.'
  problem_type: Operationalization_and_Scaling
