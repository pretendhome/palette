- id: LIB-150
  question: How do I synthesize a customer problem narrative using Jobs-to-be-Done when the customer describes symptoms rather
    than root causes?
  answer: 'RIU-200 applies the JTBD framework to transform symptom descriptions into actionable problem narratives. Step 1
    — Symptom Collection: gather all symptoms the customer reports without interpreting them. Record exact quotes. Common
    symptoms: "it takes too long," "our team is frustrated," "we are losing customers," "the data is wrong." Step 2 — JTBD
    Translation: for each symptom, ask "What job is the customer trying to get done, and what is preventing them?" The JTBD
    formula: "When [situation], I want to [motivation], so I can [expected outcome]." Example: Symptom "our team is frustrated
    with the CRM" becomes JTBD "When a sales rep needs to update a deal, they want to log the update in under 30 seconds,
    so they can spend time selling instead of data entry." Step 3 — Constraint Mapping: for each JTBD, identify constraints:
    budget, timeline, technical (legacy systems, integrations), regulatory (compliance requirements), organizational (who
    must approve, who resists change). Step 4 — Narrative Synthesis: write a 1-page narrative that connects symptoms to JTBDs
    to constraints. Structure: "The customer experiences [symptoms] because [root cause]. Their core job is [JTBD]. They are
    constrained by [constraints]. A successful solution must [success criteria]." Step 5 — Customer Confirmation: present
    the narrative to the customer and ask "Did I get this right?" Misunderstood problems are the leading cause of failed AI
    projects — this confirmation step is not optional.'
  problem_type: Intake_and_Convergence
