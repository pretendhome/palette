- id: LIB-177
  question: How do I design a taxonomy that an AI system can use for consistent, accurate classification?
  riu_ids:
  - RIU-401
  - RIU-400
  - RIU-001
  rationale: Taxonomy design is foundational to every structured AI system — from knowledge libraries to routing engines to
    classification pipelines. Most teams skip it or do it ad hoc, leading to overlapping categories, inconsistent classification,
    and systems that break when new items appear.
  proposed_answer:
    key_constraint: Categories must be mutually exclusive and collectively exhaustive for the target domain. Overlapping categories
      cause inconsistent classification; gaps cause unclassifiable items.
    decision_type: TWO_WAY_DOOR
    implementation: Start with the problem the taxonomy solves (routing, classification, search). Define categories by the
      decision they drive, not by topic similarity. Use 2-3 levels maximum. Each leaf node needs a machine-readable description
      specific enough that two different classifiers would agree. Add an escape hatch (triage queue) for unclassifiable items.
      Test with real inputs — if agreement between classifiers is below 80%, refine descriptions. Version the taxonomy and
      track changes.
    related_rius:
    - RIU-401
    - RIU-400
    - RIU-001
  difficulty: high
  industries:
  - All
  tags:
  - taxonomy
  - classification
  - knowledge-architecture
  - information-design
  sources:
  - title: Palette Taxonomy v1.3 — 120 RIUs across 6 workstreams
    type: internal
    tier: tier_1
  answer: 'Define taxonomy nodes as problem-solution pairs, not abstract categories. Each node should answer: ''What problem
    does this solve?'' and ''What is the execution approach?'' Use mutually exclusive categories at each level — if an item
    could belong to two categories, the taxonomy is ambiguous. Add trigger signals to each node: specific phrases, keywords,
    or patterns that indicate this category applies. Test the taxonomy with real queries: give 50 real user questions to the
    classifier and measure precision and recall per node. A taxonomy with 80% accuracy on 20 nodes is better than one with
    60% accuracy on 100 nodes. Version the taxonomy and track classification accuracy over time. When accuracy drops below
    threshold, the taxonomy needs revision, not the classifier.'
- id: LIB-178
  question: What is a crack spread and why do oil investors monitor it?
  answer: 'A crack spread is the price difference between crude oil and the refined petroleum products (gasoline, diesel,
    jet fuel) produced from it. The term comes from the refining process of "cracking" crude oil molecules into lighter products.
    The most common benchmark is the 3-2-1 crack spread: the profit from refining 3 barrels of crude into 2 barrels of gasoline
    and 1 barrel of distillate (diesel/heating oil). Investors monitor crack spreads because they indicate refinery profitability
    — when spreads are wide, refiners earn more per barrel processed. Narrow or negative spreads signal margin compression
    and potential refinery shutdowns. For upstream investors, crack spreads affect demand for crude: weak refining margins
    reduce crude purchases. For portfolio managers, crack spread trends are leading indicators of energy sector earnings.
    Monitor the 3-2-1 spread on CME Group or EIA data. A spread above $20/barrel is historically strong; below $10 signals
    stress. Seasonal patterns matter — spreads typically widen before summer driving season (gasoline demand) and winter heating
    season (distillate demand).

    '
  sources:
