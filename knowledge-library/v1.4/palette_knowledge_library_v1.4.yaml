- id: LIB-169
  question: How do I build a defensible AI ROI quantification framework for CFO-level budget approval?
  answer: 'RIU-604 builds a three-bucket ROI model. Prerequisite — Baseline Establishment: before calculating ROI, you need
    the "before" measurement (RIU-020). Document current costs, error rates, cycle times, and headcount for the processes
    AI will affect. Without a baseline, ROI is fiction. Bucket 1 — Cost Reduction (typically 40% of total ROI): direct operational
    savings. Examples: reduced manual processing labor, lower error-related rework costs, decreased tool licensing (consolidation),
    and reduced infrastructure costs (right-sizing). Calculate as: current annual cost minus projected annual cost with AI.
    Be conservative — use 70% of expected savings to account for transition costs. Bucket 2 — Productivity Gains (typically
    35%): time freed for higher-value work. Examples: analysis time reduced from 4 hours to 30 minutes, report generation
    automated, data entry eliminated. Calculate as: hours saved x fully loaded hourly rate x 50% (not all freed time translates
    to productive output). Bucket 3 — Cost Avoidance (typically 25%): risks prevented or reduced. Examples: compliance violations
    avoided, security incidents prevented, customer churn reduced through faster resolution. Calculate as: probability of
    event x cost of event x reduction in probability. Financial Model: calculate risk-adjusted NPV using a 15-20% discount
    rate for AI projects (higher than standard IT because of execution uncertainty). Show multi-horizon benefits: Year 1 is
    investment-heavy with modest returns; Years 2-3 show compounding returns as adoption increases. Present a budget trajectory
    showing Year 1 investment, Year 2 break-even, Year 3 net positive. Compare against tool sprawl TCO: many organizations
    spend more on 5-10 point solutions than one well-architected agentic system would cost.'
  problem_type: Intake_and_Convergence
