- id: LIB-172
  question: How do I define a typed workflow for multi-agent engagements that makes implicit coordination explicit?
  answer: 'RIU-608 defines a YAML-based workflow format for multi-agent engagements. Structure: a workflow has five top-level
    sections. Section 1 — Phases: ordered list of engagement phases. Each phase has: name, description, assigned agents (primary
    + supporting), estimated duration, entry criteria (what must be true to start this phase), and exit criteria (what must
    be true to complete this phase). Phases execute sequentially by default; mark phases as parallelizable if they have no
    dependencies. Section 2 — Agent Assignments: for each agent, document: role in this engagement, phases they participate
    in, tools they are authorized to use (cross-reference RIU-029), and handoff protocol (how they pass work to the next agent).
    Section 3 — Quality Gates: define checkpoints between phases where an Validator (validator) agent reviews the work product.
    Each gate has: what is being validated, acceptance criteria, and what happens if validation fails (rework, escalate, or
    skip with documented risk acceptance). Section 4 — Decision Checkpoints: points where a human must make a decision before
    the workflow can proceed. Flag one-way door decisions (RIU-087). Include the information the human needs to make the decision
    and the deadline. Section 5 — Memory Update Expectations: define when MEMORY.md must be updated (at minimum: after each
    phase completion, after each quality gate, and after each decision checkpoint). The workflow is a living document — update
    it when the engagement pivots. The anti-pattern is defining a rigid workflow that blocks necessary pivots. Build in explicit
    "reassess workflow" checkpoints every 2-3 phases. Validate the workflow with Validator before the engagement begins.'
  problem_type: Operationalization_and_Scaling
