- id: LIB-009
  question: How do I document tribal knowledge that exists only in stakeholder heads?
  answer: "**Elicitation techniques:**\n      - Use voice-based capture (Amazon Transcribe + Bedrock) — reduces cognitive\
    \ load and captures natural explanations better than asking SMEs to write documentation\n      - Ask scenario-based questions:\
    \ \"Walk me through what you do when X happens\" rather than \"What are the rules for X?\"\n      - Probe \"it depends\"\
    \ answers: \"What specifically does it depend on? Give me the last 3 examples\"\n      - Shadow SMEs during real work\
    \ to capture decision-making in context\n      - Use \"teach-back\" validation: document your understanding and have SME\
    \ correct it\n      \n      **4-step capture workflow:**\n      1. **Capture**: Record conversations with experienced\
    \ workers (voice preferred)\n      2. **Transcribe**: Convert to structured text using Amazon Transcribe\n      3. **Structure**:\
    \ Use Bedrock to extract decision trees, rules, and edge cases\n      4. **Validate**: Review with SME to confirm accuracy\
    \ before finalizing\n      \n      **PALETTE integration:**\n      - Store validated rules in Assumptions Register (RIU-008)\
    \ with testable conditions\n      - Document decision logic in Decision Log (RIU-003) for future reference\n      - Feed\
    \ into Edge-Case Catalog (RIU-014) for testing\n      - Flag assumptions that are ONE-WAY DOORs if they drive architecture\
    \ decisions\n      \n      Critical: Capture *why* decisions are made, not just *what* — the reasoning is often more valuable\
    \ than the rule itself."
  problem_type: Intake_and_Convergence
