- id: LIB-004
  question: What artifacts prove convergence has been achieved before implementation starts?
  answer: 'The Semantic Blueprint (Convergence Brief, RIU-001) is the primary artifact — it must contain five elements: Goal
    (measurable success criteria), Roles (human vs agent responsibilities), Capabilities (tools/agents needed), Constraints
    (binding requirements), and Non-goals (explicit exclusions). Supporting artifacts include: Stakeholder Map + RACI-lite
    (RIU-002) showing decision authority and escalation paths; Decision Log + One-Way Door Registry (RIU-003) documenting
    irreversible commitments; Success Metrics Charter (RIU-006) with outcome metrics and acceptance checks; Assumptions Register
    (RIU-008) listing testable assumptions with validation plans; and Problem → Workstream Decomposition (RIU-004) showing
    candidate RIUs without premature commitment. Per AWS CAF AI, also document ethical AI guidelines, data governance approach,
    and risk evaluation. Convergence is proven when stakeholders have signed off on these artifacts and no open questions
    block implementation. Store in decisions.md for restartability.'
  problem_type: Intake_and_Convergence
