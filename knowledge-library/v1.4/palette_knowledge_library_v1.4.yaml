- id: LIB-100
  question: How do I maintain continuity across sessions in a long engagement?
  answer: 'Use the COMPACT protocol (RIU-607). Before context fills: flush canonical facts to MEMORY.md, write a daily log
    with continuation note, update decisions.md. Next session starts by reading MEMORY.md + latest daily log + decisions.md
    before touching any phase artifacts. This prevents the two most common continuity failures: number drift between documents
    and lost operational context.

