- id: LIB-006
  question: What's the minimum viable convergence brief for a 2-week AI proof of concept?
  answer: "Even a 2-week PoC requires all five Semantic Blueprint elements (RIU-001), but scoped minimally:\n      \n    \
    \  **Goal**: One measurable outcome (e.g., \"80% accuracy on 50 test cases\" or \"< 3s latency at < $0.02/request\").\n\
    \      **Roles**: One human sponsor + one technical lead — skip full RACI.\n      **Capabilities**: Single AI capability\
    \ being validated (e.g., \"Document classification via Bedrock Claude\").\n      **Constraints**: Hard boundaries — budget\
    \ cap, data restrictions, no production deployment, token limits.\n      **Non-goals**: 2-3 explicit exclusions to prevent\
    \ scope creep.\n      \n      Per AWS guidance, add **exit criteria** with specific thresholds for quality, latency, and\
    \ cost — know when to pivot or stop. Validate only core components before full integration to isolate failure points.\
    \ Track unit economics early (per-request cost, token usage, compute). Document ethical AI considerations even for short\
    \ pilots. Use ONE-WAY DOOR check: if PoC requires irreversible decisions (data grants, vendor commits), get sign-off first.\
    \ Brief should fit one page — if not, you're overscoping."
  problem_type: Intake_and_Convergence
