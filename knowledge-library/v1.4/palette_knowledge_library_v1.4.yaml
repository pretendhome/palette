- id: LIB-161
  question: How do I design and implement AuthN/AuthZ for AI agent systems where agents act on behalf of users?
  answer: 'RIU-327 addresses the unique AuthN/AuthZ challenges of agentic AI systems. Challenge 1 — Agent Identity: every
    agent must have a distinct identity (service principal, IAM role, or managed identity) separate from the user it serves.
    This enables audit trails that distinguish "User A requested action X" from "Agent B executed action X on behalf of User
    A." Never share credentials between agents. Challenge 2 — Delegated Authorization: use OAuth 2.0 token exchange (RFC 8693)
    to create delegated tokens where the agent acts with a subset of the user''s permissions. The agent should never have
    broader permissions than the user. Implement scope narrowing: if the user has read-write access, the agent may only need
    read access for its current task. Challenge 3 — Least Privilege Per Task: agent permissions should be task-scoped, not
    session-scoped. When an agent performs a tool call, it should request only the permissions needed for that specific call.
    Use just-in-time access provisioning where possible. Challenge 4 — Audit Requirements: log every authentication event
    (agent login, token refresh, token exchange) and every authorization decision (access granted, access denied, scope narrowed).
    These logs must be tamper-proof and retained per compliance requirements. Cross-reference with RIU-029 (Tool-Calling Safety
    Envelope) for the tool-level permission model. Common failure: agents with long-lived, broad-scope tokens that persist
    across sessions. Implement token lifetime limits and automatic revocation when the user session ends.'
