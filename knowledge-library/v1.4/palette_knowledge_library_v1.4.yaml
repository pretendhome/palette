- id: LIB-184
  question: How do I optimize LLM inference for low-latency production applications?
  answer: "Low-latency inference is critical for interactive systems. Optimization strategies follow four layers: hardware\
    \ acceleration, model-level techniques, serving-level optimizations, and client-side strategies.\n\n1. **Hardware & Serving\
    \ Optimization**:\n   - **Quantization**: Use 4-bit or 8-bit (INT8/FP8) quantization (e.g., AWQ, GPTQ) to reduce model\
    \ size and memory bandwidth requirements. This can improve throughput by 2-4x.\n   - **FlashAttention-2**: Implement memory-efficient\
    \ attention kernels (FlashAttention) to reduce memory access during the attention step.\n   - **KV Caching**: Cache the\
    \ key-value (KV) states of the tokens generated during the prompt phase to avoid recomputing them during the generation\
    \ phase.\n\n2. **Model-Level Techniques**:\n   - **Speculative Decoding**: Use a small draft model (e.g., Llama-7B) to\
    \ predict the next token and a larger target model (e.g., Llama-70B) to verify it in parallel. This significantly reduces\
    \ generation time.\n   - **Knowledge Distillation**: Train a smaller model to mimic the outputs of a larger one, resulting\
    \ in a faster but similarly capable model.\n\n3. **Serving-Level Optimizations**:\n   - **Continuous Batching**: Batch\
    \ incoming requests dynamically at the token level, maximizing GPU utilization (e.g., vLLM, TGI).\n   - **Streaming**:\
    \ Stream tokens back to the client as they are generated to reduce 'Time to First Token' (TTFT) perception.\n\n4. **Client-Side\
    \ Strategies**:\n   - **Semantic Caching**: Use a client-side vector store to cache and reuse responses for similar queries.\n\
    \   - **Prefetching**: Predict and pre-generate likely user responses in the background.\n\n**Implementation Threshold**:\
    \ If TTFT exceeds 500ms or tokens-per-second (TPS) falls below 20, move from baseline serving to quantized models and\
    \ speculative decoding.\n"
  sources:
  - title: 'vLLM: High-throughput Serving with PagedAttention'
    url: https://docs.vllm.ai/en/latest/index.html
  - title: 'NVIDIA: TensorRT-LLM Performance Guide'
    url: https://nvidia.github.io/TensorRT-LLM/performance.html
  - title: 'Anthropic: Optimizing Claude Latency'
    url: https://docs.anthropic.com/en/docs/build-with-claude/latency-optimization
