- id: LIB-153
  question: How do I compile a security review packet that passes review without delays?
  answer: 'RIU-250 defines the security review packet with six sections. Section 1 — System Overview: architecture diagram
    showing all components, data flows, trust boundaries, and external dependencies. Include the deployment model (single-tenant,
    multi-tenant, serverless). Section 2 — Threat Model: use STRIDE (Spoofing, Tampering, Repudiation, Information Disclosure,
    Denial of Service, Elevation of Privilege) to identify threats at each trust boundary. For each threat: describe the attack
    vector, assess likelihood and impact, and document the mitigation. Section 3 — Data Flow Diagram: show how data moves
    through the system, including at-rest and in-transit encryption, storage locations, retention policies, and deletion procedures.
    Highlight any PII or regulated data paths. Cross-reference with RIU-012 (PII/Compliance Triage). Section 4 — Permissions
    Matrix: for every identity (human user, service account, agent), document: what they can access, what permission level
    (read/write/admin), how authentication works, and how access is revoked. Cross-reference with RIU-010 (Access Checklist).
    Section 5 — Mitigation Status: for each identified threat, show the current status: mitigated (control implemented and
    tested), in-progress (control being built), accepted (risk acknowledged by decision authority), or deferred (with timeline).
    Section 6 — Residual Risk Statement: explicitly state what risks remain after all mitigations. Security reviewers respect
    honesty about residual risk far more than claims of zero risk. Common delay cause: incomplete data flow diagrams — security
    reviewers cannot assess what they cannot see.'
