- id: LIB-050
  question: What's the best fallback strategy when AI confidence drops below threshold?
  answer: "Low confidence means the AI doesn't know if it's right. The fallback strategy depends on the stakes: low-stakes\
    \ can fail gracefully, high-stakes need human review.\n      \n      **Confidence threshold framework:**\n      \n   \
    \   ```\n      Confidence Score\n      │\n      ├── HIGH (>0.85): Proceed automatically\n      │\n      ├── MEDIUM (0.65-0.85):\
    \ Proceed with caveats\n      │   └── Flag for async review, include uncertainty indicator\n      │\n      ├── LOW (0.40-0.65):\
    \ Fallback required\n      │   └── Human review, alternative model, or graceful decline\n      │\n      └── VERY LOW (<0.40):\
    \ Decline to answer\n          └── \"I'm not confident enough to answer this\"\n      ```\n      \n      **Fallback decision\
    \ tree:**\n      \n      ```\n      AI confidence < threshold\n      │\n      ├─ Is this a high-stakes decision?\n   \
    \   │  ├─ YES → Route to human review (HITL)\n      │  │        ├─ Approval-based: Human approves/rejects\n      │  │\
    \        └─ Review-and-edit: Human modifies output\n      │  │\n      │  └─ NO → Try fallback chain\n      │         \
    \  ├─ Step 1: Retry with different prompt\n      │           ├─ Step 2: Try alternative model\n      │           ├─ Step\
    \ 3: Return partial answer with caveat\n      │           └─ Step 4: Graceful decline\n      │\n      └─ Has user asked\
    \ for confirmation?\n         ├─ YES → Provide answer with explicit uncertainty\n         └─ NO → Follow decision tree\
    \ above\n      ```\n      \n      **Fallback options (ordered by preference):**\n      \n      | Priority | Fallback |\
    \ When to Use | User Impact |\n      |----------|----------|-------------|-------------|\n      | 1 | Retry with refined\
    \ prompt | Confidence borderline | Minimal delay |\n      | 2 | Alternative model | Primary model uncertain | Slightly\
    \ different output |\n      | 3 | Cached/similar response | Similar query answered before | Fast, may be stale |\n   \
    \   | 4 | Partial answer + caveat | Can answer partially | Useful but incomplete |\n      | 5 | Human review (async) |\
    \ Non-urgent, quality critical | Delayed response |\n      | 6 | Human review (sync) | Urgent, high-stakes | Wait for\
    \ human |\n      | 7 | Graceful decline | Cannot help | Clear \"I don't know\" |\n      \n      **HITL patterns for low\
    \ confidence (Amazon A2I):**\n      \n      ```yaml\n      hitl_patterns:\n        approval_based:\n          trigger:\
    \ \"confidence < 0.65 AND action.is_irreversible\"\n          flow: \"AI generates → Human approves/rejects → Execute\
    \ or discard\"\n          use_case: \"Financial decisions, compliance actions\"\n          \n        review_and_edit:\n\
    \          trigger: \"confidence < 0.75 AND output.is_customer_facing\"\n          flow: \"AI generates → Human edits\
    \ → Publish modified\"\n          use_case: \"Content creation, customer communications\"\n          \n        escalation_based:\n\
    \          trigger: \"confidence < 0.50 OR user.requests_human\"\n          flow: \"AI attempts → Fails threshold → Handoff\
    \ to human agent\"\n          use_case: \"Customer support, complex queries\"\n          \n        feedback_loop:\n  \
    \        trigger: \"all outputs\" (background)\n          flow: \"AI generates → User interacts → Feedback captured →\
    \ Model improves\"\n          use_case: \"Continuous improvement, collaborative workflows\"\n      ```\n      \n     \
    \ **Implementation with confidence thresholds:**\n      \n      ```python\n      def handle_ai_response(response, context):\n\
    \          confidence = response.confidence_score\n          \n          # High confidence: proceed automatically\n  \
    \        if confidence >= 0.85:\n              return AIResult(response.output, status=\"auto_approved\")\n          \n\
    \          # Medium confidence: proceed with caveat\n          elif confidence >= 0.65:\n              return AIResult(\n\
    \                  response.output,\n                  status=\"uncertain\",\n                  caveat=\"This response\
    \ may need verification\",\n                  flag_for_review=True\n              )\n          \n          # Low confidence:\
    \ fallback chain\n          elif confidence >= 0.40:\n              # Try alternative model\n              alt_response\
    \ = try_alternative_model(context)\n              if alt_response.confidence >= 0.65:\n                  return handle_ai_response(alt_response,\
    \ context)\n              \n              # Route to human if high-stakes\n              if context.is_high_stakes:\n\
    \                  return route_to_human_review(context, response)\n              \n              # Return partial with\
    \ strong caveat\n              return AIResult(\n                  response.output,\n                  status=\"low_confidence\"\
    ,\n                  caveat=\"I'm not very confident in this answer\"\n              )\n          \n          # Very low\
    \ confidence: decline\n          else:\n              return AIResult(\n                  output=None,\n             \
    \     status=\"declined\",\n                  message=\"I don't have enough information to answer this confidently\"\n\
    \              )\n      ```\n      \n      **User communication during fallback:**\n      \n      | Confidence Level |\
    \ What to Tell User |\n      |------------------|-------------------|\n      | Medium | \"Here's my answer, but you may\
    \ want to verify...\" |\n      | Low | \"I'm not very confident. Here's my best guess...\" |\n      | Very Low | \"I don't\
    \ have enough information to answer this.\" |\n      | Human Review | \"This needs human review. Expected response time:\
    \ X\" |\n      | Fallback Model | No indication needed (transparent to user) |\n      \n      **Learning from low-confidence\
    \ cases:**\n      \n      ```yaml\n      low_confidence_logging:\n        capture:\n          - input_query\n        \
    \  - confidence_score\n          - fallback_path_taken\n          - human_feedback (if HITL)\n          - final_outcome\n\
    \          \n        analysis:\n          - \"Which query types trigger low confidence?\"\n          - \"Does alternative\
    \ model perform better?\"\n          - \"What did humans do differently?\"\n          \n        improvement:\n       \
    \   - Add low-confidence queries to evaluation set\n          - Fine-tune on human-corrected examples\n          - Update\
    \ prompts to handle common low-confidence patterns\n      ```\n      \n      **Setting confidence thresholds:**\n    \
    \  \n      | Factor | Lower Threshold | Higher Threshold |\n      |--------|-----------------|------------------|\n  \
    \    | High stakes | | ✅ |\n      | Customer-facing | | ✅ |\n      | Reversible action | ✅ | |\n      | Internal only\
    \ | ✅ | |\n      | Time-sensitive | ✅ (prefer speed) | |\n      | Compliance-related | | ✅ |\n      \n      **PALETTE\
    \ integration:**\n      - Document threshold settings in RIU-500 (Prompt/Model Config)\n      - Configure HITL workflows\
    \ in RIU-513 (Human Approval for ONE-WAY DOORs)\n      - Track low-confidence patterns in RIU-101 (Failure Mode Catalog)\n\
    \      - Log fallback events in RIU-100 (Incident Log)\n      \n      Key insight: \"I don't know\" is a valid and valuable\
    \ AI output. A system that confidently gives wrong answers is worse than one that admits uncertainty. Design fallbacks\
    \ that preserve user trust."
