    before acting: trust barrier, usability barrier, and perceived value barrier each have different fixes.'
- id: LIB-073
  question: What's the minimum viable governance for AI systems in regulated industries?
  answer: "\"Minimum viable\" in regulated industries means: enough governance to be defensible to regulators, not comprehensive\
    \ governance. Start with what can get you shut down (risk, audit, oversight), then iterate.\n      \n      **Minimum viable\
    \ governance framework:**\n      \n      ```\n      ┌─────────────────────────────────────────────────────────────┐\n\
    \      │           MINIMUM VIABLE AI GOVERNANCE                       │\n      ├─────────────────────────────────────────────────────────────┤\n\
    \      │                                                             │\n      │  TIER 1: NON-NEGOTIABLE (Day 1)      \
    \                       │\n      │  ─────────────────────────────                              │\n      │  ✓ Risk assessment\
    \ completed                                │\n      │  ✓ Human oversight for high-stakes decisions                │\n\
    \      │  ✓ Audit logging enabled                                    │\n      │  ✓ Data governance basics (PII, access\
    \ controls)            │\n      │  ✓ Accountability assigned (who owns this?)                 │\n      │             \
    \                                                │\n      │  TIER 2: REQUIRED (Within 30 days)                       \
    \   │\n      │  ─────────────────────────────────                          │\n      │  ✓ Policies documented         \
    \                             │\n      │  ✓ Model documentation (model cards)                        │\n      │  ✓ Incident\
    \ response procedures                             │\n      │  ✓ Training for operators                               \
    \    │\n      │  ✓ Monitoring dashboards                                    │\n      │                               \
    \                              │\n      │  TIER 3: MATURE (Within 90 days)                            │\n      │  ───────────────────────────────\
    \                            │\n      │  ○ Automated compliance checks                              │\n      │  ○ Bias/fairness\
    \ testing                                    │\n      │  ○ Third-party audits                                       │\n\
    \      │  ○ Governance board established                             │\n      │  ○ Continuous improvement process    \
    \                       │\n      │                                                             │\n      └─────────────────────────────────────────────────────────────┘\n\
    \      ```\n      \n      **Tier 1: Non-negotiable controls (Day 1)**\n      \n      ```yaml\n      tier_1_controls:\n\
    \        risk_assessment:\n          requirement: \"Document what can go wrong\"\n          minimum_content:\n       \
    \     - \"AI system description and purpose\"\n            - \"Risk identification (what could fail)\"\n            -\
    \ \"Impact assessment (who gets hurt)\"\n            - \"Risk mitigation (how we prevent/reduce)\"\n          regulator_question:\
    \ \"Did you assess the risks before deploying?\"\n          \n        human_oversight:\n          requirement: \"Human\
    \ decision-maker for significant impacts\"\n          implementation:\n            - \"High-stakes decisions require human\
    \ approval\"\n            - \"Escalation path defined\"\n            - \"Override capability available\"\n          regulator_question:\
    \ \"Who was responsible for this decision?\"\n          \n        audit_logging:\n          requirement: \"Prove what\
    \ happened\"\n          minimum_logging:\n            - \"All AI decisions (input, output, timestamp)\"\n            -\
    \ \"Who accessed the system\"\n            - \"Configuration changes\"\n          retention: \"Per regulatory requirement\
    \ (often 5-10 years)\"\n          regulator_question: \"Show me the record of this transaction\"\n          \n       \
    \ data_governance:\n          requirement: \"Know your data, protect it\"\n          minimum_controls:\n            -\
    \ \"PII identified and protected\"\n            - \"Access controls implemented\"\n            - \"Data lineage documented\"\
    \n          regulator_question: \"Where did this data come from? Who can access it?\"\n          \n        accountability:\n\
    \          requirement: \"Named responsible party\"\n          implementation:\n            - \"AI system owner identified\"\
    \n            - \"Decision authority defined\"\n            - \"Escalation contacts documented\"\n          regulator_question:\
    \ \"Who is accountable for this system?\"\n      ```\n      \n      **Industry-specific requirements:**\n      \n    \
    \  | Industry | Key Regulation | Minimum Viable Additions |\n      |----------|----------------|--------------------------|\n\
    \      | **Financial Services** | OCC guidance, FFIEC, GDPR, EU AI Act | Model risk management, fair lending testing,\
    \ explainable credit decisions |\n      | **Healthcare** | HIPAA, FDA guidance, HITECH | PHI protection, clinical decision\
    \ support safeguards, validation studies |\n      | **Government (US)** | OMB M-24-10, EO 14110 | Rights-impacting AI\
    \ inventory, public transparency, procurement requirements |\n      | **Government (EU)** | EU AI Act | Risk classification,\
    \ conformity assessment, CE marking (high-risk) |\n      | **Insurance** | State regulations, NAIC guidance | Actuarial\
    \ review, non-discrimination testing, rate justification |\n      \n      **Financial Services specifics:**\n      \n\
    \      ```yaml\n      fsi_minimum_governance:\n        model_risk_management:\n          requirement: \"SR 11-7 / OCC\
    \ 2011-12 applies to AI\"\n          controls:\n            - \"Model validation (independent review)\"\n            -\
    \ \"Model inventory maintained\"\n            - \"Performance monitoring\"\n            - \"Model documentation\"\n  \
    \          \n        fair_lending:\n          requirement: \"ECOA, Fair Housing Act\"\n          controls:\n         \
    \   - \"Disparate impact testing\"\n            - \"Adverse action notices with reasons\"\n            - \"No prohibited\
    \ factors in decisions\"\n            \n        consumer_protection:\n          requirement: \"UDAP/UDAAP\"\n        \
    \  controls:\n            - \"Clear disclosure of AI use\"\n            - \"Accurate representations\"\n            -\
    \ \"Consumer recourse available\"\n            \n        aws_tools:\n          - \"Bedrock Guardrails (content filtering)\"\
    \n          - \"SageMaker Model Monitor (drift detection)\"\n          - \"AWS Audit Manager (GenAI framework)\"\n   \
    \   ```\n      \n      **Healthcare specifics:**\n      \n      ```yaml\n      healthcare_minimum_governance:\n      \
    \  hipaa_compliance:\n          requirement: \"Protected Health Information\"\n          controls:\n            - \"PHI\
    \ not used in training without authorization\"\n            - \"BAA with AI service providers\"\n            - \"Access\
    \ logging for PHI\"\n            - \"Minimum necessary principle\"\n            \n        clinical_decision_support:\n\
    \          requirement: \"FDA guidance (if applicable)\"\n          controls:\n            - \"Intended use clearly defined\"\
    \n            - \"Clinical validation documentation\"\n            - \"Human clinician in the loop\"\n            - \"\
    Clear disclaimers\"\n            \n        patient_safety:\n          requirement: \"First, do no harm\"\n          controls:\n\
    \            - \"Failsafe to human for uncertainty\"\n            - \"Adverse event reporting\"\n            - \"Quality\
    \ monitoring\"\n      ```\n      \n      **Government specifics:**\n      \n      ```yaml\n      government_minimum_governance:\n\
    \        omb_m24_10_requirements:\n          # For US federal agencies\n          controls:\n            - \"AI use case\
    \ inventory\"\n            - \"Rights-impacting AI identification\"\n            - \"Minimum risk management practices\"\
    \n            - \"Chief AI Officer designated\"\n            \n        transparency:\n          requirement: \"Public\
    \ accountability\"\n          controls:\n            - \"Public disclosure of AI use cases\"\n            - \"Algorithmic\
    \ impact assessments\"\n            - \"Citizen recourse mechanisms\"\n            \n        procurement:\n          requirement:\
    \ \"Responsible AI acquisition\"\n          controls:\n            - \"Vendor AI governance assessment\"\n           \
    \ - \"Contractual compliance requirements\"\n            - \"Ongoing monitoring obligations\"\n      ```\n      \n   \
    \   **Minimum viable checklist (all industries):**\n      \n      ```yaml\n      mvg_checklist:\n        # Complete before\
    \ production deployment\n        before_go_live:\n          risk:\n            - \"Risk assessment completed and documented\"\
    \n            - \"Risk owner identified\"\n            - \"Mitigation controls implemented\"\n            \n         \
    \ oversight:\n            - \"Human oversight process defined\"\n            - \"Escalation path documented\"\n      \
    \      - \"Override capability tested\"\n            \n          audit:\n            - \"Logging enabled for all decisions\"\
    \n            - \"Logs stored immutably\"\n            - \"Query capability verified\"\n            \n          data:\n\
    \            - \"PII/sensitive data identified\"\n            - \"Access controls implemented\"\n            - \"Data\
    \ lineage documented\"\n            \n          accountability:\n            - \"System owner named\"\n            - \"\
    Contact information current\"\n            - \"Responsibilities documented\"\n            \n        # Document but can\
    \ refine post-launch\n          policy:\n            - \"Acceptable use policy drafted\"\n            - \"Incident response\
    \ procedure exists\"\n            - \"Training plan identified\"\n            \n        # Can iterate after launch\n \
    \         optimization:\n            - \"Bias testing planned\"\n            - \"Governance board formation planned\"\n\
    \            - \"Automation roadmap defined\"\n      ```\n      \n      **Phase-in approach:**\n      \n      | Phase\
    \ | Timeline | Focus | Governance Maturity |\n      |-------|----------|-------|---------------------|\n      | **Launch**\
    \ | Day 0 | Tier 1 controls | Defensible minimum |\n      | **Stabilize** | Days 1-30 | Tier 2 documentation | Documented\
    \ processes |\n      | **Mature** | Days 31-90 | Tier 3 automation | Scalable governance |\n      | **Optimize** | Ongoing\
    \ | Continuous improvement | Best-in-class |\n      \n      **PALETTE integration:**\n      - Configure controls in RIU-530\
    \ (AI Governance Config)\n      - Implement guardrails via RIU-531 (Guardrail Selection)\n      - Document in RIU-533\
    \ (FRIA - Fundamental Rights Impact Assessment)\n      - Train team using RIU-140 (Training Materials)\n      \n     \
    \ Key insight: \"Minimum viable\" doesn't mean \"minimal\" — it means \"enough to be defensible.\" When a regulator asks,\
    \ you need to answer: \"Yes, we assessed the risks. Yes, humans are in the loop. Yes, we have records. Here's who's responsible.\"\
    \ If you can answer those four questions, you have minimum viable governance."
