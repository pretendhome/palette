- id: LIB-165
  question: How do I design a multi-brand AI strategy that preserves brand autonomy while enabling shared platform capabilities?
  answer: 'RIU-600 implements the federated AI strategy pattern based on the LVMH maison autonomy model. Step 1 — Brand Landscape
    Map: for each brand, document: customer base (demographics, expectations), operations model (centralized vs distributed),
    price positioning (luxury vs value), digital maturity, and AI readiness. This map determines which brands can share capabilities
    and which need bespoke solutions. Step 2 — Shared vs Specific: divide AI capabilities into three tiers. Tier 1 Shared
    Platform (mandatory): infrastructure (compute, storage, MLOps), data platform (lakehouse, feature store), security and
    compliance framework, and cost management. Tier 2 Shared Optional: common use cases where brands opt in — inventory optimization,
    customer segmentation, demand forecasting. Brands choose to adopt, adapt, or ignore. Tier 3 Brand-Specific: use cases
    unique to a brand — luxury concierge vs value-price optimizer, brand-specific language and tone, customer experience differentiators.
    Step 3 — Federated Governance: centralize platform decisions (which cloud, which MLOps stack, which guardrails). Decentralize
    use case decisions (each brand chooses its AI priorities). Establish a cross-brand AI council that meets monthly to share
    learnings (not to mandate uniformity). Step 4 — Per-Brand Convergence: create a convergence brief (RIU-001) for each brand
    that references the shared platform constraints but defines brand-specific goals, success metrics, and timelines. Step
    5 — Anti-Pattern Prevention: avoid the "one-size-fits-all" trap where a centralized team builds generic solutions that
    satisfy no brand fully.'
