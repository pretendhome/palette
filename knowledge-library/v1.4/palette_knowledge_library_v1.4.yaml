- id: LIB-145
  question: How do I implement a human review gate for one-way door decisions in AI systems?
  answer: 'RIU-087 defines a gating process for irreversible decisions. Step 1 — Identify One-Way Doors: catalog all decisions
    that are difficult or impossible to reverse. In AI systems, common one-way doors include: production data deletion, model
    deployment to customer-facing systems, API contract changes that break backward compatibility, granting data access to
    third parties, and compliance certifications. Tag each in decisions.md with "ONE-WAY DOOR" label. Step 2 — Review Checklist:
    for each one-way door category, define a review checklist. Example for model deployment: (a) regression suite passes (RIU-086),
    (b) cost/latency within budget envelope (RIU-085), (c) security review complete (RIU-250), (d) rollback plan documented
    and tested, (e) monitoring alerts configured. Step 3 — Sign-Off Protocol: require explicit sign-off from the designated
    decision authority (identified via RIU-002 RACI). Sign-off must be recorded in decisions.md with: decision description,
    reviewer name, date, conditions, and any dissenting opinions. Step 4 — Bypass Prevention: the gate must not be bypassable
    by the agent or automation. Implement as a hard block in the workflow — the system cannot proceed without the recorded
    sign-off. Common failure: gates get bypassed during "urgent" incidents. Counter by defining an emergency bypass protocol
    that requires two approvers and mandatory post-incident review. The gate is itself a two-way door (you can change the
    gate criteria), but the decisions it protects are one-way doors.'
  problem_type: Trust_Governance_and_Adoption
