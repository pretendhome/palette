- id: LIB-072
  question: How do I measure AI adoption vs AI avoidance in production?
  answer: "Adoption metrics show if people use AI. Avoidance metrics show if they're working around it. You need both — high\
    \ adoption with high avoidance means people use AI when forced but avoid it when they can.\n      \n      **Adoption vs.\
    \ Avoidance framework:**\n      \n      ```\n      ┌─────────────────────────────────────────────────────────────┐\n \
    \     │                 ADOPTION-AVOIDANCE MATRIX                    │\n      ├─────────────────────────────────────────────────────────────┤\n\
    \      │                                                             │\n      │           LOW AVOIDANCE         HIGH AVOIDANCE\
    \              │\n      │         ┌────────────────┐    ┌────────────────┐           │\n      │  HIGH   │  ✅ SUCCESS \
    \   │    │  ⚠️ COMPLIANCE  │           │\n      │ ADOPTION│  Genuine use   │    │  Forced use,   │           │\n     \
    \ │         │  Users prefer  │    │  workarounds   │           │\n      │         │  AI            │    │  when possible\
    \ │           │\n      │         └────────────────┘    └────────────────┘           │\n      │         ┌────────────────┐\
    \    ┌────────────────┐           │\n      │   LOW   │  \U0001F4CA NASCENT    │    │  ❌ RESISTANCE  │           │\n  \
    \    │ ADOPTION│  Early stage,  │    │  Active        │           │\n      │         │  room to grow  │    │  avoidance,\
    \    │           │\n      │         │                │    │  possible      │           │\n      │         │          \
    \      │    │  shadow AI     │           │\n      │         └────────────────┘    └────────────────┘           │\n   \
    \   │                                                             │\n      └─────────────────────────────────────────────────────────────┘\n\
    \      ```\n      \n      **Adoption metrics (are people using AI?):**\n      \n      | Metric | What It Measures | Calculation\
    \ | Target |\n      |--------|------------------|-------------|--------|\n      | **Active users / Licensed users** |\
    \ Breadth of adoption | Unique users / Total licenses | >70% |\n      | **Frequency of use** | Habit formation | Sessions\
    \ per user per week | Daily |\n      | **Feature utilization** | Depth of adoption | Features used / Available | >50%\
    \ of key features |\n      | **Session duration** | Engagement | Average time per session | Increasing |\n      | **Tasks\
    \ completed with AI** | Productivity impact | AI-assisted tasks / Total tasks | Increasing |\n      | **Voluntary vs.\
    \ Required use** | Genuine preference | Voluntary sessions / Total | >60% |\n      \n      **Avoidance metrics (are people\
    \ working around AI?):**\n      \n      | Metric | What It Measures | How to Detect | Red Flag |\n      |--------|------------------|---------------|----------|\n\
    \      | **Override rate** | Trust issues | AI suggestions rejected | >50% |\n      | **Manual bypass rate** | Preference\
    \ for old way | Tasks done manually when AI available | Increasing |\n      | **Edit-to-completion rate** | AI output\
    \ quality | Edits before accepting AI output | >80% edits |\n      | **Time to first use** | Resistance | Days from access\
    \ to first use | >14 days |\n      | **Dropped sessions** | Frustration | Sessions started but not completed | >30% |\n\
    \      | **Shadow AI usage** | Sanctioned tools inadequate | External AI tool usage detected | Any |\n      | **Help desk\
    \ tickets** | Usability issues | Tickets about AI system | Increasing |\n      \n      **Behavioral signals of avoidance:**\n\
    \      \n      ```yaml\n      avoidance_behaviors:\n        active_avoidance:\n          signals:\n            - \"Consistently\
    \ routes work to non-AI path\"\n            - \"Uses AI only when manager is watching\"\n            - \"Completes AI\
    \ workflow but re-does manually\"\n            - \"Uses personal AI tools instead of corporate\"\n          detection:\n\
    \            - \"Compare AI vs. non-AI task completion by user\"\n            - \"Session timestamps (only during reviews)\"\
    \n            - \"Duplicate work patterns\"\n            - \"Network traffic to external AI services\"\n            \n\
    \        passive_avoidance:\n          signals:\n            - \"Never logs in despite training\"\n            - \"Logs\
    \ in but doesn't complete tasks\"\n            - \"Uses minimum features only\"\n            - \"Doesn't explore new capabilities\"\
    \n          detection:\n            - \"Login frequency tracking\"\n            - \"Feature usage analytics\"\n      \
    \      - \"Time-in-app metrics\"\n            - \"Completion rates\"\n            \n        workarounds:\n          signals:\n\
    \            - \"Copy-paste to external tools\"\n            - \"Screenshots instead of using integrations\"\n       \
    \     - \"Manual data entry despite automation\"\n            - \"Email instead of using AI assistant\"\n          detection:\n\
    \            - \"Clipboard monitoring (privacy-aware)\"\n            - \"Integration usage vs. manual patterns\"\n   \
    \         - \"Process mining\"\n      ```\n      \n      **Metrics dashboard design:**\n      \n      ```yaml\n      adoption_dashboard:\n\
    \        executive_view:\n          - \"Overall adoption rate (% active users)\"\n          - \"Trend: Adoption over time\"\
    \n          - \"ROI: Time saved / Cost\"\n          - \"Risk: Shadow AI incidents\"\n          \n        team_manager_view:\n\
    \          - \"Team adoption rate\"\n          - \"Top users (celebrate)\"\n          - \"Non-users (support needed)\"\
    \n          - \"Common issues raised\"\n          \n        detailed_analytics:\n          by_user:\n            - \"\
    First use date\"\n            - \"Frequency\"\n            - \"Features used\"\n            - \"Override rate\"\n    \
    \        - \"Feedback provided\"\n            \n          by_feature:\n            - \"Usage rate\"\n            - \"\
    Success rate\"\n            - \"Avoidance rate\"\n            - \"User satisfaction\"\n            \n          by_team:\n\
    \            - \"Adoption rate\"\n            - \"Average engagement\"\n            - \"Barriers identified\"\n      ```\n\
    \      \n      **Intervention triggers:**\n      \n      ```yaml\n      intervention_triggers:\n        individual_level:\n\
    \          - trigger: \"No login in 14 days post-training\"\n            action: \"Personal outreach from AI ambassador\"\
    \n            \n          - trigger: \"Override rate >70% for 2 weeks\"\n            action: \"1:1 to understand concerns\"\
    \n            \n          - trigger: \"Dropped 5+ sessions in a week\"\n            action: \"Usability support session\"\
    \n            \n        team_level:\n          - trigger: \"Team adoption <50% after 30 days\"\n            action: \"\
    Team training refresh + manager engagement\"\n            \n          - trigger: \"Team avoidance metrics increasing\"\
    \n            action: \"Focus group to identify barriers\"\n            \n        system_level:\n          - trigger:\
    \ \"Shadow AI usage detected\"\n            action: \"Assess if sanctioned tools meet needs\"\n            \n        \
    \  - trigger: \"Overall adoption plateau\"\n            action: \"New feature launch or success story campaign\"\n   \
    \   ```\n      \n      **Segmentation for analysis:**\n      \n      | Segment | What to Look For | Action |\n      |---------|------------------|--------|\n\
    \      | **Champions** (high adopt, low avoid) | What's working for them? | Amplify their stories |\n      | **Compliant**\
    \ (high adopt, high avoid) | Why the workarounds? | Fix usability issues |\n      | **Potential** (low adopt, low avoid)\
    \ | Awareness or access issue? | Training and outreach |\n      | **Resistant** (low adopt, high avoid) | Root cause of\
    \ resistance? | 1:1 intervention |\n      \n      **Qualitative signals (complement quantitative):**\n      \n      ```yaml\n\
    \      qualitative_measurement:\n        surveys:\n          frequency: \"Monthly or quarterly\"\n          questions:\n\
    \            - \"How useful is the AI tool for your work? (1-10)\"\n            - \"What prevents you from using it more?\"\
    \n            - \"What would make it more valuable?\"\n          analysis: \"Sentiment trending, theme extraction\"\n\
    \          \n        feedback_channels:\n          - \"In-app feedback (thumbs up/down)\"\n          - \"Anonymous suggestion\
    \ box\"\n          - \"AI ambassador feedback\"\n          - \"Support ticket themes\"\n          \n        observational:\n\
    \          - \"Shadowing users during tasks\"\n          - \"Think-aloud sessions\"\n          - \"Focus groups by segment\"\
    \n      ```\n      \n      **PALETTE integration:**\n      - Track adoption in RIU-141 (Change Management Plan)\n    \
    \  - Store training records in RIU-140 (Training Materials)\n      - Monitor usage via RIU-532 (Model Registry) deployment\
    \ metrics\n      - Feed into RIU-001 (Convergence Brief) for stakeholder updates\n      \n      Key insight: High adoption\
    \ + high avoidance = compliance theater. Users tick the box but don't genuinely rely on AI. The goal is high adoption\
    \ + low avoidance — people choose AI because it helps them. Measure both, or you'll miss the story."
  problem_type: Trust_Governance_and_Adoption
