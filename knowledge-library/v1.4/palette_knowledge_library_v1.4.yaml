- id: LIB-179
  question: How do I detect hallucination in production LLM outputs?
  answer: 'Hallucination detection in production requires multiple complementary strategies because no single method catches
    all types. Start with reference-based checking: compare LLM output claims against your source documents using semantic
    similarity. If the output asserts a fact not grounded in the provided context, flag it. Second, implement self-consistency
    checking: ask the same question multiple times with different temperatures and compare outputs. Inconsistent answers on
    factual questions indicate hallucination. Third, add structured output validation: if the LLM should return JSON with
    specific fields, validate the schema and check that referenced entities exist in your database. Fourth, deploy an LLM-as-judge
    pipeline where a second model evaluates whether the first model''s output is grounded in the provided context. This catches
    subtle hallucinations that string matching misses. Fifth, track hallucination rates per query type and model version.
    Some query patterns trigger hallucination more than others. Build a regression suite of known hallucination-inducing prompts
    and test every model update against it. The goal is not zero hallucination — it is known, measured, bounded hallucination
    with clear fallback paths.

    '
  sources:
  - title: Anthropic — Reducing Hallucination in AI Systems
    url: https://docs.anthropic.com/en/docs/build-with-claude/reduce-hallucinations
    accessed: '2026-04-03'
