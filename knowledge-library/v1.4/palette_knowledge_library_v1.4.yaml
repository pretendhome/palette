- id: LIB-176
  question: How do I scope QA testing based on what actually changed instead of testing everything?
  answer: 'Use diff-aware QA scoping: start from the code diff, trace to affected components, then select a testing tier.
    Step 1 — Change scope analysis: read the diff, identify which files changed, map those to affected routes, services, and
    UI components. Step 2 — Tier selection based on risk: Quick (under 2 min, smoke test for low-risk changes), Standard (5-15
    min, affected routes plus adjacent components for most PRs), or Exhaustive (30-60 min, full coverage for major releases,
    security changes, or data model changes). Step 3 — Test plan ordered by risk: for each affected component, test happy
    path, one failure path, and one edge case. Step 4 — Health score: quantify quality 0-100 with category breakdown so you
    can track improvement over time. Step 5 — Regression delta: compare against previous baseline to identify what improved,
    what regressed, and what is new. The key insight is that testing everything equally wastes time on unchanged code while
    under-testing the actual changes.'
  problem_type: Reliability_and_Failure_Handling
