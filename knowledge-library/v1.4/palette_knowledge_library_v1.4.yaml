- id: LIB-049
  question: How do I handle cascading failures in multi-model AI pipelines?
  answer: "Cascading failures occur when one component's failure propagates to dependent components. In multi-model pipelines,\
    \ this is especially dangerous — Model A's timeout can exhaust Model B's connection pool, which crashes Model C. Design\
    \ for isolation, not just redundancy.\n      \n      **Cascade failure patterns in AI pipelines:**\n      ```\n      Model\
    \ A fails (timeout)\n           ↓\n      Model B retries exhaustively (no backoff)\n           ↓\n      Model B exhausts\
    \ connection pool / hits rate limit\n           ↓\n      Model C waiting on B times out\n           ↓\n      Entire pipeline\
    \ fails\n           ↓\n      Users retry → amplifies load → system collapse\n      ```\n      \n      **Defense-in-depth\
    \ architecture:**\n      ```\n                    ┌─────────────────────────────────────────┐\n                    │ \
    \          LOAD SHEDDING                 │\n                    │    (reject excess requests early)       │\n        \
    \            └─────────────────────────────────────────┘\n                                      ↓\n                  \
    \  ┌─────────────────────────────────────────┐\n                    │           BULKHEADS                     │\n    \
    \                │    (isolate resources per model)        │\n                    └─────────────────────────────────────────┘\n\
    \                                      ↓\n      ┌──────────────┐    ┌──────────────┐    ┌──────────────┐\n      │   Model\
    \ A    │    │   Model B    │    │   Model C    │\n      │   + Circuit  │    │   + Circuit  │    │   + Circuit  │\n   \
    \   │   Breaker    │    │   Breaker    │    │   Breaker    │\n      └──────────────┘    └──────────────┘    └──────────────┘\n\
    \                                      ↓\n                    ┌─────────────────────────────────────────┐\n          \
    \          │        GRACEFUL DEGRADATION             │\n                    │    (fallback when models fail)         \
    \ │\n                    └─────────────────────────────────────────┘\n      ```\n      \n      **Pattern 1: Circuit Breakers\
    \ (stop calling failing models)**\n      \n      ```yaml\n      circuit_breaker_config:\n        model_a:\n          failure_threshold:\
    \ 5        # Open after 5 failures\n          success_threshold: 3        # Close after 3 successes\n          timeout_seconds:\
    \ 30         # Half-open test interval\n          \n          states:\n            closed: \"Normal operation, requests\
    \ pass through\"\n            open: \"Failures detected, requests fail fast (don't call model)\"\n            half_open:\
    \ \"Testing if model recovered\"\n      ```\n      \n      **AWS Implementation (Lambda + DynamoDB):**\n      ```python\n\
    \      # Lambda extension checks circuit status before calling model\n      def check_circuit(model_name):\n         \
    \ status = dynamodb.get_item(Key={'model': model_name})\n          if status['state'] == 'OPEN':\n              if time.now()\
    \ > status['retry_after']:\n                  return 'HALF_OPEN'  # Try one request\n              raise CircuitOpenError(\"\
    Model unavailable\")\n          return 'CLOSED'\n      \n      def call_model_with_circuit_breaker(model_name, input):\n\
    \          state = check_circuit(model_name)\n          try:\n              result = invoke_model(model_name, input)\n\
    \              if state == 'HALF_OPEN':\n                  record_success(model_name)  # Close circuit\n             \
    \ return result\n          except Exception:\n              record_failure(model_name)\n              raise\n      ```\n\
    \      \n      **Pattern 2: Bulkheads (isolate resources per model)**\n      \n      ```yaml\n      bulkhead_config:\n\
    \        model_a:\n          max_concurrent_requests: 50\n          connection_pool_size: 20\n          queue_size: 100\n\
    \          \n        model_b:\n          max_concurrent_requests: 30\n          connection_pool_size: 15\n          queue_size:\
    \ 50\n          \n        # Model A exhausting resources won't affect Model B\n      ```\n      \n      **AWS Implementation:**\n\
    \      - Separate Lambda functions per model (isolated concurrency)\n      - Separate SQS queues per pipeline stage\n\
    \      - App Mesh for EKS workloads with per-model resource limits\n      \n      **Pattern 3: Timeouts (fail fast, don't\
    \ wait forever)**\n      \n      ```yaml\n      timeout_strategy:\n        # Cascading timeouts: each stage shorter than\
    \ previous\n        api_gateway: 29s    # API Gateway max\n        orchestrator: 25s   # Total pipeline budget\n     \
    \   model_a: 10s        # Individual model budgets\n        model_b: 8s         # Leave headroom for retry\n        model_c:\
    \ 5s\n        \n        # If Model A times out at 10s, we still have 15s for fallback\n      ```\n      \n      **Pattern\
    \ 4: Load Shedding (reject excess early)**\n      \n      ```yaml\n      load_shedding:\n        triggers:\n         \
    \ - queue_depth > 1000\n          - error_rate > 10%\n          - latency_p99 > 5s\n          \n        actions:\n   \
    \       - reject_new_requests: true\n          - return_code: 503\n          - message: \"System overloaded, retry in\
    \ 30 seconds\"\n          - preserve_capacity_for: \"in-flight requests\"\n      ```\n      \n      **Pattern 5: Graceful\
    \ Degradation (fallback chain)**\n      \n      ```yaml\n      degradation_strategy:\n        model_a_failure:\n     \
    \     fallback_1: \"Use smaller/faster model (reduced quality)\"\n          fallback_2: \"Return cached response if fresh\
    \ enough\"\n          fallback_3: \"Route to human review\"\n          fallback_4: \"Return error with retry guidance\"\
    \n          \n        rag_failure:\n          fallback_1: \"Answer without retrieval (warn user)\"\n          fallback_2:\
    \ \"Return 'I don't have enough context'\"\n          \n        full_pipeline_failure:\n          action: \"Queue request\
    \ for later processing\"\n          notify_user: \"Your request is queued, ETA: 30 minutes\"\n      ```\n      \n    \
    \  **Step Functions orchestration with resilience:**\n      ```yaml\n      # Step Functions state machine with circuit\
    \ breakers\n      States:\n        CheckModelACircuit:\n          Type: Choice\n          Choices:\n            - Variable:\
    \ \"$.circuitStatus\"\n              StringEquals: \"OPEN\"\n              Next: ModelAFallback\n          Default: InvokeModelA\n\
    \          \n        InvokeModelA:\n          Type: Task\n          Resource: \"arn:aws:lambda:...:invoke-model-a\"\n\
    \          Retry:\n            - ErrorEquals: [\"TransientError\"]\n              IntervalSeconds: 2\n              MaxAttempts:\
    \ 3\n              BackoffRate: 2\n          Catch:\n            - ErrorEquals: [\"States.ALL\"]\n              Next:\
    \ RecordModelAFailure\n              \n        RecordModelAFailure:\n          Type: Task\n          Resource: \"arn:aws:lambda:...:update-circuit-breaker\"\
    \n          Next: ModelAFallback\n      ```\n      \n      **Testing cascading failure resilience:**\n      - Use AWS\
    \ Fault Injection Simulator to inject failures\n      - Test each circuit breaker opens correctly\n      - Verify bulkheads\
    \ isolate failures\n      - Confirm fallbacks activate appropriately\n      - Load test to find actual breaking points\n\
    \      \n      **PALETTE integration:**\n      - Document failure modes in RIU-101 (Failure Mode Catalog)\n      - Define\
    \ circuit breaker configs in RIU-063 (Performance Baselines)\n      - Include fallback procedures in RIU-069 (Runbook)\n\
    \      - Track cascade incidents in RIU-100 (Incident Log)\n      \n      Key insight: The goal isn't preventing all failures\
    \ — it's containing blast radius. A well-designed pipeline degrades gracefully: one model failing shouldn't take down\
    \ the whole system."
