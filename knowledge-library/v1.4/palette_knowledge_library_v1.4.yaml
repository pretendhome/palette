- id: LIB-011
  question: How do I create a semantic blueprint that non-technical stakeholders can validate?
  answer: "Translate the 5 Semantic Blueprint elements (RIU-001) into business language:\n      \n      **Goal**: Use OGSM\
    \ framework — state business outcome, not technical metric. Say \"Reduce customer churn by 5%\" not \"Achieve 85% model\
    \ accuracy.\" Avoid vague objectives like \"improve productivity.\"\n      \n      **Roles**: Name people and departments,\
    \ not systems. \"Marketing owns data input; AI team owns model; Legal approves before launch\" — skip technical architecture.\n\
    \      \n      **Capabilities**: Describe what the system *does for users*, not how it works. \"Automatically flags high-risk\
    \ accounts for review\" not \"Uses gradient boosting classifier.\"\n      \n      **Constraints**: Frame as business boundaries.\
    \ \"Must not access customer PII without consent; Budget capped at $50K; Must launch before Q3.\"\n      \n      **Non-goals**:\
    \ Critical for scope control. Explicitly state \"This will NOT replace human decision-making / integrate with System X\
    \ / handle edge case Y.\"\n      \n      **Validation techniques:**\n      - Use AIR workshop format with cross-functional\
    \ team (business + technical)\n      - Walk through each element verbally — if stakeholder can't explain it back, rewrite\
    \ it\n      - Provide visual assessment showing feasibility, budget, ROI, data quality, risks\n      - Get explicit sign-off:\
    \ \"Do you agree this is what we're building and what success looks like?\"\n      \n      **Format**: One page maximum.\
    \ Use bullet points, not paragraphs. If it requires technical glossary, it's too complex."
  problem_type: Intake_and_Convergence
  related_rius:
  - RIU-001
