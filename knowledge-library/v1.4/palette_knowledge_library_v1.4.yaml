- id: LIB-136
  question: How do I implement the sidecar augmentation pattern to enhance an existing system without rewriting it?
  answer: 'The sidecar pattern (RIU-024) augments an existing system by producing adjacent artifacts keyed to the source system''s
    primary identifiers (doc_id, entity_id, record_id). The sidecar never modifies the source system — it only reads from
    it and writes to its own storage. This means rollback is trivial: ignore the sidecar. Implementation steps: (1) Define
    the sidecar schema as a JSON/YAML document with three required fields: source_id (foreign key to source system), computed_signals
    (the new data you are adding), and reason_codes (why each signal was computed). (2) Build a sidecar writer that reads
    from the source, computes signals (e.g., classification labels, risk scores, extracted entities), and writes sidecar documents.
    (3) Build a sidecar reader that joins sidecar data with source data at query time. (4) Make sidecars idempotent — reprocessing
    the same source record produces the same sidecar document. (5) Version sidecars — when your computation logic changes,
    increment the sidecar version so consumers can distinguish old from new computations. Common failure: doc_id mismatches
    between source and sidecar, especially when the source system uses composite keys or UUIDs that change on re-import. Validate
    key alignment with a reconciliation check before production deployment.'
  problem_type: Systems_Integration
