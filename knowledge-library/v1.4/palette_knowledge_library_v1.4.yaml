- id: LIB-002
  question: What's the difference between a ONE-WAY DOOR and TWO-WAY DOOR decision in AI system architecture?
  answer: 'ONE-WAY DOOR decisions are difficult or impossible to reverse and require human approval before execution — flag
    these as "🚨 ONE-WAY DOOR — confirmation required" and log in decisions.md via RIU-003 (Decision Log + One-Way Door Registry).
    Examples in AI/ML: ethical AI guidelines, data governance frameworks, model architecture selection, production deployment
    commitments, and database schema for ML features. TWO-WAY DOOR decisions are easily reversible and support Amazon''s "Bias
    for Action" — agents may proceed autonomously with monitoring. Examples: hyperparameter tuning, prompt iterations, A/B
    test configurations. Key insight: don''t treat AI/ML projects as deterministic software; acknowledge uncertainty and establish
    governance templates before implementation. For ONE-WAY DOORs, estimate value of right decisions against cost of wrong
    ones, secure executive sponsorship, and use MLOps assessment to ensure architectural decisions support long-term ROI.'
  problem_type: Intake_and_Convergence
