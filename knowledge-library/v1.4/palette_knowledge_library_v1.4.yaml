- id: LIB-162
  question: How do I define error messaging standards that reduce support burden and help users recover from failures?
  answer: 'RIU-330 defines error messaging in three tiers. Tier 1 — User-Facing Errors: every error message must answer three
    questions: (a) What happened? (b) Why? (c) What can the user do next? Bad example: "Error 500: Internal Server Error."
    Good example: "We could not process your request because the document format is not supported. Please upload a PDF, DOCX,
    or TXT file and try again." Structure: [What went wrong] + [Why it happened, if knowable] + [Specific action to resolve].
    Use active voice. Avoid technical jargon. Never blame the user. Tier 2 — Developer/Operator Errors: include technical
    detail for debugging. Structure: error code (machine-parseable, e.g., ERR_DOC_FORMAT_UNSUPPORTED), error message (human-readable),
    request_id (for log correlation), timestamp, and suggested fix. Return in structured format (JSON) with consistent schema
    across all API endpoints. Tier 3 — Internal Logging: log full context including stack trace, input parameters (redacted
    per RIU-012), system state, and correlation IDs. Never expose Tier 3 information in Tier 1 or Tier 2 responses — stack
    traces and internal paths are security vulnerabilities. AI-Specific Considerations: (a) when an LLM call fails, distinguish
    between model errors (content filtered, context too long) and infrastructure errors (API timeout, rate limit); (b) when
    an agent tool call fails, include the tool name and a user-understandable description of what the tool was trying to do;
    (c) never expose raw model outputs in error messages — they may contain prompt fragments or system information. Measure
    error messaging effectiveness by tracking: support tickets per error type, self-resolution rate, and repeat error rate.'
