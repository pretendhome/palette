- id: LIB-023
  question: How do I build a decision tree from unstructured interview transcripts?
  answer: "Use a 4-stage pipeline: Capture → Extract → Structure → Validate.\n      \n      **Stage 1: Capture and transcribe**\n\
    \      - Record SME interviews (voice capture reduces cognitive load)\n      - Use Amazon Transcribe for speech-to-text\
    \ conversion\n      - Preserve speaker identification for multi-person interviews\n      - Store raw transcripts in S3\
    \ for audit trail\n      \n      **Stage 2: Extract decision logic with LLM**\n      Use structured prompts to identify\
    \ decision points:\n      ```\n      Analyze this interview transcript and extract:\n      1. All decision points where\
    \ the expert chooses between options\n      2. The conditions/factors they consider for each decision\n      3. The outcomes/actions\
    \ for each branch\n      4. Any exceptions or edge cases mentioned\n      \n      Format as: IF [conditions] THEN [action]\
    \ ELSE [alternative]\n      Flag any \"it depends\" statements for follow-up.\n      ```\n      \n      - Use Amazon Bedrock\
    \ (Claude, Nova) for extraction\n      - Multi-agent pipeline: one agent for classification, one for rule extraction,\
    \ one for validation\n      - Extract entities and relationships for knowledge graph (Neo4j + Bedrock)\n      \n     \
    \ **Stage 3: Structure into decision tree**\n      - Convert extracted IF/THEN statements into tree format:\n      ```yaml\n\
    \      decision_node:\n        id: \"escalation_decision\"\n        question: \"Is customer tier enterprise?\"\n     \
    \   conditions:\n          - branch: \"yes\"\n            next: \"check_severity\"\n          - branch: \"no\"\n     \
    \       action: \"standard_support\"\n        source: \"transcript_001, timestamp 12:34\"\n      ```\n      - Link nodes\
    \ to form complete tree\n      - Identify gaps where branches are undefined\n      - Store in machine-readable format\
    \ (YAML/JSON) per LIB-020\n      \n      **Stage 4: Validate with SME**\n      - Walk through extracted tree with original\
    \ expert\n      - Present edge cases: \"If X and Y, the tree says Z — is that correct?\"\n      - Probe gaps: \"What happens\
    \ when [undefined condition]?\"\n      - Update tree based on corrections\n      - Document validation in Assumptions\
    \ Register (RIU-008)\n      \n      **Quality checks:**\n      - Every leaf node has an action (no dead ends)\n      -\
    \ Every condition has both true/false branches\n      - Source attribution for each rule (traceability)\n      - Edge\
    \ cases cataloged separately (RIU-014)\n      \n      **PALETTE integration:**\n      - Store validated decision trees\
    \ in RIU-044 (Business Rules Documentation)\n      - Track unvalidated branches as Assumptions (RIU-008)\n      - Flag\
    \ rules that are ONE-WAY DOORs (compliance, safety decisions)\n      - Use extracted trees to build Golden Set for testing\
    \ (RIU-021)\n      \n      Key insight: LLMs extract *candidate* decision logic; SMEs *validate* it. Never deploy an extracted\
    \ tree without expert review — transcripts contain noise, tangents, and incomplete thoughts."
