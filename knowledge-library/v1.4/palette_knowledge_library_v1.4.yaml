- id: LIB-167
  question: How do I build an AI use case prioritization matrix that balances business impact, feasibility, and responsible
    AI considerations?
  answer: 'RIU-602 implements a structured prioritization framework. Phase 1 — Use Case Collection: gather candidate use cases
    from all departments/brands. For each, require: a one-sentence description, the business metric it impacts, the estimated
    annual value ($ or time saved), and the data availability status. Reject use cases without a clear business metric — "improve
    productivity" is not a metric; "reduce processing time from 4 hours to 30 minutes" is. Phase 2 — Multi-Dimensional Scoring:
    score each use case 1-10 on five dimensions. Business Impact: revenue lift, cost reduction, or risk mitigation in dollar
    terms. Feasibility: data exists, technical complexity is manageable, team has skills. Risk: brand safety, compliance exposure,
    customer impact if it fails. Strategic Alignment: fits organizational AI vision and brand strategy. Time to Value: months
    to measurable impact. Phase 3 — WSJF Sequencing: apply Weighted Shortest Job First. Priority = (Business Value + Time
    Criticality + Risk Reduction) / Job Size. This naturally surfaces quick wins and deprioritizes large, uncertain bets.
    Phase 4 — Responsible AI Assessment: before finalizing, assess each top-10 use case for: bias risk (does it affect different
    populations differently?), transparency requirement (do users need to know AI is involved?), and reversibility (can decisions
    be undone?). Use cases with high responsible AI risk may need to be deprioritized or scoped differently. Phase 5 — Red
    Flags: deprioritize use cases with no executive sponsor, no clear metric, data that does not exist yet, or ONE-WAY DOOR
    decisions without sufficient research.'
