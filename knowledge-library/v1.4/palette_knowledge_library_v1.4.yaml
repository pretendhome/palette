- id: LIB-160
  question: How do I create a threat model and attack surface map for an AI system?
  answer: 'RIU-326 applies threat modeling specifically to AI systems using an extended STRIDE framework. Step 1 — Define
    Trust Boundaries: draw the system architecture and mark every trust boundary where data or control crosses between components
    owned by different parties or at different privilege levels. For AI systems, key trust boundaries include: user input
    to prompt, prompt to model API, model output to application logic, tool calls to external systems, and training data to
    model weights. Step 2 — AI-Specific Threats (extending STRIDE): Prompt Injection (Information Disclosure + Elevation of
    Privilege): attacker manipulates model behavior through crafted inputs. Mitigate with input sanitization, system prompt
    isolation, and output validation. Training Data Poisoning (Tampering): compromised training data causes model misbehavior.
    Mitigate with data provenance tracking and anomaly detection. Model Extraction (Information Disclosure): attacker reverse-engineers
    model through API queries. Mitigate with rate limiting and output perturbation. Supply Chain Attack (Tampering): compromised
    model weights or dependencies. Mitigate with checksum verification and dependency scanning. Step 3 — Risk Assessment:
    for each threat, score likelihood (1-5) and impact (1-5). Priority = likelihood x impact. Focus mitigations on threats
    with priority > 12. Step 4 — Mitigation Plan: for each high-priority threat, document the control, its implementation
    status, and the residual risk after mitigation. Present to security review (RIU-250).'
  problem_type: Trust_Governance_and_Adoption
