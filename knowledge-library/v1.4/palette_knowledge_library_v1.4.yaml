- id: LIB-152
  question: How do I implement a deduplication system that avoids both missed duplicates and false merges?
  answer: 'RIU-232 defines deduplication in four stages. Stage 1 — Candidate Generation (Blocking): reduce the comparison
    space by grouping records that are likely duplicates using blocking keys (e.g., first 3 characters of name + zip code).
    Without blocking, comparing N records requires N*(N-1)/2 comparisons — this is O(N^2) and infeasible for large datasets.
    Stage 2 — Similarity Scoring: for each candidate pair, compute similarity using multiple signals. For text: edit distance
    (Levenshtein), token overlap (Jaccard), semantic similarity (embedding cosine). For structured records: field-level exact
    match + fuzzy match. Combine signals into a composite score (weighted average or learned model). Stage 3 — Threshold Decision:
    define three zones. Match zone (score > 0.90): automatically merge. Review zone (0.70-0.90): flag for human review. Non-match
    zone (< 0.70): no action. Tune thresholds on a labeled sample of 200+ pairs. The review zone is critical — it catches
    cases where the algorithm is uncertain and prevents both false positives (merging distinct records) and false negatives
    (missing real duplicates). Stage 4 — Conflict Resolution: when merging, define field-level resolution rules. Options:
    most recent wins, most complete wins, source priority (gold-tier system wins), or human review for conflicts. Never silently
    discard data during merge — preserve the full merge history so merges can be reversed. The most dangerous failure mode
    is false positive deduplication — merging records for two different entities. This is data loss and often irreversible.'
  problem_type: Data_Semantics_and_Quality
