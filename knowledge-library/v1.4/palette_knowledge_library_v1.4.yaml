- id: LIB-183
  question: What are context compaction techniques and how do they improve RAG performance?
  answer: "Context compaction (or 'prompt compression') is the process of reducing the number of tokens in a prompt while\
    \ preserving its semantic intent. This is critical for improving latency, reducing costs, and fitting long-form retrieval\
    \ results into limited context windows.\n\n1. **Semantic Summarization**:\n   - Use a smaller LLM (e.g., Haiku, Flash)\
    \ to summarize large retrieval chunks into dense information summaries before injecting them into the main prompt.\n \
    \  - **Constraint**: Summaries must maintain entity-level fidelity to prevent information loss.\n\n2. **Contextual Pruning**:\n\
    \   - **Stop-word & Noise Removal**: Remove non-semantic filler text, boilerplates, and redundant headers from retrieved\
    \ documents.\n   - **Selective Context**: Use mutual information or attention-based scores to identify and keep only the\
    \ most informative sentences/tokens (e.g., LLMLingua).\n\n3. **LongContext Re-ranking**:\n   - Retrieve 50+ chunks but\
    \ re-rank them using a cross-encoder (e.g., Cohere Re-ranker) to select the top 5-10 most relevant ones. This ensures\
    \ the model only sees the most pertinent context.\n\n4. **Structural Compression**:\n   - Convert unstructured retrieved\
    \ text into a dense format like Markdown tables or JSON schemas, which models often process more efficiently than prose.\n\
    \n**Implementation Threshold**: Compaction is recommended when the context window exceeds 32k tokens or when 'Time to\
    \ First Token' (TTFT) exceeds 2 seconds.\n"
  sources:
  - title: 'Microsoft: LLMLingua Context Compression'
    url: https://github.com/microsoft/LLMLingua
  - title: 'Cohere: Re-ranking for Improved Retrieval'
    url: https://docs.cohere.com/docs/reranking
  - title: 'Anthropic: Managing Long Context Windows'
    url: https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/long-context-tips
