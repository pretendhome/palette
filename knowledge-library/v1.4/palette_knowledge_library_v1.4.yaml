- id: LIB-164
  question: How do I create a comprehensive AI system documentation package for compliance, audit, or handoff?
  answer: 'RIU-535 defines the documentation package with six required sections. Section 1 — System Specification: architecture
    overview, component inventory, data flow diagrams, model specifications (model name, version, provider, fine-tuning details
    if any), and integration points. Include the system boundary — what is in scope and what is external. Section 2 — Risk
    Assessment: identified risks (using RIU-326 threat model), risk ratings, mitigation status, and residual risks. For AI
    systems, specifically address: bias and fairness risks, hallucination risks, data privacy risks, and adversarial robustness.
    Cross-reference with EU AI Act requirements for high-risk systems (Article 11: Technical Documentation). Section 3 — Operational
    Procedures: deployment process, monitoring and alerting, incident response, rollback procedures, and escalation paths.
    Include runbooks for common failure scenarios. Section 4 — Evaluation Results: performance metrics on test sets, evaluation
    methodology, known limitations, and failure modes. Include the eval set itself or a description of how to reproduce results.
    Section 5 — Data Documentation: data sources, data processing pipeline, data quality metrics, PII handling, retention
    policies, and deletion procedures. Section 6 — Change Log: version history, what changed, who approved, and impact assessment.
    The documentation package must be a living document — schedule quarterly reviews to ensure it stays current. The most
    common audit finding is documentation that describes the system as it was designed, not as it currently operates. Mitigate
    by including automated checks that validate documentation against the running system.'
