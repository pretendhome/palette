- id: LIB-129
  question: How do I design an observability stack for AI/ML systems in production?
  answer: AI observability requires three layers — infrastructure metrics (CPU, memory, latency), model metrics (prediction
    quality, drift, throughput), and business metrics (user satisfaction, task completion). Choose one primary platform —
    Datadog for enterprise-scale with broad integrations, Honeycomb for high-cardinality debugging, New Relic for best free
    tier (100GB/month, all features). Key decision — start with the free tier of your chosen platform and validate it captures
    what you need before committing budget. For AI-specific observability, add Arize AI or Evidently for model monitoring
    (drift, data quality, feature importance). Do not build custom dashboards until you have proven the platform captures
    the signals that predict production incidents.
