- id: LIB-121
  question: How do I safely run database migrations in AI systems without downtime or data loss?
  answer: Use a versioned migration tool (Flyway for JVM/SQL, Alembic for Python/SQLAlchemy) with mandatory dry-run before
    apply. Every migration must be reversible — write both up and down scripts. For AI systems specifically, schema changes
    to feature stores or embedding tables require coordinated deployment with the model that reads them. Pattern — deploy
    new schema version alongside old (expand phase), update application code (migrate phase), drop old columns (contract phase).
    Never run ALTER TABLE on production without a tested rollback script. Use blue-green deployment for vector database index
    rebuilds — build new index in parallel, swap pointer when ready.
