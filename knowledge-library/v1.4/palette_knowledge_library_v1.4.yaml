- id: LIB-159
  question: How do I design a caching strategy that improves performance without serving stale data?
  answer: 'RIU-324 defines caching strategy across five design dimensions. Dimension 1 — Cache Placement: choose the right
    layer. Client-side cache (browser, mobile): best for static assets and user preferences. Application cache (in-memory,
    Redis): best for computed results, API responses, and session data. CDN cache: best for public content, media, static
    resources. For AI systems: cache LLM responses for identical prompts (semantic caching), embedding vectors for repeated
    queries, and retrieval results for common searches. Dimension 2 — TTL (Time-to-Live): set per data type. Reference data
    (country codes, taxonomies): hours to days. Computed results (search rankings, recommendations): minutes to hours. Real-time
    data (prices, inventory): seconds or no cache. Err toward shorter TTLs initially and extend based on observed staleness
    impact. Dimension 3 — Invalidation Strategy: choose from: time-based (TTL expiration), event-based (invalidate when source
    data changes), and version-based (cache key includes data version). Event-based is most accurate but requires change notification
    infrastructure. Combine with TTL as a safety net — even event-based invalidation should have a max TTL. Dimension 4 —
    Cache Warming: pre-populate cache with high-traffic queries during deployment to avoid cold-start latency spikes. Implement
    background refresh for expiring entries (refresh 10% before TTL to prevent thundering herd). Dimension 5 — Failure Handling:
    when cache is unavailable, the system must still function (cache-aside pattern). Never make the cache a single point of
    failure. Monitor cache hit rate (target > 80%), miss storm rate, and memory usage.'
  problem_type: Operationalization_and_Scaling
