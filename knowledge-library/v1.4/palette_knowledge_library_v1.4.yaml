- id: LIB-128
  question: How do I set up multi-model LLM routing with automatic fallback and cost tracking?
  answer: Use OpenRouter as the routing layer — single OpenAI-compatible API that routes to 500+ models across providers.
    Change base URL and API key, existing code unchanged. Key features — automatic fallback routing (if Claude fails, route
    to GPT-4o), cost tracking per model per API key, and routing suffixes (nitro for fastest, floor for cheapest). Zero percent
    model markup, 5.5 percent credit purchase fee. For self-hosted alternative, LiteLLM provides similar routing with zero
    markup but requires infrastructure management. Decision — use OpenRouter for simplicity and zero-ops, LiteLLM if you need
    on-premise or want zero fees. Both support budget limits and usage analytics. This is critical infrastructure for Palette's
    SageMaker disruptor thesis.
