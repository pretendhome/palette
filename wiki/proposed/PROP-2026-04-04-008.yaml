content:
  question: What is the difference between zero-shot and few-shot LLM performance, and when should I use each?
  answer: "Zero-shot and few-shot learning describe how much context/example data is provided to an LLM during a prompt to\
    \ enable a specific task.\n\n1. **Zero-Shot Learning**:\n   - **Definition**: The model is given a task and a prompt but\
    \ zero examples of the desired output.\n   - **When to Use**: For well-defined, general-knowledge tasks (e.g., 'Summarize\
    \ this text') where the model's pre-training is sufficient.\n   - **Benefits**: Minimum token usage, lowest latency, simplest\
    \ prompt engineering.\n\n2. **Few-Shot Learning**:\n   - **Definition**: The model is provided with a small number (typically\
    \ 1-5) of high-quality examples (input-output pairs) within the prompt.\n   - **When to Use**: For complex, domain-specific,\
    \ or highly structured tasks (e.g., 'Extract entities in this exact JSON schema') where the desired format or reasoning\
    \ pattern is non-trivial.\n   - **Benefits**: Significantly improved accuracy on specific tasks, better adherence to complex\
    \ formatting rules, allows 'teaching' the model a specific tone or style.\n\n**Comparison Table**:\n\n| Metric | Zero-Shot\
    \ | Few-Shot |\n|---|---|---|\n| **Accuracy** | High (General) | Very High (Specific) |\n| **Token Cost** | Lowest | Higher\
    \ (depends on example size) |\n| **Latency** | Lowest | Slightly Higher |\n| **Prompt Complexity** | Low | Medium |\n\n\
    **Implementation Threshold**: If zero-shot performance falls below your required accuracy threshold (e.g., <80%), implement\
    \ 3-shot learning before moving to more complex techniques like fine-tuning or RAG.\n"
  sources:
