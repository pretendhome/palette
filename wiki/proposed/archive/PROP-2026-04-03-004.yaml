content:
  question: Stress test entry 3 — does the pipeline handle concurrent proposals?
  answer: 'This is stress test entry number 3. It exists to verify that the governance pipeline correctly handles multiple
    proposals filed in rapid succession. Each proposal should get a unique PROP-ID, its own YAML file, its own rendered page,
    and appear independently in the APPROVAL_QUEUE.md. The queue should show all pending proposals sorted correctly. If any
    proposal overwrites another or the ID counter collides, the pipeline has a bug. This answer is deliberately over 100 words
    to pass the substantive criterion in the acceptance criteria. The content itself is not meaningful — the test is the pipeline
    behavior.

    '
