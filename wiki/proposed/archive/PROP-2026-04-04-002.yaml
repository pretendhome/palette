content:
  question: What are the key criteria for selecting a vector database for RAG architectures?
  answer: "Selecting a vector database is a one-way door decision for most RAG architectures. Choice follows four primary\
    \ axes: performance, data consistency, retrieval features, and operational model.\n\n1. **Retrieval Speed & Scale**: \n\
    \   - **Latency**: Pinecone (SaaS) or Milvus (Self-hosted) offer low-latency HNSW indexing for multi-million vector datasets.\n\
    \   - **Concurrent Queries**: Weaviate and Qdrant handle high RPS well.\n\n2. **Data Consistency**:\n   - **Metadata Filtering**:\
    \ Critical for multi-tenant or multi-workspace systems (like Palette). Pinecone and Weaviate support efficient filtering\
    \ at query time.\n   - **Hybrid Search**: The ability to combine vector similarity with keyword/BM25 search (e.g., Pinecone,\
    \ Weaviate, ElasticSearch).\n\n3. **Retrieval Features**:\n   - **Auto-Schema**: Weaviate automatically handles vectorization\
    \ and schema creation.\n   - **Multimodal Support**: Some databases (e.g., Milvus, Marqo) are optimized for multiple data\
    \ types (image, text).\n\n4. **Operational Model**:\n   - **SaaS vs Self-Hosted**: Managed services (e.g., Pinecone, Zilliz)\
    \ reduce operational overhead but introduce data privacy/sovereignty concerns.\n   - **Extensibility**: Vector plugins\
    \ for established databases (e.g., pgvector for PostgreSQL, ElasticSearch Vector Search) simplify the stack for smaller\
    \ deployments.\n\n**Recommendation**: Use Pinecone (SaaS) for rapid PoC and high scale. Use pgvector (PostgreSQL) if you\
    \ already have a Postgres stack and need tight relational coupling. Use Weaviate for multi-tenant, feature-rich RAG pipelines.\n"
  sources:
