# BDB Gateway Configuration
gateway:
  perplexity_model: "sonar-pro"
  timeout_seconds: 15
  cache_ttl_hours: 24
  max_external_calls_per_day: 100

sanitization:
  mode: "strict"
  log_all_detections: true
  block_on_any_pii: true

allowed_external_query_types:
  - legal_precedent
  - statutory_interpretation
  - regulatory_requirement
  - standard_contract_clause
  - jurisdictional_rules
  - filing_procedure

blocked_indicators:
  - "our client"
  - "my client"
  - "the defendant"
  - "should we"
  - "strategy"
  - "settlement offer"
  - "privileged"
  - "work product"
  - "advise"
