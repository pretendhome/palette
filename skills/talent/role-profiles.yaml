# Role Profiles — Palette Talent Skill
# Each profile is a lens through which the entire career gets framed.
# Discovery → Fit → Resume → Application → Interview Prep → Post-mortem
# all flow through profile_id.
#
# Learnings compound: every interview for a profile type makes the next one better.
# Updated: 2026-03-24

profiles:

  # --- FORWARD DEPLOYED ENGINEER ---
  forward_deployed_engineer:
    id: FDE
    display_name: "Forward Deployed Engineer"
    one_liner: "Build and deploy AI systems at customer sites — architecture + delivery"
    resource_refs:
      primary_lenses: [LENS-DEV-001, LENS-INT-001]
      supporting_lenses: [LENS-CS-001, LENS-ENG-001]

    search_patterns:
      titles:
        - "Forward Deployed Engineer"
        - "Solutions Architect"
        - "Solutions Engineer"
        - "Applied AI Engineer"
        - "Field Engineer"
        - "Customer Engineer"
        - "Implementation Engineer"
      keywords:
        - "customer-facing"
        - "deploy"
        - "prototype"
        - "architecture review"
        - "integration"
        - "hands-on"
        - "technical depth"
      companies_targeted:
        - { name: Perplexity, role: "FDE", status: applied }
        - { name: "Google Cloud", role: "FDE GenAI", status: sweep }
        - { name: Dust, role: "FDE Paris", status: sweep }
        - { name: FriendliAI, role: "Agentic FDE", status: interviewed }
        - { name: Braintrust, role: "Solutions Engineer", status: sweep }

    resume_profile: forward_deployed_engineer  # maps to build_resume.py PROFILES key
    bullet_key: data_engineer  # which bullet variant to pull from experience-inventory.yaml

    lead_eras: [ERA-2, ERA-4]  # POI Knowledge Graph + Ask Pathfinder
    capstone_era: ERA-5  # Palette as builder credibility
    palette_framing: "builder credibility — full-stack AI system with 9 agents, 146 tests"

    fit_lens:
      must_haves:
        - { requirement: "Systems architecture", maps_to: "ERA-2 POI Graph + ERA-5 Palette", weight: 2 }
        - { requirement: "Customer delivery", maps_to: "ERA-4 Ask Pathfinder (12K sellers/month)", weight: 2 }
        - { requirement: "Technical depth (Python, APIs)", maps_to: "ERA-5 Palette (Python, Claude API, Go)", weight: 2 }
      nice_to_haves:
        - { requirement: "LLM/RAG experience", maps_to: "ERA-3 AGI attribution + ERA-5 Palette RAG", weight: 1 }
        - { requirement: "Startup experience", maps_to: "ERA-5 Palette (independent build)", weight: 1 }

    story_bank:
      lead: STORY-5   # POI Knowledge Graph (scale, architecture)
      secondary: STORY-1  # Ask Pathfinder (adoption, cross-team)
      technical: STORY-4  # Taxonomy restructuring (design decisions)
      builder: STORY-7   # Palette (hands-on credibility)
      failure: STORY-1   # Ask Pathfinder team unification (conflict → resolution)

    interview_playbook:
      prep_hours: 4-6
      prep_documents:
        - fit_analysis
        - company_research_brief
        - interview_cheatsheet
        - behavioral_stories
        - technical_deep_dive
        - day_of_protocol
      anchor_messages:
        - "I've built production AI systems end-to-end — from 25B-node knowledge graphs to multi-agent orchestration"
        - "I bridge the gap between what models can do technically and what customers need to deploy"
        - "My comparative linguistics background means I translate complex systems into actionable architecture"
      common_questions:
        - { q: "Walk me through a system you built", lead_with: ERA-2, follow: ERA-5 }
        - { q: "How do you handle conflicting requirements?", lead_with: ERA-2, note: "47 providers, entity resolution" }
        - { q: "Tell me about a customer delivery win", lead_with: ERA-4, note: "Ask Pathfinder, 25% prep reduction" }
        - { q: "How would you debug a RAG pipeline?", lead_with: ERA-3, follow: ERA-5 }
      advance_bar: "8.5/10 — customer-safe, structured, concise, confident"

    accumulated_learnings:
      from_implementations:
        - talent-perplexity-fde
        - talent-friendliai-interview
      patterns:
        - "FDE roles value 'diagnose AND build' — always show both sides"
        - "Power user positioning is rare and memorable (Palette built ON their product)"
        - "Technical depth matters more than breadth — go deep on one system per answer"
        - "They want to see you prototype, not just plan"
      anti_patterns:
        - "Don't lead with Palette unless asked — it's capstone, not headline"
        - "Don't over-explain architecture without tying to customer outcome"

  # --- ENABLEMENT STRATEGY ---
  enablement_strategy:
    id: ES
    display_name: "Enablement Strategy & Adoption"
    one_liner: "Drive AI adoption at scale — strategy, measurement, executive engagement"
    resource_refs:
      primary_lenses: [LENS-SALES-001, LENS-INT-001]
      supporting_lenses: [LENS-CS-001, LENS-EXEC-001, LENS-MGR-001]

    search_patterns:
      titles:
        - "AI Strategy Manager"
        - "AI Enablement Lead"
        - "Senior Manager, AI Strategy"
        - "Director, AI Enablement"
        - "GTM Enablement Manager"
        - "Customer Enablement Architect"
        - "AI Adoption Manager"
        - "AI Outcomes Manager"
      keywords:
        - "adoption"
        - "enablement"
        - "strategy"
        - "executive"
        - "GTM"
        - "change management"
        - "measurement"
        - "scaled impact"
      companies_targeted:
        - { name: "Gap Inc", role: "Sr Manager AI Strategy", status: interviewed }
        - { name: TaskRabbit, role: "Director AI Strategy", status: applied }
        - { name: Databricks, role: "Sr Customer Enablement Architect", status: sweep }

    resume_profile: enablement_strategy
    bullet_key: enablement

    lead_eras: [ERA-4]  # Ask Pathfinder — the adoption machine
    capstone_era: ERA-5
    palette_framing: "enablement at scale — 117 taxonomy nodes, assessment system, learning progressions"

    fit_lens:
      must_haves:
        - { requirement: "Scaled enablement/adoption", maps_to: "ERA-4 Ask Pathfinder (12K sellers, 250+ sessions, 20K users)", weight: 2 }
        - { requirement: "Executive engagement", maps_to: "ERA-4 Data Leadership Forum (291 leaders, 98 CxOs)", weight: 2 }
        - { requirement: "Measurement & outcomes", maps_to: "ERA-4 three-level measurement (+17% engagement, +67% adoption)", weight: 2 }
      nice_to_haves:
        - { requirement: "AI/ML technical depth", maps_to: "ERA-2 POI Graph + ERA-3 AGI + ERA-5 Palette", weight: 1 }
        - { requirement: "Change management", maps_to: "ERA-1 multinational programs (200+ associates, 4 countries)", weight: 1 }

    story_bank:
      lead: STORY-1   # Ask Pathfinder (adoption, enablement, cross-team)
      secondary: STORY-3  # Data Leadership Forum (executive engagement)
      technical: STORY-4  # Taxonomy restructuring (design → outcome)
      builder: STORY-7   # Palette (builder credibility, use sparingly)
      cultural: STORY-6  # Multilingual (translation = enablement)

    interview_playbook:
      prep_hours: 4-8
      prep_documents:
        - fit_analysis
        - company_research_brief
        - interview_cheatsheet
        - behavioral_stories
        - simulation_drills_4_rounds
        - day_of_protocol
      anchor_messages:
        - "Adoption isn't a model problem — it's a translation problem"
        - "I measure at three levels: usage, behavior shift, business outcomes"
        - "I find one team, prove the win, let success create pull"
      common_questions:
        - { q: "How do you drive adoption at scale?", lead_with: ERA-4, note: "Finance POD → full org" }
        - { q: "Give an example of executive engagement", lead_with: ERA-4, note: "Data Forum, 98 CxOs" }
        - { q: "How do you measure success?", lead_with: ERA-4, note: "Three-level measurement" }
        - { q: "Tell me about a failure", lead_with: "Glean post-mortem", note: "Didn't know internal systems" }
      advance_bar: "8/10 recruiter, 8.5/10 hiring manager, 9/10 technical"

    accumulated_learnings:
      from_implementations:
        - talent-gap-interview
        - talent-taskrabbit-director-ai-strategy
      patterns:
        - "Research depth scales with domain familiarity — don't over-research familiar domains"
        - "4-round simulation protocol (Gap) was the most rigorous prep — keep using it"
        - "Enabler vs Executor: same proof points, different framing"
        - "Counter-intuitive specificity wins: 'I would NOT do X' is more memorable"
        - "'Find one team, prove the win, let success create pull' = Finance POD pattern"
        - "Deep company research is non-negotiable for unfamiliar domains (Gap: 8+ docs, 150KB)"
      anti_patterns:
        - "Don't use generic transformation language — specifics win"
        - "Don't lead with Palette for strategy roles — lead with Ask Pathfinder"
        - "Don't skip hiring manager research (LinkedIn, talks, blog posts)"

  # --- ENABLEMENT SYSTEMS BUILDER ---
  enablement_systems_builder:
    id: ESB
    display_name: "Enablement Systems Builder"
    one_liner: "Build the infrastructure that enables AI adoption — curriculum, assessment, credentialing systems"
    resource_refs:
      primary_lenses: [LENS-DEV-001, LENS-INT-001]
      supporting_lenses: [LENS-SALES-001, LENS-MKT-001]

    search_patterns:
      titles:
        - "Technical Marketing Engineer"
        - "Developer Education Lead"
        - "Education Engineer"
        - "AI Enablement Engineer"
        - "Developer Advocate"
        - "Developer Experience Engineer"
        - "Certification Content & Systems Architect"
        - "Design Engineer, Education"
      keywords:
        - "enablement infrastructure"
        - "developer education"
        - "curriculum"
        - "certification"
        - "credentialing"
        - "assessment"
        - "developer experience"
        - "playbooks"
        - "integration frameworks"
      companies_targeted:
        - { name: Mistral, role: "TME", status: interviewing }
        - { name: Lenovo, role: "Sr Manager EKM", status: interviewing }
        - { name: Cognition, role: "AI Enablement Engineer", status: sweep }
        - { name: Anthropic, role: "Developer Education Lead", status: sweep }
        - { name: Anthropic, role: "Cert Content & Systems Architect", status: sweep }
        - { name: LangChain, role: "Education Engineer ML", status: sweep }
        - { name: OpenAI, role: "Developer Experience Engineer", status: sweep }
        - { name: n8n, role: "Sr Developer Advocate EMEA", status: sweep }

    resume_profile: technical_marketing_engineer  # TME profile is closest
    bullet_key: tme  # falls back to enablement/knowledge_engineer where tme doesn't exist

    lead_eras: [ERA-4]  # Ask Pathfinder as knowledge-to-adoption translation system
    secondary_eras: [ERA-1]  # Multilingual enablement foundation
    capstone_era: ERA-5
    palette_framing: "enablement system builder — taxonomy, assessment, calibration, validation loops"

    fit_lens:
      must_haves:
        - { requirement: "Technical content creation", maps_to: "ERA-4 Ask Pathfinder (3-layer architecture, 100+ use cases)", weight: 2 }
        - { requirement: "Developer enablement", maps_to: "ERA-4 (250+ sessions, 12K sellers, partner ecosystem)", weight: 2 }
        - { requirement: "AI product fluency", maps_to: "ERA-4 Mistral/xAI partnerships + ERA-5 Palette (Claude API daily)", weight: 2 }
      nice_to_haves:
        - { requirement: "Curriculum/assessment design", maps_to: "ERA-5 Palette enablement system (117 modules, calibration exemplars)", weight: 1 }
        - { requirement: "Open source / community", maps_to: "ERA-5 Palette (github.com/pretendhome/palette)", weight: 1 }
        - { requirement: "Multilingual", maps_to: "ERA-1 + STORY-6 (French, Italian, Spanish)", weight: 1 }

    story_bank:
      lead: STORY-1   # Ask Pathfinder (GTM chatbot, adoption)
      secondary: STORY-4  # Taxonomy restructuring (design → impact)
      executive: STORY-3  # Data Leadership Forum
      technical: STORY-7  # Palette (builder credibility)
      cultural: STORY-6  # Multilingual (Paris, translation = enablement)
      partner: STORY-2  # Mistral partnership at AWS

    interview_playbook:
      prep_hours: 4-6
      prep_documents:
        - fit_analysis
        - company_research_brief
        - product_mastery
        - interview_cheatsheet
        - behavioral_stories
        - drill_protocol
        - day_of_protocol
      anchor_messages:
        - "I don't just create content — I build the enablement layer around adoption"
        - "The best model doesn't get deployed if the sales team can't explain why it matters"
        - "Taxonomy, calibration, assessment, validation — that's what scales enablement, not more docs"
      common_questions:
        - { q: "Tell me about yourself", lead_with: ERA-4, note: "Ask Pathfinder as enablement system" }
        - { q: "Why this company?", note: "Thesis-first, product-specific" }
        - { q: "What enablement system would you build?", lead_with: ERA-4, follow: ERA-5 }
        - { q: "Technical content that drove adoption", lead_with: ERA-4, note: "67% feature adoption" }
        - { q: "First 90 days?", note: "Audit existing enablement → identify highest-leverage gap → build one system → prove the win" }
      advance_bar: "8.5/10 — reward enablement-system thinking, not just launch-content answers"

    accumulated_learnings:
      from_implementations:
        - talent-mistral-tme
        - talent-lenovo-ekm
        - talent-anthropic-cert-architect
      patterns:
        - "Frame as 'enablement infrastructure' not 'content creation' — systems thinking wins"
        - "Pathfinder stays lead historical proof, V1 enablement build is fresh secondary"
        - "'Already done the job from the other side' is strongest positioning"
        - "Product demonstration is non-negotiable — use their product to advocate for it"
        - "Study system: STUDY_INDEX → REFERENCE_STACK → LIVE_COACHING_LOOP → DRILL_PROTOCOL"
        - "Coaching loops with hard grading (8.5/10 bar) outperform passive prep"
        - "Stale product knowledge is deadly — verify against current docs before interview"
      anti_patterns:
        - "Don't lead with Palette unless directly asked"
        - "Don't memorize model specs — understand decision framing instead"
        - "Don't use generic 'drive adoption' language — describe the system you'd build"

  # --- CUSTOMER SUCCESS & AI DEPLOYMENT ---
