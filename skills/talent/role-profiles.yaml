    secondary_eras: [ERA-3]  # AGI (evaluation, quality)
    capstone_era: ERA-5
    palette_framing: "customer-facing AI systems — routing, evaluation, quality instrumentation"

    fit_lens:
      must_haves:
        - { requirement: "Customer-facing delivery", maps_to: "ERA-4 Ask Pathfinder (12K sellers, 250+ sessions)", weight: 2 }
        - { requirement: "AI product deployment", maps_to: "ERA-4 partners (Mistral, xAI) + ERA-5 Palette", weight: 2 }
        - { requirement: "Outcome measurement", maps_to: "ERA-4 three-level measurement + ERA-3 evaluation frameworks", weight: 2 }
      nice_to_haves:
        - { requirement: "Technical depth", maps_to: "ERA-2 POI Graph + ERA-5 Palette (9 agents)", weight: 1 }
        - { requirement: "Executive relationships", maps_to: "ERA-4 Data Forum (98 CxOs)", weight: 1 }

    story_bank:
      lead: STORY-1   # Ask Pathfinder (adoption, measurement)
      secondary: STORY-3  # Data Leadership Forum (executive engagement)
      technical: STORY-5  # POI Graph (scale, data quality)
      failure: STORY-4   # Taxonomy restructuring (found and fixed a structural problem)
      builder: STORY-7   # Palette (builder credibility)

    interview_playbook:
      prep_hours: 6-8
      prep_documents:
        - fit_analysis
        - company_research_brief
        - product_deep_dive
        - interview_cheatsheet
        - behavioral_stories
        - simulation_drills_4_rounds
        - takehome_protocol  # common for these roles
        - day_of_protocol
      anchor_messages:
        - "I measure at three levels: usage, behavior shift, business outcomes"
        - "The 4-question framework: Is it a pattern? Is there data? Is it repetitive? Is it measurable?"
        - "I've been on both sides — building the AI and deploying it for customers"
      common_questions:
        - { q: "How do you ensure customer success?", lead_with: ERA-4, note: "Three-level measurement" }
        - { q: "Walk me through a deployment", lead_with: ERA-4, note: "Ask Pathfinder adoption journey" }
        - { q: "How do you handle a failing account?", lead_with: ERA-3, note: "Diagnostic approach from AGI eval" }
        - { q: "Technical product demo", note: "Use their product, build something on it" }
      advance_bar: "9/10 — these roles have the highest bar for product knowledge"

    accumulated_learnings:
      from_implementations:
        - talent-openai-deployment-mgr
        - talent-glean-interview
        - talent-perplexity-csm
      patterns:
        - "Product depth matters more than generic prep — know their internal systems"
        - "4-question framework works as both demo tool and customer engagement method"
        - "Modular materials (5-6 docs) > monolithic documents (Glean learning)"
        - "Takehome assignments are common — use the takehome protocol"
        - "Study system with coaching loop and hard grading (9/10 bar) is essential"
        - "FDE-adjacent positioning may be stronger than pure CS for technical candidates"
        - "Research depth: unfamiliar domain 8+ docs/150KB, familiar domain 5 docs/80KB"
      anti_patterns:
        - "Don't use generic transformation language — specifics win"
        - "Don't skip company blog/engineering posts — non-negotiable"
        - "Don't skip hiring manager philosophy research (LinkedIn, talks)"
        - "Don't lead with revenue numbers — lead with customer outcomes"

